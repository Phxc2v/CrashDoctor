- id: m25_tdr_delay
  title:
    en: "Raise GPU timeout (TdrDelay) for TOR shader compile"
    ru: "Поднять GPU-таймаут (TdrDelay) для компиляции шейдеров TOR"
    zh: "为 TOR 着色器编译提高显卡超时（TdrDelay）"
    zht: "為 TOR 著色器編譯提高顯示卡逾時（TdrDelay）"
    tr: "TOR gölgelendirici derlemesi için ekran kartı zaman aşımını (TdrDelay) yükselt"
  description:
    en: |
      Windows kills any GPU command that doesn't return within 2 seconds (TDR — Timeout
      Detection and Recovery). TOR's pbr_metallic.rs / faceshader_high.rs routinely take
      5-15 seconds per dispatch on a single shader permutation, so the OS thinks the GPU
      hung and kills it — leading to "out of memory during compilation" cascades and
      DXGI device-removed crashes during "Build Shader Cache".

      This module raises TdrDelay and TdrDdiDelay to 60 seconds, giving the compiler
      enough time to finish each permutation. Safe Microsoft-recommended workaround;
      reversible.
    ru: |
      Windows убивает любую GPU-команду, которая не вернула управление за 2 секунды
      (TDR — Timeout Detection and Recovery). pbr_metallic.rs / faceshader_high.rs в TOR
      компилируются по 5–15 с на одну перестановку шейдера — ОС думает что GPU завис и
      бьёт по рукам. Получаешь каскад «out of memory during compilation» и DXGI
      device-removed во время «Build Shader Cache».

      Модуль поднимает TdrDelay и TdrDdiDelay до 60 секунд — у компилятора будет время
      доделать каждую перестановку. Безопасный обходной путь, рекомендованный Microsoft;
      обратимый.
    zh: |
      Windows 会终止任何在 2 秒内没有返回的 GPU 命令（TDR —— Timeout
      Detection and Recovery）。TOR 的 pbr_metallic.rs / faceshader_high.rs 在单个着色器
      变体上经常每次调度需要 5–15 秒，于是系统以为显卡卡死并将其终止 —— 导致
      "out of memory during compilation" 级联错误，以及在 "Build Shader Cache" 期间
      出现 DXGI device-removed 崩溃。

      本模块把 TdrDelay 和 TdrDdiDelay 提高到 60 秒，给编译器足够的时间完成每个
      变体。这是微软推荐的安全变通方法；可撤销。
    zht: |
      Windows 會終止任何在 2 秒內沒有返回的 GPU 命令（TDR —— Timeout
      Detection and Recovery）。TOR 的 pbr_metallic.rs / faceshader_high.rs 在單個著色器
      變體上經常每次分派需要 5–15 秒，於是系統以為顯示卡卡死並將其終止 —— 導致
      "out of memory during compilation" 級聯錯誤，以及在 "Build Shader Cache" 期間
      出現 DXGI device-removed 當機。

      本模組把 TdrDelay 和 TdrDdiDelay 提高到 60 秒，給編譯器足夠的時間完成每個
      變體。這是微軟建議的安全變通方法；可復原。
    tr: |
      Windows, 2 saniye içinde geri dönmeyen herhangi bir GPU komutunu sonlandırır (TDR —
      Timeout Detection and Recovery). TOR'un pbr_metallic.rs / faceshader_high.rs dosyaları
      tek bir gölgelendirici permütasyonu için sevk başına düzenli olarak 5–15 saniye alır,
      bu yüzden işletim sistemi ekran kartının takıldığını düşünüp onu sonlandırır — bu da
      "out of memory during compilation" zincirlerine ve "Build Shader Cache" sırasında DXGI
      device-removed çökmelerine yol açar.

      Bu modül TdrDelay ve TdrDdiDelay değerlerini 60 saniyeye yükselterek derleyiciye her
      permütasyonu bitirmesi için yeterli zaman verir. Microsoft'un önerdiği güvenli bir
      geçici çözüm; geri alınabilir.
  details:
    en:
      - "Click Apply: Windows shows one UAC consent dialog — click Yes."
      - "Requires a reboot — Windows reads TDR settings only at boot."
      - "Reversible from the History tab."
      - "Set TdrDelay = TdrDdiDelay = 60 (seconds). Default is 2 / 5."
    ru:
      - "Нажми «Применить»: Windows покажет диалог UAC — нажми «Да»."
      - "Нужна перезагрузка — Windows читает настройки TDR только при загрузке."
      - "Откат — из вкладки Журнал."
      - "Ставит TdrDelay = TdrDdiDelay = 60 (секунд). По умолчанию 2 / 5."
    zh:
      - "点击应用：Windows 会显示一个 UAC 同意对话框 —— 点击「是」。"
      - "需要重启 —— Windows 只在开机时读取 TDR 设置。"
      - "可在历史标签页中撤销。"
      - "设置 TdrDelay = TdrDdiDelay = 60（秒）。默认值为 2 / 5。"
    zht:
      - "點擊套用：Windows 會顯示一個 UAC 同意對話方塊 —— 點擊「是」。"
      - "需要重新啟動 —— Windows 只在開機時讀取 TDR 設定。"
      - "可在歷史標籤頁中復原。"
      - "設定 TdrDelay = TdrDdiDelay = 60（秒）。預設值為 2 / 5。"
    tr:
      - "Uygula'ya tıklayın: Windows tek bir UAC onay penceresi gösterir — Evet'e tıklayın."
      - "Yeniden başlatma gerektirir — Windows TDR ayarlarını yalnızca açılışta okur."
      - "Geçmiş sekmesinden geri alınabilir."
      - "TdrDelay = TdrDdiDelay = 60 (saniye) olarak ayarlar. Varsayılan 2 / 5'tir."
