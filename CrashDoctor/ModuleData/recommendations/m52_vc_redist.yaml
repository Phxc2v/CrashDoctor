- id: m52_vc_redist
  title:
    en: "Visual C++ 2015-2022 x64 Redistributable check"
    ru: "Проверка Visual C++ 2015-2022 x64 Redistributable"
    zh: "检查 Visual C++ 2015-2022 x64 Redistributable"
    zht: "檢查 Visual C++ 2015-2022 x64 Redistributable"
    tr: "Visual C++ 2015-2022 x64 Redistributable kontrolü"
  description:
    en: |
      Bannerlord ships native DLLs (TaleWorlds.Native.dll, FMOD, libcrypto) that link
      against vcruntime140.dll and msvcp140.dll from the Visual C++ 2015-2022 x64
      runtime. If the system has only the x86 redist or none, the launcher fails to
      load TaleWorlds.MountAndBlade.dll with BadImageFormatException — players think
      it's a mod conflict and start uninstalling things at random.

      Card surfaces only when x64 redist is missing or older than 14.30 (the VS2022
      baseline that Bannerlord 1.3.x is built against).
    ru: |
      Bannerlord использует нативные DLL (TaleWorlds.Native.dll, FMOD, libcrypto),
      которые слинкованы с vcruntime140.dll и msvcp140.dll из Visual C++ 2015-2022
      x64 runtime. Если на системе только x86-редист или вообще ничего, лаунчер
      не загрузит TaleWorlds.MountAndBlade.dll и упадёт с BadImageFormatException —
      игрок будет думать что это конфликт модов и начнёт удалять моды наугад.

      Карточка появляется только если x64-редист отсутствует или версия меньше
      14.30 (минимум для Bannerlord 1.3.x, собранного под VS2022).
    zh: |
      Bannerlord 附带了原生 DLL（TaleWorlds.Native.dll、FMOD、libcrypto），它们链接到
      Visual C++ 2015-2022 x64 运行库中的 vcruntime140.dll 和 msvcp140.dll。如果系统
      只装了 x86 redist 或完全没有，启动器加载 TaleWorlds.MountAndBlade.dll 时会以
      BadImageFormatException 失败——玩家会以为是模组冲突，于是开始随机卸载东西。

      这张卡片只在缺失 x64 redist 或版本低于 14.30（Bannerlord 1.3.x 所基于的 VS2022
      基准）时才出现。
    zht: |
      Bannerlord 附帶了原生 DLL（TaleWorlds.Native.dll、FMOD、libcrypto），它們連結到
      Visual C++ 2015-2022 x64 執行階段程式庫中的 vcruntime140.dll 和 msvcp140.dll。如果系統
      只裝了 x86 redist 或完全沒有，啟動器載入 TaleWorlds.MountAndBlade.dll 時會以
      BadImageFormatException 失敗——玩家會以為是模組衝突，於是開始隨機解除安裝東西。

      這張卡片只在缺失 x64 redist 或版本低於 14.30（Bannerlord 1.3.x 所基於的 VS2022
      基準）時才出現。
    tr: |
      Bannerlord, Visual C++ 2015-2022 x64 çalışma zamanından vcruntime140.dll ve
      msvcp140.dll'ye bağlanan yerel DLL'lerle (TaleWorlds.Native.dll, FMOD, libcrypto)
      gelir. Sistemde yalnızca x86 redist varsa veya hiç yoksa, başlatıcı
      TaleWorlds.MountAndBlade.dll'yi BadImageFormatException ile yükleyemez — oyuncular
      bunun bir mod çakışması olduğunu sanır ve rastgele şeyler kaldırmaya başlar.

      Kart yalnızca x64 redist eksik olduğunda veya 14.30'dan (Bannerlord 1.3.x'in
      derlendiği VS2022 temeli) eski olduğunda görünür.
  details:
    en:
      - "Read-only. Apply opens https://aka.ms/vs/17/release/vc_redist.x64.exe in your browser."
      - "Crash Doctor never downloads or installs software itself."
      - "Source: HKLM\\SOFTWARE\\Microsoft\\VisualStudio\\14.0\\VC\\Runtimes\\x64."
      - "Not reversible."
    ru:
      - "Только проверка. «Применить» откроет https://aka.ms/vs/17/release/vc_redist.x64.exe в браузере."
      - "Crash Doctor сам ничего не качает и не устанавливает."
      - "Источник: HKLM\\SOFTWARE\\Microsoft\\VisualStudio\\14.0\\VC\\Runtimes\\x64."
      - "Откат не предусмотрен."
    zh:
      - "只读。「应用」会在浏览器中打开 https://aka.ms/vs/17/release/vc_redist.x64.exe。"
      - "Crash Doctor 绝不会自行下载或安装软件。"
      - "来源：HKLM\\SOFTWARE\\Microsoft\\VisualStudio\\14.0\\VC\\Runtimes\\x64。"
      - "不可撤销。"
    zht:
      - "唯讀。「套用」會在瀏覽器中開啟 https://aka.ms/vs/17/release/vc_redist.x64.exe。"
      - "Crash Doctor 絕不會自行下載或安裝軟體。"
      - "來源：HKLM\\SOFTWARE\\Microsoft\\VisualStudio\\14.0\\VC\\Runtimes\\x64。"
      - "不可復原。"
    tr:
      - "Salt okunur. «Uygula» tarayıcınızda https://aka.ms/vs/17/release/vc_redist.x64.exe adresini açar."
      - "Crash Doctor kendisi asla yazılım indirmez veya kurmaz."
      - "Kaynak: HKLM\\SOFTWARE\\Microsoft\\VisualStudio\\14.0\\VC\\Runtimes\\x64."
      - "Geri alınamaz."
