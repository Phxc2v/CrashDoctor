- id: m32_onedrive_docs
  title:
    en: "Documents folder is on OneDrive"
    ru: "Папка «Документы» на OneDrive"
    zh: "「文档」文件夹位于 OneDrive 上"
    zht: "「文件」資料夾位於 OneDrive 上"
    tr: "Belgeler klasörü OneDrive üzerinde"
  description:
    en: |
      Bannerlord stores saves, configs and shader logs under Documents. When Documents is
      redirected through OneDrive (default on new Windows installs), OneDrive's lazy-sync
      can lock files mid-write — that corrupts saves on a long campaign — or fail log
      rotation while the cloud is busy. The recommended fix is to mark the Bannerlord
      folder as 'Always keep on this device' or to disable OneDrive backup of Documents
      entirely.
    ru: |
      Bannerlord хранит сейвы, конфиги и логи шейдеров в папке «Документы». Когда
      «Документы» проксированы через OneDrive (по умолчанию на свежей Windows),
      ленивая синхронизация OneDrive может блокировать файлы при сохранении игры —
      это калечит сейвы в долгой кампании — или ломает ротацию логов когда облако занято.
      Рекомендованный фикс: пометить папку Bannerlord как «Всегда сохранять на этом
      устройстве» или полностью отключить резервное копирование «Документов» в OneDrive.
    zh: |
      Bannerlord 将存档、配置和着色器日志保存在「文档」文件夹下。当「文档」通过
      OneDrive 重定向时（新装 Windows 的默认设置），OneDrive 的延迟同步可能会在
      写入过程中锁定文件——这会损坏长期战役的存档——或在云端繁忙时导致日志轮转失败。
      推荐的修复方法是将 Bannerlord 文件夹标记为「始终保留在此设备上」，或者完全禁用
      OneDrive 对「文档」的备份。
    zht: |
      Bannerlord 將存檔、設定和著色器記錄儲存在「文件」資料夾下。當「文件」透過
      OneDrive 重新導向時（新裝 Windows 的預設設定），OneDrive 的延遲同步可能會在
      寫入過程中鎖定檔案——這會損壞長期戰役的存檔——或在雲端忙碌時導致記錄輪替失敗。
      推薦的修復方法是將 Bannerlord 資料夾標記為「永遠保留在此裝置上」，或者完全停用
      OneDrive 對「文件」的備份。
    tr: |
      Bannerlord kayıtları, yapılandırmaları ve gölgelendirici günlüklerini Belgeler
      altında saklar. Belgeler OneDrive üzerinden yönlendirildiğinde (yeni Windows
      kurulumlarında varsayılan), OneDrive'ın tembel eşitlemesi yazma sırasında
      dosyaları kilitleyebilir — bu da uzun bir kampanyada kayıtları bozar — veya bulut
      meşgulken günlük döndürmeyi başarısız kılabilir. Önerilen düzeltme, Bannerlord
      klasörünü 'Her zaman bu cihazda tut' olarak işaretlemek veya Belgeler'in OneDrive
      yedeklemesini tamamen devre dışı bırakmaktır.
  details:
    en:
      - "⚠ DO NOT delete the OneDrive folder. That wipes your saves both locally and in the cloud sync. Use the steps below — they keep your saves intact."
      - "Apply opens the Bannerlord folder in Documents."
      - "Right-click 'Mount and Blade II Bannerlord' → 'Always keep on this device' (forces local copy, saves stay)."
      - "Permanent fix: OneDrive Settings → Backup → Manage backup → uncheck 'Documents'. Files stay in your local Documents folder, OneDrive just stops syncing them."
      - "If you already deleted OneDrive folder by accident: saves are recoverable for 30 days at https://onedrive.live.com → Recycle Bin (and local Recycle Bin)."
      - "After re-pinning, save corruption risk drops sharply on long campaigns."
    ru:
      - "⚠ НЕ УДАЛЯЙ папку OneDrive целиком. Это снесёт твои сейвы и локально, и из облачной синхронизации. Используй шаги ниже — они оставляют сейвы в целости."
      - "«Применить» откроет папку Bannerlord в Документах."
      - "Правый клик по «Mount and Blade II Bannerlord» → «Всегда сохранять на этом устройстве» (форсит локальную копию, сейвы остаются на месте)."
      - "Полный фикс: OneDrive → Настройки → Резервное копирование → снять галку «Документы». Файлы остаются в локальной папке Документы, OneDrive просто перестаёт их синкать."
      - "Если уже случайно удалил папку OneDrive — сейвы восстанавливаются 30 дней через https://onedrive.live.com → Корзина (и локальная Корзина Windows)."
      - "После репина риск битых сейвов в долгой кампании резко падает."
    zh:
      - "⚠ 不要删除整个 OneDrive 文件夹。那会同时抹掉你本地和云端同步中的存档。请使用下面的步骤——它们会保持你的存档完好。"
      - "「应用」会打开「文档」中的 Bannerlord 文件夹。"
      - "右键点击「Mount and Blade II Bannerlord」→「始终保留在此设备上」（强制本地副本，存档保留）。"
      - "永久修复：OneDrive 设置 → 备份 → 管理备份 → 取消勾选「文档」。文件会保留在你本地的「文档」文件夹中，OneDrive 只是停止同步它们。"
      - "如果你已经不小心删除了 OneDrive 文件夹：存档可在 30 天内通过 https://onedrive.live.com → 回收站（以及本地回收站）恢复。"
      - "重新固定后，长期战役中存档损坏的风险会大幅下降。"
    zht:
      - "⚠ 不要刪除整個 OneDrive 資料夾。那會同時抹掉你本機和雲端同步中的存檔。請使用下面的步驟——它們會保持你的存檔完好。"
      - "「套用」會開啟「文件」中的 Bannerlord 資料夾。"
      - "右鍵點擊「Mount and Blade II Bannerlord」→「永遠保留在此裝置上」（強制本機副本，存檔保留）。"
      - "永久修復：OneDrive 設定 → 備份 → 管理備份 → 取消勾選「文件」。檔案會保留在你本機的「文件」資料夾中，OneDrive 只是停止同步它們。"
      - "如果你已經不小心刪除了 OneDrive 資料夾：存檔可在 30 天內透過 https://onedrive.live.com → 資源回收筒（以及本機資源回收筒）復原。"
      - "重新固定後，長期戰役中存檔損壞的風險會大幅下降。"
    tr:
      - "⚠ OneDrive klasörünü tamamen SİLMEYİN. Bu, kayıtlarınızı hem yerelde hem de bulut eşitlemesinde siler. Aşağıdaki adımları kullanın — bunlar kayıtlarınızı sağlam tutar."
      - "«Uygula», Belgeler içindeki Bannerlord klasörünü açar."
      - "'Mount and Blade II Bannerlord' üzerine sağ tıklayın → 'Her zaman bu cihazda tut' (yerel kopyayı zorlar, kayıtlar kalır)."
      - "Kalıcı düzeltme: OneDrive Ayarları → Yedekleme → Yedeklemeyi yönet → 'Belgeler' işaretini kaldırın. Dosyalar yerel Belgeler klasörünüzde kalır, OneDrive yalnızca eşitlemeyi durdurur."
      - "OneDrive klasörünü yanlışlıkla zaten sildiyseniz: kayıtlar 30 gün boyunca https://onedrive.live.com → Geri Dönüşüm Kutusu (ve yerel Geri Dönüşüm Kutusu) üzerinden kurtarılabilir."
      - "Yeniden sabitledikten sonra, uzun kampanyalarda kayıt bozulma riski belirgin şekilde düşer."
