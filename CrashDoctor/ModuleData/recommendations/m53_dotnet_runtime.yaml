- id: m53_dotnet_runtime
  title:
    en: ".NET Framework 4.7.2+ check"
    ru: "Проверка .NET Framework 4.7.2+"
    zh: ".NET Framework 4.7.2+ 检查"
    zht: ".NET Framework 4.7.2+ 檢查"
    tr: ".NET Framework 4.7.2+ kontrolü"
  description:
    en: |
      Bannerlord 1.3.x and the BUTR family of mods (BLSE, ButterLib, MCM) target
      net472. The classic .NET Framework registry key (HKLM\SOFTWARE\Microsoft\NET
      Framework Setup\NDP\v4\Full) tells us what's actually on the box. Below 4.7.2
      you'll get BadImageFormatException at module load time.

      We don't use `dotnet --list-runtimes` — that's for .NET Core / .NET 5+ and
      doesn't list classic Framework. Registry is the authoritative source.
    ru: |
      Bannerlord 1.3.x и семейство BUTR (BLSE, ButterLib, MCM) собраны под net472.
      Классическая ветка реестра .NET Framework (HKLM\SOFTWARE\Microsoft\NET
      Framework Setup\NDP\v4\Full) говорит, что реально установлено. Меньше 4.7.2 —
      на загрузке модулей будет BadImageFormatException.

      Мы НЕ используем `dotnet --list-runtimes` — он для .NET Core / .NET 5+ и
      классический Framework не показывает. Реестр — авторитетный источник.
    zh: |
      Bannerlord 1.3.x 和 BUTR 系列模组（BLSE、ButterLib、MCM）都以 net472 为目标。
      经典 .NET Framework 注册表键（HKLM\SOFTWARE\Microsoft\NET Framework Setup\NDP\v4\Full）
      会告诉我们机器上实际安装的版本。低于 4.7.2 时，模块加载阶段就会出现
      BadImageFormatException。

      我们不使用 `dotnet --list-runtimes`——那是针对 .NET Core / .NET 5+ 的，
      不会列出经典 Framework。注册表才是权威来源。
    zht: |
      Bannerlord 1.3.x 和 BUTR 系列模組（BLSE、ButterLib、MCM）都以 net472 為目標。
      經典 .NET Framework 登錄機碼（HKLM\SOFTWARE\Microsoft\NET Framework Setup\NDP\v4\Full）
      會告訴我們機器上實際安裝的版本。低於 4.7.2 時，模組載入階段就會出現
      BadImageFormatException。

      我們不使用 `dotnet --list-runtimes`——那是針對 .NET Core / .NET 5+ 的，
      不會列出經典 Framework。登錄才是權威來源。
    tr: |
      Bannerlord 1.3.x ve BUTR ailesi modları (BLSE, ButterLib, MCM) net472'yi hedefler.
      Klasik .NET Framework kayıt defteri anahtarı (HKLM\SOFTWARE\Microsoft\NET Framework
      Setup\NDP\v4\Full) makinede gerçekte ne olduğunu söyler. 4.7.2'nin altında, modül
      yükleme sırasında BadImageFormatException alırsınız.

      `dotnet --list-runtimes` kullanmıyoruz — o, .NET Core / .NET 5+ içindir ve klasik
      Framework'ü listelemez. Kayıt defteri yetkili kaynaktır.
  details:
    en:
      - "Apply opens Microsoft's .NET 4.8 download page (latest supported on Win10, fully back-compatible)."
      - "Source: HKLM Release DWORD value mapped to friendly version name."
      - "Threshold: 461808 (.NET 4.7.2)."
      - "Not reversible."
    ru:
      - "«Применить» откроет страницу загрузки .NET 4.8 от Microsoft (последний на Win10, обратная совместимость)."
      - "Источник: HKLM Release DWORD, маппится в человекочитаемое имя."
      - "Порог: 461808 (.NET 4.7.2)."
      - "Откат не предусмотрен."
    zh:
      - "「应用」会打开 Microsoft 的 .NET 4.8 下载页面（Win10 上支持的最新版本，完全向后兼容）。"
      - "来源：HKLM 的 Release DWORD 值，映射为易读的版本名称。"
      - "阈值：461808（.NET 4.7.2）。"
      - "不可撤销。"
    zht:
      - "「套用」會開啟 Microsoft 的 .NET 4.8 下載頁面（Win10 上支援的最新版本，完全向後相容）。"
      - "來源：HKLM 的 Release DWORD 值，對應為易讀的版本名稱。"
      - "閾值：461808（.NET 4.7.2）。"
      - "不可復原。"
    tr:
      - "«Uygula» Microsoft'un .NET 4.8 indirme sayfasını açar (Win10'da desteklenen en son sürüm, tamamen geriye dönük uyumlu)."
      - "Kaynak: HKLM Release DWORD değeri, okunabilir sürüm adına eşlenir."
      - "Eşik: 461808 (.NET 4.7.2)."
      - "Geri alınamaz."
