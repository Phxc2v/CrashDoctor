- id: m24_bad_driver
  title:
    en: "Known-bad GPU driver detection"
    ru: "Детект GPU-драйвера из known-bad списка"
    zh: "已知问题显卡驱动程序检测"
    zht: "已知問題顯示卡驅動程式偵測"
    tr: "Bilinen sorunlu ekran kartı sürücüsü tespiti"
  description:
    en: |
      Looks up your live driver version against a shipped JSON manifest of
      known-bad versions reported by the community on the Telegram channel.
      Surfaces the exact reason (e.g. "TDR cascade in TOR shader compile") and
      the recommended action (upgrade to N+ / roll back to N-).

      Crash Doctor never installs or rolls back drivers — too risky and vendor-
      specific. Apply opens the relevant vendor's driver page. You handle the
      install yourself.

      The manifest lives in ModuleData/bad_drivers.json and is data-edited.
      Spot a new bad driver? Drop a note in t.me/CodeRickTg and we'll add a row.
    ru: |
      Сверяет твою живую версию драйвера со списком known-bad версий из JSON-
      манифеста, обновляемого сообществом через Telegram-канал. Показывает
      точную причину (например, "TDR-каскад при компиляции шейдеров TOR") и
      рекомендуемое действие (обновить до N+ / откатить на N-).

      Crash Doctor сам драйверы не ставит и не откатывает — слишком рискованно
      и vendor-specific. «Применить» откроет страницу драйверов нужного
      vendor'а. Установку делаешь сам.

      Манифест — в ModuleData/bad_drivers.json, редактируется данными. Нашёл
      новый плохой драйвер? Напиши в t.me/CodeRickTg, добавим запись.
    zh: |
      将你的实时驱动程序版本与随附的 JSON 清单进行比对，该清单记录了
      社区在 Telegram 频道上报告的已知问题版本。
      给出确切原因（例如 "TDR cascade in TOR shader compile"）以及
      推荐的操作（升级到 N+ / 回退到 N-）。

      Crash Doctor 从不安装或回退驱动程序 —— 风险太高且因厂商而异。
      应用会打开相应厂商的驱动程序页面。安装由你自己完成。

      清单位于 ModuleData/bad_drivers.json，以数据方式编辑。
      发现了新的问题驱动程序？在 t.me/CodeRickTg 留言，我们会加一条记录。
    zht: |
      將你的即時驅動程式版本與隨附的 JSON 清單進行比對，該清單記錄了
      社群在 Telegram 頻道上回報的已知問題版本。
      給出確切原因（例如 "TDR cascade in TOR shader compile"）以及
      建議的操作（升級到 N+ / 回復到 N-）。

      Crash Doctor 從不安裝或回復驅動程式 —— 風險太高且因廠商而異。
      套用會開啟對應廠商的驅動程式頁面。安裝由你自己完成。

      清單位於 ModuleData/bad_drivers.json，以資料方式編輯。
      發現了新的問題驅動程式？在 t.me/CodeRickTg 留言，我們會加一條記錄。
    tr: |
      Canlı sürücü sürümünüzü, topluluğun Telegram kanalında bildirdiği bilinen
      sorunlu sürümlerin paketlenmiş bir JSON bildirimine karşı arar.
      Tam nedeni (örneğin "TDR cascade in TOR shader compile") ve önerilen
      eylemi (N+ sürümüne yükselt / N- sürümüne geri dön) gösterir.

      Crash Doctor asla sürücü kurmaz veya geri almaz — fazla riskli ve üreticiye
      özgü. Uygula ilgili üreticinin sürücü sayfasını açar. Kurulumu kendiniz
      yaparsınız.

      Bildirim ModuleData/bad_drivers.json içinde yer alır ve veri olarak düzenlenir.
      Yeni bir sorunlu sürücü mü buldunuz? t.me/CodeRickTg adresine not bırakın, bir
      satır ekleyelim.
  details:
    en:
      - "Source: ModuleData/bad_drivers.json (manifest)."
      - "Match: vendor substring in GPU name + exact driver-version string."
      - "Apply opens vendor driver page (NVIDIA / AMD / Intel)."
      - "Not reversible — Apply only opens URLs."
    ru:
      - "Источник: ModuleData/bad_drivers.json (манифест)."
      - "Сравнение: vendor-подстрока в имени GPU + точная строка версии драйвера."
      - "«Применить» откроет страницу драйверов vendor'а (NVIDIA / AMD / Intel)."
      - "Откат не предусмотрен — кнопка только открывает URL."
    zh:
      - "来源：ModuleData/bad_drivers.json（清单）。"
      - "匹配：显卡名称中的厂商子串 + 精确的驱动程序版本字符串。"
      - "应用会打开厂商驱动程序页面（NVIDIA / AMD / Intel）。"
      - "不可撤销 —— 应用只会打开 URL。"
    zht:
      - "來源：ModuleData/bad_drivers.json（清單）。"
      - "比對：顯示卡名稱中的廠商子字串 + 精確的驅動程式版本字串。"
      - "套用會開啟廠商驅動程式頁面（NVIDIA / AMD / Intel）。"
      - "不可復原 —— 套用只會開啟 URL。"
    tr:
      - "Kaynak: ModuleData/bad_drivers.json (bildirim)."
      - "Eşleşme: ekran kartı adındaki üretici alt dizesi + tam sürücü sürümü dizesi."
      - "Uygula üreticinin sürücü sayfasını açar (NVIDIA / AMD / Intel)."
      - "Geri alınamaz — düğme yalnızca URL açar."
