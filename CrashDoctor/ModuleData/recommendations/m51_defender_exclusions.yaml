- id: m51_defender_exclusions
  title:
    en: "Add Bannerlord folders to Windows Defender exclusions"
    ru: "Добавить папки Bannerlord в исключения Windows Defender"
    zh: "将 Bannerlord 文件夹添加到 Windows Defender 排除项"
    tr: "Bannerlord klasörlerini Windows Defender hariç tutmalarına ekle"
  description:
    en: |
      Windows Defender's real-time scan stays on top of every file write. During TOR
      shader compilation Bannerlord writes 30+ GB of intermediate files in seconds,
      and Defender's I/O hooking creates contention that the engine logs as «Trying
      to make partial read on compressed asset data» — a known precursor to async-
      I/O fault crashes (see assets.tpac_async_read_burst rule).

      Adding the install + Workshop folders to Defender's exclusion list eliminates
      the contention WITHOUT disabling Defender system-wide. If you have a third-
      party AV (Kaspersky, ESET, Avast), add the same paths there manually — Defender
      exclusions don't propagate to other security suites.
    ru: |
      Real-time скан Windows Defender'а сидит на каждой записи в файл. При компиляции
      шейдеров TOR Bannerlord пишет 30+ ГБ промежуточных файлов за секунды, и I/O-хуки
      Defender'а создают contention, который движок логирует как «Trying to make
      partial read on compressed asset data» — известный прекурсор крэша async-I/O
      (см. правило assets.tpac_async_read_burst).

      Добавление папки игры и Workshop'а в exclusion list устраняет contention БЕЗ
      отключения Defender'а на всю систему. Если стоит сторонний AV (Kaspersky, ESET,
      Avast) — добавь те же пути там вручную, исключения Defender'а на сторонние
      продукты не распространяются.
    zh: |
      Windows Defender 的实时扫描会盯着每一次文件写入。在 TOR 着色器编译期间，
      Bannerlord 会在几秒内写入 30+ GB 的中间文件，而 Defender 的 I/O 挂钩会造成争用，
      引擎将其记录为「Trying to make partial read on compressed asset data」——
      这是异步 I/O 故障崩溃的已知前兆（参见 assets.tpac_async_read_burst 规则）。

      将安装目录 + 创意工坊文件夹添加到 Defender 的排除列表，可以在不在系统范围内
      禁用 Defender 的情况下消除争用。如果你使用第三方杀毒软件（Kaspersky、ESET、Avast），
      请在那里手动添加相同的路径——Defender 的排除项不会传播到其他安全套件。
    tr: |
      Windows Defender'ın gerçek zamanlı taraması her dosya yazımının üzerinde durur. TOR
      gölgelendirici derlemesi sırasında Bannerlord saniyeler içinde 30+ GB ara dosya
      yazar ve Defender'ın G/Ç kancası, motorun «Trying to make partial read on
      compressed asset data» olarak günlüğe kaydettiği bir çekişme yaratır — eşzamansız
      G/Ç hatası çökmelerinin bilinen bir öncülüdür (assets.tpac_async_read_burst
      kuralına bakın).

      Kurulum + Atölye klasörlerini Defender'ın hariç tutma listesine eklemek,
      Defender'ı sistem genelinde devre dışı bırakmadan çekişmeyi ortadan kaldırır.
      Üçüncü taraf bir AV'niz varsa (Kaspersky, ESET, Avast), aynı yolları orada manuel
      olarak ekleyin — Defender hariç tutmaları diğer güvenlik paketlerine yayılmaz.
  details:
    en:
      - "Action: `Add-MpPreference -ExclusionPath` for game install + Workshop content folder (261550)."
      - "Single UAC dialog. Reversible from History tab (`Remove-MpPreference`)."
      - "Does NOT disable Windows Defender — only excludes those two folders."
      - "Third-party antivirus is not affected — add the same paths in its UI manually."
    ru:
      - "Действие: `Add-MpPreference -ExclusionPath` для папки игры + Workshop content (261550)."
      - "Один UAC-диалог. Откат из вкладки Журнал (`Remove-MpPreference`)."
      - "Defender НЕ отключается — только исключаются эти две папки."
      - "Сторонний AV не затрагивается — добавь те же пути в его UI вручную."
    zh:
      - "操作：对游戏安装目录 + 创意工坊内容文件夹（261550）执行 `Add-MpPreference -ExclusionPath`。"
      - "单个 UAC 对话框。可从「历史」选项卡撤销（`Remove-MpPreference`）。"
      - "不会禁用 Windows Defender——只排除这两个文件夹。"
      - "第三方杀毒软件不受影响——请在其界面中手动添加相同的路径。"
    tr:
      - "Eylem: oyun kurulumu + Atölye içerik klasörü (261550) için `Add-MpPreference -ExclusionPath`."
      - "Tek bir UAC iletişim kutusu. Geçmiş sekmesinden geri alınabilir (`Remove-MpPreference`)."
      - "Windows Defender'ı DEVRE DIŞI BIRAKMAZ — yalnızca bu iki klasörü hariç tutar."
      - "Üçüncü taraf antivirüs etkilenmez — aynı yolları kendi arayüzünde manuel olarak ekleyin."
