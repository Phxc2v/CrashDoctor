- id: m14_dump_cleanup
  title:
    en: "Clean up old crash dumps"
    ru: "Очистить старые крэш-дампы"
    zh: "清理旧的崩溃转储"
    zht: "清理舊的當機傾印"
    tr: "Eski çökme dökümlerini temizle"
  description:
    en: |
      Each Bannerlord crash leaves a folder with a 0.5–1.5 GB minidump and log files
      under ProgramData\Mount and Blade II Bannerlord\crashes\. Over time these eat
      tens of GB of disk space and slow down loading.
    ru: |
      Каждый краш Bannerlord оставляет папку с минидампом 0.5–1.5 ГБ и логами в
      ProgramData\Mount and Blade II Bannerlord\crashes\. Со временем они съедают
      десятки ГБ места и тормозят загрузку.
    zh: |
      Bannerlord 每次崩溃都会在 ProgramData\Mount and Blade II Bannerlord\crashes\
      下留下一个文件夹，里面有 0.5–1.5 GB 的小型转储和日志文件。时间一长这些会占用
      几十 GB 的磁盘空间并拖慢加载。
    zht: |
      Bannerlord 每次當機都會在 ProgramData\Mount and Blade II Bannerlord\crashes\
      下留下一個資料夾，裡面有 0.5–1.5 GB 的小型傾印和記錄檔。時間一長這些會占用
      幾十 GB 的磁碟空間並拖慢載入。
    tr: |
      Bannerlord her çökmesinde ProgramData\Mount and Blade II Bannerlord\crashes\
      altında 0.5–1.5 GB'lık bir mini döküm ve günlük dosyaları içeren bir klasör
      bırakır. Zamanla bunlar onlarca GB disk alanı yer ve yüklemeyi yavaşlatır.
  details:
    en:
      - "The 3 most recent crash folders are kept for diagnostic continuity."
      - "Older folders go to the Windows Recycle Bin and can be restored from there."
      - "No reboot required."
    ru:
      - "Последние 3 папки крашей сохраняются — на случай если понадобятся для диагностики."
      - "Остальные уезжают в корзину Windows и могут быть восстановлены оттуда."
      - "Перезагрузка не нужна."
    zh:
      - "保留最近的 3 个崩溃文件夹，以备诊断之需。"
      - "较旧的文件夹会进入 Windows 回收站，可从那里恢复。"
      - "无需重启。"
    zht:
      - "保留最近的 3 個當機資料夾，以備診斷之需。"
      - "較舊的資料夾會進入 Windows 資源回收筒，可從那裡還原。"
      - "無需重新啟動。"
    tr:
      - "Tanılama sürekliliği için en yeni 3 çökme klasörü saklanır."
      - "Daha eski klasörler Windows Geri Dönüşüm Kutusu'na gider ve oradan geri getirilebilir."
      - "Yeniden başlatma gerekmez."
