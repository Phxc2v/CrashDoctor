- id: m42_integrity_check
  title:
    en: "SHA-256 integrity check against shipped manifest"
    ru: "Проверка целостности SHA-256 по shipped-манифесту"
    zh: "根据随附清单进行 SHA-256 完整性检查"
    zht: "根據隨附資訊清單進行 SHA-256 完整性檢查"
    tr: "Birlikte gelen manifestoya karşı SHA-256 bütünlük denetimi"
  description:
    en: |
      Catches: partial Workshop downloads (Steam said "subscribed" but a file is
      shorter than expected), AV-quarantined DLLs that came back zero-byte,
      manual user edits to mod files, and tampering / "premium fix" malware DLLs
      swapping on top of the legit mod.

      The manifest lives in `ModuleData/integrity_manifest.json`. By default it
      is empty — populated only when we have a verified-clean reference install
      to hash against. Until then, the card stays NotApplicable and hidden, so
      no false positives on a fresh install.

      Apply doesn't touch files; it just opens the Steam Workshop page so the
      user can re-subscribe to the affected mod (canonical fix for Workshop
      corruption).
    ru: |
      Ловит: частичные докачки Workshop'а (Steam говорит «подписан», но файл
      короче ожидаемого), AV-карантин нашей DLL (которая вернулась 0 байт),
      ручные правки мод-файлов пользователем, а также подмену файлов
      малварью / «premium fix»-DLL, поверх легитимного мода.

      Манифест — в `ModuleData/integrity_manifest.json`. По умолчанию пуст —
      заполняется только когда есть верифицированная чистая reference-установка
      для хэшей. До тех пор карточка остаётся NotApplicable и скрыта,
      без false positive на свежей установке.

      «Применить» файлы не трогает; открывает страницу Steam Workshop чтобы
      переподписаться на затронутый мод (каноничный фикс corruption Workshop'а).
    zh: |
      可捕捉：创意工坊的部分下载（Steam 显示「已订阅」，但某个文件比预期短）、
      被杀毒软件隔离后变成零字节的 DLL、用户对模组文件的手动编辑，以及篡改 /
      「premium fix」恶意软件 DLL 覆盖在合法模组之上的情况。

      清单位于 `ModuleData/integrity_manifest.json`。默认情况下它是空的——
      只有在我们拥有经过验证的干净参考安装可供哈希比对时才会填充。在此之前，
      这张卡片保持 NotApplicable 并隐藏，因此在全新安装上不会出现误报。

      「应用」不会触碰文件；它只是打开 Steam 创意工坊页面，让用户重新订阅
      受影响的模组（创意工坊损坏的标准修复方法）。
    zht: |
      可捕捉：創意工坊的部分下載（Steam 顯示「已訂閱」，但某個檔案比預期短）、
      被防毒軟體隔離後變成零位元組的 DLL、使用者對模組檔案的手動編輯，以及竄改 /
      「premium fix」惡意軟體 DLL 覆蓋在合法模組之上的情況。

      資訊清單位於 `ModuleData/integrity_manifest.json`。預設情況下它是空的——
      只有在我們擁有經過驗證的乾淨參考安裝可供雜湊比對時才會填充。在此之前，
      這張卡片保持 NotApplicable 並隱藏，因此在全新安裝上不會出現誤報。

      「套用」不會觸碰檔案；它只是開啟 Steam 創意工坊頁面，讓使用者重新訂閱
      受影響的模組（創意工坊損壞的標準修復方法）。
    tr: |
      Şunları yakalar: kısmi Atölye indirmeleri (Steam "abone olundu" der ama bir dosya
      beklenenden kısadır), geri döndüğünde sıfır bayt olan AV karantinasındaki DLL'ler,
      kullanıcının mod dosyalarında yaptığı manuel düzenlemeler ve meşru modun üzerine
      geçen kurcalama / "premium fix" kötü amaçlı DLL'ler.

      Manifesto `ModuleData/integrity_manifest.json` içinde yer alır. Varsayılan olarak
      boştur — yalnızca karşılaştırma için doğrulanmış-temiz bir referans kurulumumuz
      olduğunda doldurulur. O zamana kadar kart NotApplicable kalır ve gizlenir, böylece
      yeni bir kurulumda yanlış pozitif olmaz.

      Uygula dosyalara dokunmaz; yalnızca kullanıcının etkilenen moda yeniden abone
      olabilmesi için Steam Atölye sayfasını açar (Atölye bozulması için standart düzeltme).
  details:
    en:
      - "Read-only check. Hash algorithm: SHA-256."
      - "Empty manifest = NotApplicable (card hidden)."
      - "Apply opens steam://url/CommunityFilePage/261550."
      - "Not reversible (read-only)."
    ru:
      - "Только проверка. Алгоритм: SHA-256."
      - "Пустой манифест = NotApplicable (карточка скрыта)."
      - "«Применить» откроет steam://url/CommunityFilePage/261550."
      - "Откат не предусмотрен (read-only)."
    zh:
      - "只读检查。哈希算法：SHA-256。"
      - "空清单 = NotApplicable（卡片隐藏）。"
      - "「应用」会打开 steam://url/CommunityFilePage/261550。"
      - "不可撤销（只读）。"
    zht:
      - "唯讀檢查。雜湊演算法：SHA-256。"
      - "空資訊清單 = NotApplicable（卡片隱藏）。"
      - "「套用」會開啟 steam://url/CommunityFilePage/261550。"
      - "不可復原（唯讀）。"
    tr:
      - "Salt okunur kontrol. Karma algoritması: SHA-256."
      - "Boş manifesto = NotApplicable (kart gizli)."
      - "«Uygula» steam://url/CommunityFilePage/261550 adresini açar."
      - "Geri alınamaz (salt okunur)."
