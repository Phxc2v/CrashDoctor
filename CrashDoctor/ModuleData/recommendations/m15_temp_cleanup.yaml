- id: m15_temp_cleanup
  title:
    en: "Clean stale %TEMP% files"
    ru: "Очистить старые файлы из %TEMP%"
    zh: "清理 %TEMP% 中的陈旧文件"
    zht: "清理 %TEMP% 中的陳舊檔案"
    tr: "%TEMP% içindeki eski dosyaları temizle"
  description:
    en: |
      Bannerlord's shader compiler and TaleWorlds.Native FMOD layer write intermediate
      scratch files to the user's %TEMP% folder. On a long-running install %TEMP% hits
      5–20 GB and Windows starts running out of scratch space — that's when shader-
      compile OOM crashes show up at the most random moments.

      Per-file deletion only: skips anything locked by another process (Steam, Edge,
      Office, OneDrive). Only files older than 7 days are touched. Safe to run while
      other apps are open. Bannerlord must be closed (the launcher itself can hold
      handles to /Temp/RGL_*.tmp shader scratch files).
    ru: |
      Компилятор шейдеров Bannerlord и нативный FMOD-слой пишут промежуточные scratch-
      файлы в пользовательский %TEMP%. На долго работающей установке %TEMP% разрастается
      до 5–20 ГБ и Windows перестаёт хватать scratch-пространства — отсюда OOM-крэши
      компилятора шейдеров в самые неожиданные моменты.

      Поштучное удаление: всё, что заблокировано другим процессом (Steam, Edge, Office,
      OneDrive) — пропускается. Удаляются только файлы старше 7 дней. Безопасно запускать
      с открытыми приложениями. Bannerlord должен быть закрыт (лаунчер держит хэндлы
      на /Temp/RGL_*.tmp файлы компилятора).
    zh: |
      Bannerlord 的着色器编译器和 TaleWorlds.Native FMOD 层会把中间临时文件写到
      用户的 %TEMP% 文件夹。在长期运行的安装上 %TEMP% 会涨到 5–20 GB，于是 Windows
      开始缺少临时空间 — 这时着色器编译内存不足崩溃就会在最随机的时刻出现。

      仅逐个文件删除：跳过任何被其他进程（Steam、Edge、Office、OneDrive）锁定的文件。
      只会动 7 天以上的文件。可以在其他应用打开时安全运行。Bannerlord 必须关闭
      （启动器本身可能持有 /Temp/RGL_*.tmp 着色器临时文件的句柄）。
    zht: |
      Bannerlord 的著色器編譯器和 TaleWorlds.Native FMOD 層會把中間暫存檔寫到
      使用者的 %TEMP% 資料夾。在長期執行的安裝上 %TEMP% 會漲到 5–20 GB，於是 Windows
      開始缺少暫存空間 — 這時著色器編譯記憶體不足當機就會在最隨機的時刻出現。

      僅逐個檔案刪除：跳過任何被其他處理程序（Steam、Edge、Office、OneDrive）鎖定的檔案。
      只會動 7 天以上的檔案。可以在其他應用程式開啟時安全執行。Bannerlord 必須關閉
      （啟動器本身可能持有 /Temp/RGL_*.tmp 著色器暫存檔的控制代碼）。
    tr: |
      Bannerlord'un gölgelendirici derleyicisi ve TaleWorlds.Native FMOD katmanı ara
      geçici dosyaları kullanıcının %TEMP% klasörüne yazar. Uzun süredir kurulu bir
      sistemde %TEMP% 5–20 GB'a ulaşır ve Windows geçici alandan yoksun kalmaya
      başlar — işte o zaman gölgelendirici derleme bellek yetersizliği çökmeleri en
      rastgele anlarda ortaya çıkar.

      Yalnızca tek tek dosya silme: başka bir işlem (Steam, Edge, Office, OneDrive)
      tarafından kilitli olan her şeyi atlar. Yalnızca 7 günden eski dosyalara
      dokunulur. Diğer uygulamalar açıkken çalıştırmak güvenlidir. Bannerlord kapalı
      olmalıdır (başlatıcının kendisi /Temp/RGL_*.tmp gölgelendirici geçici
      dosyalarının tutamaçlarını tutabilir).
  details:
    en:
      - "Path: $env:TEMP (typically %LOCALAPPDATA%\\Temp)."
      - "Threshold for 'NeedsAction' card: total %TEMP% > 1 GB."
      - "Only files older than 7 days are deleted; newer files are scratch from active apps."
      - "Files go to the Recycle Bin where possible (some Shell-locked items go straight to /dev/null)."
      - "Not reversible from Crash Doctor."
    ru:
      - "Путь: $env:TEMP (обычно %LOCALAPPDATA%\\Temp)."
      - "Порог появления карточки: суммарно %TEMP% > 1 ГБ."
      - "Удаляются только файлы старше 7 дней; новее — это scratch активных приложений."
      - "По возможности файлы уезжают в Корзину (часть Shell-заблокированных удаляется напрямую)."
      - "Откат из Crash Doctor не предусмотрен."
    zh:
      - "路径：$env:TEMP（通常为 %LOCALAPPDATA%\\Temp）。"
      - "出现「NeedsAction」卡片的阈值：%TEMP% 总计 > 1 GB。"
      - "只删除 7 天以上的文件；较新的文件是活动应用的临时数据。"
      - "尽可能把文件放入回收站（部分被 Shell 锁定的项会直接删除）。"
      - "无法从 Crash Doctor 撤销。"
    zht:
      - "路徑：$env:TEMP（通常為 %LOCALAPPDATA%\\Temp）。"
      - "出現「NeedsAction」卡片的閾值：%TEMP% 總計 > 1 GB。"
      - "只刪除 7 天以上的檔案；較新的檔案是使用中應用程式的暫存資料。"
      - "盡可能把檔案放入資源回收筒（部分被 Shell 鎖定的項目會直接刪除）。"
      - "無法從 Crash Doctor 復原。"
    tr:
      - "Yol: $env:TEMP (genellikle %LOCALAPPDATA%\\Temp)."
      - "'NeedsAction' kartı eşiği: toplam %TEMP% > 1 GB."
      - "Yalnızca 7 günden eski dosyalar silinir; daha yeni dosyalar etkin uygulamaların geçici verisidir."
      - "Mümkün olduğunda dosyalar Geri Dönüşüm Kutusu'na gider (Shell tarafından kilitli bazı öğeler doğrudan silinir)."
      - "Crash Doctor üzerinden geri alınamaz."
