- id: mem.pagefile_low
  category: memory
  severity: critical
  confidence: high
  evidence_source: "https://learn.microsoft.com/en-us/windows/client-management/determine-appropriate-page-file-size"
  requires_sources: [crash_tag]
  title:
    en: "Windows page file is almost exhausted"
    ru: "Файл подкачки Windows почти исчерпан"
    zh: "Windows 页面文件几乎耗尽"
    zht: "Windows 分頁檔幾乎耗盡"
    tr: "Windows sayfa dosyası neredeyse tükendi"
  description:
    en: |
      Less than 1 GB of virtual memory is left for the game. Long sessions with
      heavy mods (especially TOR on a /continuegame save) accumulate memory until
      Windows can no longer hand out a page — the process then dies with an
      access violation.
    ru: |
      Виртуальной памяти осталось меньше 1 ГБ. Долгие сессии с тяжёлыми модами
      (особенно TOR на загрузке /continuegame) накапливают потребление памяти,
      пока Windows не перестаёт выдавать страницы — после чего процесс падает
      с access violation.
    zh: |
      游戏可用的虚拟内存已不足 1 GB。带着重型模组的长时间游戏（尤其是用
      /continuegame 读取的 TOR 存档）会不断累积内存占用，直到 Windows 再也无法
      分配页面——随后进程因访问冲突而崩溃。
    zht: |
      遊戲可用的虛擬記憶體已不足 1 GB。帶著重型模組的長時間遊戲（尤其是用
      /continuegame 載入的 TOR 存檔）會不斷累積記憶體佔用，直到 Windows 再也無法
      分配分頁——隨後行程因存取違規而崩潰。
    tr: |
      Oyun için 1 GB'den az sanal bellek kaldı. Ağır modlarla yapılan uzun
      oturumlar (özellikle /continuegame ile yüklenen TOR kaydı) Windows artık
      sayfa veremeyene kadar bellek biriktirir — sonra süreç bir erişim ihlaliyle
      ölür.
  fix:
    en:
      - "Reboot the PC — the page file is reset on cold boot."
      - "Don't load saves via /continuegame after a long session — quit to main menu and Continue from there."
      - "Increase the page file: System → Advanced system settings → Performance → Settings → Advanced → Virtual Memory → Custom size 32–64 GB on an SSD."
      - "Close background apps (Chrome, Discord, browsers) before launching."
    ru:
      - "Перезагрузить ПК — файл подкачки очищается при холодном старте."
      - "Не загружай сейв через /continuegame после долгой сессии — выйди в главное меню и нажми Continue."
      - "Увеличить файл подкачки: Система → Дополнительные параметры → Производительность → Параметры → Дополнительно → Виртуальная память → Особый размер 32–64 ГБ на SSD."
      - "Закрой фоновые приложения (Chrome, Discord, браузеры) перед запуском."
    zh:
      - "重启电脑——冷启动时页面文件会被重置。"
      - "长时间游戏后不要用 /continuegame 读档——退回主菜单，再从那里点 Continue。"
      - "增大页面文件：系统 → 高级系统设置 → 性能 → 设置 → 高级 → 虚拟内存 → 在 SSD 上设自定义大小 32–64 GB。"
      - "启动前关闭后台应用（Chrome、Discord、浏览器）。"
    zht:
      - "重新啟動電腦——冷開機時分頁檔會被重設。"
      - "長時間遊戲後不要用 /continuegame 讀檔——退回主選單，再從那裡點 Continue。"
      - "增大分頁檔：系統 → 進階系統設定 → 效能 → 設定 → 進階 → 虛擬記憶體 → 在 SSD 上設自訂大小 32–64 GB。"
      - "啟動前關閉背景應用程式（Chrome、Discord、瀏覽器）。"
    tr:
      - "Bilgisayarı yeniden başlat — sayfa dosyası soğuk açılışta sıfırlanır."
      - "Uzun bir oturumdan sonra kayıtları /continuegame ile yükleme — ana menüye çık ve oradan Continue'ya bas."
      - "Sayfa dosyasını büyüt: Sistem → Gelişmiş sistem ayarları → Performans → Ayarlar → Gelişmiş → Sanal Bellek → SSD'de 32–64 GB özel boyut."
      - "Başlatmadan önce arka plan uygulamalarını kapat (Chrome, Discord, tarayıcılar)."
  match:
    all:
      - system:
          field: page_file_available_mb
          lt: "1024"

- id: mem.bad_alloc
  category: memory
  severity: critical
  confidence: high
  evidence_source: "https://en.cppreference.com/w/cpp/memory/new/bad_alloc"
  requires_sources: [log_line]
  title:
    en: "Out of memory (bad_alloc)"
    ru: "Закончилась память (bad_alloc)"
    zh: "内存不足（bad_alloc）"
    zht: "記憶體不足（bad_alloc）"
    tr: "Bellek yetersiz (bad_alloc)"
  description:
    en: |
      The native allocator failed to grab a chunk of memory. Either the page file
      is too small, RAM is fragmented after a long session, or a mod has a leak.
    ru: |
      Нативному аллокатору не удалось получить кусок памяти. Либо мал файл
      подкачки, либо RAM фрагментирована после долгой сессии, либо в моде утечка.
    zh: |
      原生分配器无法获取一块内存。要么页面文件太小，要么长时间游戏后内存碎片化，
      要么某个模组存在内存泄漏。
    zht: |
      原生配置器無法取得一塊記憶體。要麼分頁檔太小，要麼長時間遊戲後記憶體碎片化，
      要麼某個模組存在記憶體洩漏。
    tr: |
      Yerel ayırıcı bir bellek parçası alamadı. Ya sayfa dosyası çok küçük, ya
      uzun bir oturumdan sonra RAM parçalanmış ya da bir modda sızıntı var.
  fix:
    en:
      - "Reboot the PC."
      - "Lower Texture Quality and Texture Budget by one step in Options → Graphics."
      - "Increase the Windows page file (see mem.pagefile_low fix)."
      - "Quit any background apps before launching."
    ru:
      - "Перезагрузить ПК."
      - "Понизь Texture Quality и Texture Budget на ступень в Опции → Графика."
      - "Увеличить файл подкачки Windows (см. mem.pagefile_low)."
      - "Закрой фоновые приложения перед запуском."
    zh:
      - "重启电脑。"
      - "在选项 → 图形中，把 Texture Quality 和 Texture Budget 各降低一档。"
      - "增大 Windows 页面文件（见 mem.pagefile_low 的处理办法）。"
      - "启动前退出所有后台应用。"
    zht:
      - "重新啟動電腦。"
      - "在選項 → 圖形中，把 Texture Quality 和 Texture Budget 各降低一檔。"
      - "增大 Windows 分頁檔（見 mem.pagefile_low 的處理辦法）。"
      - "啟動前退出所有背景應用程式。"
    tr:
      - "Bilgisayarı yeniden başlat."
      - "Seçenekler → Grafikler'de Texture Quality ve Texture Budget'ı birer kademe düşür."
      - "Windows sayfa dosyasını büyüt (bkz. mem.pagefile_low çözümü)."
      - "Başlatmadan önce tüm arka plan uygulamalarını kapat."
  match:
    all:
      - log_line:
          contains: "bad_alloc"

- id: native.access_violation_taleworlds
  category: native
  severity: critical
  confidence: high
  evidence_source: "BL-032 catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "Access violation in TaleWorlds.MountAndBlade native code"
    ru: "Access violation в нативе TaleWorlds.MountAndBlade"
    zh: "TaleWorlds.MountAndBlade 原生代码中的访问冲突"
    zht: "TaleWorlds.MountAndBlade 原生程式碼中的存取違規"
    tr: "TaleWorlds.MountAndBlade yerel kodunda erişim ihlali"
  description:
    en: |
      System.AccessViolationException with Source=TaleWorlds.MountAndBlade — native
      engine corruption in Bannerlord 1.2.10 / 1.2.11. Documented TaleWorlds
      regression. Crash is random and not caused by mods.
    ru: |
      System.AccessViolationException с Source=TaleWorlds.MountAndBlade — порча
      нативного движка в Bannerlord 1.2.10 / 1.2.11. Задокументированная
      регрессия TaleWorlds. Краш случайный и не из-за модов.
    zh: |
      System.AccessViolationException，Source=TaleWorlds.MountAndBlade——Bannerlord
      1.2.10 / 1.2.11 中的原生引擎损坏。这是有记录的 TaleWorlds 回归缺陷。崩溃是
      随机的，与模组无关。
    zht: |
      System.AccessViolationException，Source=TaleWorlds.MountAndBlade——Bannerlord
      1.2.10 / 1.2.11 中的原生引擎損壞。這是有記錄的 TaleWorlds 回歸缺陷。崩潰是
      隨機的，與模組無關。
    tr: |
      Source=TaleWorlds.MountAndBlade ile System.AccessViolationException —
      Bannerlord 1.2.10 / 1.2.11'deki yerel motor bozulması. Belgelenmiş bir
      TaleWorlds regresyonu. Çökme rastgeledir ve modlardan kaynaklanmaz.
  fix:
    en:
      - "Update Bannerlord to 1.2.12+ or downgrade to 1.2.9 via Steam beta branch."
      - "Reset GPU clocks to default (no overclock / undervolt)."
      - "Verify integrity of game files in Steam."
    ru:
      - "Обнови Bannerlord до 1.2.12+ или откатись на 1.2.9 через Steam beta."
      - "Сбрось разгон GPU на default (никакого OC / UV)."
      - "Steam → Проверить целостность файлов игры."
    zh:
      - "把 Bannerlord 更新到 1.2.12+，或通过 Steam beta 分支降级到 1.2.9。"
      - "把显卡频率重置为默认（不超频 / 不降压）。"
      - "在 Steam 中验证游戏文件完整性。"
    zht:
      - "把 Bannerlord 更新到 1.2.12+，或透過 Steam beta 分支降級到 1.2.9。"
      - "把顯示卡頻率重設為預設（不超頻 / 不降壓）。"
      - "在 Steam 中驗證遊戲檔案完整性。"
    tr:
      - "Bannerlord'u 1.2.12+ sürümüne güncelle veya Steam beta dalı üzerinden 1.2.9'a düşür."
      - "GPU saat hızlarını varsayılana sıfırla (overclock / undervolt yok)."
      - "Steam'de oyun dosyalarının bütünlüğünü doğrula."
  match:
    all:
      - log_line:
          contains: "AccessViolationException"
      - log_line:
          contains: "TaleWorlds.MountAndBlade"

- id: native.dotnet_finalizer_av
  category: native
  severity: critical
  confidence: high
  evidence_source: "Client crash 3973dcff (2026-06-03 / 2026-06-08, new-game start)"
  requires_sources: [log_line]
  title:
    en: "Access violation in TaleWorlds.DotNet native finalizer"
    ru: "Access violation в нативном финализаторе TaleWorlds.DotNet"
    zh: "TaleWorlds.DotNet 原生终结器中的访问冲突"
    zht: "TaleWorlds.DotNet 原生終結器中的存取違規"
    tr: "TaleWorlds.DotNet yerel sonlandırıcısında erişim ihlali"
  description:
    en: |
      System.AccessViolationException in TaleWorlds.DotNet.NativeObject.Finalize() —
      the .NET garbage collector tried to release a native engine object that the
      engine had already destroyed (use-after-free). A random base-game native fault,
      most often surfacing at new-game start and scene transitions, where native
      allocation/finalization peaks. Not caused by mods — no mod frames are in the
      stack. Unrelated to the shader cache; rebuilding shaders will NOT help.
    ru: |
      System.AccessViolationException в TaleWorlds.DotNet.NativeObject.Finalize() —
      сборщик мусора .NET попытался освободить нативный объект движка, который движок
      уже уничтожил (обращение к освобождённой памяти). Случайный нативный сбой самой
      игры, чаще всего вылезает при старте новой игры и смене сцен, где пик нативных
      выделений и очистки памяти. Не вина модов — их кода в стеке нет. К кэшу шейдеров
      отношения не имеет, пересобирать шейдеры НЕ нужно.
    zh: |
      TaleWorlds.DotNet.NativeObject.Finalize() 中的 System.AccessViolationException——
      .NET 垃圾回收器试图释放引擎已经销毁的原生对象（释放后使用）。这是基础游戏的随机
      原生故障，多在开始新游戏和场景切换时出现，此时原生内存分配/回收达到高峰。与模组
      无关——堆栈中没有任何模组代码。与着色器缓存无关，重建着色器没有帮助。
    zht: |
      TaleWorlds.DotNet.NativeObject.Finalize() 中的 System.AccessViolationException——
      .NET 垃圾回收器試圖釋放引擎已經銷毀的原生物件（釋放後使用）。這是基礎遊戲的隨機
      原生故障，多在開始新遊戲和場景切換時出現，此時原生記憶體配置/回收達到高峰。與模組
      無關——堆疊中沒有任何模組程式碼。與著色器快取無關，重建著色器沒有幫助。
    tr: |
      TaleWorlds.DotNet.NativeObject.Finalize() içinde System.AccessViolationException —
      .NET çöp toplayıcı, motorun zaten yok ettiği bir yerel motor nesnesini serbest
      bırakmaya çalıştı (serbest bırakıldıktan sonra kullanım). Yeni oyun başlangıcında
      ve sahne geçişlerinde sıkça beliren, temel oyuna ait rastgele bir yerel hata.
      Modlardan kaynaklanmaz — yığında mod karesi yok. Shader önbelleğiyle ilgisi yok;
      shader'ları yeniden derlemek YARDIMCI OLMAZ.
  fix:
    en:
      - "Just restart and start the new game again — the fault is random and usually clears on the next attempt."
      - "Steam → Verify integrity of game files (in case of a genuinely broken native asset)."
      - "Reset GPU/CPU overclock or undervolt to default; with 16 GB RAM, close background apps before launching."
    ru:
      - "Просто перезапусти игру и снова начни новую — сбой случайный, обычно проходит со следующей попытки."
      - "Steam → Проверить целостность файлов игры (на случай реально битого нативного ресурса)."
      - "Сбрось разгон/андервольт GPU и процессора на стандарт; при 16 ГБ ОЗУ закрой фоновые программы перед запуском."
    zh:
      - "直接重启并重新开始新游戏——故障是随机的，通常下次尝试就能通过。"
      - "Steam → 验证游戏文件完整性（以防真的有损坏的原生资源）。"
      - "把 GPU/CPU 的超频或降压重置为默认；16 GB 内存下，启动前关闭后台程序。"
    zht:
      - "直接重啟並重新開始新遊戲——故障是隨機的，通常下次嘗試就能通過。"
      - "Steam → 驗證遊戲檔案完整性（以防真的有損壞的原生資源）。"
      - "把 GPU/CPU 的超頻或降壓重設為預設；16 GB 記憶體下，啟動前關閉背景程式。"
    tr:
      - "Sadece yeniden başlat ve yeni oyunu tekrar başlat — hata rastgeledir, genelde bir sonraki denemede geçer."
      - "Steam → Oyun dosyalarının bütünlüğünü doğrula (gerçekten bozuk bir yerel varlık ihtimaline karşı)."
      - "GPU/CPU overclock veya undervolt'u varsayılana sıfırla; 16 GB RAM ile başlatmadan önce arka plan uygulamalarını kapat."
  match:
    all:
      - log_line:
          contains: "AccessViolationException"
      - log_line:
          contains: "NativeObject.Finalize"

- id: native.stack_overflow
  category: native
  severity: critical
  confidence: high
  evidence_source: "BL-034 catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "Stack overflow (0xC00000FD) — recursive AI loop"
    ru: "Stack overflow (0xC00000FD) — рекурсивный AI loop"
    zh: "栈溢出（0xC00000FD）——递归 AI 循环"
    zht: "堆疊溢位（0xC00000FD）——遞迴 AI 迴圈"
    tr: "Yığın taşması (0xC00000FD) — özyinelemeli AI döngüsü"
  description:
    en: |
      Process exited with STATUS_STACK_OVERFLOW (exit code 0xC00000FD). Vanilla
      Bannerlord cause: a recursive AI loop (BannerBearer search, troop upgrade
      cycle). Known and fixed in 1.1.0 — almost always means the campaign save
      was started on an older buggy version.
    ru: |
      Процесс завершился со STATUS_STACK_OVERFLOW (exit code 0xC00000FD). Корень
      в ванильном Bannerlord — рекурсивный AI loop (поиск BannerBearer, цикл
      апгрейда юнитов). Известно и фикшено в 1.1.0 — почти всегда означает, что
      кампания начата на старой багованной версии.
    zh: |
      进程以 STATUS_STACK_OVERFLOW 退出（退出码 0xC00000FD）。原版 Bannerlord 的
      根源：一个递归 AI 循环（旗手搜索、部队升级循环）。已知并在 1.1.0 中修复——
      几乎总是意味着这个战役存档是在更旧的有缺陷版本上开始的。
    zht: |
      行程以 STATUS_STACK_OVERFLOW 退出（退出碼 0xC00000FD）。原版 Bannerlord 的
      根源：一個遞迴 AI 迴圈（旗手搜尋、部隊升級迴圈）。已知並在 1.1.0 中修復——
      幾乎總是意味著這個戰役存檔是在更舊的有缺陷版本上開始的。
    tr: |
      Süreç STATUS_STACK_OVERFLOW ile çıktı (çıkış kodu 0xC00000FD). Orijinal
      Bannerlord nedeni: özyinelemeli bir AI döngüsü (BannerBearer araması, birlik
      yükseltme döngüsü). Bilinen ve 1.1.0'da düzeltilmiş bir sorun — neredeyse
      her zaman sefer kaydının daha eski, hatalı bir sürümde başlatıldığı anlamına
      gelir.
  fix:
    en:
      - "Update Bannerlord to the latest patch."
      - "If save started on 1.0.x — start a new campaign."
      - "If reproducible on a specific battle — disable AI mods one by one (RBM, AI overhauls)."
    ru:
      - "Обнови Bannerlord до последнего патча."
      - "Если сейв начат на 1.0.x — стартани новую кампанию."
      - "Если краш воспроизводится на конкретной битве — отключай AI-моды по одному (RBM, AI-оверхолы)."
    zh:
      - "把 Bannerlord 更新到最新补丁。"
      - "如果存档是在 1.0.x 上开始的——开一局新战役。"
      - "如果在某场特定战斗中能复现——逐个禁用 AI 模组（RBM、AI 大改）。"
    zht:
      - "把 Bannerlord 更新到最新修補程式。"
      - "如果存檔是在 1.0.x 上開始的——開一局新戰役。"
      - "如果在某場特定戰鬥中能重現——逐個停用 AI 模組（RBM、AI 大改）。"
    tr:
      - "Bannerlord'u en son yamaya güncelle."
      - "Kayıt 1.0.x'te başlatıldıysa — yeni bir sefer başlat."
      - "Belirli bir savaşta tekrarlanabiliyorsa — AI modlarını teker teker devre dışı bırak (RBM, AI elden geçirmeleri)."
  match:
    any:
      - log_line:
          contains: "0xC00000FD"
      - log_line:
          contains: "STATUS_STACK_OVERFLOW"

- id: native.lordshall_div_by_zero
  category: native
  severity: critical
  confidence: high
  evidence_source: "BL-040 catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "Lord's Hall fight DivideByZeroException"
    ru: "DivideByZeroException на бое в Lord's Hall"
    zh: "领主大厅战斗的 DivideByZeroException"
    zht: "領主大廳戰鬥的 DivideByZeroException"
    tr: "Lord's Hall savaşında DivideByZeroException"
  description:
    en: |
      LordsHallFightMissionController+MissionSide.SpawnTroops divides by zero
      because the scene's spawn-point count is zero. Specific Lord's Hall siege
      stage on certain fiefs.
    ru: |
      LordsHallFightMissionController+MissionSide.SpawnTroops делится на ноль —
      в сцене ноль точек спавна. Специфичный баг Lord's Hall на определённых
      городах.
    zh: |
      LordsHallFightMissionController+MissionSide.SpawnTroops 发生除以零，因为该
      场景的出生点数量为零。这是某些封地上特定的领主大厅攻城阶段才有的问题。
    zht: |
      LordsHallFightMissionController+MissionSide.SpawnTroops 發生除以零，因為該
      場景的出生點數量為零。這是某些封地上特定的領主大廳攻城階段才有的問題。
    tr: |
      LordsHallFightMissionController+MissionSide.SpawnTroops sıfıra bölünüyor,
      çünkü sahnenin doğuş noktası sayısı sıfır. Belirli tımarlardaki özel bir
      Lord's Hall kuşatma aşaması.
  fix:
    en:
      - "Avoid the Lord's Hall stage of this specific siege — sally out / surrender / pick another fief."
      - "Reload to the pre-siege save and try a different settlement."
