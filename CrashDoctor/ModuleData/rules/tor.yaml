- id: tor.assimilation_swap_troops
  category: tor
  severity: critical
  confidence: high
  # Merged 2026-05-15: was tor.assimilation_swap_troops + tor.assimilation_indexoutofrange.
  # Both fired on AssimilationCampaignBehavior with the same underlying root
  # cause (stale culture / roster index after a settlement faction transition)
  # and recommended swapping in different Nexus fixes (8872 / 5512). Now one
  # card covers both, with the fix list mentioning both patches.
  evidence_source: "TOR-015 catalog 2026-05-02 — Nexus 8872 TOR Assimilation Crash Fix; Nexus #5512 TOR Assimilation Fix (settlement transition)"
  requires_sources: [log_line]
  title:
    en: "TOR Assimilation crash — IndexOutOfRange (Hunger Woods / wraith bind / settlement transition)"
    ru: "Краш TOR Assimilation — IndexOutOfRange (Hunger Woods / bind wraiths / смена фракции города)"
    zh: "TOR 同化崩溃 — IndexOutOfRange（Hunger Woods / 绑定怨灵 / 定居点势力转换）"
    tr: "TOR Asimilasyon çökmesi — IndexOutOfRange (Hunger Woods / hayalet bağlama / yerleşim geçişi)"
  description:
    en: |
      AssimilationCampaignBehavior throws System.IndexOutOfRangeException /
      ArgumentOutOfRangeException. Two known triggers share the same code path:
        - "summon wraiths" / "bind wraiths" in Hunger Woods (any vampire-army
          assimilation where the companion roster index falls out of bounds),
          via TroopRoster.AddToCountsAtIndex → SwapTroopsIfNeeded.
        - Late-game settlement faction transition, where the culture stringlist
          has no entry for the new faction.
      Both end in the same crash signature; pick whichever Nexus patch matches
      your situation.
    ru: |
      AssimilationCampaignBehavior бросает System.IndexOutOfRangeException /
      ArgumentOutOfRangeException. Два известных триггера через один code path:
        - «summon wraiths» / «bind wraiths» в Hunger Woods (любая вампирская
          ассимиляция, где индекс ростера компаньона выходит за пределы), через
          TroopRoster.AddToCountsAtIndex → SwapTroopsIfNeeded.
        - Поздняя смена фракции города, когда в списке культур нет записи для
          новой фракции.
      Обе ветки дают одинаковую сигнатуру; выбирай Nexus-фикс по своему случаю.
    zh: |
      AssimilationCampaignBehavior 抛出 System.IndexOutOfRangeException /
      ArgumentOutOfRangeException。两个已知触发点共用同一段代码路径：
        - 在 Hunger Woods 中“召唤怨灵” / “绑定怨灵”（任何同伴名册索引越界的
          吸血鬼军队同化），经由 TroopRoster.AddToCountsAtIndex → SwapTroopsIfNeeded。
        - 后期定居点的势力转换，此时文化字符串列表里没有对应新势力的条目。
      两者都会产生相同的崩溃特征；根据你的具体情况选择相应的 Nexus 补丁。
    tr: |
      AssimilationCampaignBehavior, System.IndexOutOfRangeException /
      ArgumentOutOfRangeException fırlatır. İki bilinen tetikleyici aynı kod
      yolunu paylaşır:
        - Hunger Woods'ta "hayalet çağır" / "hayalet bağla" (yoldaş kadro
          indeksinin sınırların dışına çıktığı her vampir ordusu asimilasyonu),
          TroopRoster.AddToCountsAtIndex → SwapTroopsIfNeeded üzerinden.
        - Geç oyun yerleşim hizip geçişi; burada kültür dizesi listesinde yeni
          hizip için bir kayıt yoktur.
      İkisi de aynı çökme imzasıyla biter; durumuna uyan Nexus yamasını seç.
  fix:
    en:
      - "Install TOR Assimilation Crash Fix from NexusMods (mod 8872) — patches SwapTroopsIfNeeded directly. Covers the Hunger Woods / wraith-bind path."
      - "Or install TOR Assimilation Fix from NexusMods (mod #5512) — patches the culture-index lookup to fall back to source culture. Covers the settlement-transition path."
      - "Until installed: avoid 'summon wraiths' / 'bind wraiths'; don't visit Hunger Woods with vampire armies + companions."
      - "If reproducible on save load — restore to a save before the first wraith bind or before the settlement changed hands."
    ru:
      - "Поставь TOR Assimilation Crash Fix с NexusMods (мод 8872) — прямой патч на SwapTroopsIfNeeded. Покрывает Hunger Woods / bind wraiths."
      - "Или TOR Assimilation Fix с NexusMods (мод #5512) — патчит индексацию культур, при отсутствии записи использует исходную. Покрывает смену фракции города."
      - "До установки: избегай «summon wraiths» / «bind wraiths»; не заходи в Hunger Woods вампирской армией + компаньонами."
      - "Если падает на загрузке сейва — откатись до первого bind wraith или до смены владельца города."
    zh:
      - "从 NexusMods 安装 TOR Assimilation Crash Fix（mod 8872）——直接修补 SwapTroopsIfNeeded。覆盖 Hunger Woods / 绑定怨灵这条路径。"
      - "或安装 TOR Assimilation Fix（NexusMods mod #5512）——修补文化索引查找，找不到时回退到源文化。覆盖定居点势力转换这条路径。"
      - "安装之前：避免“召唤怨灵” / “绑定怨灵”；不要带着吸血鬼军队和同伴进入 Hunger Woods。"
      - "如果读取存档时能复现——回退到第一次绑定怨灵之前、或定居点易主之前的存档。"
    tr:
      - "NexusMods'tan TOR Assimilation Crash Fix'i kur (mod 8872) — doğrudan SwapTroopsIfNeeded'i yamalar. Hunger Woods / hayalet bağlama yolunu kapsar."
      - "Ya da TOR Assimilation Fix'i kur (NexusMods mod #5512) — kültür indeksi aramasını, kayıt bulunamazsa kaynak kültüre dönecek şekilde yamalar. Yerleşim geçişi yolunu kapsar."
      - "Kurana kadar: 'hayalet çağır' / 'hayalet bağla' yapma; vampir orduları + yoldaşlarla Hunger Woods'a gitme."
      - "Kayıt yüklenirken tekrarlanabiliyorsa — ilk hayalet bağlamadan ya da yerleşim el değiştirmeden önceki bir kayda dön."
  match:
    all:
      - log_line:
          contains: "AssimilationCampaignBehavior"
      - any:
          - log_line:
              contains: "SwapTroopsIfNeeded"
          - log_line:
              contains: "IndexOutOfRange"
          - log_line:
              contains: "ArgumentOutOfRange"

