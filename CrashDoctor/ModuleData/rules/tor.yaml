- id: tor.character_creation_back_crash
  category: tor
  severity: warning
  confidence: high
  evidence_source: "Reproduced 2026-05-21 on full TOR + LoreHardcore stack. Press 'New Campaign' → pick culture in TOR character creation → press Back. The engine already created Hero objects (logs show 'creating hero from template with id: tor_wanderer_greenskins_*' before the screen opened). After Back, the engine fires 'Start Game Final Cleanup.' to roll the half-built campaign state back, while TOR's TORInitialScreen reactivates on top of the cleanup. The mismatched order — TOR scene activate, then ThumbnailCacheManager::ClearManager, then a 'Unregister tooltip for type: <T>' cascade — crashes inside the renderer with 0xC0000005 right after the last tooltip type is unregistered. The log line right before the crash is always 'Unregister tooltip for type: ExplainedNumber' or close to it. Workshop ID for TOR_Core: 3025574678."
  requires_sources: [log_line, module_list]
  title:
    en: "TOR character-creation crash on Back button"
    ru: "TOR — краш при нажатии «Назад» в создании персонажа"
    zh: "TOR 角色创建界面按“返回”时崩溃"
    tr: "TOR karakter oluşturmada Geri düğmesinde çökme"
  description:
    en: |
      Bannerlord crashes (0xC0000005, access violation in native) when the
      player opens 'New Campaign', lands on the TOR character creation
      screen, and presses Back instead of continuing. The crash happens
      a fraction of a second after the press, with no in-game error
      message.

      What is happening under the hood: by the time the player sees the
      character creation screen, the engine has already instantiated a
      pile of Hero objects (TOR's pre-generated wanderers — the log
      contains many 'creating hero from template with id:
      tor_wanderer_greenskins_*' lines). When the player presses Back,
      Bannerlord invokes 'Start Game Final Cleanup.' to walk that
      half-built campaign state back. TOR meanwhile re-activates its
      own initial screen on top of the cleanup, so the cleanup is
      tearing down hero / tooltip / scene state while TOR has freshly
      reattached to it. The final 'Unregister tooltip for type:' cascade
      hits a dangling pointer and the renderer crashes.

      This is a TOR bug, not a Bannerlord bug — vanilla character
      creation handles Back correctly. The exact line right before the
      crash is consistently 'Unregister tooltip for type: ExplainedNumber'
      (or one of the tooltip types around it).
    ru: |
      Bannerlord падает (0xC0000005, access violation в нативном коде)
      когда игрок открывает «Новая кампания», попадает на экран
      создания персонажа TOR и нажимает «Назад» вместо продолжения.
      Краш происходит через долю секунды после нажатия, без никакого
      внутриигрового сообщения об ошибке.

      Что происходит под капотом: к моменту, когда игрок видит экран
      создания персонажа, движок уже создал кучу Hero-объектов
      (предзаготовленных wanderers из TOR — в логе много строк
      «creating hero from template with id: tor_wanderer_greenskins_*»).
      Когда игрок жмёт «Назад», Bannerlord вызывает «Start Game Final
      Cleanup.» чтобы откатить это полуготовое состояние кампании. В
      это же время TOR заново активирует свой initial screen поверх
      этого cleanup'а, и движок разрушает state hero / tooltip / scene
      пока TOR только что к нему прицепился. Финальный каскад
      «Unregister tooltip for type:» упирается в висячий указатель, и
      рендер падает.

      Это баг TOR, а не Bannerlord — ванильное создание персонажа
      обрабатывает «Назад» корректно. Последняя строка в логе перед
      крашем — всегда «Unregister tooltip for type: ExplainedNumber»
      (или один из соседних типов тултипов).
    zh: |
      当玩家打开“新战役”，进入 TOR 角色创建界面，然后按下“返回”而不是
      继续时，Bannerlord 会崩溃（0xC0000005，原生代码访问冲突）。崩溃在
      按下后的一瞬间发生，没有任何游戏内错误提示。

      底层发生的事情：当玩家看到角色创建界面时，引擎已经实例化了一大堆
      Hero 对象（TOR 预生成的流浪者——日志里有许多
      "creating hero from template with id: tor_wanderer_greenskins_*" 这样的
      行）。当玩家按下“返回”时，Bannerlord 调用 "Start Game Final Cleanup."
      来回滚这个半成品的战役状态。与此同时 TOR 又在这个清理之上重新激活
      它自己的初始界面，于是清理正在拆除 hero / tooltip / scene 状态，而 TOR
      刚刚重新挂接上去。最后的 "Unregister tooltip for type:" 级联触及一个
      悬空指针，渲染器随之崩溃。

      这是 TOR 的缺陷，不是 Bannerlord 的缺陷——原版角色创建能正确处理
      “返回”。崩溃前的那一行始终是 "Unregister tooltip for type: ExplainedNumber"
      （或它周围的某个 tooltip 类型）。
    tr: |
      Oyuncu 'Yeni Sefer'i açıp TOR karakter oluşturma ekranına geldiğinde ve
      devam etmek yerine Geri'ye bastığında Bannerlord çöker (0xC0000005, yerel
      kodda erişim ihlali). Çökme, basıştan saniyenin kesri kadar sonra, hiçbir
      oyun içi hata mesajı olmadan gerçekleşir.

      Arka planda olan şey: oyuncu karakter oluşturma ekranını gördüğünde motor
      çoktan bir yığın Hero nesnesi oluşturmuştur (TOR'un önceden üretilmiş
      gezginleri — günlükte birçok 'creating hero from template with id:
      tor_wanderer_greenskins_*' satırı vardır). Oyuncu Geri'ye bastığında
      Bannerlord, bu yarı kurulmuş sefer durumunu geri sarmak için 'Start Game
      Final Cleanup.' çağırır. Bu sırada TOR kendi başlangıç ekranını bu
      temizliğin üzerine yeniden etkinleştirir, böylece temizlik hero / tooltip /
      sahne durumunu söküp atarken TOR henüz yeniden bağlanmıştır. Son
      'Unregister tooltip for type:' zinciri sarkan bir işaretçiye çarpar ve
      görüntüleyici çöker.

      Bu bir TOR hatasıdır, Bannerlord hatası değil — orijinal karakter oluşturma
      Geri'yi doğru işler. Çökmeden hemen önceki satır tutarlı şekilde
      'Unregister tooltip for type: ExplainedNumber' (ya da etrafındaki tooltip
      türlerinden biri) olur.
  fix:
    en:
      - "Workaround: do NOT use the in-screen Back button from the TOR character creation screen. To get out of new-campaign setup, use Escape → 'Exit to Main Menu' (or the corner Quit button if visible). That path tears the half-built state down cleanly and does not crash."
      - "If you only want to change the culture choice you already made, do not press Back to go up the screen stack — instead, click the culture you actually want directly. The screen lets you re-pick before confirming."
      - "If you have already crashed once, just restart Bannerlord and start the new campaign without going Back. The crash does not corrupt anything on disk (no save was written), so a clean relaunch is enough."
      - "The bug lives in TOR_Core, not in Bannerlord — report it on the TOR Discord / Steam Workshop comments so the mod author can fix the cleanup ordering."
    ru:
      - "Обходной путь: НЕ нажимай «Назад» внутри экрана создания персонажа TOR. Чтобы выйти из настройки новой кампании, используй Escape → «Выйти в главное меню» (или кнопку Quit в углу, если она доступна). Этот путь корректно сворачивает полу-готовое состояние и не крашит игру."
      - "Если просто хочешь сменить выбранную культуру — не возвращайся назад по стеку экранов, а сразу кликни ту культуру, которая нужна. Экран позволяет переключиться до подтверждения."
      - "Если уже упало — просто перезапусти Bannerlord и начни новую кампанию без «Назад». Краш не пишет ничего на диск (сейв не сохранялся), так что чистый запуск всё решает."
      - "Баг сидит в TOR_Core, не в Bannerlord — стоит написать в Discord TOR / в комментариях к моду в Steam Workshop, чтобы автор мода починил порядок cleanup'а."
    zh:
      - "临时办法：不要在 TOR 角色创建界面里使用界面上的“返回”按钮。要退出新战役设置，请用 Escape →“退出到主菜单”（或角落里的退出按钮，如果可见）。这条路径会干净地拆除半成品状态，不会崩溃。"
      - "如果你只是想更改已经选好的文化，不要按“返回”往回退界面——而是直接点击你真正想要的文化。该界面允许你在确认前重新选择。"
      - "如果已经崩溃过一次，直接重启 Bannerlord，然后不按“返回”地开始新战役。这次崩溃不会损坏磁盘上的任何东西（没有写入存档），所以干净地重启就够了。"
      - "这个缺陷在 TOR_Core 里，不在 Bannerlord 里——请在 TOR Discord / Steam 创意工坊评论里反馈，好让模组作者修正清理的顺序。"
    tr:
      - "Geçici çözüm: TOR karakter oluşturma ekranındaki ekran içi Geri düğmesini KULLANMA. Yeni sefer kurulumundan çıkmak için Escape → 'Ana Menüye Çık' (veya görünüyorsa köşedeki Çık düğmesi) kullan. Bu yol yarı kurulmuş durumu temiz bir şekilde söker ve çökmez."
      - "Sadece zaten yaptığın kültür seçimini değiştirmek istiyorsan, ekran yığınında geri gitmek için Geri'ye basma — bunun yerine doğrudan gerçekten istediğin kültüre tıkla. Ekran, onaylamadan önce yeniden seçmene izin verir."
      - "Bir kez çöktüyse, sadece Bannerlord'u yeniden başlat ve Geri'ye basmadan yeni seferi başlat. Çökme diskte hiçbir şeyi bozmaz (kayıt yazılmadı), bu yüzden temiz bir yeniden başlatma yeterlidir."
      - "Hata TOR_Core'da, Bannerlord'da değil — mod yazarının temizleme sırasını düzeltebilmesi için TOR Discord / Steam Workshop yorumlarında bildir."
  match:
    all:
      - module_list: { id: "TOR_Core", has: "true" }
      - log_line:
          contains: "PopScreen - SandBox.View.CharacterCreation.CharacterCreationScreen"
      - log_line:
          contains: "Start Game Final Cleanup."

- id: tor.mount_status_effect_property
  category: tor
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-03 report.txt — ArgumentException 'The property was not defined in the status effect system' / MountSpeed, seen 4x in one battle. StatusEffectComponent.GetBaseValueForDrivenProperty ← AgentDrivenPropertiesExtensions.SetDynamicMountMovementProperties ← TORAgentStatCalculateModel.UpdateDynamicAgentDrivenProperties on the mission tick. Captured by Crash Doctor managed capture."
  requires_sources: [managed_exception]
  title:
    en: "TOR mount-speed status effect crash (missing base value) — guarded by Crash Doctor"
    ru: "Краш TOR в эффекте скорости коня (нет базового значения) — перехвачено Crash Doctor"
    zh: "TOR 坐骑速度状态效果崩溃（缺少基准值）——已被 Crash Doctor 拦截"
    tr: "TOR at hızı durum efekti çökmesi (eksik temel değer) — Crash Doctor tarafından korunuyor"
  description:
    en: |
      System.ArgumentException ("The property was not defined in the status effect
      system", parameter MountSpeed) thrown every mission tick from
      TOR_Core StatusEffectComponent.GetBaseValueForDrivenProperty, via
      AgentDrivenPropertiesExtensions.SetDynamicMountMovementProperties and
      TORAgentStatCalculateModel.UpdateDynamicAgentDrivenProperties.

      TOR caches a rider's "base values" for the speed/maneuver status effects, but
      the mount-specific keys (MountSpeed / MountDash / MountManeuver) are only
      stored when the rider already has a mount at cache time. If the values were
      captured before the unit mounted (spawn / mount-up timing), the cache lacks
      the mount keys, and once the now-mounted unit is recomputed TOR asks for
      MountSpeed, finds no entry and throws — repeatedly, because it runs from the
      per-frame stat update. This is a TOR_Core bug, not a shader/driver issue.
    ru: |
      System.ArgumentException («The property was not defined in the status effect
      system», параметр MountSpeed) на каждом тике миссии из
      TOR_Core StatusEffectComponent.GetBaseValueForDrivenProperty, через
      AgentDrivenPropertiesExtensions.SetDynamicMountMovementProperties и
      TORAgentStatCalculateModel.UpdateDynamicAgentDrivenProperties.

      TOR кэширует «базовые значения» эффектов скорости/манёвра у всадника, но
      ключи коня (MountSpeed / MountDash / MountManeuver) сохраняются только если у
      всадника УЖЕ есть конь в момент кэширования. Если значения сняты до того, как
      боец сел на коня (тайминг спавна / посадки), в кэше нет ключей коня, и при
      пересчёте уже конного бойца TOR просит MountSpeed, не находит запись и падает —
      повторно, потому что это идёт из покадрового обновления статов. Это баг
      TOR_Core, а не проблема шейдеров/драйвера.
    zh: |
      System.ArgumentException（"The property was not defined in the status effect
      system"，参数 MountSpeed）在每个任务 tick 从
      TOR_Core StatusEffectComponent.GetBaseValueForDrivenProperty 抛出，经由
      AgentDrivenPropertiesExtensions.SetDynamicMountMovementProperties 和
      TORAgentStatCalculateModel.UpdateDynamicAgentDrivenProperties。

      TOR 会缓存骑手用于速度/机动状态效果的"基准值"，但坐骑专属的键
      （MountSpeed / MountDash / MountManeuver）只有在缓存时骑手已经骑乘时才会
      存储。如果这些值在单位上马之前就被捕获（生成 / 上马时序），缓存里就缺少坐骑
      键，于是当已上马的单位被重新计算时，TOR 请求 MountSpeed 却找不到条目而抛出
      异常——并且反复发生，因为它来自逐帧的属性更新。这是 TOR_Core 的 bug，不是
      着色器/驱动问题。
    tr: |
      Her görev tick'inde TOR_Core StatusEffectComponent.GetBaseValueForDrivenProperty'den,
      AgentDrivenPropertiesExtensions.SetDynamicMountMovementProperties ve
      TORAgentStatCalculateModel.UpdateDynamicAgentDrivenProperties üzerinden
      System.ArgumentException ("The property was not defined in the status effect
      system", parametre MountSpeed) fırlatılır.

      TOR, bir binicinin hız/manevra durum efektleri için "temel değerlerini"
      önbelleğe alır, ancak ata özgü anahtarlar (MountSpeed / MountDash /
      MountManeuver) yalnızca binici önbellekleme anında zaten bir ata sahipse
      saklanır. Değerler birim ata binmeden önce yakalandıysa (doğma / ata binme
      zamanlaması), önbellekte at anahtarları yoktur ve artık atlı olan birim yeniden
      hesaplandığında TOR MountSpeed'i ister, kayıt bulamaz ve hata fırlatır — kare
      başına stat güncellemesinden geldiği için tekrar tekrar. Bu bir TOR_Core
      hatasıdır, gölgelendirici/sürücü sorunu değil.
  fix:
    en:
      - "Crash Doctor already guards this — its safety net re-syncs the mount values and swallows the leftover error so the battle continues. Keep the «exception guards» setting ON."
      - "If it still spams: update TOR_Core to the latest version (the cache-timing bug is on TOR's side)."
      - "Harmless gameplay-wise — at worst a mounted unit's speed effect is one frame stale; nothing is lost."
      - "Do NOT rebuild shaders or change drivers for this — it's a code bug, that won't help."
    ru:
      - "Crash Doctor уже это перехватывает — safety net пересинхронизирует значения коня и глушит остаточную ошибку, бой продолжается. Держи настройку «перехват ошибок» ВКЛ."
      - "Если всё равно спамит — обнови TOR_Core до свежей версии (баг тайминга кэша на стороне TOR)."
      - "На геймплей не влияет — в худшем случае эффект скорости конного бойца на кадр устаревает; ничего не теряется."
      - "НЕ пересобирай шейдеры и не меняй драйвер из-за этого — это баг кода, не поможет."
    zh:
      - "Crash Doctor 已经拦截了它——安全网会重新同步坐骑数值并吞掉残余错误，战斗继续。保持「异常防护」设置为开。"
      - "如果仍然刷屏：把 TOR_Core 更新到最新版本（缓存时序 bug 在 TOR 一侧）。"
      - "对玩法无害——最坏情况下骑乘单位的速度效果只是延迟一帧；不会有任何损失。"
      - "不要为此重建着色器或更换驱动——这是代码 bug，没用。"
    tr:
      - "Crash Doctor bunu zaten koruyor — güvenlik ağı at değerlerini yeniden eşitler ve kalan hatayı yutar, savaş devam eder. «İstisna korumaları» ayarını AÇIK tut."
      - "Hâlâ spam yapıyorsa: TOR_Core'u en son sürüme güncelle (önbellek zamanlama hatası TOR tarafında)."
      - "Oynanış açısından zararsız — en kötü ihtimalle atlı bir birimin hız efekti bir kare eskidir; hiçbir şey kaybolmaz."
      - "Bunun için gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — bu bir kod hatası, yardımcı olmaz."
  match:
    all:
      - managed_exception: { frame_contains: "SetDynamicMountMovementProperties" }
      - managed_exception: { type_contains: "ArgumentException" }

- id: tor.ability_cast_rts_camera_nre
  category: tor_compatibility
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-05 report.txt (fe1c70fc) — NullReferenceException in TOR_Core.AbilitySystem.Ability.CalculateAICastMatrixFrame ← GetSpawnFrame ← ActivateAbility ← DoCast ← TryCastCurrentAbility ← AbilityManagerMissionLogic.HandleInput. Player casting Sylvania spell in battle with RTS Camera v5.3.25 active. Captured by Crash Doctor managed capture."
  requires_sources: [managed_exception]
  title:
    en: "TOR spell-cast crash from the RTS / free camera — guarded by Crash Doctor"
    ru: "Краш TOR при касте из RTS / свободной камеры — перехвачено Crash Doctor"
    zh: "TOR 在 RTS／自由镜头下施法崩溃——已被 Crash Doctor 拦截"
    tr: "RTS / serbest kameradan TOR büyü-yapma çökmesi — Crash Doctor tarafından korunuyor"
  description:
    en: |
      System.NullReferenceException thrown from TOR_Core
      Ability.CalculateAICastMatrixFrame ← Ability.GetSpawnFrame ← ActivateAbility /
      DoCast ← AgentExtensions.TryCastCurrentAbility ←
      AbilityManagerMissionLogic.HandleInput while you cast a spell in battle.

      Trigger: casting a TOR spell while in the RTS / free (commander) camera. RTS
      Camera detaches control from your hero, so the engine no longer reports it as
      player-controlled. TOR's GetSpawnFrame then routes the cast into its AI branch
      (CalculateAICastMatrixFrame), which immediately reads a WizardAIComponent that
      only AI-controlled wizards ever get — your hero has none, so it is null and the
      cast dereferences null and crashes the battle. This is a TOR + RTS Camera
      interaction bug, not a shader / driver issue.
    ru: |
      System.NullReferenceException из TOR_Core
      Ability.CalculateAICastMatrixFrame ← Ability.GetSpawnFrame ← ActivateAbility /
      DoCast ← AgentExtensions.TryCastCurrentAbility ←
      AbilityManagerMissionLogic.HandleInput при касте спелла в бою.

      Триггер: каст спелла TOR в режиме RTS / свободной (командирской) камеры. RTS
      Camera отцепляет управление от твоего героя, и движок перестаёт считать его
      player-controlled. Тогда GetSpawnFrame у TOR уводит каст в AI-ветку
      (CalculateAICastMatrixFrame), которая сразу читает WizardAIComponent — а он
      бывает только у ИИ-магов; у твоего героя его нет, значит null, и каст падает на
      разыменовании null, роняя бой. Это баг взаимодействия TOR + RTS Camera, а не
      проблема шейдеров / драйвера.
    zh: |
      在战斗中施法时，从 TOR_Core
      Ability.CalculateAICastMatrixFrame ← Ability.GetSpawnFrame ← ActivateAbility /
      DoCast ← AgentExtensions.TryCastCurrentAbility ←
      AbilityManagerMissionLogic.HandleInput 抛出 System.NullReferenceException。

      触发条件：在 RTS／自由（指挥）镜头下施放 TOR 法术。RTS Camera 会分离对你英雄的
      控制，引擎不再将其报告为玩家控制。于是 TOR 的 GetSpawnFrame 把施法导向其 AI 分支
      （CalculateAICastMatrixFrame），该分支立即读取只有 AI 法师才有的
      WizardAIComponent——你的英雄没有，因此为 null，施法对 null 解引用而崩溃。这是
      TOR + RTS Camera 的交互 bug，不是着色器／驱动问题。
    tr: |
      Savaşta büyü yaparken TOR_Core
      Ability.CalculateAICastMatrixFrame ← Ability.GetSpawnFrame ← ActivateAbility /
      DoCast ← AgentExtensions.TryCastCurrentAbility ←
      AbilityManagerMissionLogic.HandleInput'ten System.NullReferenceException
      fırlatılır.

      Tetikleyici: RTS / serbest (komutan) kamerada bir TOR büyüsü yapmak. RTS
      Camera kahramanının kontrolünü ayırır, böylece motor onu artık oyuncu kontrollü
      olarak bildirmez. TOR'un GetSpawnFrame'i büyüyü AI dalına
      (CalculateAICastMatrixFrame) yönlendirir; bu dal yalnızca AI büyücülerinde
      bulunan bir WizardAIComponent'i hemen okur — kahramanında yoktur, dolayısıyla
      null'dır ve büyü null başvurusuyla çöker. Bu bir TOR + RTS Camera etkileşim
      hatasıdır, gölgelendirici / sürücü sorunu değil.
  fix:
    en:
      - "Crash Doctor already guards this — its safety net reroutes the cast to your hero and the battle continues. Keep the «Spell-cast crash guard — RTS/free camera» fix ON (Crash Fixes tab)."
      - "Workaround: leave the RTS / free camera and take direct control of your hero before casting a spell — casting while detached is what triggers it."
      - "Do NOT rebuild shaders or change drivers for this — it's a code-interaction bug, that won't help."
      - "Report it to the RTS Camera / TOR authors so it's fixed at the source."
    ru:
      - "Crash Doctor уже это перехватывает — safety net перенаправляет каст на твоего героя, бой продолжается. Держи фикс «Защита от вылета при касте из RTS/свободной камеры» ВКЛ (вкладка «Фиксы крашей»)."
      - "Обходной путь: выйди из RTS / свободной камеры и возьми прямое управление героем перед кастом — падает именно каст в отцепленном режиме."
      - "НЕ пересобирай шейдеры и не меняй драйвер из-за этого — это баг взаимодействия кода, не поможет."
      - "Сообщи авторам RTS Camera / TOR, чтобы починили в первоисточнике."
    zh:
      - "Crash Doctor 已经拦截了它——安全网会把施法重定向到你的英雄，战斗继续。保持「施法崩溃防护——RTS／自由镜头」修复为开（崩溃修复标签页）。"
      - "变通方法：在施法前退出 RTS／自由镜头并直接控制你的英雄——在分离状态下施法正是触发条件。"
      - "不要为此重建着色器或更换驱动——这是代码交互 bug，没用。"
      - "向 RTS Camera / TOR 作者报告，以便从源头修复。"
    tr:
      - "Crash Doctor bunu zaten koruyor — güvenlik ağı büyüyü kahramanına yönlendirir ve savaş devam eder. «Büyü çökme koruması — RTS/serbest kamera» düzeltmesini AÇIK tut (Çökme Düzeltmeleri sekmesi)."
      - "Geçici çözüm: büyü yapmadan önce RTS / serbest kameradan çık ve kahramanının doğrudan kontrolünü al — ayrık durumdayken büyü yapmak tetikleyicidir."
      - "Bunun için gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — bu bir kod-etkileşim hatasıdır, yardımcı olmaz."
      - "Kaynağında düzeltilmesi için RTS Camera / TOR yazarlarına bildir."
  match:
    all:
      - managed_exception: { frame_contains: "CalculateAICastMatrixFrame" }
      - managed_exception: { type_contains: "NullReferenceException" }
