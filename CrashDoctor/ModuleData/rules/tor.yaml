- id: tor.null_particle
  category: tor
  severity: info
  confidence: medium
  evidence_source: "TOR-bug-corpus.md TOR-019"
  requires_sources: [log_line]
  title:
    en: "TOR null particle on agent bone"
    ru: "TOR — null particle на кости агента"
