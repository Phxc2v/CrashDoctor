- id: tor.naval_dlc_conflict
  category: tor_compatibility
  severity: critical
  confidence: high
  evidence_source: "Real client crash 2026-05-04 (Phoenix) — NavalDLC + TOR_Core in module list, game terminates without managed exception during scene load."
  requires_sources: [module_list]
  title:
    en: "Naval DLC (War Sails) is incompatible with TOR"
    ru: "Naval DLC (War Sails) несовместим с TOR"
    zh: "Naval DLC（War Sails）与 TOR 不兼容"
    tr: "Naval DLC (War Sails) ile TOR uyumsuz"
  description:
    en: |
      The Naval DLC (TaleWorlds' "War Sails" content; ships as a SubModule with
      Id="NavalDLC") replaces the vanilla campaign map with a sea-bearing version
      and reworks party movement, scene transitions, and several hard-coded
      campaign behaviours. The Old Realms completely overrides the campaign map
      via TOR_Environment + TOR_Core. The two cannot share a save: party-position
      reads, scene names and faction-territory bindings diverge — the game crashes
      either during initial save load, on the first map-encounter scene, or
      silently terminates without writing a managed stack trace.

      No fix exists short of disabling one of them. The TOR team has stated they
      do NOT plan to add Naval DLC compat (the campaign map rewrite is too deep).
    zh: |
      Naval DLC（TaleWorlds 的 "War Sails" 内容；以 Id="NavalDLC" 的 SubModule
      形式发布）用带海洋的版本替换了原版战役地图，并重做了队伍移动、场景切换
      以及若干硬编码的战役行为。The Old Realms 通过 TOR_Environment + TOR_Core
      完全重写了战役地图。两者无法共用同一个存档：队伍位置读取、场景名称和
      势力领土绑定都会冲突——游戏要么在初次读取存档时崩溃，要么在第一个地图
      遭遇场景崩溃，要么不写托管堆栈就静默退出。

      除了禁用其中之一，没有别的解决办法。TOR 团队已表示他们不打算添加
      Naval DLC 兼容（战役地图重写得太深入了）。
    tr: |
      Naval DLC (TaleWorlds'ün "War Sails" içeriği; Id="NavalDLC" olan bir
      SubModule olarak gelir) orijinal sefer haritasını denizli bir sürümle
      değiştirir ve grup hareketini, sahne geçişlerini ve sabit kodlanmış
      birkaç sefer davranışını yeniden düzenler. The Old Realms, sefer haritasını
      TOR_Environment + TOR_Core ile tamamen yeniden yazar. İkisi aynı kaydı
      paylaşamaz: grup-konum okumaları, sahne adları ve hizip-bölge bağlantıları
      ayrışır — oyun ya ilk kayıt yüklenirken, ya ilk harita karşılaşma sahnesinde
      çöker ya da yönetilen bir yığın izi yazmadan sessizce sonlanır.

      Birini devre dışı bırakmaktan başka bir çözüm yok. TOR ekibi Naval DLC
      uyumluluğu eklemeyi PLANLAMADIKLARINI belirtti (sefer haritası yeniden
      yazımı çok derin).
    ru: |
      Naval DLC (контент TaleWorlds «War Sails»; в лаунчере проходит как
      SubModule с Id="NavalDLC") меняет ванильную карту кампании на версию
      с морями и переписывает party movement, переходы сцен и часть hard-coded
      campaign behaviours. The Old Realms полностью переопределяет карту через
      TOR_Environment + TOR_Core. Один сейв на двоих не уживёт — чтение позиций
      партий, имена сцен, привязки территорий фракций расходятся, и игра падает
      либо на загрузке сейва, либо на первой scene-сцене карты, либо молча
      завершается без managed-стека.

      Фикса нет — только отключить одно из двух. Команда TOR явно сказала,
      что Naval DLC compat делать НЕ планируют (переписан слишком большой
      кусок карты).
  fix:
    en:
      - "Pick one: TOR or Naval DLC. They cannot coexist."
      - "Launcher → uncheck NavalDLC if you want to play TOR."
      - "Launcher → uncheck TOR_Core, TOR_Environment, TOR_Armory and any TOR_* sub-modules if you want to play Naval DLC."
      - "DO NOT load a save that was started with one mod-set under the other — load order changes mid-save will corrupt the campaign state."
      - "If a save is already poisoned (started TOR, added Naval, can't roll back): start a new campaign from the appropriate config."
    ru:
      - "Выбери одно: TOR или Naval DLC. Вместе не работают."
      - "Лаунчер → сними галку с NavalDLC если хочешь играть TOR."
      - "Лаунчер → сними галки с TOR_Core, TOR_Environment, TOR_Armory и любых TOR_* подмодулей если хочешь играть Naval DLC."
      - "НЕ загружай сейв, начатый с одним набором модов, под другим — смена load order'а посреди сейва ломает состояние кампании."
      - "Если сейв уже отравлен (начал на TOR, добавил Naval, отката нет) — заводи новую кампанию под нужный конфиг."
    zh:
      - "二选一：TOR 或 Naval DLC。它们无法共存。"
      - "想玩 TOR，就在启动器里取消勾选 NavalDLC。"
      - "想玩 Naval DLC，就在启动器里取消勾选 TOR_Core、TOR_Environment、TOR_Armory 以及任何 TOR_* 子模块。"
      - "不要把用某一套模组开始的存档在另一套下加载——存档中途改变加载顺序会损坏战役状态。"
      - "如果存档已经被污染（用 TOR 开档，又加了 Naval，无法回退）：用对应的配置开一局新战役。"
    tr:
      - "Birini seç: TOR ya da Naval DLC. Birlikte var olamazlar."
      - "TOR oynamak istiyorsan başlatıcıda NavalDLC'nin işaretini kaldır."
      - "Naval DLC oynamak istiyorsan başlatıcıda TOR_Core, TOR_Environment, TOR_Armory ve tüm TOR_* alt modüllerinin işaretini kaldır."
      - "Bir mod setiyle başlatılmış bir kaydı diğerinin altında YÜKLEME — kayıt ortasında yükleme sırasını değiştirmek sefer durumunu bozar."
      - "Kayıt zaten bozulduysa (TOR ile başladın, Naval ekledin, geri dönemiyorsun): uygun yapılandırmayla yeni bir sefer başlat."
  match:
    all:
      - module_list: { id: "TOR_Core", has: "true" }
      - module_list: { id: "NavalDLC", has: "true" }

