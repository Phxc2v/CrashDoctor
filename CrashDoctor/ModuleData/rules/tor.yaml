- id: tor.gamepass_not_supported
  category: tor
  severity: critical
  confidence: high
  evidence_source: "TOR-bug-corpus.md TOR-006"
  requires_sources: [log_line]
  title:
    en: "TOR does not run on Microsoft Store / Game Pass"
    ru: "TOR не работает на Microsoft Store / Game Pass"
  description:
    en: "TOR is built for the Steam version. The MS Store / Game Pass build of Bannerlord uses different binaries."
    ru: "TOR собран под Steam-версию. Версия Microsoft Store / Game Pass использует другие бинарники."
  fix:
    en:
      - "Buy Bannerlord on Steam to play TOR."
      - "There is no fix for the MS Store version — TaleWorlds and TOR don't support it."
    ru:
      - "Купи Bannerlord в Steam, чтобы играть с TOR."
      - "Решения для MS Store-версии нет — TaleWorlds и TOR её не поддерживают."
  match:
    any:
