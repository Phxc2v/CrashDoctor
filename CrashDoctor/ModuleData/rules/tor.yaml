- id: tor.career_perk_npe
  category: tor
  severity: critical
  confidence: high
  evidence_source: "TOR-bug-corpus.md TOR-001"
  # No requires_sources: match below is `any` between a log_line probe and a
  # butr_report.exception probe. Listing only log_line here would gate the
  # whole rule on log_line presence and silently skip BLSE/BUTR-only crashes
  # where the managed stack went straight to crash_report.html without an
  # rgl_log entry — the more diagnostic case of the two.
  title:
    en: "TOR CareerPerkMissionBehavior null reference"
    ru: "Null reference в TOR_Core.CareerPerkMissionBehavior"
    zh: "TOR CareerPerkMissionBehavior 空引用"
    tr: "TOR CareerPerkMissionBehavior boş referans"
  description:
    en: "Known TOR bug — CareerPerkMissionBehavior.OnAgentRemoved hits a null when certain career perks fire on an already-dead agent."
    ru: "Известный баг TOR — CareerPerkMissionBehavior.OnAgentRemoved падает на null, когда определённые карьерные перки срабатывают на уже мёртвом агенте."
    zh: "已知的 TOR 缺陷——当某些职业天赋在已经死亡的单位上触发时，CareerPerkMissionBehavior.OnAgentRemoved 会遇到空值。"
    tr: "Bilinen bir TOR hatası — bazı kariyer yetenekleri zaten ölmüş bir birim üzerinde tetiklendiğinde CareerPerkMissionBehavior.OnAgentRemoved boş değere takılır."
  fix:
    en:
      - "Update TOR_Core to the latest version on NexusMods."
      - "If reproducible: avoid the specific career perk that triggers it (see TOR Discord #bug-reports)."
    ru:
      - "Обнови TOR_Core до свежей версии на NexusMods."
      - "Если повторяется — избегай конкретного карьерного перка (см. TOR Discord #bug-reports)."
    zh:
      - "在 NexusMods 上把 TOR_Core 更新到最新版本。"
      - "如果能复现：避免使用触发它的那个职业天赋（见 TOR Discord #bug-reports）。"
    tr:
      - "NexusMods'ta TOR_Core'u en son sürüme güncelle."
      - "Tekrarlanabiliyorsa: onu tetikleyen belirli kariyer yeteneğini kullanma (bkz. TOR Discord #bug-reports)."
  match:
    any:
      - log_line: { contains: "CareerPerkMissionBehavior.OnAgentRemoved" }
      - butr_report.exception: { frame_module_equals: "TOR_Core" }

