- id: tor.dll_blocked
  category: modules
  severity: critical
  confidence: high
  evidence_source: "TOR-bug-corpus.md TOR-005"
  requires_sources: [log_line]
  title:
    en: "TOR DLL blocked by Windows / antivirus"
    ru: "Windows / антивирус заблокировал TOR DLL"
    zh: "TOR DLL 被 Windows / 杀毒软件阻止"
    tr: "TOR DLL'i Windows / antivirüs tarafından engellendi"
  description:
    en: "Cannot load TOR_Core.dll — Windows marks downloads from the Internet as 'blocked' until you unblock them, or your antivirus quarantined it."
    ru: "Не загружается TOR_Core.dll — Windows помечает скачанные файлы как 'blocked' пока их не разблокировать; или антивирус посадил DLL в карантин."
    zh: "无法加载 TOR_Core.dll——Windows 会把从网上下载的文件标记为“已阻止”，直到你解除阻止；或者杀毒软件把它隔离了。"
    tr: "TOR_Core.dll yüklenemiyor — Windows, internetten indirilen dosyaları sen engeli kaldırana kadar 'engellenmiş' olarak işaretler veya antivirüsün onu karantinaya aldı."
  fix:
    en:
      - "Modules/TOR_Core/bin/Win64_Shipping_Client/TOR_Core.dll → right click → Properties → check 'Unblock' → OK. Repeat for the other TOR DLLs."
      - "Add the Modules/TOR_Core folder to your antivirus exclusions."
      - "Re-download the mod from NexusMods if its DLLs are missing entirely."
    ru:
      - "Modules/TOR_Core/bin/Win64_Shipping_Client/TOR_Core.dll → правый клик → Свойства → Разблокировать → OK. Повтори для остальных DLL TOR."
      - "Добавь папку Modules/TOR_Core в исключения антивируса."
      - "Перекачай мод с NexusMods, если DLL вообще пропали."
    zh:
      - "Modules/TOR_Core/bin/Win64_Shipping_Client/TOR_Core.dll → 右键 → 属性 → 勾选“解除锁定” → 确定。对其他 TOR DLL 重复此操作。"
      - "把 Modules/TOR_Core 文件夹加入杀毒软件的排除列表。"
      - "如果 DLL 完全丢失，从 NexusMods 重新下载该模组。"
    tr:
      - "Modules/TOR_Core/bin/Win64_Shipping_Client/TOR_Core.dll → sağ tık → Özellikler → 'Engellemeyi kaldır'ı işaretle → Tamam. Diğer TOR DLL'leri için tekrarla."
      - "Modules/TOR_Core klasörünü antivirüs istisnalarına ekle."
      - "DLL'ler tamamen eksikse modu NexusMods'tan yeniden indir."
  match:
    all:
      - log_line: { contains: "TOR_Core" }
      - log_line: { contains: "Cannot load" }

- id: tor.gpu_texture_array_fail
  category: tor
  severity: critical
  confidence: high
  evidence_source: "TOR-bug-corpus.md TOR-009"
  # Gate on TOR module presence — otherwise this overlaps with
  # gpu.create_texture_array_invalidarg (which also matches `rglGPU_device::create_texture_array`)
  # and produces two cards with similar fixes for vanilla users.
  requires_sources: [log_line, module_list]
  title:
    en: "TOR GPU texture array allocation failed"
    ru: "TOR — GPU не выделил массив текстур"
    zh: "TOR GPU 纹理数组分配失败"
    tr: "TOR GPU doku dizisi tahsisi başarısız"
  description:
    en: "rglGPU_device::create_texture_array failed. TOR loads many high-res textures at once; on a low-VRAM GPU the call returns an error and the game crashes."
    ru: "rglGPU_device::create_texture_array упал. TOR подгружает много текстур разом; на видеокарте с малым VRAM вызов возвращает ошибку и игра крашится."
    zh: "rglGPU_device::create_texture_array 失败。TOR 会一次性加载许多高分辨率纹理；在显存较小的显卡上，该调用返回错误，游戏崩溃。"
    tr: "rglGPU_device::create_texture_array başarısız oldu. TOR aynı anda birçok yüksek çözünürlüklü doku yükler; düşük VRAM'li bir ekran kartında çağrı hata döndürür ve oyun çöker."
  fix:
    en:
      - "In-game: Options → Graphics → set Texture Quality to Low and Texture Budget to 1."
      - "Restart the game; if it still crashes — disable TOR_Environment temporarily."
      - "If you have a discrete GPU, make sure the game runs on it (see gpu.amd_integrated_default)."
    ru:
      - "В игре: Опции → Графика → Texture Quality на Low, Texture Budget на 1."
      - "Перезапусти игру; если опять — временно отключи TOR_Environment."
      - "Если есть дискретная видеокарта — убедись, что игра идёт на ней (см. gpu.amd_integrated_default)."
    zh:
      - "游戏内：选项 → 图形 → 把 Texture Quality 设为 Low，Texture Budget 设为 1。"
      - "重启游戏；如果仍然崩溃——暂时禁用 TOR_Environment。"
      - "如果你有独立显卡，确保游戏运行在独显上（见 gpu.amd_integrated_default）。"
    tr:
      - "Oyun içi: Seçenekler → Grafikler → Texture Quality'yi Low, Texture Budget'ı 1 yap."
      - "Oyunu yeniden başlat; hâlâ çöküyorsa — TOR_Environment'ı geçici olarak devre dışı bırak."
      - "Ayrı bir ekran kartın varsa, oyunun onun üzerinde çalıştığından emin ol (bkz. gpu.amd_integrated_default)."
  match:
    all:
      - log_line: { contains: "rglGPU_device::create_texture_array" }
      - module_list: { id: "TOR_Core", has: "true" }

