- id: tor.requires_harmony
  category: modules
  severity: critical
  confidence: high
  evidence_source: "TOR-bug-corpus.md TOR-R01"
  requires_sources: [module_list]
  title:
    en: "TOR is enabled without Bannerlord.Harmony"
    ru: "TOR включён без Bannerlord.Harmony"
  description:
    en: "The Old Realms requires Harmony to load. Without it the game crashes during module init."
    ru: "The Old Realms требует Harmony для загрузки. Без него игра падает на старте инициализации модов."
  fix:
    en:
      - "Install Bannerlord.Harmony from NexusMods (mod 2006)."
      - "Place it ABOVE TOR_Core in the launcher load order."
    ru:
      - "Поставь Bannerlord.Harmony с NexusMods (mod 2006)."
      - "Поставь его ВЫШЕ TOR_Core в порядке загрузки лаунчера."
  match:
    all:
      - module_list: { id: "TOR_Core", has: "true" }
      - module_list: { id: "Bannerlord.Harmony", missing: "true" }

- id: tor.missing_core_submodule
  category: modules
  severity: critical
  confidence: high
  evidence_source: "TOR-bug-corpus.md TOR-R02"
  requires_sources: [module_list]
  title:
    en: "TOR sub-module enabled without TOR_Core"
    ru: "TOR-подмодуль активен, а TOR_Core нет"
  description:
    en: "TOR_Armory or TOR_Environment are enabled but TOR_Core is missing. They will fail to load anything."
    ru: "TOR_Armory или TOR_Environment активны, но TOR_Core отсутствует. Они не смогут загрузиться."
  fix:
    en:
      - "Enable TOR_Core in the launcher and place it ABOVE TOR_Armory and TOR_Environment."
    ru:
      - "Включи TOR_Core в лаунчере и поставь ВЫШЕ TOR_Armory и TOR_Environment."
  match:
    all:
      - any:
          - module_list: { id: "TOR_Armory", has: "true" }
          - module_list: { id: "TOR_Environment", has: "true" }
      - module_list: { id: "TOR_Core", missing: "true" }

- id: tor.career_perk_npe
