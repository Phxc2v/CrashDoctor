- id: mod.module_not_found
  category: modules
  severity: critical
  confidence: high
  evidence_source: "https://forums.taleworlds.com/threads/could-not-load-module.450123/"
  requires_sources: [log_line]
  title:
    en: "A required module DLL could not be loaded"
    ru: "Не удалось загрузить DLL одного из модов"
    zh: "无法加载某个必需模组的 DLL"
    zht: "無法載入某個必需模組的 DLL"
    tr: "Gerekli bir modül DLL'i yüklenemedi"
  description:
    en: |
      Bannerlord could not load the DLL of one of the active modules. The mod is
      either missing files, blocked by Windows ('blocked file' on download), or
      installed for a different game version.
    ru: |
      Bannerlord не смог загрузить DLL одного из активных модов. У мода либо нет
      нужных файлов, либо Windows заблокировал DLL ('blocked file' после
      скачивания), либо мод на другую версию игры.
    zh: |
      Bannerlord 无法加载某个已启用模组的 DLL。该模组要么缺少文件，要么被
      Windows 阻止（下载后出现 'blocked file'），要么是为其他游戏版本安装的。
    zht: |
      Bannerlord 無法載入某個已啟用模組的 DLL。該模組要麼缺少檔案，要麼被
      Windows 阻擋（下載後出現 'blocked file'），要麼是為其他遊戲版本安裝的。
    tr: |
      Bannerlord, etkin modüllerden birinin DLL'ini yükleyemedi. Modun ya
      dosyaları eksik, ya Windows tarafından engellenmiş ('blocked file' indirme
      sonrası), ya da farklı bir oyun sürümü için kurulmuş.
  fix:
    en:
      - "Check that the mod is installed in <Bannerlord>/Modules/<ModId>/, not nested."
      - "Right-click the mod's .dll → Properties → Unblock (if shown)."
      - "Reinstall the mod for the current Bannerlord version."
    ru:
      - "Проверь, что мод лежит в <Bannerlord>/Modules/<ModId>/, не вложен."
      - "Правый клик по DLL мода → Свойства → Разблокировать (если есть галочка)."
      - "Переустанови мод под текущую версию Bannerlord."
    zh:
      - "确认模组安装在 <Bannerlord>/Modules/<ModId>/ 下，没有多套一层目录。"
      - "右键模组的 .dll → 属性 → 解除阻止（如果有该选项）。"
      - "为当前 Bannerlord 版本重新安装该模组。"
    zht:
      - "確認模組安裝在 <Bannerlord>/Modules/<ModId>/ 下，沒有多套一層目錄。"
      - "右鍵模組的 .dll → 內容 → 解除封鎖（如果有該選項）。"
      - "為目前 Bannerlord 版本重新安裝該模組。"
    tr:
      - "Modun <Bannerlord>/Modules/<ModId>/ içinde, iç içe olmadan kurulu olduğunu doğrulayın."
      - "Modun .dll dosyasına sağ tıklayın → Özellikler → Engellemeyi kaldır (görünüyorsa)."
      - "Modu mevcut Bannerlord sürümü için yeniden yükleyin."
  match:
    # Narrow on "module" so we don't false-positive on the engine's "Cannot load
    # font", "Couldn't load shader", "Couldn't load icon" which are unrelated
    # and fire on perfectly healthy startups. The harmony-stray and TOR-DLL
    # rules pick up bare "Cannot load" + their own qualifiers.
    any:
      - log_line:
          contains: "Could not load module"
      - log_line:
          regex: "(?i)(Couldn't|Cannot) load .{0,40}(module|SubModule|\\.dll)"

- id: mod.bad_image_format
  category: modules
  severity: critical
  confidence: high
  evidence_source: "https://learn.microsoft.com/en-us/dotnet/api/system.badimageformatexception"
  requires_sources: [log_line]
  title:
    en: "BadImageFormatException — DLL bitness mismatch"
    ru: "BadImageFormatException — несовпадение разрядности DLL"
    zh: "BadImageFormatException — DLL 位数不匹配"
    zht: "BadImageFormatException — DLL 位數不相符"
    tr: "BadImageFormatException — DLL bit uyumsuzluğu"
  description:
    en: |
      A mod's DLL was compiled for a different bitness or runtime than the game.
      Almost always caused by an outdated mod that targets a previous Bannerlord version.
    ru: |
      DLL мода собран под другую разрядность или рантайм, чем игра. Почти всегда —
      устаревший мод под старую версию Bannerlord.
    zh: |
      某个模组的 DLL 是按与游戏不同的位数或运行时编译的。几乎总是由
      针对旧版 Bannerlord 的过时模组引起。
    zht: |
      某個模組的 DLL 是按與遊戲不同的位數或執行階段編譯的。幾乎總是由
      針對舊版 Bannerlord 的過時模組引起。
    tr: |
      Bir modun DLL'i oyundan farklı bir bit yapısı veya çalışma zamanı için
      derlenmiş. Neredeyse her zaman önceki bir Bannerlord sürümünü hedefleyen
      eski bir mod nedeniyledir.
  fix:
    en:
      - "Update the mod to the version compatible with the current Bannerlord."
      - "Check the mod's required Bannerlord version on its NexusMods page."
      - "Disable the mod if no update is available."
    ru:
      - "Обнови мод до версии под текущий Bannerlord."
      - "Проверь требуемую версию Bannerlord на странице мода в NexusMods."
      - "Отключи мод, если обновления нет."
    zh:
      - "把模组更新到与当前 Bannerlord 兼容的版本。"
      - "在模组的 NexusMods 页面查看其要求的 Bannerlord 版本。"
      - "如果没有更新可用，就禁用该模组。"
    zht:
      - "把模組更新到與目前 Bannerlord 相容的版本。"
      - "在模組的 NexusMods 頁面查看其要求的 Bannerlord 版本。"
      - "如果沒有更新可用，就停用該模組。"
    tr:
      - "Modu mevcut Bannerlord ile uyumlu sürüme güncelleyin."
      - "Modun NexusMods sayfasında gereken Bannerlord sürümünü kontrol edin."
      - "Güncelleme yoksa modu devre dışı bırakın."
  match:
    all:
      - log_line:
          contains: "BadImageFormatException"

- id: mod.dependency_mismatch
  category: modules
  severity: critical
  confidence: high
  evidence_source: "https://docs.bannerlordmodding.com/dependency-mismatch"
  requires_sources: [log_line]
  title:
    en: "Mod dependency version mismatch"
    ru: "Несовпадение версий зависимостей модов"
    zh: "模组依赖版本不匹配"
    zht: "模組相依版本不相符"
    tr: "Mod bağımlılık sürümü uyuşmazlığı"
  description:
    en: |
      A mod requires another mod at a specific version, and the version installed
      is different. The launcher highlights this red on startup.
    ru: |
      Мод требует другой мод определённой версии, а установлена другая. Лаунчер
      подсвечивает это красным при старте.
    zh: |
      某个模组要求另一个模组为特定版本，而已安装的版本不同。启动器在启动时
      会用红色标出此问题。
    zht: |
      某個模組要求另一個模組為特定版本，而已安裝的版本不同。啟動器在啟動時
      會用紅色標出此問題。
    tr: |
      Bir mod, başka bir modun belirli bir sürümünü gerektiriyor ama kurulu sürüm
      farklı. Başlatıcı bunu açılışta kırmızıyla işaretler.
  fix:
    en:
      - "Open the launcher and read which mod has the version conflict."
      - "Update the dependency to the required version."
      - "If newer version isn't compatible, downgrade the dependent mod."
    ru:
      - "Открой лаунчер и посмотри, у какого мода конфликт версий."
      - "Обнови зависимость до требуемой версии."
      - "Если свежей нет — откати зависящий мод на старую версию."
    zh:
      - "打开启动器，查看哪个模组存在版本冲突。"
      - "把该依赖更新到要求的版本。"
      - "如果新版本不兼容，就把依赖它的那个模组降级。"
    zht:
      - "開啟啟動器，查看哪個模組存在版本衝突。"
      - "把該相依更新到要求的版本。"
      - "如果新版本不相容，就把相依它的那個模組降級。"
    tr:
      - "Başlatıcıyı açın ve hangi modda sürüm çakışması olduğunu okuyun."
      - "Bağımlılığı gereken sürüme güncelleyin."
      - "Daha yeni sürüm uyumlu değilse, bağımlı modu eski sürüme düşürün."
  match:
    any:
      - log_line:
          contains: "DependencyVersionMismatch"
      - log_line:
          contains: "dependency version"

- id: mod.type_load_exception
  category: modules
  severity: critical
  confidence: high
  evidence_source: "https://learn.microsoft.com/en-us/dotnet/api/system.typeloadexception"
  requires_sources: [log_line]
  title:
    en: "TypeLoadException — class signature mismatch"
    ru: "TypeLoadException — несовпадение сигнатуры класса"
    zh: "TypeLoadException — 类签名不匹配"
    zht: "TypeLoadException — 類別簽章不相符"
    tr: "TypeLoadException — sınıf imzası uyuşmazlığı"
  description:
    en: |
      A mod tried to use a TaleWorlds type that has changed between game versions.
      The mod is built against a different Bannerlord version.
    ru: |
      Мод пытается использовать тип TaleWorlds, который изменился между версиями
      игры. Мод собран под другую версию Bannerlord.
    zh: |
      某个模组试图使用一个在不同游戏版本间发生了变化的 TaleWorlds 类型。
      该模组是针对其他 Bannerlord 版本编译的。
    zht: |
      某個模組試圖使用一個在不同遊戲版本間發生了變化的 TaleWorlds 類型。
      該模組是針對其他 Bannerlord 版本編譯的。
    tr: |
      Bir mod, oyun sürümleri arasında değişmiş bir TaleWorlds türünü kullanmaya
      çalıştı. Mod farklı bir Bannerlord sürümüne göre derlenmiş.
  fix:
    en:
      - "Read the next stack frames after TypeLoadException — they name the offending mod."
      - "Update the mod or downgrade Bannerlord to its target version."
    ru:
      - "Прочитай следующие фреймы стека после TypeLoadException — там имя мода."
      - "Обнови мод или откати Bannerlord до его целевой версии."
    zh:
      - "查看 TypeLoadException 之后的几个堆栈帧——里面会写出出问题的模组名。"
      - "更新该模组，或把 Bannerlord 降级到它对应的目标版本。"
    zht:
      - "查看 TypeLoadException 之後的幾個堆疊框架——裡面會寫出出問題的模組名。"
      - "更新該模組，或把 Bannerlord 降級到它對應的目標版本。"
    tr:
      - "TypeLoadException'dan sonraki yığın çerçevelerini okuyun — sorunlu modun adını verirler."
      - "Modu güncelleyin ya da Bannerlord'u hedef sürümüne düşürün."
  match:
    any:
      - log_line:
          contains: "TypeLoadException"

- id: mod.missing_method
  category: modules
  severity: critical
  confidence: high
  evidence_source: "https://learn.microsoft.com/en-us/dotnet/api/system.missingmethodexception"
  requires_sources: [log_line]
  title:
    en: "MissingMethodException — outdated mod"
    ru: "MissingMethodException — устаревший мод"
    zh: "MissingMethodException — 模组已过时"
    zht: "MissingMethodException — 模組已過時"
    tr: "MissingMethodException — eski mod"
  description:
    en: |
      A mod called a TaleWorlds method that no longer exists. Same root cause as
      TypeLoadException — mod built against an old Bannerlord.
    ru: |
      Мод позвал метод TaleWorlds, которого больше нет. Та же причина, что и у
      TypeLoadException — мод собран под старый Bannerlord.
    zh: |
      某个模组调用了一个已经不存在的 TaleWorlds 方法。根本原因与
      TypeLoadException 相同——模组是针对旧版 Bannerlord 编译的。
    zht: |
      某個模組呼叫了一個已經不存在的 TaleWorlds 方法。根本原因與
      TypeLoadException 相同——模組是針對舊版 Bannerlord 編譯的。
    tr: |
      Bir mod, artık var olmayan bir TaleWorlds yöntemini çağırdı. Kök neden
      TypeLoadException ile aynı — mod eski bir Bannerlord'a göre derlenmiş.
  fix:
    en:
      - "Read the next stack frames — they name the offending mod and method."
      - "Update the mod from NexusMods."
      - "Disable the mod if there is no update."
    ru:
      - "Прочитай следующие фреймы стека — там мод и метод, который не нашёлся."
      - "Обнови мод с NexusMods."
      - "Отключи мод, если обновления нет."
    zh:
      - "查看后续的堆栈帧——里面会写出出问题的模组及方法名。"
      - "从 NexusMods 更新该模组。"
      - "如果没有更新，就禁用该模组。"
    zht:
      - "查看後續的堆疊框架——裡面會寫出出問題的模組及方法名。"
      - "從 NexusMods 更新該模組。"
      - "如果沒有更新，就停用該模組。"
    tr:
      - "Sonraki yığın çerçevelerini okuyun — sorunlu modu ve yöntemi adlandırırlar."
      - "Modu NexusMods'tan güncelleyin."
      - "Güncelleme yoksa modu devre dışı bırakın."
  match:
    any:
      - log_line:
          contains: "MissingMethodException"

- id: harmony.stray_dll_in_main_bin
  category: harmony
  severity: critical
  confidence: high
  evidence_source: "Harmony-stray catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "Stray 0Harmony.dll in game's main bin folder"
    ru: "Лишний 0Harmony.dll в основной bin-папке игры"
    zh: "游戏主 bin 文件夹中有多余的 0Harmony.dll"
    zht: "遊戲主 bin 資料夾中有多餘的 0Harmony.dll"
    tr: "Oyunun ana bin klasöründe fazladan 0Harmony.dll"
  description:
    en: |
      Cannot load: Bannerlord.Harmony.dll. A stray copy of 0Harmony.dll has
      been dropped into <Bannerlord>/bin/Win64_Shipping_Client/ (instead of
      Modules/Bannerlord.Harmony/bin/...). The native loader picks up that
      copy first and fails the version check. Common after manual Harmony
      installs or Vortex deploy bugs.
    ru: |
      Cannot load: Bannerlord.Harmony.dll. Лишняя копия 0Harmony.dll лежит в
      <Bannerlord>/bin/Win64_Shipping_Client/ (вместо Modules/Bannerlord.Harmony/bin/...).
      Нативный загрузчик берёт эту копию первой и проваливает версионную
      проверку. Часто после ручной установки Harmony или багов Vortex deploy.
    zh: |
      Cannot load: Bannerlord.Harmony.dll。一份多余的 0Harmony.dll 被放进了
      <Bannerlord>/bin/Win64_Shipping_Client/（而不是 Modules/Bannerlord.Harmony/bin/...）。
      原生加载器会先取到这份副本并导致版本检查失败。常见于手动安装
      Harmony 或 Vortex 部署出错之后。
    zht: |
      Cannot load: Bannerlord.Harmony.dll。一份多餘的 0Harmony.dll 被放進了
      <Bannerlord>/bin/Win64_Shipping_Client/（而不是 Modules/Bannerlord.Harmony/bin/...）。
      原生載入器會先取到這份副本並導致版本檢查失敗。常見於手動安裝
      Harmony 或 Vortex 部署出錯之後。
    tr: |
      Cannot load: Bannerlord.Harmony.dll. 0Harmony.dll'in fazladan bir kopyası
      <Bannerlord>/bin/Win64_Shipping_Client/ içine bırakılmış
      (Modules/Bannerlord.Harmony/bin/... yerine). Yerel yükleyici önce o kopyayı
      alır ve sürüm denetiminde başarısız olur. Genelde elle Harmony kurulumu
      ya da Vortex dağıtım hatalarından sonra görülür.
  fix:
    en:
      - "Open <Bannerlord install>/bin/Win64_Shipping_Client/ in Explorer."
      - "Delete 0Harmony.dll if present (the legitimate one lives under Modules/Bannerlord.Harmony/bin/Win64_Shipping_Client/)."
      - "Re-launch the game."
      - "If using Vortex — switch to manual install for Bannerlord.Harmony."
    ru:
      - "Открой <Bannerlord>/bin/Win64_Shipping_Client/ в проводнике."
      - "Удали 0Harmony.dll, если он там есть (правильный лежит в Modules/Bannerlord.Harmony/bin/Win64_Shipping_Client/)."
      - "Перезапусти игру."
      - "Если используешь Vortex — переходи на ручную установку Bannerlord.Harmony."
    zh:
      - "在资源管理器中打开 <Bannerlord install>/bin/Win64_Shipping_Client/。"
      - "如果存在 0Harmony.dll 就删除它（正确的那份位于 Modules/Bannerlord.Harmony/bin/Win64_Shipping_Client/）。"
      - "重新启动游戏。"
      - "如果使用 Vortex——改为手动安装 Bannerlord.Harmony。"
    zht:
      - "在檔案總管中開啟 <Bannerlord install>/bin/Win64_Shipping_Client/。"
      - "如果存在 0Harmony.dll 就刪除它（正確的那份位於 Modules/Bannerlord.Harmony/bin/Win64_Shipping_Client/）。"
      - "重新啟動遊戲。"
      - "如果使用 Vortex——改為手動安裝 Bannerlord.Harmony。"
    tr:
      - "Dosya Gezgini'nde <Bannerlord install>/bin/Win64_Shipping_Client/ klasörünü açın."
      - "Varsa 0Harmony.dll dosyasını silin (doğrusu Modules/Bannerlord.Harmony/bin/Win64_Shipping_Client/ altındadır)."
      - "Oyunu yeniden başlatın."
      - "Vortex kullanıyorsanız — Bannerlord.Harmony için elle kuruluma geçin."
  match:
    all:
      - log_line:
          contains: "Bannerlord.Harmony.dll"
      - any:
          - log_line:
              contains: "Cannot load"
          - log_line:
              contains: "Could not resolve type with token"

- id: blse.format_exception_locale
  category: blse
  severity: critical
  confidence: high
  evidence_source: "BLSE 1.6.4 regression catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "BLSE 1.6.4 startup FormatException — locale regression"
    ru: "BLSE 1.6.4 краш на старте FormatException — регрессия локали"
    zh: "BLSE 1.6.4 启动时 FormatException — 区域设置回归问题"
    zht: "BLSE 1.6.4 啟動時 FormatException — 區域設定回歸問題"
    tr: "BLSE 1.6.4 başlangıç FormatException — bölge ayarı gerilemesi"
  description:
    en: |
      FormatException inside TaleWorlds.GauntletUI.PrefabSystem.ConstantDefinition.GetValue_Patch2.
      Known BLSE 1.6.4 regression with non-en-US locales (Russian, EU). The
      patched method tries to parse a number using the system culture and
      blows up. Fixed by downgrading BLSE.
    ru: |
      FormatException внутри TaleWorlds.GauntletUI.PrefabSystem.ConstantDefinition.GetValue_Patch2.
      Известная регрессия BLSE 1.6.4 с не-en-US локалями (русская, европейские).
      Запатченный метод парсит число по системной культуре и падает. Лечится
      даунгрейдом BLSE.
    zh: |
      TaleWorlds.GauntletUI.PrefabSystem.ConstantDefinition.GetValue_Patch2 内部出现
      FormatException。这是 BLSE 1.6.4 在非 en-US 区域（俄语、欧洲）下的已知回归问题。
      被修改的方法按系统区域格式解析数字时出错崩溃。降级 BLSE 即可解决。
    zht: |
      TaleWorlds.GauntletUI.PrefabSystem.ConstantDefinition.GetValue_Patch2 內部出現
      FormatException。這是 BLSE 1.6.4 在非 en-US 區域（俄語、歐洲）下的已知回歸問題。
      被修改的方法按系統區域格式解析數字時出錯崩潰。降級 BLSE 即可解決。
    tr: |
      TaleWorlds.GauntletUI.PrefabSystem.ConstantDefinition.GetValue_Patch2 içinde
      FormatException. en-US dışı bölgelerde (Rusça, AB) bilinen bir BLSE 1.6.4
      gerilemesidir. Yamalı yöntem, bir sayıyı sistem kültürüne göre ayrıştırmaya
      çalışır ve patlar. BLSE'yi eski sürüme düşürmek çözer.
  fix:
    en:
      - "Downgrade BLSE to 1.6.3 from butr.link/butrloader (the previous release)."
      - "Or temporarily change Windows region to English (US) — System Settings → Time & Language → Region → English."
      - "Watch for BLSE 1.6.5+ with the fix."
    ru:
      - "Откати BLSE до 1.6.3 с butr.link/butrloader (предыдущий релиз)."
      - "Или временно поставь регион Windows English (US) — Параметры → Время и язык → Регион → Английский."
      - "Жди BLSE 1.6.5+ с фиксом."
    zh:
      - "从 butr.link/butrloader 把 BLSE 降级到 1.6.3（上一个版本）。"
      - "或临时把 Windows 区域改为 English (US)——系统设置 → 时间和语言 → 区域 → English。"
      - "留意带修复的 BLSE 1.6.5+。"
    zht:
      - "從 butr.link/butrloader 把 BLSE 降級到 1.6.3（上一個版本）。"
      - "或暫時把 Windows 區域改為 English (US)——系統設定 → 時間與語言 → 區域 → English。"
      - "留意帶修復的 BLSE 1.6.5+。"
    tr:
