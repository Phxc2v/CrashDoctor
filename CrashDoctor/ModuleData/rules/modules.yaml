- id: mcm.prefab_injector_field_info
  category: mcm
  severity: critical
  confidence: high
  evidence_source: "MCM-Prefab catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "MCM PrefabInjector ArgumentNullException fieldInfo"
    ru: "MCM PrefabInjector ArgumentNullException fieldInfo"
    zh: "MCM PrefabInjector ArgumentNullException fieldInfo"
    zht: "MCM PrefabInjector ArgumentNullException fieldInfo"
    tr: "MCM PrefabInjector ArgumentNullException fieldInfo"
  description:
    en: |
      MCM.UI.Functionality.Injectors.PrefabInjector throws ArgumentNullException
      with parameter name 'fieldInfo'. Specific to MCM 4.0.7 (TypeInit chain on
      old ModLib-shaped settings) and MCM 5.0.4 preset-load regression.
    ru: |
      MCM.UI.Functionality.Injectors.PrefabInjector выбрасывает ArgumentNullException
      с именем параметра 'fieldInfo'. Специфично для MCM 4.0.7 (TypeInit-цепочка
      на старых ModLib-настройках) и регрессии MCM 5.0.4 на загрузке preset.
    zh: |
      MCM.UI.Functionality.Injectors.PrefabInjector 抛出 ArgumentNullException，
      参数名为 'fieldInfo'。这是 MCM 4.0.7（旧 ModLib 形式设置上的 TypeInit 链）
      以及 MCM 5.0.4 预设加载回归问题特有的现象。
    zht: |
      MCM.UI.Functionality.Injectors.PrefabInjector 拋出 ArgumentNullException，
      參數名為 'fieldInfo'。這是 MCM 4.0.7（舊 ModLib 形式設定上的 TypeInit 鏈）
      以及 MCM 5.0.4 預設載入回歸問題特有的現象。
    tr: |
      MCM.UI.Functionality.Injectors.PrefabInjector, 'fieldInfo' parametre adıyla
      ArgumentNullException fırlatır. MCM 4.0.7'ye (eski ModLib biçimli ayarlarda
      TypeInit zinciri) ve MCM 5.0.4 ön ayar yükleme gerilemesine özgüdür.
  fix:
    en:
      - "Update MCM to 4.3.13 or 5.0.5+ from NexusMods."
      - "If on MCM 4.0.7 with old ModLib mods — uninstall any ModLib-shaped settings."
      - "Update UIExtenderEx alongside MCM (they share the prefab pipeline)."
    ru:
      - "Обнови MCM до 4.3.13 или 5.0.5+ с NexusMods."
      - "Если стоит MCM 4.0.7 со старыми ModLib-модами — снеси настройки ModLib-форма."
      - "Параллельно обнови UIExtenderEx (они делят prefab-конвейер)."
    zh:
      - "从 NexusMods 把 MCM 更新到 4.3.13 或 5.0.5+。"
      - "如果使用 MCM 4.0.7 并带有旧 ModLib 模组——卸载所有 ModLib 形式的设置。"
      - "同时更新 UIExtenderEx（它和 MCM 共用 prefab 管线）。"
    zht:
      - "從 NexusMods 把 MCM 更新到 4.3.13 或 5.0.5+。"
      - "如果使用 MCM 4.0.7 並帶有舊 ModLib 模組——解除安裝所有 ModLib 形式的設定。"
      - "同時更新 UIExtenderEx（它和 MCM 共用 prefab 管線）。"
    tr:
      - "MCM'yi NexusMods'tan 4.3.13 veya 5.0.5+ sürümüne güncelleyin."
      - "Eski ModLib modlarıyla MCM 4.0.7 kullanıyorsanız — tüm ModLib biçimli ayarları kaldırın."
      - "MCM ile birlikte UIExtenderEx'i de güncelleyin (prefab hattını paylaşırlar)."
  match:
    all:
      - log_line:
          contains: "PrefabInjector"
      - any:
          - log_line:
              contains: "ArgumentNullException"
          - log_line:
              contains: "fieldInfo"

- id: harmony.patch_exception
  category: harmony
  severity: critical
  confidence: high
  evidence_source: "https://harmony.pardeike.net/articles/patching.html"
  requires_sources: [log_line]
  title:
    en: "Harmony patch failed to apply"
    ru: "Harmony-патч не применился"
    zh: "Harmony 补丁应用失败"
    zht: "Harmony 修補程式套用失敗"
    tr: "Harmony yaması uygulanamadı"
  description:
    en: |
      A Harmony patch threw during apply. Two patches from different mods are
      probably touching the same method incompatibly.
    ru: |
      Патч Harmony упал при применении. Скорее всего два мода патчат один и тот же
      метод несовместимо.
    zh: |
      一个 Harmony 补丁在应用时抛出了异常。很可能是来自不同模组的两个补丁以
      不兼容的方式修改了同一个方法。
    zht: |
      一個 Harmony 修補程式在套用時拋出了例外。很可能是來自不同模組的兩個修補程式以
      不相容的方式修改了同一個方法。
    tr: |
      Bir Harmony yaması uygulanırken hata fırlattı. Muhtemelen farklı modlardan
      gelen iki yama aynı yöntemi uyumsuz şekilde değiştiriyor.
  fix:
    en:
      - "Read the next lines after Harmony.PatchException — they name the patcher mod."
      - "Update the patcher mod to the latest version."
      - "Disable mods one by one to localize the conflict."
    ru:
      - "Прочитай следующие строки после Harmony.PatchException — там имя мода-патчера."
      - "Обнови мод-патчер до свежей версии."
      - "Отключай моды по одному, чтобы локализовать конфликт."
    zh:
      - "查看 Harmony.PatchException 之后的几行——里面会写出打补丁的模组名。"
      - "把打补丁的那个模组更新到最新版本。"
      - "逐个禁用模组以定位冲突。"
    zht:
      - "查看 Harmony.PatchException 之後的幾行——裡面會寫出套用修補的模組名。"
      - "把套用修補的那個模組更新到最新版本。"
      - "逐個停用模組以定位衝突。"
    tr:
      - "Harmony.PatchException'dan sonraki satırları okuyun — yamayı uygulayan modu adlandırırlar."
      - "Yamayı uygulayan modu en son sürüme güncelleyin."
      - "Çakışmayı yerelleştirmek için modları tek tek devre dışı bırakın."
  match:
    any:
      - log_line:
          contains: "Harmony.PatchException"
      - log_line:
          contains: "HarmonyPatchException"
