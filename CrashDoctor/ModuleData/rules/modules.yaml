- id: mod.module_not_found
  category: modules
  severity: critical
  confidence: high
  evidence_source: "https://forums.taleworlds.com/threads/could-not-load-module.450123/"
  requires_sources: [log_line]
  title:
    en: "A required module DLL could not be loaded"
    ru: "Не удалось загрузить DLL одного из модов"
  description:
    en: |
      Bannerlord could not load the DLL of one of the active modules. The mod is
      either missing files, blocked by Windows ('blocked file' on download), or
      installed for a different game version.
    ru: |
      Bannerlord не смог загрузить DLL одного из активных модов. У мода либо нет
      нужных файлов, либо Windows заблокировал DLL ('blocked file' после
      скачивания), либо мод на другую версию игры.
  fix:
    en:
      - "Check that the mod is installed in <Bannerlord>/Modules/<ModId>/, not nested."
      - "Right-click the mod's .dll → Properties → Unblock (if shown)."
      - "Reinstall the mod for the current Bannerlord version."
    ru:
      - "Проверь, что мод лежит в <Bannerlord>/Modules/<ModId>/, не вложен."
      - "Правый клик по DLL мода → Свойства → Разблокировать (если есть галочка)."
      - "Переустанови мод под текущую версию Bannerlord."
  match:
    any:
      - log_line:
          contains: "Could not load module"
      - log_line:
          contains: "Couldn't load"
      - log_line:
          contains: "Cannot load"

- id: mod.bad_image_format
  category: modules
  severity: critical
  confidence: high
  evidence_source: "https://learn.microsoft.com/en-us/dotnet/api/system.badimageformatexception"
  requires_sources: [log_line]
  title:
    en: "BadImageFormatException — DLL bitness mismatch"
    ru: "BadImageFormatException — несовпадение разрядности DLL"
  description:
    en: |
      A mod's DLL was compiled for a different bitness or runtime than the game.
      Almost always caused by an outdated mod that targets a previous Bannerlord version.
    ru: |
      DLL мода собран под другую разрядность или рантайм, чем игра. Почти всегда —
      устаревший мод под старую версию Bannerlord.
  fix:
    en:
      - "Update the mod to the version compatible with the current Bannerlord."
      - "Check the mod's required Bannerlord version on its NexusMods page."
      - "Disable the mod if no update is available."
    ru:
      - "Обнови мод до версии под текущий Bannerlord."
      - "Проверь требуемую версию Bannerlord на странице мода в NexusMods."
      - "Отключи мод, если обновления нет."
  match:
    all:
      - log_line:
          contains: "BadImageFormatException"

- id: mod.dependency_mismatch
  category: modules
  severity: critical
  confidence: high
  evidence_source: "https://docs.bannerlordmodding.com/dependency-mismatch"
  requires_sources: [log_line]
  title:
    en: "Mod dependency version mismatch"
    ru: "Несовпадение версий зависимостей модов"
  description:
    en: |
      A mod requires another mod at a specific version, and the version installed
      is different. The launcher highlights this red on startup.
    ru: |
      Мод требует другой мод определённой версии, а установлена другая. Лаунчер
      подсвечивает это красным при старте.
  fix:
    en:
      - "Open the launcher and read which mod has the version conflict."
      - "Update the dependency to the required version."
      - "If newer version isn't compatible, downgrade the dependent mod."
    ru:
      - "Открой лаунчер и посмотри, у какого мода конфликт версий."
      - "Обнови зависимость до требуемой версии."
      - "Если свежей нет — откати зависящий мод на старую версию."
  match:
    any:
      - log_line:
          contains: "DependencyVersionMismatch"
      - log_line:
          contains: "dependency version"

- id: mod.type_load_exception
  category: modules
  severity: critical
  confidence: high
  evidence_source: "https://learn.microsoft.com/en-us/dotnet/api/system.typeloadexception"
  requires_sources: [log_line]
  title:
    en: "TypeLoadException — class signature mismatch"
    ru: "TypeLoadException — несовпадение сигнатуры класса"
  description:
    en: |
      A mod tried to use a TaleWorlds type that has changed between game versions.
      The mod is built against a different Bannerlord version.
    ru: |
      Мод пытается использовать тип TaleWorlds, который изменился между версиями
      игры. Мод собран под другую версию Bannerlord.
  fix:
    en:
      - "Read the next stack frames after TypeLoadException — they name the offending mod."
      - "Update the mod or downgrade Bannerlord to its target version."
    ru:
      - "Прочитай следующие фреймы стека после TypeLoadException — там имя мода."
      - "Обнови мод или откати Bannerlord до его целевой версии."
  match:
    any:
      - log_line:
          contains: "TypeLoadException"

- id: mod.missing_method
  category: modules
  severity: critical
  confidence: high
  evidence_source: "https://learn.microsoft.com/en-us/dotnet/api/system.missingmethodexception"
  requires_sources: [log_line]
  title:
    en: "MissingMethodException — outdated mod"
    ru: "MissingMethodException — устаревший мод"
  description:
    en: |
      A mod called a TaleWorlds method that no longer exists. Same root cause as
      TypeLoadException — mod built against an old Bannerlord.
    ru: |
      Мод позвал метод TaleWorlds, которого больше нет. Та же причина, что и у
      TypeLoadException — мод собран под старый Bannerlord.
  fix:
    en:
      - "Read the next stack frames — they name the offending mod and method."
      - "Update the mod from NexusMods."
      - "Disable the mod if there is no update."
    ru:
      - "Прочитай следующие фреймы стека — там мод и метод, который не нашёлся."
      - "Обнови мод с NexusMods."
      - "Отключи мод, если обновления нет."
  match:
    any:
      - log_line:
          contains: "MissingMethodException"

- id: harmony.stray_dll_in_main_bin
  category: harmony
  severity: critical
  confidence: high
  evidence_source: "Harmony-stray catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "Stray 0Harmony.dll in game's main bin folder"
    ru: "Лишний 0Harmony.dll в основной bin-папке игры"
  description:
    en: |
      Cannot load: Bannerlord.Harmony.dll. A stray copy of 0Harmony.dll has
      been dropped into <Bannerlord>/bin/Win64_Shipping_Client/ (instead of
      Modules/Bannerlord.Harmony/bin/...). The native loader picks up that
      copy first and fails the version check. Common after manual Harmony
      installs or Vortex deploy bugs.
    ru: |
      Cannot load: Bannerlord.Harmony.dll. Лишняя копия 0Harmony.dll лежит в
      <Bannerlord>/bin/Win64_Shipping_Client/ (вместо Modules/Bannerlord.Harmony/bin/...).
      Нативный загрузчик берёт эту копию первой и проваливает версионную
      проверку. Часто после ручной установки Harmony или багов Vortex deploy.
  fix:
    en:
      - "Open <Bannerlord install>/bin/Win64_Shipping_Client/ in Explorer."
      - "Delete 0Harmony.dll if present (the legitimate one lives under Modules/Bannerlord.Harmony/bin/Win64_Shipping_Client/)."
      - "Re-launch the game."
      - "If using Vortex — switch to manual install for Bannerlord.Harmony."
    ru:
      - "Открой <Bannerlord>/bin/Win64_Shipping_Client/ в проводнике."
      - "Удали 0Harmony.dll, если он там есть (правильный лежит в Modules/Bannerlord.Harmony/bin/Win64_Shipping_Client/)."
      - "Перезапусти игру."
      - "Если используешь Vortex — переходи на ручную установку Bannerlord.Harmony."
  match:
    all:
      - log_line:
          contains: "Bannerlord.Harmony.dll"
      - any:
          - log_line:
              contains: "Cannot load"
          - log_line:
              contains: "Could not resolve type with token"

- id: blse.format_exception_locale
  category: blse
  severity: critical
  confidence: high
  evidence_source: "BLSE 1.6.4 regression catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "BLSE 1.6.4 startup FormatException — locale regression"
    ru: "BLSE 1.6.4 краш на старте FormatException — регрессия локали"
  description:
    en: |
      FormatException inside TaleWorlds.GauntletUI.PrefabSystem.ConstantDefinition.GetValue_Patch2.
      Known BLSE 1.6.4 regression with non-en-US locales (Russian, EU). The
      patched method tries to parse a number using the system culture and
      blows up. Fixed by downgrading BLSE.
    ru: |
      FormatException внутри TaleWorlds.GauntletUI.PrefabSystem.ConstantDefinition.GetValue_Patch2.
      Известная регрессия BLSE 1.6.4 с не-en-US локалями (русская, европейские).
      Запатченный метод парсит число по системной культуре и падает. Лечится
      даунгрейдом BLSE.
  fix:
    en:
      - "Downgrade BLSE to 1.6.3 from butr.link/butrloader (the previous release)."
      - "Or temporarily change Windows region to English (US) — System Settings → Time & Language → Region → English."
      - "Watch for BLSE 1.6.5+ with the fix."
    ru:
      - "Откати BLSE до 1.6.3 с butr.link/butrloader (предыдущий релиз)."
      - "Или временно поставь регион Windows English (US) — Параметры → Время и язык → Регион → Английский."
      - "Жди BLSE 1.6.5+ с фиксом."
  match:
    all:
      - log_line:
          contains: "ConstantDefinition.GetValue_Patch2"
      - any:
          - log_line:
              contains: "FormatException"
          - log_line:
              contains: "GauntletUI.PrefabSystem"

- id: butterlib.string_reader_settings
  category: butr
  severity: critical
  confidence: high
  evidence_source: "ButterLibSettings catalog 2026-05-02 — manual fix FIX-014"
  requires_sources: [log_line]
  title:
    en: "ButterLib settings file is corrupt"
    ru: "Файл настроек ButterLib битый"
  description:
    en: |
      System.IO.StringReader..ctor inside ButterLib.Options.SettingsProvider.
      The user's per-mod ModSettings JSON for ButterLib has been corrupted (often
      after a botched mod uninstall or partial save). ButterLib hard-fails on load.
    ru: |
      System.IO.StringReader..ctor внутри ButterLib.Options.SettingsProvider.
      JSON-настройки ButterLib в папке ModSettings пользователя битые (часто
      после неаккуратного удаления мода или частичного сохранения). ButterLib
      падает при загрузке.
  fix:
    en:
      - "Delete the folder Documents/Mount and Blade II Bannerlord/Configs/ModSettings/ButterLib/ ."
      - "Launch the game — ButterLib will recreate defaults."
    ru:
      - "Удали папку Documents/Mount and Blade II Bannerlord/Configs/ModSettings/ButterLib/ ."
      - "Запусти игру — ButterLib пересоздаст настройки заново."
  match:
    all:
      - log_line:
          contains: "ButterLib.Options.SettingsProvider"
      - log_line:
          contains: "StringReader"

- id: mcm.prefab_injector_field_info
  category: mcm
  severity: critical
  confidence: high
  evidence_source: "MCM-Prefab catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "MCM PrefabInjector ArgumentNullException fieldInfo"
    ru: "MCM PrefabInjector ArgumentNullException fieldInfo"
  description:
    en: |
      MCM.UI.Functionality.Injectors.PrefabInjector throws ArgumentNullException
      with parameter name 'fieldInfo'. Specific to MCM 4.0.7 (TypeInit chain on
      old ModLib-shaped settings) and MCM 5.0.4 preset-load regression.
    ru: |
      MCM.UI.Functionality.Injectors.PrefabInjector выбрасывает ArgumentNullException
      с именем параметра 'fieldInfo'. Специфично для MCM 4.0.7 (TypeInit-цепочка
      на старых ModLib-настройках) и регрессии MCM 5.0.4 на загрузке preset.
  fix:
    en:
      - "Update MCM to 4.3.13 or 5.0.5+ from NexusMods."
      - "If on MCM 4.0.7 with old ModLib mods — uninstall any ModLib-shaped settings."
      - "Update UIExtenderEx alongside MCM (they share the prefab pipeline)."
    ru:
      - "Обнови MCM до 4.3.13 или 5.0.5+ с NexusMods."
      - "Если стоит MCM 4.0.7 со старыми ModLib-модами — снеси настройки ModLib-форма."
      - "Параллельно обнови UIExtenderEx (они делят prefab-конвейер)."
  match:
    all:
      - log_line:
          contains: "PrefabInjector"
      - any:
          - log_line:
              contains: "ArgumentNullException"
          - log_line:
              contains: "fieldInfo"

- id: harmony.patch_exception
  category: harmony
  severity: critical
  confidence: high
  evidence_source: "https://harmony.pardeike.net/articles/patching.html"
  requires_sources: [log_line]
  title:
    en: "Harmony patch failed to apply"
    ru: "Harmony-патч не применился"
  description:
    en: |
      A Harmony patch threw during apply. Two patches from different mods are
      probably touching the same method incompatibly.
    ru: |
      Патч Harmony упал при применении. Скорее всего два мода патчат один и тот же
      метод несовместимо.
  fix:
    en:
      - "Read the next lines after Harmony.PatchException — they name the patcher mod."
      - "Update the patcher mod to the latest version."
      - "Disable mods one by one to localize the conflict."
    ru:
      - "Прочитай следующие строки после Harmony.PatchException — там имя мода-патчера."
      - "Обнови мод-патчер до свежей версии."
      - "Отключай моды по одному, чтобы локализовать конфликт."
  match:
    any:
      - log_line:
          contains: "Harmony.PatchException"
      - log_line:
          contains: "HarmonyPatchException"
