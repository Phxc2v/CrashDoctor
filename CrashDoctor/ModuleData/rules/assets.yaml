- id: assets.scene_missing
  category: assets
  severity: critical
  confidence: high
  evidence_source: "https://forums.taleworlds.com/threads/cannot-find-scene.456001/"
  requires_sources: [log_line]
  title:
    en: "Scene file not found"
    ru: "Файл сцены не найден"
    zh: "找不到场景文件"
    zht: "找不到場景檔案"
    tr: "Sahne dosyası bulunamadı"
  description:
    en: |
      A mod tried to load a scene that doesn't exist on disk. Either the mod
      install is incomplete or the scene was renamed in a newer mod version.
    ru: |
      Мод пытается загрузить сцену, которой нет на диске. Либо мод установлен
      не полностью, либо сцену переименовали в новой версии мода.
    zh: |
      某个模组试图加载磁盘上不存在的场景。要么是模组没装完整，要么是该场景在
      较新的模组版本里被改了名字。
    zht: |
      某個模組試圖載入磁碟上不存在的場景。要麼是模組沒裝完整，要麼是該場景在
      較新的模組版本裡被改了名字。
    tr: |
      Bir mod, diskte var olmayan bir sahneyi yüklemeye çalıştı. Ya mod kurulumu
      eksik ya da sahne daha yeni bir mod sürümünde yeniden adlandırıldı.
  fix:
    en:
      - "Reinstall the mod completely — fully delete its folder before re-adding."
      - "Check the mod's Required Files on NexusMods (often a 'Scenes' download)."
    ru:
      - "Переустанови мод полностью — удали папку и накати свежую версию."
      - "Проверь Required Files на странице мода в NexusMods (часто отдельно лежит 'Scenes')."
    zh:
      - "彻底重新安装该模组——重新添加之前先完全删除它的文件夹。"
      - "查看该模组在 NexusMods 上的 Required Files（往往有一个单独的 'Scenes' 下载）。"
    zht:
      - "徹底重新安裝該模組——重新加入之前先完全刪除它的資料夾。"
      - "查看該模組在 NexusMods 上的 Required Files（往往有一個單獨的 'Scenes' 下載）。"
    tr:
      - "Modu tamamen yeniden kur — yeniden eklemeden önce klasörünü tümüyle sil."
      - "Modun NexusMods'taki Required Files bölümüne bak (genellikle ayrı bir 'Scenes' indirmesi olur)."
  match:
    any:
      - log_line:
          contains: "Cannot find scene"
      - log_line:
          contains: "Scene not found"

- id: assets.mesh_missing
  category: assets
  severity: warning
  confidence: high
  evidence_source: "https://forums.taleworlds.com/threads/cannot-find-mesh.457001/"
  requires_sources: [log_line]
  title:
    en: "Mesh asset not found"
    ru: "Меш не найден"
    zh: "找不到网格资源"
    zht: "找不到網格資源"
    tr: "Mesh varlığı bulunamadı"
  description:
    en: |
      A model referenced by item/scene XML doesn't exist as a .obj/.mesh on disk.
      Usually a missing or partial mod install.
    ru: |
      Модель, на которую ссылается XML предмета/сцены, не существует как
      .obj/.mesh файл. Обычно — мод установлен частично.
    zh: |
      物品 / 场景 XML 引用的某个模型在磁盘上没有对应的 .obj/.mesh 文件。通常是
      模组缺失或没装完整。
    zht: |
      物品 / 場景 XML 引用的某個模型在磁碟上沒有對應的 .obj/.mesh 檔案。通常是
      模組缺失或沒裝完整。
    tr: |
      Eşya/sahne XML'inin başvurduğu bir model, diskte .obj/.mesh olarak yok.
      Genellikle eksik veya yarım bir mod kurulumu.
  fix:
    en:
      - "Reinstall the offending mod (mesh path in the log usually contains the mod ID)."
      - "Check Required Files on NexusMods."
    ru:
      - "Переустанови мод (путь в логе обычно содержит ID мода)."
      - "Проверь Required Files на NexusMods."
    zh:
      - "重新安装肇事的模组（日志里的网格路径通常包含模组 ID）。"
      - "查看 NexusMods 上的 Required Files。"
    zht:
      - "重新安裝肇事的模組（日誌裡的網格路徑通常包含模組 ID）。"
      - "查看 NexusMods 上的 Required Files。"
    tr:
      - "Sorunlu modu yeniden kur (günlükteki mesh yolu genellikle mod kimliğini içerir)."
      - "NexusMods'taki Required Files bölümüne bak."
  match:
    all:
      - log_line:
          contains: "Cannot find mesh"

- id: audio.fmod_bank_failed
  category: audio
  severity: warning
  confidence: medium
  evidence_source: "https://www.fmod.com/docs/2.02/api/glossary.html"
  requires_sources: [log_line]
  title:
    en: "FMOD audio bank failed to load"
    ru: "FMOD не загрузил аудиобанк"
    zh: "FMOD 音频库加载失败"
    zht: "FMOD 音訊庫載入失敗"
    tr: "FMOD ses bankası yüklenemedi"
  description:
    en: |
      An audio bank file (.bank) is missing or corrupt. Bannerlord usually keeps
      running with broken sounds, but a hard FMOD error can also crash on first
      battle music.
    ru: |
      Аудиобанк (.bank) отсутствует или повреждён. Bannerlord обычно работает
      без звука, но жёсткая FMOD-ошибка может уронить игру при первой боевой
      музыке.
    zh: |
      某个音频库文件（.bank）缺失或损坏。Bannerlord 通常会在声音损坏的情况下继续
      运行，但严重的 FMOD 错误也可能在第一段战斗音乐时导致崩溃。
    zht: |
      某個音訊庫檔案（.bank）缺失或損壞。Bannerlord 通常會在聲音損壞的情況下繼續
      執行，但嚴重的 FMOD 錯誤也可能在第一段戰鬥音樂時導致崩潰。
    tr: |
      Bir ses bankası dosyası (.bank) eksik veya bozuk. Bannerlord genellikle
      bozuk seslerle çalışmaya devam eder, ama ağır bir FMOD hatası ilk savaş
      müziğinde çökmeye de yol açabilir.
  fix:
    en:
      - "Steam → Bannerlord → Properties → Installed Files → Verify integrity."
      - "Reinstall any audio mods one by one to find the conflict."
    ru:
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность."
      - "Переустанови аудио-моды по одному, чтобы найти конфликт."
    zh:
      - "Steam → Bannerlord → 属性 → 已安装文件 → 验证完整性。"
      - "逐个重新安装音频模组以找出冲突。"
    zht:
      - "Steam → Bannerlord → 內容 → 已安裝檔案 → 驗證完整性。"
      - "逐個重新安裝音訊模組以找出衝突。"
    tr:
      - "Steam → Bannerlord → Özellikler → Yüklü Dosyalar → Bütünlüğü doğrula."
      - "Çakışmayı bulmak için ses modlarını teker teker yeniden kur."
  match:
    all:
      - log_line:
          contains: "FMOD"
      - any:
          - log_line:
              contains: "Master.bank"
          - log_line:
              contains: "bank failed"

- id: assets.tpac_async_read_burst
  category: assets
  severity: critical
  confidence: medium
  evidence_source: "https://steamcommunity.com/app/261550/discussions/0/3722820118820333415/"
  requires_sources: [log_line]
  title:
    en: "Async I/O fault on compressed asset (.tpac) — engine couldn't read pack"
    ru: "Ошибка асинхронного чтения сжатого ассета (.tpac) — движок не смог прочитать пак"
    zh: "压缩资源（.tpac）的异步 I/O 故障——引擎无法读取该资源包"
    zht: "壓縮資源（.tpac）的非同步 I/O 故障——引擎無法讀取該資源包"
    tr: "Sıkıştırılmış varlıkta (.tpac) eşzamansız G/Ç hatası — motor paketi okuyamadı"
  description:
    en: |
      The log shows a heavy burst of "Trying to make partial read on compressed
      asset data" warnings (often dozens to hundreds of times in a row), which is
      a known signature of an async I/O fault on Bannerlord's .tpac packages —
      the compressed archives that hold meshes, textures and icons. When this
      pattern precedes a managed CLR exception (0xE0434352), the engine usually
      threw a System.IO.FileNotFoundException or async-read failure that nobody
      caught, and the game went down.

      Forum-confirmed root causes for this exact pattern:
      1. Corrupt or partially-downloaded .tpac in the base game (typically Modules/Native/AssetPackages/pack0.tpac) or in a Workshop mod.
      2. Antivirus / Defender real-time scan blocking async file handles opened by the engine on large .tpac reads.
      3. Disk I/O errors (failing sector, USB-attached storage timing out, HDD under heavy load while the game streams an asset).
      4. Modded asset that references a file the mod author forgot to ship.

      Without BLSE + ButterLib installed, Bannerlord won't write a managed stack trace to rgl_log, so we can't name the exact .tpac that failed — only the symptom class. Install BLSE before the next session if this repeats.
    ru: |
      В логе серия предупреждений "Trying to make partial read on compressed
      asset data" (часто десятки-сотни подряд) — это известная сигнатура
      ошибки асинхронного I/O на .tpac-паках Bannerlord (сжатые архивы с
      мешами, текстурами, иконками). Когда такой всплеск идёт перед managed-
      исключением CLR (0xE0434352) — движок обычно бросил
      System.IO.FileNotFoundException или async-read failure, который никто
      не поймал, и игра упала.

      Форумно-подтверждённые первопричины именно этого паттерна:
      1. Битый или не до конца скачанный .tpac в базе игры (обычно Modules/Native/AssetPackages/pack0.tpac) или в Workshop-моде.
      2. Антивирус / Defender real-time блокирует асинхронные файловые хэндлы, которые движок открывает на больших .tpac.
      3. I/O-ошибки на диске (битый сектор, USB-носитель с таймаутами, HDD под нагрузкой во время стриминга ассета).
      4. Модовый ассет ссылается на файл, который автор мода забыл положить в архив.

      Без установленных BLSE + ButterLib Bannerlord не пишет managed-стек в rgl_log, поэтому точное имя битого .tpac определить невозможно — только класс проблемы. Если краш повторится — поставь BLSE перед следующей сессией, тогда мы получим точный стек.
    zh: |
      日志里出现一连串 "Trying to make partial read on compressed asset data"
      警告（往往连续几十到几百次），这是 Bannerlord 的 .tpac 资源包（存放网格、
      纹理和图标的压缩档案）发生异步 I/O 故障的已知特征。当这种模式出现在一个
      托管 CLR 异常（0xE0434352）之前时，引擎通常抛出了一个没人接住的
      System.IO.FileNotFoundException 或异步读取失败，于是游戏倒下了。

      论坛已证实的、这一确切模式的根本原因：
      1. 基础游戏里损坏或没下载完整的 .tpac（通常是 Modules/Native/AssetPackages/pack0.tpac），或者某个创意工坊模组里的。
      2. 杀毒软件 / Defender 实时扫描在引擎对大块 .tpac 进行读取时阻止了它打开的异步文件句柄。
      3. 磁盘 I/O 错误（坏扇区、USB 外接存储超时、游戏在串流资源时 HDD 负载过高）。
      4. 模组资源引用了一个模组作者忘记一并发布的文件。

      没有安装 BLSE + ButterLib，Bannerlord 不会把托管堆栈写进 rgl_log，所以我们
      无法指出究竟是哪个 .tpac 出了问题——只能指出问题的类别。如果再次出现，请在
      下次游戏前装上 BLSE。
    zht: |
      日誌裡出現一連串 "Trying to make partial read on compressed asset data"
      警告（往往連續幾十到幾百次），這是 Bannerlord 的 .tpac 資源包（存放網格、
      紋理和圖示的壓縮檔案）發生非同步 I/O 故障的已知特徵。當這種模式出現在一個
      託管 CLR 例外（0xE0434352）之前時，引擎通常拋出了一個沒人接住的
      System.IO.FileNotFoundException 或非同步讀取失敗，於是遊戲倒下了。

      論壇已證實的、這一確切模式的根本原因：
      1. 基礎遊戲裡損壞或沒下載完整的 .tpac（通常是 Modules/Native/AssetPackages/pack0.tpac），或者某個創意工坊模組裡的。
      2. 防毒軟體 / Defender 即時掃描在引擎對大塊 .tpac 進行讀取時阻止了它開啟的非同步檔案控制代碼。
      3. 磁碟 I/O 錯誤（壞磁區、USB 外接儲存逾時、遊戲在串流資源時 HDD 負載過高）。
      4. 模組資源引用了一個模組作者忘記一併發布的檔案。

      沒有安裝 BLSE + ButterLib，Bannerlord 不會把託管堆疊寫進 rgl_log，所以我們
      無法指出究竟是哪個 .tpac 出了問題——只能指出問題的類別。如果再次出現，請在
      下次遊戲前裝上 BLSE。
    tr: |
      Günlükte yoğun bir "Trying to make partial read on compressed asset data"
      uyarısı dizisi var (genellikle peş peşe onlarca ila yüzlerce kez); bu,
      Bannerlord'un .tpac paketlerinde (mesh, doku ve simgeleri tutan sıkıştırılmış
      arşivler) eşzamansız bir G/Ç hatasının bilinen imzasıdır. Bu desen yönetilen
      bir CLR istisnasından (0xE0434352) önce geldiğinde, motor genellikle kimsenin
      yakalamadığı bir System.IO.FileNotFoundException ya da eşzamansız okuma hatası
      fırlatmıştır ve oyun çökmüştür.

      Bu tam desen için forumda doğrulanmış kök nedenler:
      1. Temel oyunda bozuk veya eksik indirilmiş bir .tpac (genellikle Modules/Native/AssetPackages/pack0.tpac) ya da bir Workshop modunda.
      2. Antivirüs / Defender gerçek zamanlı taraması, motorun büyük .tpac okumalarında açtığı eşzamansız dosya tanıtıcılarını engelliyor.
      3. Disk G/Ç hataları (bozuk sektör, zaman aşımına uğrayan USB depolama, oyun bir varlığı akıtırken yoğun yük altındaki HDD).
      4. Mod yazarının göndermeyi unuttuğu bir dosyaya başvuran modlu bir varlık.

      BLSE + ButterLib kurulu olmadan Bannerlord rgl_log'a yönetilen bir yığın izi
      yazmaz, bu yüzden başarısız olan tam .tpac'i adlandıramayız — yalnızca sorun
      sınıfını. Bu tekrarlanırsa, bir sonraki oturumdan önce BLSE kur.
  fix:
    en:
      - "Steam → Bannerlord → Properties → Installed Files → Verify integrity (rebuilds Native pack0.tpac if it's broken)."
      - "Resubscribe to your large content mods on Steam Workshop: unsubscribe → close Steam → delete the mod folder under steamapps\\workshop\\content\\261550\\<id>\\ → reopen Steam → re-subscribe (forces a clean redownload — Workshop has no built-in 'verify')."
      - "Add the Bannerlord install folder and steamapps\\workshop\\content\\261550 to your antivirus / Windows Defender exclusion list, then restart the PC."
      - "Run 'chkdsk C: /f' from an admin console (will require a reboot) — confirms the disk holding the game has no I/O errors."
      - "Install BLSE + ButterLib for the next session — they make Bannerlord write a managed stack trace, so we can name the exact failing .tpac next time."
    ru:
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность (если сломан Native pack0.tpac — Steam докачает)."
      - "Перекачай свои крупные контентные моды через Workshop: отписаться → закрыть Steam → удалить папку мода в steamapps\\workshop\\content\\261550\\<id>\\ → открыть Steam → подписаться обратно (Workshop сам по себе не верифицирует, нужен ручной reset)."
      - "Добавь папку игры и steamapps\\workshop\\content\\261550 в исключения антивируса / Windows Defender, затем перезагрузи ПК."
      - "Прогони 'chkdsk C: /f' в админ-консоли (потребуется перезагрузка) — подтвердит, что на диске с игрой нет I/O-ошибок."
      - "Поставь BLSE + ButterLib к следующей сессии — они заставят Bannerlord писать managed-стек, и в следующий раз мы укажем конкретный битый .tpac."
    zh:
      - "Steam → Bannerlord → 属性 → 已安装文件 → 验证完整性（如果 Native pack0.tpac 坏了，会重建它）。"
      - "通过 Steam 创意工坊重新下载你的大型内容模组：取消订阅 → 关闭 Steam → 删除 steamapps\\workshop\\content\\261550\\<id>\\ 下的模组文件夹 → 重新打开 Steam → 重新订阅（强制干净地重新下载——创意工坊没有内置的“验证”功能）。"
      - "把 Bannerlord 安装文件夹和 steamapps\\workshop\\content\\261550 加入杀毒软件 / Windows Defender 的排除列表，然后重启电脑。"
      - "从管理员控制台运行 'chkdsk C: /f'（需要重启）——确认装游戏的磁盘没有 I/O 错误。"
      - "下次游戏前安装 BLSE + ButterLib——它们会让 Bannerlord 写出托管堆栈，这样下次我们就能指出究竟是哪个 .tpac 出错了。"
    zht:
      - "Steam → Bannerlord → 內容 → 已安裝檔案 → 驗證完整性（如果 Native pack0.tpac 壞了，會重建它）。"
      - "透過 Steam 創意工坊重新下載你的大型內容模組：取消訂閱 → 關閉 Steam → 刪除 steamapps\\workshop\\content\\261550\\<id>\\ 下的模組資料夾 → 重新開啟 Steam → 重新訂閱（強制乾淨地重新下載——創意工坊沒有內建的「驗證」功能）。"
      - "把 Bannerlord 安裝資料夾和 steamapps\\workshop\\content\\261550 加入防毒軟體 / Windows Defender 的排除清單，然後重新啟動電腦。"
      - "從系統管理員主控台執行 'chkdsk C: /f'（需要重新啟動）——確認裝遊戲的磁碟沒有 I/O 錯誤。"
      - "下次遊戲前安裝 BLSE + ButterLib——它們會讓 Bannerlord 寫出託管堆疊，這樣下次我們就能指出究竟是哪個 .tpac 出錯了。"
    tr:
      - "Steam → Bannerlord → Özellikler → Yüklü Dosyalar → Bütünlüğü doğrula (Native pack0.tpac bozuksa yeniden oluşturur)."
      - "Büyük içerik modlarını Steam Workshop üzerinden yeniden indir: abonelikten çık → Steam'i kapat → steamapps\\workshop\\content\\261550\\<id>\\ altındaki mod klasörünü sil → Steam'i yeniden aç → yeniden abone ol (temiz bir yeniden indirme zorlar — Workshop'un yerleşik bir 'doğrula' özelliği yoktur)."
      - "Bannerlord kurulum klasörünü ve steamapps\\workshop\\content\\261550 klasörünü antivirüs / Windows Defender istisna listesine ekle, sonra bilgisayarı yeniden başlat."
      - "Yönetici konsolundan 'chkdsk C: /f' çalıştır (yeniden başlatma gerektirir) — oyunun bulunduğu diskte G/Ç hatası olmadığını teyit eder."
      - "Bir sonraki oturum için BLSE + ButterLib kur — Bannerlord'un yönetilen bir yığın izi yazmasını sağlarlar, böylece bir dahaki sefere başarısız olan tam .tpac'i adlandırabiliriz."
  match:
    all:
      - log_line:
          contains: "partial read on compressed asset"
          count_at_least: "100"
