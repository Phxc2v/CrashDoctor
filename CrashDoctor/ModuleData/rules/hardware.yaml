- id: hw.gpu_vram_likely_low
  category: hardware
  severity: warning
  confidence: medium
  evidence_source: "TOR-bug-corpus.md - VRAM thresholds"
  requires_sources: [crash_tag]
  title:
    en: "GPU likely under-VRAMed for TOR (under 6 GB reported)"
    ru: "У видеокарты, похоже, мало VRAM для TOR (меньше 6 ГБ)"
    zh: "显卡显存可能不足以运行 TOR（报告低于 6 GB）"
    zht: "顯示卡顯示記憶體可能不足以執行 TOR（報告低於 6 GB）"
    tr: "Ekran kartının VRAM'i TOR için yetersiz olabilir (6 GB altında bildirildi)"
  description:
    en: |
      DXDIAG reports under 6 GB dedicated VRAM on the active GPU. TOR + Bannerlord
      at 1080p+ wants 6+ GB; below that, expect "out of video memory" or
      CreateTexture2D failures during heavy battles or armor-mod loads.

      Important caveat: DXDIAG is known to misreport VRAM on modern cards. AMD
      RX 7000/9000 series and several high-end NVIDIA cards (RTX 4080/4090 in
      some configurations) get capped at 3072–4095 MB in the report even though
      the card has 12-24 GB physically. If your card is one of those and the
      game otherwise runs fine — ignore this card. Otherwise the warning is real.
    zh: |
      DXDIAG 报告当前显卡的专用显存不足 6 GB。TOR + Bannerlord 在 1080p 以上
      需要 6 GB 以上；低于此值，重型战斗或加载护甲模组时会出现
      "out of video memory" 或 CreateTexture2D 失败。

      重要提示：DXDIAG 在新显卡上常常误报显存。AMD RX 7000/9000 系列和
      部分高端 NVIDIA 显卡（某些配置下的 RTX 4080/4090）在报告中会被
      限制为 3072–4095 MB，尽管显卡实际有 12-24 GB。如果你的显卡属于这种
      情况且游戏本来运行正常——忽略此卡片。否则该警告是真实的。
    zht: |
      DXDIAG 報告目前顯示卡的專用顯示記憶體不足 6 GB。TOR + Bannerlord 在 1080p 以上
      需要 6 GB 以上；低於此值，重型戰鬥或載入護甲模組時會出現
      "out of video memory" 或 CreateTexture2D 失敗。

      重要提示：DXDIAG 在新顯示卡上常常誤報顯示記憶體。AMD RX 7000/9000 系列和
      部分高階 NVIDIA 顯示卡（某些設定下的 RTX 4080/4090）在報告中會被
      限制為 3072–4095 MB，儘管顯示卡實際有 12-24 GB。如果你的顯示卡屬於這種
      情況且遊戲本來執行正常——忽略此卡片。否則該警告是真實的。
    tr: |
      DXDIAG, etkin ekran kartında 6 GB'den az ayrılmış VRAM bildiriyor. TOR +
      Bannerlord 1080p ve üzerinde 6 GB ve üzeri ister; bunun altında ağır
      savaşlarda veya zırh modu yüklerken "out of video memory" ya da
      CreateTexture2D hataları beklenir.

      Önemli uyarı: DXDIAG'in modern kartlarda VRAM'i yanlış bildirdiği bilinir.
      AMD RX 7000/9000 serisi ve bazı üst seviye NVIDIA kartları (kimi
      yapılandırmalarda RTX 4080/4090) kart fiziksel olarak 12-24 GB'a sahip olsa
      bile raporda 3072–4095 MB ile sınırlanır. Kartınız bunlardan biriyse ve oyun
      aksi halde sorunsuz çalışıyorsa bu kartı yok sayın. Aksi takdirde uyarı gerçektir.
    ru: |
      DXDIAG показал меньше 6 ГБ выделенной VRAM на активной видеокарте. TOR на
      Bannerlord в 1080p+ хочет 6+ ГБ; ниже — будут «out of video memory» или
      падения CreateTexture2D на тяжёлых битвах и загрузке armor-модов.

      Важная оговорка: DXDIAG известен тем, что врёт по VRAM на современных
      картах. AMD RX 7000/9000 и некоторые топовые NVIDIA (RTX 4080/4090) в
      отчёте могут показывать 3072–4095 МБ, хотя у карты физически 12-24 ГБ.
      Если у тебя такая карта и игра в целом работает — игнорируй эту карточку.
      Иначе предупреждение реально.
  fix:
    en:
      - "If you actually own RX 7700 XT / 7800 XT / 7900 / 9070 / RTX 4070 Super+ / 4080 / 4090 / 5080 / 5090: ignore this card — DXDIAG misreports your VRAM. Move on."
      - "If you're on a gaming laptop with both an integrated GPU and a discrete one (NVIDIA Optimus / AMD SmartShift — Lenovo Legion, ASUS ROG, MSI, Razer, etc.): DXDIAG always under-reports the discrete card's VRAM through the iGPU view. Your real VRAM is whatever the manufacturer listed (commonly 8 GB on RTX 4060 Laptop, 12 GB on 4070 Laptop, etc.). Ignore this card."
      - "Otherwise: in-game Options → Graphics → Texture Quality = Medium, Texture Budget = Medium, Shadow Quality = Medium."
      - "Close every VRAM-eating background app before launching: VR runtimes (Oculus, SteamVR, Mixed Reality Portal), AI tools (Ollama, LM Studio, Stable Diffusion), video editors (DaVinci Resolve, Premiere, After Effects), browsers with many tabs (Chrome / Edge / Firefox / Brave), OBS in Game Capture mode."
      - "Open Crash Doctor → System tune-up → 'Heavy VRAM apps' card if it appeared — it lists what's actually running on your machine right now."
      - "If your GPU has under 4 GB physical VRAM: heavy mods (TOR + armor packs) are not realistic. Run Native Bannerlord or pick lighter mods."
      - "AFTER changing any graphics setting: REBOOT the PC, then Crash Doctor → System tune-up → 'Clear Bannerlord shader cache', then Main Menu → 'Build Shader Cache' (20–60 min). Skip any of these → game crashes on splash next launch."
    zh:
      - "如果你实际拥有 RX 7700 XT / 7800 XT / 7900 / 9070 / RTX 4070 Super+ / 4080 / 4090 / 5080 / 5090——忽略此卡片，DXDIAG 误报了你的显存。继续即可。"
      - "如果你用的是同时带核显和独显的游戏本（NVIDIA Optimus / AMD SmartShift——联想拯救者、华硕 ROG、微星、雷蛇等）：DXDIAG 总是通过核显视角低报独显的显存。你的真实显存是厂商标注的值（RTX 4060 Laptop 通常 8 GB，4070 Laptop 通常 12 GB 等）。忽略此卡片。"
      - "否则：游戏内 Options → Graphics → Texture Quality = Medium、Texture Budget = Medium、Shadow Quality = Medium。"
      - "启动前关闭所有占用显存的后台程序：VR 运行时（Oculus、SteamVR、Mixed Reality Portal）、AI 工具（Ollama、LM Studio、Stable Diffusion）、视频剪辑（DaVinci Resolve、Premiere、After Effects）、开了很多标签页的浏览器（Chrome / Edge / Firefox / Brave）、处于 Game Capture 模式的 OBS。"
      - "打开 Crash Doctor → 系统调优 → 如果出现 '占用显存的程序' 卡片——它会列出你机器上当前真正在运行的程序。"
      - "如果显卡物理显存不足 4 GB：重型模组（TOR + 护甲包）不现实。请运行原版 Bannerlord 或选择更轻的模组。"
      - "更改任何图形设置之后：重启电脑，然后 Crash Doctor → 系统调优 → '清理着色器缓存'，再到主菜单 → 'Build Shader Cache'（20–60 分钟）。跳过任一步 → 下次启动会在启动画面崩溃。"
    zht:
      - "如果你實際擁有 RX 7700 XT / 7800 XT / 7900 / 9070 / RTX 4070 Super+ / 4080 / 4090 / 5080 / 5090——忽略此卡片，DXDIAG 誤報了你的顯示記憶體。繼續即可。"
      - "如果你用的是同時帶內顯和獨顯的遊戲筆電（NVIDIA Optimus / AMD SmartShift——聯想拯救者、華碩 ROG、微星、雷蛇等）：DXDIAG 總是透過內顯視角低報獨顯的顯示記憶體。你的真實顯示記憶體是廠商標註的值（RTX 4060 Laptop 通常 8 GB，4070 Laptop 通常 12 GB 等）。忽略此卡片。"
      - "否則：遊戲內 Options → Graphics → Texture Quality = Medium、Texture Budget = Medium、Shadow Quality = Medium。"
      - "啟動前關閉所有佔用顯示記憶體的背景程式：VR 執行階段（Oculus、SteamVR、Mixed Reality Portal）、AI 工具（Ollama、LM Studio、Stable Diffusion）、影片剪輯（DaVinci Resolve、Premiere、After Effects）、開了很多分頁的瀏覽器（Chrome / Edge / Firefox / Brave）、處於 Game Capture 模式的 OBS。"
      - "打開 Crash Doctor → 系統調校 → 如果出現 '佔用顯示記憶體的程式' 卡片——它會列出你機器上目前真正在執行的程式。"
      - "如果顯示卡實體顯示記憶體不足 4 GB：重型模組（TOR + 護甲包）不切實際。請執行原版 Bannerlord 或選擇更輕的模組。"
      - "變更任何圖形設定之後：重新啟動電腦，然後 Crash Doctor → 系統調校 → '清理著色器快取'，再到主選單 → 'Build Shader Cache'（20–60 分鐘）。跳過任一步 → 下次啟動會在啟動畫面當機。"
    tr:
      - "Gerçekten RX 7700 XT / 7800 XT / 7900 / 9070 / RTX 4070 Super+ / 4080 / 4090 / 5080 / 5090 kartınız varsa bu kartı yok sayın, DXDIAG VRAM'inizi düşük bildiriyor. Devam edin."
      - "Hem tümleşik hem ayrık ekran kartlı bir oyun dizüstüsündeyseniz (NVIDIA Optimus / AMD SmartShift — Lenovo Legion, ASUS ROG, MSI, Razer vb.): DXDIAG, tümleşik kart üzerinden ayrık kartın VRAM'ini her zaman düşük bildirir. Gerçek VRAM'iniz üreticinin belirttiği değerdir (genelde RTX 4060 Laptop'ta 8 GB, 4070 Laptop'ta 12 GB vb.). Bu kartı yok sayın."
      - "Aksi halde: oyun içinde Options → Graphics → Texture Quality = Medium, Texture Budget = Medium, Shadow Quality = Medium."
      - "Başlatmadan önce VRAM tüketen tüm arka plan uygulamalarını kapatın: VR çalışma zamanları (Oculus, SteamVR, Mixed Reality Portal), yapay zeka araçları (Ollama, LM Studio, Stable Diffusion), video düzenleyiciler (DaVinci Resolve, Premiere, After Effects), çok sekmeli tarayıcılar (Chrome / Edge / Firefox / Brave), Game Capture modundaki OBS."
      - "Crash Doctor → Sistem ayarı → 'Ağır VRAM uygulamaları' kartı çıktıysa açın — makinenizde şu anda gerçekten neyin çalıştığını listeler."
      - "Ekran kartınızın fiziksel VRAM'i 4 GB'den azsa: ağır modlar (TOR + zırh paketleri) gerçekçi değil. Native Bannerlord çalıştırın ya da daha hafif modlar seçin."
      - "Herhangi bir grafik ayarını değiştirdikten SONRA: bilgisayarı yeniden başlatın, ardından Crash Doctor → Sistem ayarı → 'gölgelendirici önbelleğini temizle', sonra Ana Menü → 'Build Shader Cache' (20–60 dk). Bunlardan herhangi birini atlarsanız oyun bir sonraki açılışta açılış ekranında çöker."
    ru:
      - "Если у тебя на самом деле RX 7700 XT / 7800 XT / 7900 / 9070 / RTX 4070 Super+ / 4080 / 4090 / 5080 / 5090 — игнорируй эту карточку, DXDIAG занижает твой VRAM. Иди дальше."
      - "Если ты на игровом ноутбуке с встроенной + дискретной картой (NVIDIA Optimus / AMD SmartShift — Lenovo Legion, ASUS ROG, MSI, Razer и т.д.): DXDIAG всегда занижает VRAM дискретки через iGPU view. Реальный VRAM = тот, что указал производитель (типично 8 ГБ на RTX 4060 Laptop, 12 ГБ на 4070 Laptop и т.д.). Игнорируй эту карточку."
      - "Иначе: в игре Опции → Графика → Texture Quality = Medium, Texture Budget = Medium, Shadow Quality = Medium."
      - "Закрой все жрущие VRAM фоновые приложения перед запуском: VR-runtimes (Oculus, SteamVR, Mixed Reality Portal), AI (Ollama, LM Studio, Stable Diffusion), видео-редакторы (DaVinci Resolve, Premiere, After Effects), браузеры с большим количеством вкладок (Chrome / Edge / Firefox / Brave), OBS в режиме Game Capture."
      - "Открой Crash Doctor → Настройка системы → карточку «Тяжёлые VRAM-приложения», если появилась — там видно что реально запущено сейчас на твоём ПК."
      - "Если у видеокарты физически меньше 4 ГБ VRAM — тяжёлые моды (TOR + броня) нереальны. Играй на ванильном Bannerlord или выбирай лёгкие моды."
      - "ПОСЛЕ любого изменения настройки графики: ПЕРЕЗАГРУЗИ ПК, потом Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord», потом Главное меню → «Build Shader Cache» (20–60 мин). Пропустишь — игра упадёт на заставке."
  match:
    all:
      - system:
          field: active_gpu_vram_mb
          lt: "6144"

- id: hw.driver_outdated
  category: hardware
  severity: warning
  confidence: high
  evidence_source: "https://www.amd.com/en/support / https://www.nvidia.com/Download/index.aspx"
  requires_sources: [crash_tag]
  title:
    en: "GPU driver is over 18 months old"
    ru: "Драйвер видеокарты старше 18 месяцев"
    zh: "显卡驱动程序超过 18 个月未更新"
    zht: "顯示卡驅動程式超過 18 個月未更新"
    tr: "Ekran kartı sürücüsü 18 aydan eski"
  description:
    en: |
      The display driver is from a different release year. Many TaleWorlds and
      mod-related shader/render bugs are fixed in newer driver releases.
    ru: |
      Драйвер видеокарты от старого года выпуска. Многие баги шейдеров и рендера
      в Bannerlord и модах исправляют в свежих драйверах.
    zh: |
      显示驱动程序是较早年份发布的。许多与 TaleWorlds 和模组相关的着色器/渲染
      问题在较新的驱动程序版本中已修复。
    zht: |
      顯示驅動程式是較早年份發布的。許多與 TaleWorlds 和模組相關的著色器/渲染
      問題在較新的驅動程式版本中已修復。
    tr: |
      Ekran sürücüsü farklı bir yıla ait. TaleWorlds ve modlarla ilgili birçok
      gölgelendirici/render hatası daha yeni sürücü sürümlerinde düzeltildi.
  fix:
    en:
      - "AMD: open AMD Software → Auto-detect → install the latest driver."
