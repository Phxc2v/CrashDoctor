- id: hw.ram_below_minimum
  category: hardware
  severity: warning
  confidence: high
  evidence_source: "https://store.steampowered.com/app/261550/"
  requires_sources: [crash_tag]
  title:
    en: "RAM below Bannerlord minimum"
    ru: "Меньше RAM, чем требует Bannerlord"
    zh: "内存低于 Bannerlord 最低要求"
    zht: "記憶體低於 Bannerlord 最低要求"
    tr: "RAM, Bannerlord'un alt sınırının altında"
  description:
    en: |
      Bannerlord's minimum is 6 GB RAM, recommended 8 GB. With heavy mods like TOR,
      anything below 16 GB will crash regularly.
    ru: |
      Минимум Bannerlord — 6 ГБ RAM, рекомендовано 8 ГБ. С тяжёлыми модами вроде TOR
      ниже 16 ГБ — регулярные крашы.
    zh: |
      Bannerlord 最低需要 6 GB 内存，建议 8 GB。使用 TOR 这类重型模组时，
      低于 16 GB 会频繁崩溃。
    zht: |
      Bannerlord 最低需要 6 GB 記憶體，建議 8 GB。使用 TOR 這類重型模組時，
      低於 16 GB 會頻繁當機。
    tr: |
      Bannerlord en az 6 GB RAM ister, önerilen 8 GB. TOR gibi ağır modlarla
      16 GB altındaki her şey düzenli olarak çökecektir.
  fix:
    en:
      - "Close Chrome, Discord, browsers, and other background apps before launching."
      - "In-game: Options → Graphics → set Texture Quality and Shadow Quality to Low."
      - "Add an extra RAM stick if your system allows."
    ru:
      - "Закрой Chrome, Discord, браузеры и фоновые приложения перед запуском."
      - "В игре: Опции → Графика → Texture Quality и Shadow Quality на Low."
      - "По возможности — добавь планку RAM."
    zh:
      - "启动前关闭 Chrome、Discord、浏览器和其他后台程序。"
      - "游戏内：Options → Graphics → 把 Texture Quality 和 Shadow Quality 设为 Low。"
      - "如果主板允许，加装一条内存条。"
    zht:
      - "啟動前關閉 Chrome、Discord、瀏覽器和其他背景程式。"
      - "遊戲內：Options → Graphics → 把 Texture Quality 和 Shadow Quality 設為 Low。"
      - "如果主機板允許，加裝一條記憶體模組。"
    tr:
      - "Başlatmadan önce Chrome, Discord, tarayıcıları ve diğer arka plan uygulamalarını kapatın."
      - "Oyun içinde: Options → Graphics → Texture Quality ve Shadow Quality değerlerini Low yapın."
      - "Sisteminiz izin veriyorsa ek bir RAM çubuğu takın."
  match:
    all:
      - system:
          field: ram_mb
          lt: "8192"

- id: hw.ram_below_recommended_for_tor
  category: hardware
  severity: info
  confidence: medium
  evidence_source: "TOR-bug-corpus.md - hardware notes"
  requires_sources: [crash_tag, module_list]
  title:
    en: "RAM is tight for TOR"
    ru: "Маловато RAM для TOR"
    zh: "运行 TOR 内存偏紧"
    zht: "執行 TOR 記憶體偏緊"
    tr: "TOR için RAM yetersiz"
  description:
    en: |
      The Old Realms is heavy. With less than 16 GB RAM and TOR_Core enabled,
      crashes during long sessions or sieges are likely.
    ru: |
      The Old Realms — тяжёлый мод. Меньше 16 ГБ RAM с TOR_Core активным — будут
      крашы в долгих сессиях и осадах.
    zh: |
      The Old Realms 很吃资源。内存不足 16 GB 且启用了 TOR_Core 时，
      长时间游戏或攻城战中很可能崩溃。
    zht: |
      The Old Realms 很吃資源。記憶體不足 16 GB 且啟用了 TOR_Core 時，
      長時間遊戲或攻城戰中很可能當機。
    tr: |
      The Old Realms ağır bir moddur. 16 GB'den az RAM ile TOR_Core etkinken,
      uzun oturumlarda veya kuşatmalarda çökmeler olasıdır.
  fix:
    en:
      - "In-game: lower Texture Quality and Shadow Quality."
      - "Close everything in the background before launching."
      - "Quit to main menu every 1–2 hours and Continue from there to flush memory."
    ru:
      - "В игре: понизь Texture Quality и Shadow Quality."
      - "Закрой всё в фоне перед запуском."
      - "Каждые 1–2 часа выходи в главное меню и нажимай Continue — чтобы сбрасывать память."
    zh:
      - "游戏内：降低 Texture Quality 和 Shadow Quality。"
      - "启动前关闭所有后台程序。"
      - "每 1–2 小时退回主菜单，再点 Continue 继续，以释放内存。"
    zht:
      - "遊戲內：降低 Texture Quality 和 Shadow Quality。"
      - "啟動前關閉所有背景程式。"
      - "每 1–2 小時退回主選單，再點 Continue 繼續，以釋放記憶體。"
    tr:
      - "Oyun içinde: Texture Quality ve Shadow Quality değerlerini düşürün."
      - "Başlatmadan önce arka plandaki her şeyi kapatın."
      - "Her 1–2 saatte bir ana menüye çıkıp oradan Continue ile devam ederek belleği boşaltın."
  match:
    all:
      - system:
          field: ram_mb
          lt: "16384"
      - module_list:
          id: "TOR_Core"
          has: "true"

