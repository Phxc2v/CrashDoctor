- id: save.null_ref_load
  category: saves
  severity: critical
  confidence: medium
  evidence_source: "https://forums.taleworlds.com/threads/null-ref-when-loading-save.451889/"
  requires_sources: [log_line]
  title:
    en: "NullReferenceException while loading save"
    ru: "NullReferenceException при загрузке сейва"
    zh: "加载存档时出现 NullReferenceException"
    zht: "載入存檔時出現 NullReferenceException"
    tr: "Kayıt yüklenirken NullReferenceException"
  description:
    en: |
      An object referenced by the save no longer exists in the current data set.
      Common when you disable/uninstall a mod that the save depended on.
    ru: |
      Объект, на который ссылается сейв, больше не существует в текущих данных.
      Часто бывает после отключения/удаления мода, от которого зависел сейв.
    zh: |
      存档引用的某个对象在当前数据集中已不存在。常见于你禁用 / 卸载了该存档
      所依赖的某个模组之后。
    zht: |
      存檔引用的某個物件在目前資料集中已不存在。常見於你停用 / 解除安裝了該存檔
      所依賴的某個模組之後。
    tr: |
      Kaydın başvurduğu bir nesne artık mevcut veri kümesinde yok. Kaydın
      bağımlı olduğu bir modu devre dışı bıraktığında / kaldırdığında sık görülür.
  fix:
    en:
      - "Re-enable any mods you disabled since this save was made."
      - "If the mod was deleted permanently — start a new game (this save is gone)."
      - "Use Save Editor for Bannerlord to remove the dead reference (advanced)."
    ru:
      - "Включи обратно моды, которые отключал после создания сейва."
      - "Если мод удалён навсегда — этот сейв не вытащить, начинай новую."
      - "Через Save Editor for Bannerlord можно вычистить мёртвую ссылку (продвинуто)."
    zh:
      - "重新启用你在制作此存档之后禁用的所有模组。"
      - "如果该模组已被彻底删除——这个存档没救了，开新游戏吧。"
      - "用 Save Editor for Bannerlord 清除失效引用（进阶操作）。"
    zht:
      - "重新啟用你在製作此存檔之後停用的所有模組。"
      - "如果該模組已被徹底刪除——這個存檔沒救了，開新遊戲吧。"
      - "用 Save Editor for Bannerlord 清除失效引用（進階操作）。"
    tr:
      - "Bu kayıt yapıldıktan sonra devre dışı bıraktığın modları yeniden etkinleştir."
      - "Mod kalıcı olarak silindiyse — yeni bir oyun başlat (bu kayıt gitti)."
      - "Ölü referansı kaldırmak için Save Editor for Bannerlord kullan (ileri düzey)."
  match:
    all:
      - log_line:
          contains: "NullReferenceException"
      - any:
          - log_line:
              contains: "MBObjectManager.GetObject"
          - log_line:
              contains: "LoadSaveGame"

- id: save.read_failed
  category: saves
  severity: critical
  confidence: high
  evidence_source: "https://forums.taleworlds.com/threads/failed-to-read-save.444222/"
  requires_sources: [log_line]
  title:
    en: "Save file is corrupt or unreadable"
    ru: "Файл сохранения повреждён или нечитаем"
    zh: "存档文件损坏或无法读取"
    zht: "存檔檔案損壞或無法讀取"
    tr: "Kayıt dosyası bozuk veya okunamıyor"
  description:
    en: |
      The save file structure can't be parsed. Disk error during write or game
      crashed mid-save.
    ru: |
      Структура файла сейва не парсится. Ошибка диска при записи или игра
      крашнулась посреди сохранения.
    zh: |
      存档文件的结构无法解析。写入时发生磁盘错误，或者游戏在保存过程中崩溃了。
    zht: |
      存檔檔案的結構無法解析。寫入時發生磁碟錯誤，或者遊戲在儲存過程中當機了。
    tr: |
      Kayıt dosyasının yapısı ayrıştırılamıyor. Yazma sırasında disk hatası ya
      da oyun kaydetme ortasında çöktü.
  fix:
    en:
      - "Try an earlier autosave (Continue → manage saves)."
      - "Run chkdsk on the SSD/HDD where Documents/Mount and Blade II Bannerlord/Game Saves/ lives."
      - "Make autosaves more frequent: Options → Game → Autosave Interval."
    ru:
      - "Загрузи более ранний автосейв (Continue → управление сейвами)."
      - "Проверь диск через chkdsk там, где лежит Documents/Mount and Blade II Bannerlord/Game Saves/."
      - "Сделай автосейвы чаще: Опции → Игра → Интервал автосохранения."
    zh:
      - "尝试更早的自动存档（Continue → 管理存档）。"
      - "对 Documents/Mount and Blade II Bannerlord/Game Saves/ 所在的 SSD/HDD 运行 chkdsk。"
      - "让自动存档更频繁：选项 → 游戏 → 自动存档间隔。"
    zht:
      - "嘗試更早的自動存檔（Continue → 管理存檔）。"
      - "對 Documents/Mount and Blade II Bannerlord/Game Saves/ 所在的 SSD/HDD 執行 chkdsk。"
      - "讓自動存檔更頻繁：選項 → 遊戲 → 自動存檔間隔。"
    tr:
      - "Daha eski bir otomatik kaydı dene (Continue → kayıtları yönet)."
      - "Documents/Mount and Blade II Bannerlord/Game Saves/ klasörünün bulunduğu SSD/HDD üzerinde chkdsk çalıştır."
      - "Otomatik kayıtları sıklaştır: Seçenekler → Oyun → Otomatik Kayıt Aralığı."
  match:
    any:
      - log_line:
          contains: "Failed to read save"
      - log_line:
          contains: "save file is corrupt"

- id: save.warparty_clan_late_game
  category: saves
  severity: critical
  confidence: high
  evidence_source: "BL-013 / LATE-003 catalog 2026-05-02 — Null Hero Fix Nexus 4728"
  requires_sources: [log_line]
  title:
    en: "Late-game save load NRE — stale war party / clan reference"
    ru: "NRE при загрузке поздней кампании — мёртвая ссылка на клан/отряд"
    zh: "后期存档读取空引用——失效的战队 / 氏族引用"
    zht: "後期存檔讀取空引用——失效的戰隊 / 氏族引用"
    tr: "Geç oyun kayıt yükleme boş referansı — eskimiş savaş grubu / klan referansı"
  description:
    en: |
      WarPartyComponent.get_Clan or WarPartyComponent.OnFinalize hits null inside
      MobileParty.OnRemoveParty / PreAfterLoad during save load. The save holds
      a reference to a clan or hero that was eliminated, but the cleanup logic
      didn't drop the back-reference. Cascades around day 100+ when first
      kingdoms start dying.
    ru: |
      WarPartyComponent.get_Clan или WarPartyComponent.OnFinalize падает на null
      внутри MobileParty.OnRemoveParty / PreAfterLoad при загрузке сейва. В
      сейве осталась ссылка на уничтоженный клан или героя, а логика очистки
      её не удалила. Каскадирует с дня 100+, когда начинают умирать первые
      королевства.
    zh: |
      读取存档时，WarPartyComponent.get_Clan 或 WarPartyComponent.OnFinalize 在
      MobileParty.OnRemoveParty / PreAfterLoad 内部遇到空值。存档里仍保留着对一个
      已被消灭的氏族或英雄的引用，而清理逻辑没有移除这个反向引用。通常在第 100 天
      之后、第一批王国开始覆灭时连锁发生。
    zht: |
      讀取存檔時，WarPartyComponent.get_Clan 或 WarPartyComponent.OnFinalize 在
      MobileParty.OnRemoveParty / PreAfterLoad 內部遇到空值。存檔裡仍保留著對一個
      已被消滅的氏族或英雄的引用，而清理邏輯沒有移除這個反向引用。通常在第 100 天
      之後、第一批王國開始覆滅時連鎖發生。
    tr: |
      Kayıt yüklenirken WarPartyComponent.get_Clan veya WarPartyComponent.OnFinalize,
      MobileParty.OnRemoveParty / PreAfterLoad içinde boş değere takılır. Kayıt,
      yok edilmiş bir klana veya kahramana ait bir referansı tutuyor ama temizleme
      mantığı geri-referansı kaldırmadı. İlk krallıklar ölmeye başladığında, 100.
      gün civarında zincirleme olur.
  fix:
    en:
      - "Install Null Hero Fix from NexusMods (mod 4728) — patches the validator to skip dead refs."
      - "Reload an earlier save if the crash is on every load attempt."
      - "If using Diplomacy mod — update it; old versions are the most common source."
    ru:
      - "Поставь Null Hero Fix с NexusMods (мод 4728) — патчит валидатор, чтобы он пропускал мёртвые ссылки."
      - "Если падает на каждой загрузке — откатись на более ранний сейв."
      - "Если стоит мод Diplomacy — обнови; старые версии — самый частый источник."
    zh:
      - "从 NexusMods 安装 Null Hero Fix（mod 4728）——修补校验器，让它跳过失效引用。"
      - "如果每次读取都崩溃——回退到更早的存档。"
      - "如果在用 Diplomacy 模组——更新它；旧版本是最常见的根源。"
    zht:
      - "從 NexusMods 安裝 Null Hero Fix（mod 4728）——修補驗證器，讓它跳過失效引用。"
      - "如果每次讀取都當機——回退到更早的存檔。"
      - "如果在用 Diplomacy 模組——更新它；舊版本是最常見的根源。"
    tr:
      - "NexusMods'tan Null Hero Fix'i kur (mod 4728) — doğrulayıcıyı ölü referansları atlayacak şekilde yamalar."
      - "Çökme her yükleme denemesinde oluyorsa daha eski bir kaydı yükle."
      - "Diplomacy modu kullanıyorsan — güncelle; eski sürümler en yaygın kaynaktır."
  match:
    all:
      - any:
          - log_line:
              contains: "WarPartyComponent"
          - log_line:
              contains: "WarPartyComponent.get_Clan"
      - any:
          - log_line:
              contains: "PreAfterLoad"
          - log_line:
              contains: "OnRemoveParty"
          - log_line:
              contains: "OnFinalize"

- id: save.orphan_garrison_morale_load_nre
  category: saves
  severity: critical
  confidence: high
  evidence_source: "Field report 2026-05-31 (BEW) — IsGarrisonStarving NRE in Clan.AfterLoad; root cause confirmed against 1.3.15 decompiled DefaultPartyMoraleModel/SettlementHelper"
  requires_sources: [log_line]
  title:
    en: "Save load NRE — garrison with no settlement (morale calc)"
    ru: "NRE при загрузке сейва — гарнизон без поселения (расчёт морали)"
    zh: "存档读取空引用——没有据点的驻军（士气计算）"
    zht: "存檔讀取空引用——沒有據點的駐軍（士氣計算）"
    tr: "Kayıt yükleme boş referansı — yerleşimi olmayan garnizon (moral hesabı)"
  description:
    en: |
      NullReferenceException in SettlementHelper.IsGarrisonStarving, reached from
      DefaultPartyMoraleModel.GetEffectivePartyMorale (TOR's morale model just
      delegates to it) while the engine recomputes every clan's strength inside
      Clan.AfterLoad on save load. The save holds an orphaned garrison party whose
      settlement reference is null — a healthy garrison always sits in its
      settlement, so the settlement was lost (destroyed / owner-changed in the
      campaign, or the module set changed between sessions). The garrison-morale
      branch dereferences that missing settlement and the load crashes. It happens
      on every load attempt of this save, not randomly. It is not caused by TOR or
      Crash Doctor — the crash is in vanilla code tripping over corrupted save data.
    ru: |
      NullReferenceException в SettlementHelper.IsGarrisonStarving, куда попадает
      из DefaultPartyMoraleModel.GetEffectivePartyMorale (модель морали TOR просто
      вызывает его), когда при загрузке игра пересчитывает силу всех кланов внутри
      Clan.AfterLoad. В сейве остался гарнизон без поселения: у нормального
      гарнизона поселение есть всегда, значит оно пропало (уничтожено или сменило
      владельца в кампании, либо менялся состав модов между сессиями). Ветка
      морали гарнизона обращается к отсутствующему поселению и загрузка падает.
      Падает при каждой попытке загрузить именно этот сейв, не случайно. Виноват
      не TOR и не Crash Doctor — падает родной код игры на испорченных данных сейва.
    zh: |
      SettlementHelper.IsGarrisonStarving 中的空引用异常，由
      DefaultPartyMoraleModel.GetEffectivePartyMorale 进入（TOR 的士气模型只是
      调用它），发生在读取存档时引擎在 Clan.AfterLoad 内重新计算每个氏族实力的
      过程中。存档里有一支据点引用为空的孤立驻军——健康的驻军总是驻扎在自己的
      据点里，所以该据点已丢失（在战役中被摧毁 / 易主，或两次游戏之间模组组合
      变了）。驻军士气分支引用了这个缺失的据点，于是读取崩溃。每次尝试读取该
      存档都会崩溃，并非随机。这不是 TOR 或 Crash Doctor 造成的——崩溃发生在
      原版代码上，是被损坏的存档数据绊倒的。
    zht: |
      SettlementHelper.IsGarrisonStarving 中的空引用例外，由
      DefaultPartyMoraleModel.GetEffectivePartyMorale 進入（TOR 的士氣模型只是
      呼叫它），發生在讀取存檔時引擎在 Clan.AfterLoad 內重新計算每個氏族實力的
      過程中。存檔裡有一支據點引用為空的孤立駐軍——健康的駐軍總是駐紮在自己的
      據點裡，所以該據點已遺失（在戰役中被摧毀 / 易主，或兩次遊戲之間模組組合
      變了）。駐軍士氣分支引用了這個缺失的據點，於是讀取當機。每次嘗試讀取該
      存檔都會當機，並非隨機。這不是 TOR 或 Crash Doctor 造成的——當機發生在
      原版程式碼上，是被損壞的存檔資料絆倒的。
    tr: |
      SettlementHelper.IsGarrisonStarving içinde NullReferenceException; buraya
      DefaultPartyMoraleModel.GetEffectivePartyMorale üzerinden gelinir (TOR'un
      moral modeli yalnızca onu çağırır). Kayıt yüklenirken motor, Clan.AfterLoad
      içinde her klanın gücünü yeniden hesaplarken olur. Kayıt, yerleşim referansı
      boş olan öksüz bir garnizon tutuyor — sağlıklı bir garnizon her zaman kendi
      yerleşiminde durur, yani yerleşim kaybolmuş (seferde yok edilmiş / sahip
      değiştirmiş ya da oturumlar arasında mod kümesi değişmiş). Garnizon moral
      dalı bu eksik yerleşime erişir ve yükleme çöker. Bu kaydın her yükleme
      denemesinde olur, rastgele değil. Suçlu TOR ya da Crash Doctor değil — çökme,
      bozuk kayıt verisine takılan orijinal oyun kodunda gerçekleşir.
  fix:
    en:
      - "Keep Crash Doctor enabled and load the save again: it now blocks this crash automatically and removes the broken garrison. Then SAVE the game to make the fix permanent."
      - "If you prefer a clean save — load an earlier save from before the problem appeared."
      - "Make sure the mod set matches what the save was created with (re-enable anything you turned off between sessions)."
    ru:
      - "Оставь Crash Doctor включённым и загрузи сейв снова: теперь он сам не даёт этому вылету случиться и убирает повреждённый гарнизон. После этого СОХРАНИ игру, чтобы исправление осталось навсегда."
      - "Если хочешь чистый сейв — загрузи более раннее сохранение, до появления проблемы."
      - "Проверь, что набор модов тот же, с которым создавался сейв (включи обратно то, что отключал между сессиями)."
    zh:
      - "保持启用 Crash Doctor 并再次读取存档：它现在会自动阻止这次崩溃并移除损坏的驻军。然后保存游戏以使修复永久生效。"
      - "如果你想要一个干净的存档——读取问题出现之前的较早存档。"
      - "确认模组组合与创建存档时一致（重新启用你在两次游戏之间关闭的内容）。"
    zht:
      - "保持啟用 Crash Doctor 並再次讀取存檔：它現在會自動阻止這次當機並移除損壞的駐軍。然後儲存遊戲以使修復永久生效。"
      - "如果你想要一個乾淨的存檔——讀取問題出現之前的較早存檔。"
      - "確認模組組合與建立存檔時一致（重新啟用你在兩次遊戲之間關閉的內容）。"
    tr:
      - "Crash Doctor'ı etkin tut ve kaydı tekrar yükle: artık bu çökmeyi otomatik engeller ve bozuk garnizonu kaldırır. Ardından düzeltmenin kalıcı olması için oyunu KAYDET."
      - "Temiz bir kayıt istiyorsan — sorun ortaya çıkmadan önceki daha eski bir kaydı yükle."
      - "Mod kümesinin kaydın oluşturulduğu kümeyle aynı olduğundan emin ol (oturumlar arasında kapattığın her şeyi yeniden etkinleştir)."
  match:
    all:
      - log_line:
          contains: "IsGarrisonStarving"
      - any:
          - log_line:
              contains: "GetEffectivePartyMorale"
          - log_line:
              contains: "UpdateCurrentStrength"
          - log_line:
              contains: "Clan.AfterLoad"

- id: save.pregnancy_baby_npe
  category: saves
  severity: critical
  confidence: high
  evidence_source: "LATE-014 catalog 2026-05-02 — Baby Of Rare Culture Crash Fix Nexus 9487"
  requires_sources: [log_line]
  title:
    en: "Pregnancy / birth NRE — companion of rare culture"
    ru: "NRE на беременности / рождении — компаньон редкой культуры"
    zh: "怀孕 / 分娩空引用——稀有文化的同伴"
    zht: "懷孕 / 分娩空引用——稀有文化的同伴"
    tr: "Hamilelik / doğum boş referansı — nadir kültürlü yoldaş"
  description:
    en: |
      HeroCreator.DeliverOffSpring → PregnancyCampaignBehavior.CheckOffspringsToDeliver
      crashes when a child is born to a companion whose culture has no body-property
      template (typical for rare / non-native cultures introduced by mods like TOR).
    ru: |
      HeroCreator.DeliverOffSpring → PregnancyCampaignBehavior.CheckOffspringsToDeliver
      падает на рождении ребёнка от компаньона с культурой, у которой нет
      body-property шаблона (типичный кейс для редких / не-нативных культур из
      модов вроде TOR).
    zh: |
      当孩子由一个其文化没有 body-property 模板的同伴所生时，
      HeroCreator.DeliverOffSpring → PregnancyCampaignBehavior.CheckOffspringsToDeliver
      会崩溃（对于 TOR 这类模组引入的稀有 / 非原生文化很典型）。
    zht: |
      當孩子由一個其文化沒有 body-property 範本的同伴所生時，
      HeroCreator.DeliverOffSpring → PregnancyCampaignBehavior.CheckOffspringsToDeliver
      會當機（對於 TOR 這類模組引入的稀有 / 非原生文化很典型）。
    tr: |
      Kültürünün body-property şablonu olmayan bir yoldaştan çocuk doğduğunda
      HeroCreator.DeliverOffSpring → PregnancyCampaignBehavior.CheckOffspringsToDeliver
      çöker (TOR gibi modların eklediği nadir / yerel olmayan kültürler için tipik).
  fix:
    en:
      - "Install Baby Of Rare Culture Crash Fix from NexusMods (mod 9487)."
      - "Workaround until install: console-kill the pregnant companion (campaign.kill_hero) before the due date — save first."
      - "Avoid recruiting wanderer companions of unusual cultures for marriage if you can't install the fix."
    ru:
      - "Поставь Baby Of Rare Culture Crash Fix с NexusMods (мод 9487)."
      - "Workaround до установки: через консоль убей беременного компаньона (campaign.kill_hero) до родов — сначала сделай сейв."
      - "Не бери в жёны/мужья wanderer-компаньонов с необычной культурой, если нет фикса."
    zh:
      - "从 NexusMods 安装 Baby Of Rare Culture Crash Fix（mod 9487）。"
      - "安装前的临时办法：在预产期之前用控制台杀掉怀孕的同伴（campaign.kill_hero）——先存档。"
      - "如果装不了这个修复，就别娶 / 嫁文化不寻常的流浪者同伴。"
    zht:
      - "從 NexusMods 安裝 Baby Of Rare Culture Crash Fix（mod 9487）。"
      - "安裝前的臨時辦法：在預產期之前用主控台殺掉懷孕的同伴（campaign.kill_hero）——先存檔。"
      - "如果裝不了這個修復，就別娶 / 嫁文化不尋常的流浪者同伴。"
    tr:
      - "NexusMods'tan Baby Of Rare Culture Crash Fix'i kur (mod 9487)."
      - "Kurana kadar geçici çözüm: doğum tarihinden önce hamile yoldaşı konsoldan öldür (campaign.kill_hero) — önce kaydet."
      - "Düzeltmeyi kuramıyorsan, evlilik için sıra dışı kültürlü gezgin yoldaşları alma."
  match:
    all:
      - any:
          - log_line:
              contains: "HeroCreator.DeliverOffSpring"
          - log_line:
              contains: "PregnancyCampaignBehavior.CheckOffspringsToDeliver"
          - log_line:
