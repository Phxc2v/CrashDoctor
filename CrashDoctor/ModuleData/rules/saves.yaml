- id: save.kingdom_decision_orphan_clan
  category: saves
  severity: critical
  confidence: high
  evidence_source: "Late-game vanilla bug — KingdomDecisionProposalBehavior.GetRandomAnnexationDecision NRE on dead-clan reference, observed day 700+"
  requires_sources: [log_line]
  title:
    en: "Late-game daily-tick crash — KingdomDecisionProposal on dead clan"
    ru: "Поздняя кампания: краш daily tick на KingdomDecisionProposal с мёртвым кланом"
    zh: "后期每日 tick 崩溃——KingdomDecisionProposal 涉及已消亡的氏族"
    zht: "後期每日 tick 當機——KingdomDecisionProposal 涉及已消亡的氏族"
    tr: "Geç oyun günlük tick çökmesi — ölü klan üzerinde KingdomDecisionProposal"
  description:
    en: |
      KingdomDecisionProposalBehavior.GetRandomAnnexationDecision (or sibling
      Decision* methods) throws NullReferenceException during AI decision tick.
      The save still references a clan that was eliminated; vanilla cleanup
      missed the back-pointer in the decision queue. Common day 700+ in
      long-running campaigns.
    ru: |
      KingdomDecisionProposalBehavior.GetRandomAnnexationDecision (или родственные
      Decision*-методы) бросают NullReferenceException в AI decision tick.
      В сейве осталась ссылка на уничтоженный клан, ванильная очистка не
      убрала back-pointer из decision queue. Часто с дня 700+ в долгих
      кампаниях.
    zh: |
      在 AI 决策 tick 期间，KingdomDecisionProposalBehavior.GetRandomAnnexationDecision
      （或同类的 Decision* 方法）抛出 NullReferenceException。存档里仍引用着一个已被
      消灭的氏族；原版清理漏掉了决策队列中的反向指针。在长期战役中常见于第 700 天之后。
    zht: |
      在 AI 決策 tick 期間，KingdomDecisionProposalBehavior.GetRandomAnnexationDecision
      （或同類的 Decision* 方法）拋出 NullReferenceException。存檔裡仍引用著一個已被
      消滅的氏族；原版清理漏掉了決策佇列中的反向指標。在長期戰役中常見於第 700 天之後。
    tr: |
      AI karar tick'i sırasında KingdomDecisionProposalBehavior.GetRandomAnnexationDecision
      (veya kardeş Decision* yöntemleri) NullReferenceException fırlatır. Kayıt hâlâ
      yok edilmiş bir klana başvuruyor; orijinal temizleme, karar kuyruğundaki
      geri-işaretçiyi atladı. Uzun süren seferlerde 700. günden sonra yaygındır.
  fix:
    en:
      - "Install Save Cleaner mod (NexusMods #7763) — prunes orphan clan/party references from the save."
      - "Workaround: load a save from 1-2 days earlier and skip days slowly; the decision queue often resolves itself."
      - "If reproducible on every load: this save is poisoned. Save Cleaner is the only path back, otherwise start fresh."
    ru:
      - "Поставь Save Cleaner (NexusMods #7763) — чистит сейв от мёртвых ссылок на кланы/отряды."
      - "Workaround: загрузи сейв за 1-2 дня раньше и проматывай дни медленно — decision queue часто разруливается."
      - "Если падает на каждой загрузке — сейв отравлен, Save Cleaner единственный шанс, иначе новая кампания."
    zh:
      - "安装 Save Cleaner 模组（NexusMods #7763）——从存档中清除孤立的氏族 / 队伍引用。"
      - "临时办法：读取早 1-2 天的存档，然后慢慢跳过天数；决策队列往往会自行理顺。"
      - "如果每次读取都能复现：这个存档已被污染。Save Cleaner 是唯一的退路，否则只能重开。"
    zht:
      - "安裝 Save Cleaner 模組（NexusMods #7763）——從存檔中清除孤立的氏族 / 隊伍引用。"
      - "臨時辦法：讀取早 1-2 天的存檔，然後慢慢跳過天數；決策佇列往往會自行理順。"
      - "如果每次讀取都能重現：這個存檔已被污染。Save Cleaner 是唯一的退路，否則只能重開。"
    tr:
      - "Save Cleaner modunu kur (NexusMods #7763) — kayıttan sahipsiz klan/grup referanslarını temizler."
      - "Geçici çözüm: 1-2 gün önceki bir kaydı yükle ve günleri yavaşça geç; karar kuyruğu genellikle kendini düzeltir."
      - "Her yüklemede tekrarlanabiliyorsa: bu kayıt bozulmuş. Save Cleaner tek geri dönüş yolu, yoksa sıfırdan başla."
  match:
    all:
      - any:
          - log_line:
              contains: "KingdomDecisionProposalBehavior"
          - log_line:
              contains: "GetRandomAnnexationDecision"
          - log_line:
              contains: "GetRandomAnnexation"
      - log_line:
          contains: "NullReferenceException"

- id: save.issue_alternative_solution_nre
  category: saves
  severity: critical
  confidence: high
  evidence_source: "Crash Doctor analysis 2026-05-22: vanilla IssueBase.AlternativeSolutionEndWithSuccess NRE on DailyTick. Lambda at IssueBase.cs:1028 dereferences x.Character.UpgradeTargets / x.Character.IsHero in FindAll over AlternativeSolutionSentTroops — crashes when a sent-troop element has Character == null (dangling roster entry left behind by a mod that unregistered a CharacterObject without scrubbing it out)."
  requires_sources: [log_line]
  title:
    en: "Daily-tick crash on issue completion — broken troop in 'sent troops' roster"
    ru: "Краш на ежедневном тике при завершении issue — повреждённая запись в отправленном отряде"
    zh: "完成委托时每日 tick 崩溃——“派出部队”名册里有损坏的单位"
    zht: "完成委託時每日 tick 當機——「派出部隊」名冊裡有損壞的單位"
    tr: "Görev tamamlanırken günlük tick çökmesi — 'gönderilen birlikler' kadrosunda bozuk birim"
  description:
    en: |
      NullReferenceException inside IssueBase.AlternativeSolutionEndWithSuccess,
      called from IssueManager.DailyTick. You sent troops to solve an issue with
      the alternative-solution option (Lord Needs Garrison, Caravan Ambush and
      similar). When the day rolls over and the engine tries to complete the
      issue, one of those sent troops has a null CharacterObject — a dangling
      reference left behind by some mod that unregistered a character without
      removing it from the roster. The FindAll lambda dereferences x.Character
      and dies.

      Crash Doctor's roster cleaner now scans active issues (not just parties
      and settlements) on save load and removes elements with a null Character.
      The IssueBase Harmony safety net catches anything that still slips
      through and lets DailyTick continue. Both are on by default.
    ru: |
      NullReferenceException внутри IssueBase.AlternativeSolutionEndWithSuccess,
      вызывается из IssueManager.DailyTick. Ты отправил отряд решать issue по
      «альтернативному пути» (Лорду нужен гарнизон, засада на караван и
      подобные). Когда день меняется и движок завершает issue, в отправленном
      отряде один из юнитов имеет пустую ссылку на CharacterObject — следствие
      того, что какой-то мод снял регистрацию персонажа, но не удалил его из
      ростера. FindAll-лямбда дёргает x.Character и падает.

      Очиститель отрядов Crash Doctor теперь сканирует активные issues (а не
      только обычные отряды и поселения) при загрузке сейва и удаляет записи
      с пустой ссылкой на персонажа. Harmony-перехватчик на IssueBase ловит
      то, что всё-таки проскочило, и не даёт DailyTick упасть. Оба
      работают по умолчанию.
    zh: |
      IssueBase.AlternativeSolutionEndWithSuccess 内部出现 NullReferenceException，
      由 IssueManager.DailyTick 调用。你用“替代解决方案”选项派部队去解决某个委托
      （领主需要驻军、伏击商队等等）。当一天结束、引擎试图完成该委托时，那些被派出
      的部队中有一个的 CharacterObject 为空——这是某个模组注销了某个角色却没有把它
      从名册里移除而留下的失效引用。FindAll 的 lambda 解引用 x.Character 时就崩溃了。

      Crash Doctor 的名册清理器现在会在读取存档时扫描活跃的委托（不只是普通队伍和
      定居点），并移除 Character 为空的条目。IssueBase 上的 Harmony 安全网会接住仍然
      漏过去的情况，让 DailyTick 继续。两者默认开启。
    zht: |
      IssueBase.AlternativeSolutionEndWithSuccess 內部出現 NullReferenceException，
      由 IssueManager.DailyTick 呼叫。你用「替代解決方案」選項派部隊去解決某個委託
      （領主需要駐軍、伏擊商隊等等）。當一天結束、引擎試圖完成該委託時，那些被派出
      的部隊中有一個的 CharacterObject 為空——這是某個模組登出了某個角色卻沒有把它
      從名冊裡移除而留下的失效引用。FindAll 的 lambda 解引用 x.Character 時就當機了。

      Crash Doctor 的名冊清理器現在會在讀取存檔時掃描活躍的委託（不只是普通隊伍和
      聚落），並移除 Character 為空的條目。IssueBase 上的 Harmony 安全網會接住仍然
      漏過去的情況，讓 DailyTick 繼續。兩者預設開啟。
    tr: |
      IssueBase.AlternativeSolutionEndWithSuccess içinde NullReferenceException;
      IssueManager.DailyTick'ten çağrılır. Bir görevi alternatif-çözüm seçeneğiyle
      çözmek için birlik gönderdin (Lordun Garnizona İhtiyacı Var, Kervan Pususu ve
      benzerleri). Gün değiştiğinde ve motor görevi tamamlamaya çalıştığında, o
      gönderilen birliklerden birinin CharacterObject'i boştur — bir karakterin
      kaydını silen ama onu kadrodan çıkarmayan bir modun bıraktığı sarkan bir
      referans. FindAll lambda'sı x.Character'a erişir ve çöker.

      Crash Doctor'ın kadro temizleyicisi artık kayıt yüklenirken aktif görevleri
      (yalnızca gruplar ve yerleşimler değil) tarar ve Character'ı boş olan
      öğeleri kaldırır. IssueBase üzerindeki Harmony güvenlik ağı yine de kaçanı
      yakalar ve DailyTick'in devam etmesini sağlar. İkisi de varsayılan olarak açıktır.
  fix:
    en:
      - "Update Crash Doctor to the latest version — the fix ships built-in (Settings → 'Roster cleanup' and 'NRE safety patches' must be ON, both default to ON)."
      - "Reload the save once after updating: the cleaner runs at OnSessionLaunched and removes the broken entries silently."
      - "If you keep seeing the message — note which issue type was active (the safety-net banner appears right when DailyTick survives the hit) and report it; the cleaner missed an edge case."
      - "Optional: cancel the alternative-solution issue from the Quests menu before the day rolls over, then re-take it cleanly."
    ru:
      - "Обнови Crash Doctor до последней версии — фикс встроен (в Настройках «Очистка отрядов» и «Защита от NRE» должны быть включены, обе включены по умолчанию)."
      - "Загрузи сейв ещё раз после обновления: очиститель отрабатывает при заходе в сейв и тихо убирает битые записи."
      - "Если сообщение продолжает появляться — заметь, какой тип issue был активен (баннер перехвата появляется ровно в момент, когда DailyTick выживает) и пришли отчёт; очиститель не покрыл какой-то крайний случай."
      - "По желанию: до смены дня отмени issue с альтернативным решением через меню квестов и возьми её заново — чисто."
    zh:
      - "把 Crash Doctor 更新到最新版本——修复已内置（设置 → “名册清理”和“NRE 安全补丁”必须开启，两者默认都开启）。"
      - "更新后重新读取一次存档：清理器会在 OnSessionLaunched 时运行，静默移除损坏的条目。"
      - "如果仍然看到该提示——记下当时活跃的是哪种委托类型（DailyTick 顶住时安全网横幅会恰好出现），并反馈给我们；说明清理器漏了某个边角情况。"
      - "可选：在一天结束之前，从任务菜单取消这个替代解决方案的委托，然后干净地重新接取。"
    zht:
      - "把 Crash Doctor 更新到最新版本——修復已內建（設定 → 「名冊清理」和「NRE 安全修補」必須開啟，兩者預設都開啟）。"
      - "更新後重新讀取一次存檔：清理器會在 OnSessionLaunched 時執行，靜默移除損壞的條目。"
      - "如果仍然看到該提示——記下當時活躍的是哪種委託類型（DailyTick 頂住時安全網橫幅會恰好出現），並回報給我們；說明清理器漏了某個邊角情況。"
      - "可選：在一天結束之前，從任務選單取消這個替代解決方案的委託，然後乾淨地重新接取。"
    tr:
      - "Crash Doctor'ı en son sürüme güncelle — düzeltme yerleşik gelir (Ayarlar → 'Kadro temizliği' ve 'NRE güvenlik yamaları' açık olmalı, ikisi de varsayılan olarak açıktır)."
      - "Güncelledikten sonra kaydı bir kez yeniden yükle: temizleyici OnSessionLaunched'da çalışır ve bozuk girişleri sessizce kaldırır."
      - "Mesajı görmeye devam ediyorsan — hangi görev türünün aktif olduğunu not et (güvenlik ağı afişi tam DailyTick darbeden kurtulduğunda belirir) ve bildir; temizleyici bir uç durumu kaçırdı."
      - "İsteğe bağlı: gün değişmeden önce alternatif-çözüm görevini Görevler menüsünden iptal et, sonra temiz bir şekilde yeniden al."
  match:
    all:
      - log_line:
          contains: "IssueBase.AlternativeSolutionEndWithSuccess"
      - log_line:
          contains: "IssueManager.DailyTick"
      - log_line:
          contains: "NullReferenceException"
