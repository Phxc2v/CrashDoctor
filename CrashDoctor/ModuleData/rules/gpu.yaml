- id: gpu.create_texture_array_invalidarg
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "https://learn.microsoft.com/en-us/windows/win32/api/d3d11/nf-d3d11-id3d11device-createtexture2d"
  requires_sources: [log_line]
  title:
    en: "D3D11 CreateTexture2D failed (E_INVALIDARG) — texture-array limit hit"
    ru: "D3D11 CreateTexture2D не сработал (E_INVALIDARG) — превышен лимит texture-array"
  description:
    en: |
      The Bannerlord renderer (rglGPU_device::create_texture_array) called
      ID3D11Device::CreateTexture2D and got back E_INVALIDARG ("The parameter
      is incorrect" / "Параметр задан неверно"). This is NOT out of memory and
      NOT TDR — D3D11 rejected the texture-array descriptor itself.

      Most common trigger on TOR: an oversized Battle Size (BattleSizeResized
      mod) combined with TOR_Armory + custom troop mods produces a unit-material
      array that exceeds D3D11's hard limits — ArraySize > 2048, or a format /
      MipLevels combination the driver refuses. New AMD RDNA 4 cards (RX 9070,
      9070 XT) are stricter about these descriptors than older NVIDIA drivers,
      so the same setup that "worked" on a 30-series card crashes on a 9070 XT.

      Second common trigger: a VR runtime is running in the background. Oculus
      / Meta Quest Link (OVRServer_x64), SteamVR (vrcompositor / vrserver), and
      Windows Mixed Reality reserve 1.5–3 GB of VRAM for the headset compositor
      even when the headset is idle / not on your face. With TOR + a 1440p+
      desktop already eating most of the card, that reservation is enough to
      starve the texture-array allocation and make CreateTexture2D fail.

      Third common trigger: a NVIDIA Blackwell card (RTX 50-series — 5070 /
      5070 Ti / 5080 / 5090) after a long uninterrupted session (3+ hours).
      The Blackwell DX11 driver path leaks descriptor handles slowly; once the
      pool is exhausted, every subsequent texture-array allocation returns
      E_INVALIDARG. Symptoms match this exactly: app run time 9+ hours, no VR,
      discrete NVIDIA selected ("Selected graphics adapter: [1] NVIDIA GeForce
      RTX 50xx" in rgl_log), GPU Crash flag = 1 in crash_tags. Quitting to
      desktop and relaunching restores the descriptor pool — that is why
      "I haven't crashed since I restart every 2 hours" works on this hardware.
    ru: |
      Рендерер Bannerlord (rglGPU_device::create_texture_array) вызвал
      ID3D11Device::CreateTexture2D и получил E_INVALIDARG («Параметр задан
      неверно»). Это НЕ нехватка памяти и НЕ TDR — сам дескриптор
      texture-array отвергнут D3D11.

      Самая частая причина на TOR: задранный Battle Size (через мод
      BattleSizeResized) в связке с TOR_Armory и кастомными trooper-модами
      даёт массив материалов юнитов, который пробивает жёсткие лимиты D3D11 —
      ArraySize > 2048 или несовместимая комбинация формата / MipLevels.
      Новые карты AMD RDNA 4 (RX 9070, 9070 XT) проверяют дескрипторы строже,
      чем старые драйверы NVIDIA — то же самое сочетание, которое «работало»
      на 30-серии, падает на 9070 XT.

      Вторая частая причина: в фоне работает VR-runtime. Oculus / Meta Quest
      Link (OVRServer_x64), SteamVR (vrcompositor / vrserver), Windows Mixed
      Reality резервируют 1.5–3 ГБ VRAM под compositor шлема — даже если шлем
      в покое и не на голове. На TOR + 1440p+ десктопе, где карта уже под
      нагрузкой, этого резерва хватает чтобы съесть бюджет под texture-array
      и уронить CreateTexture2D.

      Третья частая причина: NVIDIA Blackwell (RTX 50-серия — 5070 / 5070 Ti /
      5080 / 5090) после длинной непрерывной сессии (3+ часа). DX11-драйвер
      Blackwell медленно течёт descriptor handles; когда пул исчерпан, каждое
      следующее выделение texture-array возвращает E_INVALIDARG. Симптомы
      совпадают: app run time 9+ часов, без VR, выбрана дискретка NVIDIA
      («Selected graphics adapter: [1] NVIDIA GeForce RTX 50xx» в rgl_log),
      GPU Crash flag = 1 в crash_tags. Выход на рабочий стол и перезапуск
      возвращают пул дескрипторов — поэтому «я не падаю, если рестартую
      каждые 2 часа» работает на этой железке.
  fix:
    en:
      - "If you have a VR headset: fully close Oculus/Meta Quest Link AND SteamVR AND Windows Mixed Reality Portal before launching Bannerlord. Check Task Manager for OVRServer_x64.exe / vrcompositor.exe / vrserver.exe / MixedRealityPortal.exe — kill them. Disconnect the headset cable. They reserve 1.5–3 GB of VRAM each, even idle."
      - "Lower Battle Size first. If you use BattleSizeResized — try 200, then 128 (native cap). If a 200-vs-200 fight loads cleanly, you've confirmed the texture-array limit was the cause."
      - "If lowering Battle Size still crashes — temporarily disable troop/armor mods that add many unique materials (LoreHardcore, custom-troop overhauls). Re-enable one at a time."
      - "In-game: Options → Graphics → Texture Quality = Medium. Smaller textures shrink the array footprint."
      - "AMD Adrenalin: open the Bannerlord.exe profile and turn OFF AFMF, Anti-Lag/Anti-Lag+, HYPR-RX, Image Sharpening, Radeon Boost. The driver overlay can also corrupt texture descriptors — disable it (Alt+R)."
      - "If on a brand-new RDNA 4 card (RX 9070 / 9070 XT): try the previous WHQL Adrenalin instead of the latest one. Beta/Preview drivers regularly break old DX11 games."
      - "If on a brand-new NVIDIA Blackwell card (RTX 5070 / 5070 Ti / 5080 / 5090): break long sessions — quit to desktop and relaunch every 2–3 hours. The DX11 descriptor pool leak resets only on full process exit. NVIDIA Control Panel → Manage 3D settings → Bannerlord.exe → 'Shader Cache Size = 100 GB or Unlimited', 'Power management mode = Prefer maximum performance', turn OFF Image Sharpening / DLSS Frame Generation / Reflex (these add their own descriptors)."
      - "If on RTX 50-series: try the latest GeForce Game Ready (or Studio) driver — early Blackwell drivers (566.x / 570.x) are known to leak; updates 580.x+ behave better."
      - "Toggle the renderer: Bannerlord launcher → Options → Use DirectX 12 (or back to DX11). RDNA 4 is often more stable on DX12 path."
      - "AFTER changing any graphics setting (Texture Quality / Shader Quality / etc.): REBOOT the PC, open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache', launch the game, Main Menu → 'Build Shader Cache' and wait 20–60 minutes. Skip any of these and the next launch crashes on the imperial-soldier splash."
      - "If nothing helps — file a screenshot of the error popup plus rgl_log_<PID>.txt + watchdog_log_<PID>.txt to the mod author."
    ru:
      - "Если есть VR-шлем — полностью закрой Oculus/Meta Quest Link, SteamVR и Windows Mixed Reality Portal перед запуском Bannerlord. В Диспетчере задач прибей OVRServer_x64.exe / vrcompositor.exe / vrserver.exe / MixedRealityPortal.exe. Отключи кабель шлема. Каждый из них держит 1.5–3 ГБ VRAM даже когда шлем не активен."
      - "Снизь Battle Size в первую очередь. Если стоит BattleSizeResized — попробуй 200, потом 128 (нативный потолок). Если бой 200 на 200 грузится без вылета — корень найден, лимит texture-array."
      - "Если падает и на сниженном размере — временно отключи моды на отряды/броню с большим числом уникальных материалов (LoreHardcore, кастомные trooper-моды). Включай по одному."
      - "В игре: Опции → Графика → Качество текстур = Medium. Текстуры меньше — массив занимает меньше."
      - "AMD Adrenalin: открой профиль Bannerlord.exe и ВЫКЛЮЧИ AFMF, Anti-Lag/Anti-Lag+, HYPR-RX, Image Sharpening, Radeon Boost. Оверлей драйвера тоже бьёт по дескрипторам — выключи (Alt+R)."
      - "Если карта свежая RDNA 4 (RX 9070 / 9070 XT) — поставь предыдущую WHQL Adrenalin вместо последней. Beta/Preview-драйверы регулярно ломают старые DX11-игры."
      - "Если карта свежая NVIDIA Blackwell (RTX 5070 / 5070 Ti / 5080 / 5090): дроби длинные сессии — выходи на рабочий стол и запускай заново каждые 2–3 часа. Утечка пула DX11-дескрипторов сбрасывается только при полном выходе из процесса. NVIDIA Control Panel → Manage 3D settings → Bannerlord.exe → «Shader Cache Size = 100 GB или Unlimited», «Power management mode = Prefer maximum performance», ВЫКЛ Image Sharpening / DLSS Frame Generation / Reflex (они добавляют свои дескрипторы)."
      - "Если RTX 50-серия — обнови GeForce Game Ready (или Studio) до последнего; ранние Blackwell-драйверы (566.x / 570.x) известны утечкой, апдейты 580.x+ ведут себя лучше."
      - "Попробуй сменить рендерер: лаунчер Bannerlord → Опции → Use DirectX 12 (или обратно на DX11). RDNA 4 чаще стабильнее на DX12."
      - "ПОСЛЕ любого изменения настройки графики (Texture Quality / Shader Quality и т.д.): ПЕРЕЗАГРУЗИ ПК, открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord», запусти игру, Главное меню → «Build Shader Cache» и жди 20–60 мин. Пропустишь хоть один шаг — на следующем запуске игра упадёт на заставке с имперским солдатом."
      - "Если ничего не помогло — приложи скриншот окна ошибки + rgl_log_<PID>.txt + watchdog_log_<PID>.txt и пришли автору мода."
  match:
    any:
      - log_line:
          contains: "create_texture_array failed"
      - log_line:
          contains: "rglGPU_device::create_texture_array"

- id: gpu.shader_compile_oom
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "https://steamcommunity.com/workshop/filedetails/discussion/3025574678/800093831719686553/"
  requires_sources: [log_line]
  title:
    en: "Shader compilation runs out of memory (TOR pbr_metallic / horse / faceshader)"
    ru: "Не хватает памяти при компиляции шейдеров TOR (pbr_metallic / horse / faceshader)"
  description:
    en: |
      The Direct3D shader compiler ran out of memory while building TOR's heaviest
      shaders (pbr_metallic.rs, horse.rs, faceshader_high.rs). Symptoms: cascading
      Windows error dialogs "Error compiling shader file ... out of memory during
      compilation" or "internal error: pdb append failed / debug info append failed,
      byte count too large". The game crashes after ~15 min of "Build Shader Cache".

      This is NOT the same as "system page file too small". The D3DCompiler has its
      own per-process address-space limits and chokes on TOR's complex shaders even
      when the page file is huge. The proven workaround is to delete BOTH shader caches
      (game + ProgramData), make sure terrain_quality is 2 or higher, free 50+ GB on
      the system drive, and update the GPU driver.
    ru: |
      Компилятор Direct3D исчерпал память при сборке самых тяжёлых шейдеров TOR
      (pbr_metallic.rs, horse.rs, faceshader_high.rs). Симптомы: каскад окошек
      Windows «Error compiling shader file ... out of memory during compilation»
      или «internal error: pdb append failed / debug info append failed, byte count
      too large». Игра падает после ~15 минут «Build Shader Cache».

      Это НЕ то же самое, что «маленький файл подкачки». У D3DCompiler свои лимиты
      адресного пространства, и он давится на сложных шейдерах TOR даже при
      огромном pagefile. Рабочий обходной путь: удалить ОБА кэша шейдеров
      (игровой + ProgramData), убедиться что terrain_quality ≥ 2, освободить
      50+ ГБ на системном диске и обновить драйвер GPU.
  fix:
    en:
      - "Crash Doctor → System tune-up → 'Clear Bannerlord shader cache' (deletes BOTH game/Shaders/D3D11/compressed_shaders_cache.sack AND C:/ProgramData/Mount and Blade II Bannerlord/Shaders)."
      - "Crash Doctor → System tune-up → if engine_config card appears, apply it (sets terrain_quality to 2 — required, lower values cause this exact crash on TOR)."
      - "Free at least 50 GB on C: (Disk Cleanup → Temporary files; Steam → Properties → Installed Files → Verify integrity)."
      - "Update the GPU driver to the latest WHQL (NVIDIA / AMD website, not Windows Update)."
      - "Unsubscribe from any OLD versions of TOR (e.g. Core, RoR, Music) in Steam Workshop and delete leftover folders in Modules/. Re-subscribe to the current ones only."
      - "Lower in-game Texture Quality to Medium before launching 'Build Shader Cache' the next time — TOR documents 32+ GB RAM peaks for High textures."
      - "Reboot once before relaunching so the page file is reset."
      - "Patience: 'Build Shader Cache' on TOR takes 10–50 minutes. Don't close the game, don't open Chrome / Discord during compilation."
    ru:
      - "Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord» (удаляет ОБА: game/Shaders/D3D11/compressed_shaders_cache.sack И C:/ProgramData/Mount and Blade II Bannerlord/Shaders)."
      - "Crash Doctor → Настройка системы → если появилась карточка про engine_config — применить (поднимает terrain_quality до 2 — обязательно, ниже даёт ровно этот краш на TOR)."
      - "Освободить минимум 50 ГБ на C: (Очистка диска → временные файлы; Steam → Свойства → Установленные файлы → Проверить целостность)."
      - "Обновить драйвер GPU до последней WHQL (с сайта NVIDIA / AMD, не через Windows Update)."
      - "Отписаться от СТАРЫХ версий TOR (Core, RoR, Music) в Steam Workshop и удалить оставшиеся папки в Modules/. Подписаться только на актуальные."
      - "В игре понизить Texture Quality до Medium перед следующим «Build Shader Cache» — TOR документирует пики 32+ ГБ ОЗУ на High."
      - "Перезагрузить ПК один раз перед перезапуском, чтобы page file сбросился."
      - "Терпение: «Build Shader Cache» в TOR идёт 10–50 минут. Не закрывай игру, не открывай Chrome / Discord на время компиляции."
  match:
    any:
      - log_line:
          contains: "out of memory during compilation"
      - log_line:
          contains: "pdb append failed"
      - log_line:
          contains: "debug info append failed"

- id: gpu.long_session_gpu_crash
