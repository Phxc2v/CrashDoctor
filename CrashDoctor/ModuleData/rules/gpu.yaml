- id: gpu.shader_cache_corrupt
  category: gpu
  severity: warning
  confidence: high
  evidence_source: "https://forums.taleworlds.com/threads/missing-shader-from-sack.444678/"
  requires_sources: [log_line]
  title:
    en: "Shader cache appears to be corrupt or unavailable"
    ru: "Кэш шейдеров повреждён или недоступен"
  description:
    en: |
      What the shader cache is: a precompiled archive of every visual effect Bannerlord
      uses (lighting, particles, terrain, character skin, weather...). The game compiles
      it once on the first run for your specific GPU + driver combo and then reuses it.
      Without a valid cache the engine has to compile shaders on the fly while loading
      a battle — that is what causes the long freeze followed by a crash.

      The log here shows hundreds of "Missing shader from sack" messages, which means
      the cache is either broken, the GPU driver does not support the shader pipeline,
      or the disk had write errors during installation.

      Important: do NOT disable the Windows page file. Compiling TOR shaders peaks at
      30+ GB of committed memory; with a disabled or tiny page file Windows runs out of
      commit and crashes the game on the very next battle load. The fix is the opposite —
      raise the page file, not turn it off.
    ru: |
      Что такое кэш шейдеров: предкомпилированный архив всех визуальных эффектов
      Bannerlord (свет, частицы, ландшафт, кожа персонажа, погода…). Игра компилирует
      его один раз при первом запуске под твою связку GPU + драйвер и потом
      переиспользует. Без валидного кэша движку приходится компилировать шейдеры
      на лету при загрузке битвы — именно поэтому долгий «зависший» loading
      заканчивается крашем.

      В логе сотни сообщений «Missing shader from sack» — кэш либо сломан, либо
      драйвер не тянет нужный pipeline, либо при установке игры/мода были ошибки
      записи на диск.

      ВАЖНО: НЕ ОТКЛЮЧАЙ файл подкачки. Компиляция шейдеров TOR требует пиково 30+ ГБ
      committed-памяти; при выключенном или маленьком файле подкачки Windows исчерпает
      commit и игра упадёт ровно при загрузке следующей битвы. Фикс ровно
      противоположный — увеличить файл подкачки, а не выключать.
  fix:
    en:
      - "Open Crash Doctor → System tune-up → 'Increase pagefile' (sets it to 40 / 60 GB) — required for TOR."
      - "Open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache' (sends old cache to Recycle Bin)."
      - "Launch the game and pick 'Build Shader Cache' from the main menu — it takes 10–60 minutes; do not interrupt."
      - "Steam → Bannerlord → Properties → Installed Files → Verify integrity of game files."
      - "Update the GPU driver."
      - "If you already disabled the page file, turn it back on (Custom 40000–60000 MB on C:) before doing anything else."
      - "Last resort: in-game Options → Graphics → Shader Quality = Low, then save and restart."
    ru:
      - "Открой Crash Doctor → Настройка системы → «Увеличить файл подкачки» (ставит 40 / 60 ГБ) — обязательно для TOR."
      - "Открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord» (старый кэш уезжает в Корзину)."
      - "Запусти игру и в главном меню нажми «Build Shader Cache» — займёт 10–60 минут, не прерывай процесс."
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность."
      - "Обновить драйвер видеокарты."
      - "Если ты уже отключил файл подкачки — ВЕРНИ его (Особый размер 40000–60000 МБ на C:) перед всем остальным."
      - "В крайнем случае: Опции → Графика → Качество шейдеров = Low, сохрани и перезапусти."
  match:
    all:
      - log_line:
          contains: "Missing shader"
          count_at_least: "100"

