- id: gpu.amd_integrated_default
  category: gpu
  severity: critical
  confidence: medium
  evidence_source: "DxDiag Display Devices ordering is unreliable on its own; gated on positive iGPU markers (matching M28_IGpuActiveOnHybrid.IntegratedGpuMarkers), positive discrete-dGPU markers on DD1 with Current Mode=Unknown (idle), and a none-clause that bails out when DD0 itself carries a discrete prefix (5800X + RX 9070 + two monitors false-positive caught 2026-05-24)"
  requires_sources: [crash_tag, engine_config]
  title:
    en: "Game is rendering on the integrated AMD GPU"
    ru: "Игра рендерится на встроенной AMD-видеокарте"
    zh: "游戏正在使用 AMD 集成显卡渲染"
    tr: "Oyun tümleşik AMD ekran kartında render ediliyor"
  description:
    en: |
      Bannerlord launched on the integrated AMD Radeon GPU instead of the
      discrete card detected on this machine. The integrated GPU has very
      little dedicated VRAM and is the most likely cause of the crash.
    ru: |
      Bannerlord запустился на встроенной видеокарте AMD Radeon вместо
      дискретной, которая есть в этой машине. У встроенной мало видеопамяти —
      почти наверняка из-за этого и был краш.
    zh: |
      Bannerlord 使用的是 AMD Radeon 集成显卡，而不是这台机器上检测到的独立显卡。
      集成显卡的专用显存很少，极有可能就是这次崩溃的原因。
    tr: |
      Bannerlord, bu makinede algılanan ayrık kart yerine tümleşik AMD Radeon
      ekran kartında başlatıldı. Tümleşik ekran kartının ayrılmış VRAM'i çok az
      ve çökmenin en olası nedeni bu.
  fix:
    en:
      - "In-game: Options → Graphics → first tab → Graphics Adapter → choose the discrete GPU."
      - "If the option is missing: open Documents/Mount and Blade II Bannerlord/engine_config.txt and change graphics_adapter from 0 to 1."
      - "Windows fallback: Settings → System → Display → Graphics → add Bannerlord.exe → High performance."
      - "Update both AMD and the discrete GPU drivers."
    ru:
      - "В игре: Опции → Графика → первая вкладка → Графический адаптер → выбрать дискретную видеокарту."
      - "Если такой опции нет: в Documents/Mount and Blade II Bannerlord/engine_config.txt поменять graphics_adapter с 0 на 1."
      - "Через Windows: Параметры → Система → Дисплей → Графика → добавить Bannerlord.exe → Высокая производительность."
      - "Обновить драйвер AMD и драйвер дискретной видеокарты."
    zh:
      - "游戏内：Options → Graphics → 第一个标签页 → Graphics Adapter → 选择独立显卡。"
      - "如果没有该选项：打开 Documents/Mount and Blade II Bannerlord/engine_config.txt，把 graphics_adapter 从 0 改为 1。"
      - "通过 Windows：设置 → 系统 → 显示 → 显卡 → 添加 Bannerlord.exe → 高性能。"
      - "同时更新 AMD 和独立显卡的驱动程序。"
    tr:
      - "Oyun içinde: Options → Graphics → ilk sekme → Graphics Adapter → ayrık ekran kartını seçin."
      - "Seçenek yoksa: Documents/Mount and Blade II Bannerlord/engine_config.txt dosyasını açın ve graphics_adapter değerini 0'dan 1'e değiştirin."
      - "Windows üzerinden: Ayarlar → Sistem → Ekran → Grafik → Bannerlord.exe ekleyin → Yüksek performans."
      - "Hem AMD hem de ayrık ekran kartı sürücülerini güncelleyin."
  match:
    all:
      - engine_config:
          key: graphics_adapter
          equals: "0"
      # DD0 must be an AMD iGPU. Positive markers only — bare "Radeon" matched
      # discrete cards too (Radeon RX 9070 etc.) and produced a known false
      # positive on Ryzen 5800X + RX 9070 driving two monitors (2026-05-24).
      # Keep this list in sync with M28_IGpuActiveOnHybrid.IntegratedGpuMarkers.
      - any:
          - crash_tag:
              path: "Display Devices 0/Card name"
              contains: "Radeon Graphics"
          - crash_tag:
              path: "Display Devices 0/Card name"
              contains: "Radeon(TM) Graphics"
          - crash_tag:
              path: "Display Devices 0/Card name"
              contains: "Vega"
          - crash_tag:
              path: "Display Devices 0/Card name"
              regex: "Radeon\\s+(680M|780M|880M|740M|8060S)"
      # DD1 must be a discrete card. Keep in sync with
      # M28_IGpuActiveOnHybrid.DiscreteGpuMarkers.
      - any:
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "NVIDIA"
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "GeForce"
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "RTX"
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "GTX"
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "Radeon RX"
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "Radeon Pro"
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "Arc A"
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "Arc B"
      # Discrete card is idle — DxDiag writes "Unknown" for Current Mode when
      # the adapter has no attached active display surface. This is the same
      # tell-tale M28 uses in InspectCrashFolder.
      - crash_tag:
          path: "Display Devices 1/Current Mode"
          contains: "Unknown"
      # Sanity: DxDiag sometimes orders devices by primary-display port, not
      # by which GPU renders, so DD0 may itself be a discrete card. Without
      # this none-clause a discrete-only setup with two monitors on the dGPU
      # (DD0 = Radeon RX, DD1 = same Radeon RX on the second monitor) passes
      # the positive matchers above.
      - none:
          - crash_tag:
              path: "Display Devices 0/Card name"
              contains: "Radeon RX"
          - crash_tag:
              path: "Display Devices 0/Card name"
              contains: "Radeon Pro"
          - crash_tag:
              path: "Display Devices 0/Card name"
              contains: "Radeon VII"
          - crash_tag:
              path: "Display Devices 0/Card name"
              contains: "GeForce"
          - crash_tag:
              path: "Display Devices 0/Card name"
              contains: "RTX"
          - crash_tag:
              path: "Display Devices 0/Card name"
              contains: "GTX"
          - crash_tag:
              path: "Display Devices 0/Card name"
              contains: "Arc A"
          - crash_tag:
              path: "Display Devices 0/Card name"
              contains: "Arc B"

- id: gpu.shader_compile_x3004_tbn
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "BL-001/002 catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "Shader compile error X3004 — undeclared identifier '_TBN'"
    ru: "Ошибка компиляции шейдера X3004 — неопределённый '_TBN'"
    zh: "着色器编译错误 X3004 — 未声明的标识符 '_TBN'"
    tr: "Gölgelendirici derleme hatası X3004 — tanımlanmamış tanımlayıcı '_TBN'"
  description:
    en: |
      The HLSL compiler rejected particle_shading.rsh (or similar .rs/.rsh) with
      X3004 'undeclared identifier _TBN'. Triggered by an ancient/corrupt shader
      cache after a Bannerlord update — the compiled cache was built against a
      different shader source. Common after BL 1.4–1.5, 1.7–1.8, or any major
      patch where TaleWorlds renamed a varying.
    ru: |
      HLSL-компилятор отклонил particle_shading.rsh (или похожий .rs/.rsh) с
      X3004 'undeclared identifier _TBN'. Триггер — древний/сломанный кэш
      шейдеров после апдейта Bannerlord: скомпилированный кэш собран против
      другой версии исходников. Часто после BL 1.4–1.5, 1.7–1.8 или любого
      крупного патча где TaleWorlds переименовали varying.
    zh: |
      HLSL 编译器拒绝了 particle_shading.rsh（或类似的 .rs/.rsh），报错
      X3004 'undeclared identifier _TBN'。原因是 Bannerlord 更新后留下了
      陈旧/损坏的着色器缓存——已编译的缓存是针对另一个着色器源构建的。常见于
      BL 1.4–1.5、1.7–1.8，或任何 TaleWorlds 重命名了某个 varying 的大型补丁之后。
    tr: |
      HLSL derleyicisi particle_shading.rsh dosyasını (veya benzer .rs/.rsh)
      X3004 'undeclared identifier _TBN' hatasıyla reddetti. Bannerlord
      güncellemesinden sonra eski/bozuk bir gölgelendirici önbelleği bunu
      tetikler — derlenmiş önbellek farklı bir gölgelendirici kaynağına göre
      oluşturulmuş. BL 1.4–1.5, 1.7–1.8 veya TaleWorlds'ün bir varying'i yeniden
      adlandırdığı her büyük yamadan sonra sık görülür.
  fix:
    en:
      - "Open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache'."
      - "Steam → Bannerlord → Properties → Installed Files → Verify integrity."
      - "Launch the game and pick 'Build Shader Cache' from main menu — wait it out."
      - "If on AMD: NVIDIA Shader Cache settings don't apply, but lower in-game Shader Quality to Medium."
      - "If on NVIDIA: NVIDIA Control Panel → Manage 3D settings → Shader Cache Size = Unlimited."
    ru:
      - "Открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord»."
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность."
      - "Запусти игру и нажми «Build Shader Cache» в главном меню — дождись завершения."
      - "На AMD: настройки NVIDIA Shader Cache не применимы, но в игре понизь Shader Quality до Medium."
      - "На NVIDIA: NVIDIA Control Panel → Manage 3D settings → Shader Cache Size = Unlimited."
    zh:
      - "打开 Crash Doctor → 系统调优 → '清理着色器缓存'。"
      - "Steam → Bannerlord → 属性 → 已安装文件 → 验证完整性。"
      - "启动游戏，在主菜单选择 'Build Shader Cache'——耐心等待完成。"
      - "如果用 AMD：NVIDIA Shader Cache 设置不适用，但可在游戏内把 Shader Quality 降到 Medium。"
      - "如果用 NVIDIA：NVIDIA Control Panel → Manage 3D settings → Shader Cache Size = Unlimited。"
    tr:
      - "Crash Doctor → Sistem ayarı → 'gölgelendirici önbelleğini temizle' açın."
      - "Steam → Bannerlord → Özellikler → Yüklü Dosyalar → Bütünlüğü doğrula."
      - "Oyunu başlatın ve ana menüden 'Build Shader Cache' seçin — bitmesini bekleyin."
      - "AMD kullanıyorsanız: NVIDIA Shader Cache ayarları geçerli değildir, ama oyun içinde Shader Quality değerini Medium yapın."
      - "NVIDIA kullanıyorsanız: NVIDIA Control Panel → Manage 3D settings → Shader Cache Size = Unlimited."
  match:
    any:
      - log_line:
          contains: "X3004"
      - log_line:
          contains: "undeclared identifier '_TBN'"
      - log_line:
          contains: "Error compiling shader file"

- id: gpu.create_shader_resource_view_fail
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "TOR-007 catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "D3D11 CreateShaderResourceView failed — tessellation overflow on TOR"
    ru: "D3D11 CreateShaderResourceView упал — переполнение тесселяции в TOR"
    zh: "D3D11 CreateShaderResourceView 失败 — TOR 上的曲面细分溢出"
    tr: "D3D11 CreateShaderResourceView başarısız — TOR'da tessellation taşması"
  description:
    en: |
      rglGPU_device::create_gpu_buffer hit CreateShaderResourceView fail, GPU
      device suspended, often DXGI_ERROR_DEVICE_REMOVED right after. Known TOR
      pattern: tessellation + scene buffer overflow on heavy locations
      (Bretonnian villages, Mousillon tavern). The driver kills the device.
    ru: |
      rglGPU_device::create_gpu_buffer наткнулся на падение CreateShaderResourceView,
      GPU device suspended, часто следом DXGI_ERROR_DEVICE_REMOVED. Известный
      TOR-паттерн: переполнение буфера сцены при тесселяции на тяжёлых локациях
      (бретонские деревни, таверна Мусийона). Драйвер убивает device.
    zh: |
      rglGPU_device::create_gpu_buffer 遇到 CreateShaderResourceView 失败，GPU
      device suspended，之后通常紧跟 DXGI_ERROR_DEVICE_REMOVED。已知的 TOR
      模式：在重型场景（布列塔尼亚村庄、穆西永酒馆）上曲面细分 + 场景缓冲区
      溢出。驱动程序会杀掉设备。
    tr: |
      rglGPU_device::create_gpu_buffer, CreateShaderResourceView hatasına çarptı,
      GPU device suspended ve hemen ardından genelde DXGI_ERROR_DEVICE_REMOVED.
      Bilinen TOR örüntüsü: ağır konumlarda (Bretonya köyleri, Mousillon tavernası)
      tessellation + sahne arabelleği taşması. Sürücü cihazı kapatır.
  fix:
    en:
      - "Documents/Mount and Blade II Bannerlord/engine_config.txt → set tesselation = 0."
      - "In-game: Options → Graphics → Terrain Quality = Medium, Static Shadows ON."
      - "Open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache'."
      - "Update GPU driver to latest WHQL."
    ru:
      - "Documents/Mount and Blade II Bannerlord/engine_config.txt → tesselation = 0."
      - "В игре: Опции → Графика → Terrain Quality на Medium, Static Shadows ВКЛ."
      - "Открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord»."
      - "Обнови драйвер GPU до последней WHQL."
    zh:
      - "Documents/Mount and Blade II Bannerlord/engine_config.txt → 设置 tesselation = 0。"
      - "游戏内：Options → Graphics → Terrain Quality = Medium、Static Shadows 开启。"
      - "打开 Crash Doctor → 系统调优 → '清理着色器缓存'。"
      - "把显卡驱动更新到最新的 WHQL。"
    tr:
      - "Documents/Mount and Blade II Bannerlord/engine_config.txt → tesselation = 0 yapın."
      - "Oyun içinde: Options → Graphics → Terrain Quality = Medium, Static Shadows AÇIK."
      - "Crash Doctor → Sistem ayarı → 'gölgelendirici önbelleğini temizle' açın."
      - "Ekran kartı sürücüsünü en son WHQL sürümüne güncelleyin."
  match:
    any:
      - log_line:
          contains: "CreateShaderResourceView failed"
      - log_line:
          contains: "create_gpu_buffer"

- id: gpu.terrain_shader_cache_missing
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "Real client crash 2026-05-10 — save loads, MapScreen opens, hideout_place location enters → 'Bake Terrain' triggers shader load → 'Missing shader from sack: pbr_terrain' ×30+ in a single Bake → access violation 0xC0000005 in D3D11. This branch fires when the shipped shader cache package was never read (no read_compressed_shader_cache_package line in the log) — i.e. the user never ran 'Build Shader Cache' or ran it on a different GPU."
  requires_sources: [log_line]
  title:
    en: "Shader cache was never built — game crashes when entering a location"
    ru: "Кэш шейдеров не собирался — падает при входе в локацию"
    zh: "着色器缓存从未构建 — 进入场景时游戏崩溃"
    tr: "Gölgelendirici önbelleği hiç oluşturulmadı — bir konuma girerken oyun çöküyor"
  description:
    en: |
      The save loads, the campaign map opens, but the moment a terrain tile
      has to be drawn the engine asks for the `pbr_terrain` family of shaders
      and gets nothing. Tens of "Missing shader from sack: pbr_terrain" lines
      fire in a single frame and the game falls into a native access violation
      in D3D11.

      We did NOT see `read_compressed_shader_cache_package` anywhere in the
      log, which means the shipped shader cache package was not opened at
      startup. The most common reason is that 'Build Shader Cache' has never
      been run on this machine (or was run on a different GPU, e.g. integrated
      Intel UHD on a laptop), or the build was interrupted by an Alt+Tab
      during compilation.
    zh: |
      存档能加载，战役地图能打开，但一旦需要绘制地形图块，引擎就会请求
      `pbr_terrain` 系列着色器，却什么都拿不到。一帧之内出现几十行
      "Missing shader from sack: pbr_terrain"，游戏随即在 D3D11 中陷入
      原生 access violation。

      日志中任何地方都没有出现 `read_compressed_shader_cache_package`，
      这说明随游戏附带的着色器缓存包在启动时没有被打开。最常见的原因是这台
      机器上从未运行过 'Build Shader Cache'（或是在另一块显卡上运行的，例如
      笔记本上的 Intel UHD 集成显卡），或者构建过程中按了 Alt+Tab 被打断。
    tr: |
      Kayıt yükleniyor, sefer haritası açılıyor ama bir arazi karosu çizilmesi
      gerektiği anda motor `pbr_terrain` gölgelendirici ailesini istiyor ve
      hiçbir şey alamıyor. Tek bir karede onlarca "Missing shader from sack:
      pbr_terrain" satırı oluşuyor ve oyun D3D11'de yerel bir access violation'a
      düşüyor.

      Günlüğün hiçbir yerinde `read_compressed_shader_cache_package` görülmedi;
      bu, oyunla gelen gölgelendirici önbellek paketinin başlangıçta açılmadığı
      anlamına gelir. En sık görülen neden, bu makinede 'Build Shader Cache'in
      hiç çalıştırılmamış olmasıdır (ya da farklı bir ekran kartında çalıştırılmış,
      örneğin bir dizüstüde tümleşik Intel UHD), ya da derleme sırasında Alt+Tab
      ile yarıda kesilmiş olmasıdır.
    ru: |
      Сейв грузится, карта кампании открывается, но как только нужно
      нарисовать тайл ландшафта — движок просит семейство шейдеров
      `pbr_terrain`, а в архиве пусто. В одном кадре десятки строк «Missing
      shader from sack: pbr_terrain», и игра падает с access violation в
      D3D11.

      В логе НЕ видно строки `read_compressed_shader_cache_package` — значит,
      собранный кэш шейдеров вообще не открывался при старте. Самая частая
      причина: «Build Shader Cache» никогда не запускался на этой машине (или
      запускался на другой видеокарте — например, встроенной Intel UHD на
      ноутбуке), либо сборку прервали Alt+Tab'ом во время компиляции.
  fix:
    en:
      - "Main menu of Bannerlord → 'Build Shader Cache'. Wait 10–50 minutes WITHOUT Alt+Tab — switching to a browser during compilation corrupts the cache and you have to start over."
      - "Laptop with two GPUs: NVIDIA Control Panel → Manage 3D Settings → Program Settings → Bannerlord.exe → Preferred GPU = 'High-performance NVIDIA processor'. AMD: Radeon Settings → Bannerlord.exe → Graphics → 'High Performance'. Then rebuild the cache once on the correct adapter."
      - "If the page file is disabled: turn it back on (Custom 40000–60000 MB on C:) before rebuilding — TOR shader compilation peaks at ~30 GB committed memory and a tiny page file kills the build."
      - "If 'Build Shader Cache' still does not help: delete C:\\ProgramData\\Mount and Blade II Bannerlord\\Shaders\\ entirely, plus every Modules\\<mod>\\Shaders\\D3D11\\compressed_shaders_cache.sack file you can find. Then 'Build Shader Cache' again."
    zh:
      - "Bannerlord 主菜单 → 'Build Shader Cache'。等待 10–50 分钟，期间不要按 Alt+Tab——编译过程中切到浏览器会损坏缓存，得从头再来。"
      - "双显卡笔记本：NVIDIA Control Panel → Manage 3D Settings → Program Settings → Bannerlord.exe → 首选显卡 = 'High-performance NVIDIA processor'。AMD：Radeon Settings → Bannerlord.exe → Graphics → 'High Performance'。然后在正确的适配器上重新构建一次缓存。"
      - "如果页面文件被禁用：在重新构建前先把它打开（在 C: 盘自定义 40000–60000 MB）——TOR 着色器编译峰值约需 30 GB 已提交内存，页面文件太小会让构建失败。"
      - "如果 'Build Shader Cache' 仍然没用：彻底删除 C:\\ProgramData\\Mount and Blade II Bannerlord\\Shaders\\，以及你能找到的每一个 Modules\\<mod>\\Shaders\\D3D11\\compressed_shaders_cache.sack 文件。然后再次 'Build Shader Cache'。"
    tr:
      - "Bannerlord ana menüsü → 'Build Shader Cache'. Alt+Tab YAPMADAN 10–50 dakika bekleyin — derleme sırasında tarayıcıya geçmek önbelleği bozar ve baştan başlamanız gerekir."
      - "Çift ekran kartlı dizüstü: NVIDIA Control Panel → Manage 3D Settings → Program Settings → Bannerlord.exe → Tercih edilen ekran kartı = 'High-performance NVIDIA processor'. AMD: Radeon Settings → Bannerlord.exe → Graphics → 'High Performance'. Sonra doğru bağdaştırıcıda önbelleği bir kez yeniden oluşturun."
      - "Sayfa dosyası devre dışıysa: yeniden oluşturmadan önce geri açın (C: üzerinde Özel 40000–60000 MB) — TOR gölgelendirici derlemesi ~30 GB taahhüt edilen belleğe çıkar ve küçük bir sayfa dosyası derlemeyi öldürür."
      - "'Build Shader Cache' yine de yardımcı olmazsa: C:\\ProgramData\\Mount and Blade II Bannerlord\\Shaders\\ klasörünü tamamen silin, ayrıca bulabildiğiniz her Modules\\<mod>\\Shaders\\D3D11\\compressed_shaders_cache.sack dosyasını da. Sonra tekrar 'Build Shader Cache'."
    ru:
      - "Главное меню Bannerlord → «Build Shader Cache». Подожди 10–50 минут БЕЗ Alt+Tab — сворачивание в браузер во время компиляции ломает кэш, придётся начинать заново."
      - "Ноутбук с двумя видеокартами: NVIDIA Control Panel → Управление параметрами 3D → Программные настройки → Bannerlord.exe → Предпочитаемая видеокарта = «Высокопроизводительный процессор NVIDIA». На AMD: Radeon Settings → Bannerlord.exe → Графика → «Высокая производительность». После этого собери кэш заново на правильном адаптере."
      - "Если файл подкачки отключён — включи его (Особый размер 40000–60000 МБ на C:) ДО сборки кэша. Компиляция шейдеров TOR требует ~30 ГБ committed-памяти, на отключённом или маленьком файле подкачки сборка не дойдёт до конца."
      - "Если «Build Shader Cache» всё равно не помог: удали папку C:\\ProgramData\\Mount and Blade II Bannerlord\\Shaders\\ целиком, плюс файлы Modules\\<имя_мода>\\Shaders\\D3D11\\compressed_shaders_cache.sack у каждого мода. Потом снова «Build Shader Cache»."
  match:
    all:
      - log_line:
          contains: "Missing shader from sack: pbr_terrain"
          count_at_least: "30"
      - none:
          - log_line:
              contains: "read_compressed_shader_cache_package"

- id: gpu.amd_rdna4_driver_regression
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "Real client crash 2026-05-20 — RX 9070 XT on AMD Adrenalin 26.5.2 (driver build 32.0.31007.5012, dated 2026-05-12). Game falls into 0xC0000005 inside D3D11 with 60+ 'Missing shader from sack: pbr_terrain' lines in a single frame after Bake Terrain. Reinstalling the game twice did not help; Build Shader Cache did not help. AMD's own 26.5.x release notes list multiple unresolved D3D rendering regressions on RX 9000 series (God of War corruption, RoadCraft crashes, Satisfactory corruption, multi-monitor FreeSync crashes). The same shader-compiler family is what builds Bannerlord's terrain shaders, and the failure mode lands as missing pbr_terrain entries in the sack."
  requires_sources: [log_line, crash_tag]
  title:
    en: "AMD RX 9000-series driver regression (RDNA 4) — terrain shaders broken"
    ru: "Регрессия драйвера AMD на RX 9000-серии (RDNA 4) — шейдеры ландшафта не собираются"
    zh: "AMD RX 9000 系列驱动回归问题（RDNA 4）— 地形着色器损坏"
    tr: "AMD RX 9000 serisi sürücü gerilemesi (RDNA 4) — arazi gölgelendiricileri bozuk"
  description:
    en: |
      The crash signature is the late-game terrain rendering failure
      ("Missing shader from sack: pbr_terrain" × 30+ → 0xC0000005 in
      D3D11), but the root cause here is the GPU driver, not the game.

      The active GPU is a Radeon RX 9000-series card (RDNA 4) running a
      driver dated 2026-03-01 or later. AMD's Adrenalin 26.5.x release
      notes explicitly list multiple unresolved D3D rendering regressions
      on RX 9000-series products: corruption in God of War, intermittent
      application crashes / driver timeouts in RoadCraft, corruption in
      Satisfactory, and intermittent system crashes with multi-monitor
      AMD FreeSync. The same shader compiler path inside the driver is
      what builds Bannerlord's terrain shaders into the sack at runtime,
      and on RDNA 4 with these drivers a subset of TOR's pbr_terrain
      permutations either fails to compile or stores broken results.

      Symptoms that distinguish this from generic sack corruption:
        - Reinstalling Bannerlord did not help (game files are fine).
        - 'Build Shader Cache' did not help, even after multiple tries.
        - 'Missing shader from sack: pbr_terrain' specifically — broken
          driver path is most reliable on the terrain shader family.
        - Other recent reports across unrelated games (Crimson Desert,
          Warzone, VEIN, Bannerlord itself) show RX 9000-series users
          getting driver timeouts / D3D access violations on the same
          batch of drivers.
    zh: |
      从症状看，这是后期地形渲染失败（一帧内几十行
      "Missing shader from sack: pbr_terrain" → D3D11 中的 0xC0000005），
      但这里的根本原因是显卡驱动，而不是游戏本身。

      当前显卡是 Radeon RX 9000 系列（RDNA 4 架构），驱动日期为
      2026-03-01 或更晚。AMD 的 Adrenalin 26.5.x 发行说明明确列出了
      RX 9000 系列上多个尚未解决的 D3D 渲染回归问题：God of War 画面错乱、
      RoadCraft 间歇性程序崩溃/驱动超时、Satisfactory 画面错乱，以及
      多显示器 AMD FreeSync 下的间歇性系统崩溃。驱动内部那条同样的着色器
      编译路径，正是运行时把 Bannerlord 地形着色器构建进 sack 的路径；
      在配这些驱动的 RDNA 4 上，TOR 的部分 pbr_terrain 排列要么编译失败，
      要么把损坏的结果存了进去。

      区别于普通 sack 损坏的特征：
        - 重新安装 Bannerlord 没用（游戏文件没问题）。
        - 'Build Shader Cache' 没用，即便多次尝试。
        - 偏偏是 'Missing shader from sack: pbr_terrain'——损坏的驱动
          路径在地形着色器这一系列上最稳定地出问题。
        - 其他不相关游戏（Crimson Desert、Warzone、VEIN、Bannerlord
          自身）的近期报告显示，RX 9000 系列用户在同一批驱动上同样
          遇到驱动超时 / D3D access violation。
    tr: |
      Belirtiler geç oyun arazi render hatasıdır (tek bir karede onlarca
      "Missing shader from sack: pbr_terrain" satırı → D3D11'de 0xC0000005),
      ama buradaki kök neden oyun değil, ekran kartı sürücüsüdür.

      Etkin ekran kartı, 2026-03-01 veya sonrası tarihli bir sürücü çalıştıran
      bir Radeon RX 9000 serisi karttır (RDNA 4). AMD'nin Adrenalin 26.5.x
      sürüm notları, RX 9000 serisi ürünlerde çözülmemiş birden çok D3D render
      gerilemesini açıkça listeler: God of War'da bozulma, RoadCraft'ta aralıklı
      uygulama çökmeleri / sürücü zaman aşımları, Satisfactory'de bozulma ve
      çok monitörlü AMD FreeSync ile aralıklı sistem çökmeleri. Sürücünün
      içindeki aynı gölgelendirici derleyici yolu, çalışma zamanında
      Bannerlord'un arazi gölgelendiricilerini sack'e derleyen yoldur ve bu
      sürücülerle RDNA 4'te TOR'un pbr_terrain permütasyonlarının bir kısmı ya
      derlenemez ya da bozuk sonuç saklar.

      Bunu genel sack bozulmasından ayıran belirtiler:
        - Bannerlord'u yeniden yüklemek yardımcı olmadı (oyun dosyaları sağlam).
        - 'Build Shader Cache' birkaç denemeden sonra bile yardımcı olmadı.
        - Özellikle 'Missing shader from sack: pbr_terrain' — bozuk sürücü
          yolu en güvenilir şekilde arazi gölgelendirici ailesinde başarısız olur.
        - İlgisiz oyunlardaki (Crimson Desert, Warzone, VEIN, Bannerlord'un
          kendisi) son raporlar, RX 9000 serisi kullanıcılarının aynı sürücü
          partisinde sürücü zaman aşımları / D3D access violation aldığını gösteriyor.
    ru: |
      По симптомам это поздний краш на отрисовке ландшафта (десятки
      строк «Missing shader from sack: pbr_terrain» → 0xC0000005 в
      D3D11), но корень проблемы здесь — драйвер видеокарты, не игра.

      Активная видеокарта — Radeon из серии RX 9000 (архитектура
      RDNA 4) с драйвером от 2026-03-01 или новее. В release notes
      AMD к Adrenalin 26.5.x официально перечислены нерешённые
      регрессии рендера на RX 9000: артефакты в God of War,
      периодические креши и driver-таймауты в RoadCraft, артефакты
      в Satisfactory, краши при нескольких high-res мониторах с
      AMD FreeSync. Тот же шейдерный компилятор драйвера собирает
      sack-шейдеры Bannerlord на лету, и на RDNA 4 с этими
      драйверами часть TOR-перестановок pbr_terrain либо не
      компилируется, либо ложится в кэш битой.

      Что отличает этот случай от обычного «битый sack»:
        - Переустановка Bannerlord не помогла (файлы игры целы).
        - «Build Shader Cache» не помог, даже после нескольких
          попыток подряд.
        - «Missing shader from sack: pbr_terrain» именно по терреину —
          у драйвера сбой стабильнее всего на этом семействе
          шейдеров.
        - Свежие репорты на не-Bannerlord-играх (Crimson Desert,
          Warzone, VEIN) с RX 9000 показывают тот же класс падений
          (driver timeout / D3D access violation) на этом же
          батче драйверов.
  fix:
    en:
      - "Roll back the GPU driver to AMD Adrenalin 26.3.1 WHQL via DDU. Download 26.3.1 from amd.com (Previous Drivers → RX 9070 XT → 26.3.1 WHQL). Download DDU (Display Driver Uninstaller). Boot Windows into Safe Mode. Run DDU → 'Clean and Restart'. Install 26.3.1. Reboot. Launch Bannerlord → Main Menu → Build Shader Cache once more — this time the sack rebuilds with a working compiler. This is the highest-success fix per community reports on multiple games."
      - "If you cannot roll back right now: in AMD Adrenalin, turn OFF HYPR-RX, AMD Anti-Lag, AFMF / AFMF 2, Radeon Boost, Image Sharpening for Bannerlord's profile. Also turn OFF AMD FreeSync if you are on a 144 Hz / variable-refresh-rate monitor — that is one of the known 26.5.x regressions."
      - "If you are on Adrenalin 26.5.1 specifically: update to 26.5.2 — AMD fixed several of the 26.5.1 regressions there. Note that the client whose crash this rule was modelled on was already on 26.5.2 and STILL crashed; 26.3.1 is the safer rollback target."
      - "Wait for Adrenalin 26.5.3 / 26.6 — AMD ships 1-2 driver releases per month. Subscribe to the AMD release-notes RSS."
      - "Long term: upgrade to Windows 11. Windows 10 22H2 was end-of-life on 2025-10-14 and AMD prioritises QA for the newest cards on Windows 11. Not the immediate cause of this crash, but the underlying reason driver regressions land harder on this hardware combination."
    zh:
      - "通过 DDU 把显卡驱动回滚到 AMD Adrenalin 26.3.1 WHQL。从 amd.com 下载 26.3.1（Previous Drivers → RX 9070 XT → 26.3.1 WHQL）。下载 DDU（Display Driver Uninstaller）。把 Windows 启动进安全模式。运行 DDU → 'Clean and Restart'。安装 26.3.1。重启。启动 Bannerlord → 主菜单 → 再次 'Build Shader Cache'——这次 sack 会用一个能正常工作的编译器重建。按多款游戏的社区反馈，这是成功率最高的修复方法。"
      - "如果现在无法回滚：在 AMD Adrenalin 中，为 Bannerlord 的配置关闭 HYPR-RX、AMD Anti-Lag、AFMF / AFMF 2、Radeon Boost、Image Sharpening。如果你用的是 144 Hz / 可变刷新率显示器，也关闭 AMD FreeSync——这是已知的 26.5.x 回归问题之一。"
      - "如果你正好用的是 Adrenalin 26.5.1：更新到 26.5.2——AMD 在那里修复了部分 26.5.1 的回归问题。注意：本规则所依据的那位玩家当时已经是 26.5.2，仍然崩溃；26.3.1 是更安全的回滚目标。"
      - "等待 Adrenalin 26.5.3 / 26.6——AMD 每月发布 1-2 个驱动版本。订阅 AMD 发行说明的 RSS。"
      - "长期来看：升级到 Windows 11。Windows 10 22H2 已于 2025-10-14 终止支持，而 AMD 优先在 Windows 11 上为最新显卡做质量测试。这不是本次崩溃的直接原因，但正因如此，驱动回归问题在这套硬件组合上影响更大。"
    tr:
      - "Ekran kartı sürücüsünü DDU ile AMD Adrenalin 26.3.1 WHQL'ye geri alın. 26.3.1'i amd.com'dan indirin (Previous Drivers → RX 9070 XT → 26.3.1 WHQL). DDU (Display Driver Uninstaller) indirin. Windows'u Güvenli Mod'a alın. DDU → 'Clean and Restart' çalıştırın. 26.3.1 kurun. Yeniden başlatın. Bannerlord → ana menü → bir kez daha 'Build Shader Cache' — bu sefer sack çalışan bir derleyiciyle yeniden oluşur. Birçok oyundaki topluluk raporlarına göre en yüksek başarılı düzeltme budur."
      - "Şu an geri alamıyorsanız: AMD Adrenalin'de Bannerlord profili için HYPR-RX, AMD Anti-Lag, AFMF / AFMF 2, Radeon Boost, Image Sharpening'i KAPATIN. 144 Hz / değişken yenileme hızlı bir monitördeyseniz AMD FreeSync'i de KAPATIN — bu, bilinen 26.5.x gerilemelerinden biridir."
      - "Tam olarak Adrenalin 26.5.1 kullanıyorsanız: 26.5.2'ye güncelleyin — AMD orada 26.5.1 gerilemelerinin birkaçını düzeltti. Not: bu kuralın modellendiği oyuncu zaten 26.5.2'deydi ve YİNE çöktü; 26.3.1 daha güvenli bir geri alma hedefidir."
      - "Adrenalin 26.5.3 / 26.6'yı bekleyin — AMD ayda 1-2 sürücü yayınlar. AMD sürüm notları RSS'ine abone olun."
      - "Uzun vadede: Windows 11'e yükseltin. Windows 10 22H2, 2025-10-14'te destek sonuna geldi ve AMD en yeni kartlar için kalite testlerine Windows 11'de öncelik veriyor. Bu çökmenin doğrudan nedeni değil ama sürücü gerilemelerinin bu donanım kombinasyonunda daha sert vurmasının altta yatan nedeni."
    ru:
      - "Откатить драйвер видеокарты на AMD Adrenalin 26.3.1 WHQL через DDU. Скачать 26.3.1 с amd.com (Previous Drivers → RX 9070 XT → 26.3.1 WHQL). Скачать DDU (Display Driver Uninstaller). Загрузить Windows в безопасном режиме. Запустить DDU → «Clean and Restart». Установить 26.3.1. Перезагрузка. Запустить Bannerlord → главное меню → «Build Shader Cache» ещё раз — на этот раз sack соберётся с рабочим компилятором. Это самый надёжный фикс по репортам сообщества по нескольким играм."
      - "Если откатить прямо сейчас не получается: в AMD Adrenalin выключить HYPR-RX, AMD Anti-Lag, AFMF / AFMF 2, Radeon Boost, Image Sharpening в профиле Bannerlord. Также выключить AMD FreeSync, если монитор 144 Гц / с переменной частотой — это одна из known issues 26.5.x по официальным release notes."
      - "Если стоит именно Adrenalin 26.5.1: обновись на 26.5.2 — AMD починила там часть регрессий 26.5.1. Учти, что у игрока, по чьему крашу это правило сделано, стоял уже 26.5.2 и краш всё равно был; 26.3.1 — более безопасная цель."
      - "Подождать Adrenalin 26.5.3 / 26.6 — AMD выпускает 1-2 драйвера в месяц. Подписаться на RSS release notes AMD."
      - "Долгосрочно — обновиться до Windows 11. Windows 10 22H2 вышла из поддержки 14 октября 2025, а AMD приоритизирует QA новых карт под Windows 11. Это не прямая причина краша, но именно поэтому регрессии драйверов на этом железе бьют сильнее."
  match:
    all:
      - log_line:
          contains: "Missing shader from sack: pbr_terrain"
          count_at_least: "30"
      - system:
          field: active_gpu_name
          regex: "Radeon\\s+RX\\s+9[0-9]{3}"
      - system:
          field: active_gpu_driver_newer_than
          newer_than: "2026-03-01"
      # If many compile_shader entries are present, the driver compiler is
      # healthy — this is not the driver-regression case; don't tell the
      # player to roll back a driver they already rolled back.
      - none:
          - log_line:
              contains: "compile_shader: $BASE/Shaders/Sources/pbr_terrain"
              count_at_least: "100"

- id: gpu.shader_sack_corrupted
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "Real client crash 2026-05-20 — TOR + LoreHardcore + CrashDoctor on RX 9070 XT. Log shows rglShader_manager::read_compressed_shader_cache_package at startup (cache was read), but later Bake Terrain triggers Missing shader from sack: pbr_terrain × 60+ in a single frame and the game falls into access violation 0xC0000005. The user reported that 'Build Shader Cache' was run multiple times without effect. The shipped sack file is being read but does not contain the requested shader entries — i.e. the sack itself is corrupt or incomplete, not the user-built cache."
  requires_sources: [log_line, watchdog_log]
  title:
    en: "Shader sack file is corrupt — rebuild does not help, files must be re-downloaded"
    ru: "Sack-файл шейдеров повреждён — пересборка не помогает, нужно скачать файлы заново"
    zh: "着色器 sack 文件已损坏 — 重建无效，必须重新下载文件"
    tr: "Gölgelendirici sack dosyası bozuk — yeniden oluşturma yardımcı olmaz, dosyalar yeniden indirilmeli"
  description:
    en: |
      The save loads, the campaign map opens, but the moment a terrain tile
      has to be drawn the engine asks for the `pbr_terrain` family of shaders
      and gets nothing. Tens of "Missing shader from sack: pbr_terrain" lines
      fire in a single frame and the game falls into a native access violation
      in D3D11.

      Crucially, the log shows `read_compressed_shader_cache_package` at
      startup — that means the shader cache package WAS opened successfully.
      The package is present, the engine can read it, but the shader entries
      inside it are missing. This is NOT a cache-build problem. Running 'Build
      Shader Cache' again regenerates the user cache from the shipped sack
      files — if those source sack files themselves are corrupt or incomplete,
      no number of cache rebuilds will fix it.

      Typical reasons: Steam download was interrupted or partially deleted by
      antivirus, a Workshop mod that ships its own shader pack got corrupted,
      or a brand-new GPU driver fails to compile a specific TOR terrain
      shader permutation and stores the failure in the sack.
    zh: |
      存档能加载，战役地图能打开，但一旦需要绘制地形图块，引擎就会请求
      `pbr_terrain` 系列着色器，却什么都拿不到。一帧之内出现几十行
      "Missing shader from sack: pbr_terrain"，游戏随即在 D3D11 中陷入
      原生 access violation。

      关键在于：日志在启动时显示了 `read_compressed_shader_cache_package`——
      这说明着色器缓存包确实被成功打开了。包存在，引擎能读取它，但里面缺少
      相应的着色器条目。这不是缓存构建问题。再次运行 'Build Shader Cache' 只是
      从随游戏附带的 sack 文件重新生成用户缓存——如果这些源 sack 文件本身就
      损坏或不完整，再怎么重建缓存也修不好。

      常见原因：Steam 下载被中断或被杀毒软件删掉了一部分、某个自带着色器包的
      Workshop 模组在下载时损坏，或一个全新的显卡驱动无法编译某个特定的 TOR
      地形着色器排列，并把这次失败存进了 sack。
    tr: |
      Kayıt yükleniyor, sefer haritası açılıyor ama bir arazi karosu çizilmesi
      gerektiği anda motor `pbr_terrain` gölgelendirici ailesini istiyor ve
      hiçbir şey alamıyor. Tek bir karede onlarca "Missing shader from sack:
      pbr_terrain" satırı oluşuyor ve oyun D3D11'de yerel bir access violation'a
      düşüyor.

      Önemlisi, günlük başlangıçta `read_compressed_shader_cache_package`
      gösteriyor — yani gölgelendirici önbellek paketi başarıyla AÇILDI. Paket
      mevcut, motor onu okuyabiliyor ama içindeki gölgelendirici girdileri eksik.
      Bu bir önbellek oluşturma sorunu DEĞİL. 'Build Shader Cache'i tekrar
      çalıştırmak, kullanıcı önbelleğini oyunla gelen sack dosyalarından yeniden
      üretir — bu kaynak sack dosyalarının kendisi bozuk ya da eksikse, hiçbir
      önbellek yeniden oluşturma bunu düzeltmez.

      Tipik nedenler: Steam indirmesi yarıda kesilmiş ya da antivirüs tarafından
      kısmen silinmiş, kendi gölgelendirici paketini getiren bir Workshop modu
      bozulmuş, ya da yepyeni bir ekran kartı sürücüsü belirli bir TOR arazi
      gölgelendirici permütasyonunu derleyemeyip bu hatayı sack'e kaydetmiş.
    ru: |
      Сейв грузится, карта кампании открывается, но как только нужно
      нарисовать тайл ландшафта — движок просит семейство шейдеров
      `pbr_terrain`, а в архиве пусто. В одном кадре десятки строк «Missing
      shader from sack: pbr_terrain», и игра падает с access violation в
      D3D11.

      Важная деталь: в логе есть строка `read_compressed_shader_cache_package`
      на старте — значит, sack-файл с кэшем шейдеров был успешно прочитан.
      Файл на месте, движок его читает, но самих записей нужных шейдеров
      внутри нет. Это НЕ проблема сборки кэша. «Build Shader Cache» собирает
      пользовательский кэш из исходных sack-файлов, поставляемых с игрой и
      модами — если повреждены сами эти исходники, никакая пересборка не
      поможет.

      Типичные причины: Steam недокачал/повредил файлы (или антивирус удалил
      кусок), мод из Workshop, который везёт свой собственный shader pack,
      повредился при скачивании, или свежий драйвер GPU не может скомпилить
      какую-то конкретную TOR-перестановку и сохранил факап в sack.
  fix:
    en:
      - "Steam → Bannerlord → Properties → Installed Files → Verify Integrity of Game Files. This is the primary fix — Steam re-downloads any sack files whose checksum doesn't match. After it finishes, launch the game and check whether the crash is gone. If not, do step 2."
      - "Unsubscribe and re-subscribe to TOR_Core, TOR_Environment, and TOR_Armory in the Steam Workshop one by one. Wait for each download to finish completely before re-subscribing the next one. Workshop content sometimes downloads partially and Steam silently leaves the half-downloaded files in place."
      - "Only AFTER Steam Verify + Workshop re-subscribe: Main menu → 'Build Shader Cache' once more. Wait 10–50 minutes WITHOUT Alt+Tab. This is verification, not the actual fix."
      - "Brand-new GPU (RTX 50-series, RX 9000-series): consider rolling back to the previous WHQL driver via DDU in Safe Mode. The newest drivers occasionally fail to compile specific TOR shader permutations and the failure gets cached in the sack."
      - "Last resort if nothing else helps: completely uninstall Bannerlord through Steam, manually delete the leftover game folder, reinstall. This forces every byte to be re-downloaded fresh."
    zh:
      - "Steam → Bannerlord → 属性 → 已安装文件 → 验证游戏文件完整性。这是首要修复方法——Steam 会重新下载校验和不匹配的 sack 文件。完成后启动游戏，看崩溃是否消失。若仍存在，进行第 2 步。"
      - "在 Steam Workshop 中逐个对 TOR_Core、TOR_Environment、TOR_Armory 取消订阅再重新订阅。重新订阅下一个之前，先等当前这个完全下载完成。Workshop 内容有时只下载了一部分，而 Steam 会悄悄把这些半成品文件留在原处。"
      - "只有在完成 Steam 验证 + Workshop 重新订阅之后：主菜单 → 再次 'Build Shader Cache'。等待 10–50 分钟，期间不要按 Alt+Tab。这是验证步骤，不是真正的修复。"
      - "全新显卡（RTX 50 系列、RX 9000 系列）：考虑在安全模式下用 DDU 回滚到上一版 WHQL 驱动。最新驱动偶尔会无法编译某些特定的 TOR 着色器排列，而这次失败被缓存进了 sack。"
      - "如果一切都没用的最后手段：通过 Steam 彻底卸载 Bannerlord，手动删除残留的游戏文件夹，再重新安装。这会强制重新下载每一个字节。"
    tr:
      - "Steam → Bannerlord → Özellikler → Yüklü Dosyalar → Oyun Dosyalarının Bütünlüğünü Doğrula. Birincil düzeltme budur — Steam, sağlama toplamı uyuşmayan sack dosyalarını yeniden indirir. Bitince oyunu başlatın ve çökmenin geçip geçmediğine bakın. Geçmediyse 2. adıma geçin."
      - "Steam Workshop'ta TOR_Core, TOR_Environment ve TOR_Armory aboneliğinizi tek tek kaldırıp yeniden abone olun. Bir sonrakine yeniden abone olmadan önce her indirmenin tamamen bitmesini bekleyin. Workshop içeriği bazen kısmen iner ve Steam yarım inmiş dosyaları sessizce yerinde bırakır."
      - "Yalnızca Steam Doğrulama + Workshop yeniden abonelik SONRASINDA: ana menü → bir kez daha 'Build Shader Cache'. Alt+Tab YAPMADAN 10–50 dakika bekleyin. Bu bir doğrulamadır, asıl düzeltme değil."
      - "Yepyeni ekran kartı (RTX 50 serisi, RX 9000 serisi): Güvenli Mod'da DDU ile bir önceki WHQL sürücüye geri dönmeyi düşünün. En yeni sürücüler bazen belirli TOR gölgelendirici permütasyonlarını derleyemez ve hata sack'e önbelleklenir."
      - "Hiçbir şey işe yaramazsa son çare: Bannerlord'u Steam üzerinden tamamen kaldırın, kalan oyun klasörünü elle silin, yeniden yükleyin. Bu, her baytın yeniden indirilmesini zorlar."
    ru:
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность. Это главный фикс — Steam перекачает sack-файлы, у которых не сходится контрольная сумма. После завершения запусти игру и проверь, ушёл ли краш. Если нет — переходи к шагу 2."
      - "В Steam Workshop отпишись и подпишись заново на TOR_Core, TOR_Environment и TOR_Armory по одному. Дождись, пока каждый мод полностью докачается, прежде чем подписываться на следующий. Workshop иногда докачивает контент частично и Steam молча оставляет обрезки лежать."
      - "Только ПОСЛЕ Steam Verify и переподписки на TOR: главное меню → «Build Shader Cache» ещё раз. Подожди 10–50 минут БЕЗ Alt+Tab. Это контрольная проверка, не сам фикс."
      - "Свежее железо (RTX 50-серия, RX 9000-серия): попробуй откатить драйвер видеокарты на предыдущий WHQL через DDU в Safe Mode. Самые новые драйверы иногда не могут скомпилить отдельные TOR-перестановки шейдеров, и провал кэшируется в sack."
      - "Последняя мера, если ничего не сработало: полностью удали Bannerlord через Steam, удали остаточную папку игры вручную, переустанови. Это заставит Steam перекачать каждый байт заново."
  match:
    all:
      # Anchor on an actual access-violation crash. Without this, the rule
      # fires on any session whose log happens to contain 30+ Missing-shader
      # lines (a normal artifact of first TOR map load), even when the crash
      # is unrelated (e.g. a managed bug elsewhere). 0xC0000005 keeps the
      # rule scoped to the native AV pattern this is meant to diagnose.
      - exception:
          code_equals: "0xC0000005"
      - log_line:
          contains: "Missing shader from sack: pbr_terrain"
          count_at_least: "30"
      - log_line:
          contains: "read_compressed_shader_cache_package"
      # Suppress when the driver compiler is busy (many compile_shader
      # entries) — that signature means the sack is incomplete but NOT
      # corrupt, and Steam Verify will not fix it.
      - none:
          - log_line:
              contains: "compile_shader: $BASE/Shaders/Sources/pbr_terrain"
              count_at_least: "100"

- id: gpu.shader_cache_corrupt
  category: gpu
  severity: warning
  confidence: high
  evidence_source: "https://forums.taleworlds.com/threads/missing-shader-from-sack.444678/"
  requires_sources: [log_line]
  title:
    en: "Shader cache appears to be corrupt or unavailable"
    ru: "Кэш шейдеров повреждён или недоступен"
    zh: "着色器缓存似乎已损坏或不可用"
    tr: "Gölgelendirici önbelleği bozuk ya da kullanılamıyor görünüyor"
  description:
    en: |
      What the shader cache is: a precompiled archive of every visual effect Bannerlord
      uses (lighting, particles, terrain, character skin, weather...). The game compiles
      it once on the first run for your specific GPU + driver combo and then reuses it.
      Without a valid cache the engine has to compile shaders on the fly while loading
      a battle — that is what causes the long freeze followed by a crash.

      The log here shows hundreds of "Missing shader from sack" messages, which means
      the cache is either broken, the GPU driver does not support the shader pipeline,
      or the disk had write errors during installation.

      Important: do NOT disable the Windows page file. Compiling TOR shaders peaks at
      30+ GB of committed memory; with a disabled or tiny page file Windows runs out of
      commit and crashes the game on the very next battle load. The fix is the opposite —
      raise the page file, not turn it off.
    zh: |
      着色器缓存是什么：它是 Bannerlord 用到的所有视觉效果（光照、粒子、地形、
      角色皮肤、天气……）的预编译归档。游戏会在首次运行时针对你这套具体的
      显卡 + 驱动组合编译一次，之后反复复用。没有有效的缓存，引擎就得在加载战斗时
      临时编译着色器——这正是导致长时间卡顿随后崩溃的原因。

      这里的日志显示了数百条 "Missing shader from sack" 消息，这意味着缓存要么
      损坏了，要么显卡驱动不支持该着色器管线，要么在安装时磁盘出现了写入错误。

      重要：不要禁用 Windows 页面文件。编译 TOR 着色器的已提交内存峰值超过 30 GB；
      若页面文件被禁用或太小，Windows 会耗尽提交内存，并在下一次加载战斗时让游戏
      崩溃。正确的做法恰恰相反——增大页面文件，而不是关闭它。
    tr: |
      Gölgelendirici önbelleği nedir: Bannerlord'un kullandığı her görsel efektin
      (ışıklandırma, parçacıklar, arazi, karakter teni, hava durumu...) önceden
      derlenmiş arşividir. Oyun bunu ilk çalıştırmada sizin belirli ekran kartı +
      sürücü kombinasyonunuz için bir kez derler ve sonra yeniden kullanır. Geçerli
      bir önbellek olmadan motor, bir savaşı yüklerken gölgelendiricileri anında
      derlemek zorunda kalır — uzun donma ve ardından çökmeye yol açan budur.

      Buradaki günlük yüzlerce "Missing shader from sack" mesajı gösteriyor; bu,
      önbelleğin bozuk olduğu, ekran kartı sürücüsünün gölgelendirici hattını
      desteklemediği ya da kurulum sırasında diskte yazma hataları olduğu anlamına gelir.

      Önemli: Windows sayfa dosyasını DEVRE DIŞI BIRAKMAYIN. TOR gölgelendiricilerini
      derlemek 30+ GB taahhüt edilen belleğe çıkar; devre dışı ya da küçük bir sayfa
      dosyasıyla Windows taahhütü tükenir ve bir sonraki savaş yüklemesinde oyunu
      çökertir. Çözüm tam tersi — sayfa dosyasını kapatmak değil, büyütmektir.
    ru: |
      Что такое кэш шейдеров: предкомпилированный архив всех визуальных эффектов
      Bannerlord (свет, частицы, ландшафт, кожа персонажа, погода…). Игра компилирует
      его один раз при первом запуске под твою связку GPU + драйвер и потом
      переиспользует. Без валидного кэша движку приходится компилировать шейдеры
      на лету при загрузке битвы — именно поэтому долгий «зависший» loading
      заканчивается крашем.

      В логе сотни сообщений «Missing shader from sack» — кэш либо сломан, либо
      драйвер не тянет нужный pipeline, либо при установке игры/мода были ошибки
      записи на диск.

      ВАЖНО: НЕ ОТКЛЮЧАЙ файл подкачки. Компиляция шейдеров TOR требует пиково 30+ ГБ
      committed-памяти; при выключенном или маленьком файле подкачки Windows исчерпает
      commit и игра упадёт ровно при загрузке следующей битвы. Фикс ровно
      противоположный — увеличить файл подкачки, а не выключать.
  fix:
    en:
      - "Open Crash Doctor → System tune-up → 'Increase pagefile' (sets it to 40 / 60 GB) — required for TOR."
      - "Open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache' (sends old cache to Recycle Bin)."
      - "Launch the game and pick 'Build Shader Cache' from the main menu — it takes 10–60 minutes; do not interrupt."
      - "Steam → Bannerlord → Properties → Installed Files → Verify integrity of game files."
      - "Update the GPU driver."
      - "If you already disabled the page file, turn it back on (Custom 40000–60000 MB on C:) before doing anything else."
      - "Last resort: in-game Options → Graphics → Shader Quality = Low, then save and restart."
    zh:
      - "打开 Crash Doctor → 系统调优 → '增大页面文件'（设为 40 / 60 GB）——TOR 必需。"
      - "打开 Crash Doctor → 系统调优 → '清理着色器缓存'（把旧缓存放进回收站）。"
      - "启动游戏，在主菜单选择 'Build Shader Cache'——需要 10–60 分钟，不要中断。"
      - "Steam → Bannerlord → 属性 → 已安装文件 → 验证游戏文件完整性。"
      - "更新显卡驱动程序。"
      - "如果你已经禁用了页面文件，在做其他任何操作之前先把它打开（在 C: 盘自定义 40000–60000 MB）。"
      - "最后手段：游戏内 Options → Graphics → Shader Quality = Low，然后保存并重启。"
    tr:
      - "Crash Doctor → Sistem ayarı → 'Sayfa dosyasını büyüt' açın (40 / 60 GB ayarlar) — TOR için gerekli."
      - "Crash Doctor → Sistem ayarı → 'gölgelendirici önbelleğini temizle' açın (eski önbelleği Geri Dönüşüm Kutusu'na gönderir)."
      - "Oyunu başlatın ve ana menüden 'Build Shader Cache' seçin — 10–60 dakika sürer; kesmeyin."
      - "Steam → Bannerlord → Özellikler → Yüklü Dosyalar → Oyun dosyalarının bütünlüğünü doğrula."
      - "Ekran kartı sürücüsünü güncelleyin."
      - "Sayfa dosyasını zaten devre dışı bıraktıysanız, başka bir şey yapmadan önce geri açın (C: üzerinde Özel 40000–60000 MB)."
      - "Son çare: oyun içinde Options → Graphics → Shader Quality = Low, sonra kaydedip yeniden başlatın."
    ru:
      - "Открой Crash Doctor → Настройка системы → «Увеличить файл подкачки» (ставит 40 / 60 ГБ) — обязательно для TOR."
      - "Открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord» (старый кэш уезжает в Корзину)."
      - "Запусти игру и в главном меню нажми «Build Shader Cache» — займёт 10–60 минут, не прерывай процесс."
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность."
      - "Обновить драйвер видеокарты."
      - "Если ты уже отключил файл подкачки — ВЕРНИ его (Особый размер 40000–60000 МБ на C:) перед всем остальным."
      - "В крайнем случае: Опции → Графика → Качество шейдеров = Low, сохрани и перезапусти."
  match:
    all:
      - log_line:
          contains: "Missing shader"
          count_at_least: "100"

- id: gpu.dxgi_device_removed
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "https://learn.microsoft.com/en-us/windows/win32/direct3ddxgi/dxgi-error — plus real client crash 2026-05-25 (RTX 4070, TOR+LoreHardcore): engine popup 'd3d_device_context_->Map at rglGPU_device::lock_texture Failed! GPU instance suspended, use GetDeviceRemovedReason' fired during Bake Terrain on a heavy scene. Same DEVICE_REMOVED family, just surfaced as a lock_texture/Map failure with no DXGI string in the log — the popup text is the only evidence, so we match its wording too."
  requires_sources: [log_line]
  title:
    en: "DXGI_ERROR_DEVICE_REMOVED — GPU lost"
    ru: "DXGI_ERROR_DEVICE_REMOVED — GPU отвалился"
    zh: "DXGI_ERROR_DEVICE_REMOVED — 显卡丢失"
    tr: "DXGI_ERROR_DEVICE_REMOVED — ekran kartı kayboldu"
  description:
    en: |
      The graphics card stopped responding to Windows. Usually caused by
      driver crash, GPU overheat, or unstable overclock.
    ru: |
      Видеокарта перестала отвечать Windows. Обычно — краш драйвера, перегрев
      GPU или нестабильный разгон.
    zh: |
      显卡停止响应 Windows。通常由驱动程序崩溃、显卡过热或不稳定的超频引起。
    tr: |
      Ekran kartı Windows'a yanıt vermeyi bıraktı. Genellikle sürücü çökmesi,
      ekran kartının aşırı ısınması ya da kararsız hız aşırtma nedeniyledir.
  fix:
    en:
      - "In-game: lower Texture/Shadow Quality to Medium."
      - "Disable any GPU overclock (MSI Afterburner, AMD Wattman)."
      - "Clean reinstall of GPU driver via DDU + freshly downloaded driver."
      - "Check GPU temps with HWInfo64 — > 85°C means cleaning/repaste needed."
    ru:
      - "В игре: понизь Texture/Shadow Quality до Medium."
      - "Отключи разгон GPU (MSI Afterburner, AMD Wattman) если есть."
      - "Чистая переустановка драйвера через DDU + свежий драйвер с сайта."
      - "Проверь температуру GPU через HWInfo64 — >85°C значит надо чистить/менять термопасту."
    zh:
      - "游戏内：把 Texture/Shadow Quality 降到 Medium。"
      - "关闭任何显卡超频（MSI Afterburner、AMD Wattman）。"
      - "用 DDU 干净卸载显卡驱动 + 重新下载的驱动程序进行重装。"
      - "用 HWInfo64 检查显卡温度——超过 85°C 说明需要清灰/更换硅脂。"
    tr:
      - "Oyun içinde: Texture/Shadow Quality değerini Medium yapın."
      - "Tüm ekran kartı hız aşırtmalarını kapatın (MSI Afterburner, AMD Wattman)."
      - "DDU ile temiz sürücü kaldırma + yeni indirilmiş sürücüyle yeniden kurulum."
      - "HWInfo64 ile ekran kartı sıcaklıklarını kontrol edin — 85°C üzeri temizlik/macun değişimi gerektiğini gösterir."
  match:
    any:
      - log_line:
          contains: "DXGI_ERROR_DEVICE_REMOVED"
      - log_line:
          contains: "DEVICE_REMOVED"
      - log_line:
          regex: "0x887A0005|0x887A0020"
      # Engine popup wording for the same device-removed condition. These strings
      # never appear in a healthy session, so each is a safe standalone anchor.
      - log_line:
          contains: "GetDeviceRemovedReason"
      - log_line:
          contains: "lock_texture Failed"

