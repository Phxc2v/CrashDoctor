- id: gpu.amd_integrated_default
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "https://docs.bannerlordmodding.com/integrated-gpu-issues"
  requires_sources: [crash_tag, engine_config]
  title:
    en: "Game is rendering on the integrated AMD GPU"
    ru: "Игра рендерится на встроенной AMD-видеокарте"
  description:
    en: |
      Bannerlord launched on the integrated AMD Radeon GPU instead of the
      discrete card detected on this machine. The integrated GPU has very
      little dedicated VRAM and is the most likely cause of the crash.
    ru: |
      Bannerlord запустился на встроенной видеокарте AMD Radeon вместо
      дискретной, которая есть в этой машине. У встроенной мало видеопамяти —
      почти наверняка из-за этого и был краш.
  fix:
    en:
      - "In-game: Options → Graphics → first tab → Graphics Adapter → choose the discrete GPU."
      - "If the option is missing: open Documents/Mount and Blade II Bannerlord/engine_config.txt and change graphics_adapter from 0 to 1."
      - "Windows fallback: Settings → System → Display → Graphics → add Bannerlord.exe → High performance."
      - "Update both AMD and the discrete GPU drivers."
    ru:
      - "В игре: Опции → Графика → первая вкладка → Графический адаптер → выбрать дискретную видеокарту."
      - "Если такой опции нет: в Documents/Mount and Blade II Bannerlord/engine_config.txt поменять graphics_adapter с 0 на 1."
      - "Через Windows: Параметры → Система → Дисплей → Графика → добавить Bannerlord.exe → Высокая производительность."
      - "Обновить драйвер AMD и драйвер дискретной видеокарты."
  match:
    all:
      - engine_config:
          key: graphics_adapter
          equals: "0"
      - crash_tag:
          path: "Display Devices 0/Card name"
          contains: "Radeon"
      - any:
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "NVIDIA"
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "Radeon RX"

- id: gpu.shader_compile_x3004_tbn
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "BL-001/002 catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "Shader compile error X3004 — undeclared identifier '_TBN'"
    ru: "Ошибка компиляции шейдера X3004 — неопределённый '_TBN'"
  description:
    en: |
      The HLSL compiler rejected particle_shading.rsh (or similar .rs/.rsh) with
      X3004 'undeclared identifier _TBN'. Triggered by an ancient/corrupt shader
      cache after a Bannerlord update — the compiled cache was built against a
      different shader source. Common after BL 1.4–1.5, 1.7–1.8, or any major
      patch where TaleWorlds renamed a varying.
    ru: |
      HLSL-компилятор отклонил particle_shading.rsh (или похожий .rs/.rsh) с
      X3004 'undeclared identifier _TBN'. Триггер — древний/сломанный кэш
      шейдеров после апдейта Bannerlord: скомпилированный кэш собран против
      другой версии исходников. Часто после BL 1.4–1.5, 1.7–1.8 или любого
      крупного патча где TaleWorlds переименовали varying.
  fix:
    en:
      - "Open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache'."
      - "Steam → Bannerlord → Properties → Installed Files → Verify integrity."
      - "Launch the game and pick 'Build Shader Cache' from main menu — wait it out."
      - "If on AMD: NVIDIA Shader Cache settings don't apply, but lower in-game Shader Quality to Medium."
      - "If on NVIDIA: NVIDIA Control Panel → Manage 3D settings → Shader Cache Size = Unlimited."
    ru:
      - "Открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord»."
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность."
      - "Запусти игру и нажми «Build Shader Cache» в главном меню — дождись завершения."
      - "На AMD: настройки NVIDIA Shader Cache не применимы, но в игре понизь Shader Quality до Medium."
      - "На NVIDIA: NVIDIA Control Panel → Manage 3D settings → Shader Cache Size = Unlimited."
  match:
    any:
      - log_line:
          contains: "X3004"
      - log_line:
          contains: "undeclared identifier '_TBN'"
      - log_line:
          contains: "Error compiling shader file"

- id: gpu.create_shader_resource_view_fail
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "TOR-007 catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "D3D11 CreateShaderResourceView failed — tessellation overflow on TOR"
    ru: "D3D11 CreateShaderResourceView упал — переполнение тесселяции в TOR"
  description:
    en: |
      rglGPU_device::create_gpu_buffer hit CreateShaderResourceView fail, GPU
      device suspended, often DXGI_ERROR_DEVICE_REMOVED right after. Known TOR
      pattern: tessellation + scene buffer overflow on heavy locations
      (Bretonnian villages, Mousillon tavern). The driver kills the device.
    ru: |
      rglGPU_device::create_gpu_buffer наткнулся на падение CreateShaderResourceView,
      GPU device suspended, часто следом DXGI_ERROR_DEVICE_REMOVED. Известный
      TOR-паттерн: переполнение буфера сцены при тесселяции на тяжёлых локациях
      (бретонские деревни, таверна Мусийона). Драйвер убивает device.
  fix:
    en:
      - "Documents/Mount and Blade II Bannerlord/engine_config.txt → set tesselation = 0."
      - "In-game: Options → Graphics → Terrain Quality = Medium, Static Shadows ON."
      - "Open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache'."
      - "Update GPU driver to latest WHQL."
    ru:
      - "Documents/Mount and Blade II Bannerlord/engine_config.txt → tesselation = 0."
      - "В игре: Опции → Графика → Terrain Quality на Medium, Static Shadows ВКЛ."
      - "Открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord»."
      - "Обнови драйвер GPU до последней WHQL."
  match:
    any:
      - log_line:
          contains: "CreateShaderResourceView failed"
      - log_line:
          contains: "create_gpu_buffer"

- id: gpu.terrain_shader_cache_missing
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "Real client crash 2026-05-10 — save loads, MapScreen opens, hideout_place location enters → 'Bake Terrain' triggers shader load → 'Missing shader from sack: pbr_terrain' ×30+ in a single Bake → access violation 0xC0000005 in D3D11. This branch fires when the shipped shader cache package was never read (no read_compressed_shader_cache_package line in the log) — i.e. the user never ran 'Build Shader Cache' or ran it on a different GPU."
  requires_sources: [log_line]
  title:
    en: "Shader cache was never built — game crashes when entering a location"
    ru: "Кэш шейдеров не собирался — падает при входе в локацию"
  description:
    en: |
      The save loads, the campaign map opens, but the moment a terrain tile
      has to be drawn the engine asks for the `pbr_terrain` family of shaders
      and gets nothing. Tens of "Missing shader from sack: pbr_terrain" lines
      fire in a single frame and the game falls into a native access violation
      in D3D11.

      We did NOT see `read_compressed_shader_cache_package` anywhere in the
      log, which means the shipped shader cache package was not opened at
      startup. The most common reason is that 'Build Shader Cache' has never
      been run on this machine (or was run on a different GPU, e.g. integrated
      Intel UHD on a laptop), or the build was interrupted by an Alt+Tab
      during compilation.
    ru: |
      Сейв грузится, карта кампании открывается, но как только нужно
      нарисовать тайл ландшафта — движок просит семейство шейдеров
      `pbr_terrain`, а в архиве пусто. В одном кадре десятки строк «Missing
      shader from sack: pbr_terrain», и игра падает с access violation в
      D3D11.

      В логе НЕ видно строки `read_compressed_shader_cache_package` — значит,
      собранный кэш шейдеров вообще не открывался при старте. Самая частая
      причина: «Build Shader Cache» никогда не запускался на этой машине (или
      запускался на другой видеокарте — например, встроенной Intel UHD на
      ноутбуке), либо сборку прервали Alt+Tab'ом во время компиляции.
  fix:
    en:
      - "Main menu of Bannerlord → 'Build Shader Cache'. Wait 10–50 minutes WITHOUT Alt+Tab — switching to a browser during compilation corrupts the cache and you have to start over."
      - "Laptop with two GPUs: NVIDIA Control Panel → Manage 3D Settings → Program Settings → Bannerlord.exe → Preferred GPU = 'High-performance NVIDIA processor'. AMD: Radeon Settings → Bannerlord.exe → Graphics → 'High Performance'. Then rebuild the cache once on the correct adapter."
      - "If the page file is disabled: turn it back on (Custom 40000–60000 MB on C:) before rebuilding — TOR shader compilation peaks at ~30 GB committed memory and a tiny page file kills the build."
      - "If 'Build Shader Cache' still does not help: delete C:\\ProgramData\\Mount and Blade II Bannerlord\\Shaders\\ entirely, plus every Modules\\<mod>\\Shaders\\D3D11\\compressed_shaders_cache.sack file you can find. Then 'Build Shader Cache' again."
    ru:
      - "Главное меню Bannerlord → «Build Shader Cache». Подожди 10–50 минут БЕЗ Alt+Tab — сворачивание в браузер во время компиляции ломает кэш, придётся начинать заново."
      - "Ноутбук с двумя видеокартами: NVIDIA Control Panel → Управление параметрами 3D → Программные настройки → Bannerlord.exe → Предпочитаемая видеокарта = «Высокопроизводительный процессор NVIDIA». На AMD: Radeon Settings → Bannerlord.exe → Графика → «Высокая производительность». После этого собери кэш заново на правильном адаптере."
      - "Если файл подкачки отключён — включи его (Особый размер 40000–60000 МБ на C:) ДО сборки кэша. Компиляция шейдеров TOR требует ~30 ГБ committed-памяти, на отключённом или маленьком файле подкачки сборка не дойдёт до конца."
      - "Если «Build Shader Cache» всё равно не помог: удали папку C:\\ProgramData\\Mount and Blade II Bannerlord\\Shaders\\ целиком, плюс файлы Modules\\<имя_мода>\\Shaders\\D3D11\\compressed_shaders_cache.sack у каждого мода. Потом снова «Build Shader Cache»."
  match:
    all:
      - log_line:
          contains: "Missing shader from sack: pbr_terrain"
          count_at_least: "30"
      - none:
          - log_line:
              contains: "read_compressed_shader_cache_package"

- id: gpu.amd_rdna4_driver_regression
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "Real client crash 2026-05-20 — RX 9070 XT on AMD Adrenalin 26.5.2 (driver build 32.0.31007.5012, dated 2026-05-12). Game falls into 0xC0000005 inside D3D11 with 60+ 'Missing shader from sack: pbr_terrain' lines in a single frame after Bake Terrain. Reinstalling the game twice did not help; Build Shader Cache did not help. AMD's own 26.5.x release notes list multiple unresolved D3D rendering regressions on RX 9000 series (God of War corruption, RoadCraft crashes, Satisfactory corruption, multi-monitor FreeSync crashes). The same shader-compiler family is what builds Bannerlord's terrain shaders, and the failure mode lands as missing pbr_terrain entries in the sack."
  requires_sources: [log_line, crash_tag]
  title:
    en: "AMD RX 9000-series driver regression (RDNA 4) — terrain shaders broken"
    ru: "Регрессия драйвера AMD на RX 9000-серии (RDNA 4) — шейдеры ландшафта не собираются"
  description:
    en: |
      The crash signature is the late-game terrain rendering failure
      ("Missing shader from sack: pbr_terrain" × 30+ → 0xC0000005 in
      D3D11), but the root cause here is the GPU driver, not the game.

      The active GPU is a Radeon RX 9000-series card (RDNA 4) running a
      driver dated 2026-03-01 or later. AMD's Adrenalin 26.5.x release
      notes explicitly list multiple unresolved D3D rendering regressions
      on RX 9000-series products: corruption in God of War, intermittent
      application crashes / driver timeouts in RoadCraft, corruption in
      Satisfactory, and intermittent system crashes with multi-monitor
      AMD FreeSync. The same shader compiler path inside the driver is
      what builds Bannerlord's terrain shaders into the sack at runtime,
      and on RDNA 4 with these drivers a subset of TOR's pbr_terrain
      permutations either fails to compile or stores broken results.

      Symptoms that distinguish this from generic sack corruption:
        - Reinstalling Bannerlord did not help (game files are fine).
        - 'Build Shader Cache' did not help, even after multiple tries.
        - 'Missing shader from sack: pbr_terrain' specifically — broken
          driver path is most reliable on the terrain shader family.
        - Other recent reports across unrelated games (Crimson Desert,
          Warzone, VEIN, Bannerlord itself) show RX 9000-series users
          getting driver timeouts / D3D access violations on the same
          batch of drivers.
    ru: |
      По симптомам это поздний краш на отрисовке ландшафта (десятки
      строк «Missing shader from sack: pbr_terrain» → 0xC0000005 в
      D3D11), но корень проблемы здесь — драйвер видеокарты, не игра.

      Активная видеокарта — Radeon из серии RX 9000 (архитектура
      RDNA 4) с драйвером от 2026-03-01 или новее. В release notes
      AMD к Adrenalin 26.5.x официально перечислены нерешённые
      регрессии рендера на RX 9000: артефакты в God of War,
      периодические креши и driver-таймауты в RoadCraft, артефакты
      в Satisfactory, краши при нескольких high-res мониторах с
      AMD FreeSync. Тот же шейдерный компилятор драйвера собирает
      sack-шейдеры Bannerlord на лету, и на RDNA 4 с этими
      драйверами часть TOR-перестановок pbr_terrain либо не
      компилируется, либо ложится в кэш битой.

      Что отличает этот случай от обычного «битый sack»:
        - Переустановка Bannerlord не помогла (файлы игры целы).
        - «Build Shader Cache» не помог, даже после нескольких
          попыток подряд.
        - «Missing shader from sack: pbr_terrain» именно по терреину —
          у драйвера сбой стабильнее всего на этом семействе
          шейдеров.
        - Свежие репорты на не-Bannerlord-играх (Crimson Desert,
          Warzone, VEIN) с RX 9000 показывают тот же класс падений
          (driver timeout / D3D access violation) на этом же
          батче драйверов.
  fix:
    en:
      - "Roll back the GPU driver to AMD Adrenalin 26.3.1 WHQL via DDU. Download 26.3.1 from amd.com (Previous Drivers → RX 9070 XT → 26.3.1 WHQL). Download DDU (Display Driver Uninstaller). Boot Windows into Safe Mode. Run DDU → 'Clean and Restart'. Install 26.3.1. Reboot. Launch Bannerlord → Main Menu → Build Shader Cache once more — this time the sack rebuilds with a working compiler. This is the highest-success fix per community reports on multiple games."
      - "If you cannot roll back right now: in AMD Adrenalin, turn OFF HYPR-RX, AMD Anti-Lag, AFMF / AFMF 2, Radeon Boost, Image Sharpening for Bannerlord's profile. Also turn OFF AMD FreeSync if you are on a 144 Hz / variable-refresh-rate monitor — that is one of the known 26.5.x regressions."
      - "If you are on Adrenalin 26.5.1 specifically: update to 26.5.2 — AMD fixed several of the 26.5.1 regressions there. Note that the client whose crash this rule was modelled on was already on 26.5.2 and STILL crashed; 26.3.1 is the safer rollback target."
      - "Wait for Adrenalin 26.5.3 / 26.6 — AMD ships 1-2 driver releases per month. Subscribe to the AMD release-notes RSS."
      - "Long term: upgrade to Windows 11. Windows 10 22H2 was end-of-life on 2025-10-14 and AMD prioritises QA for the newest cards on Windows 11. Not the immediate cause of this crash, but the underlying reason driver regressions land harder on this hardware combination."
    ru:
      - "Откатить драйвер видеокарты на AMD Adrenalin 26.3.1 WHQL через DDU. Скачать 26.3.1 с amd.com (Previous Drivers → RX 9070 XT → 26.3.1 WHQL). Скачать DDU (Display Driver Uninstaller). Загрузить Windows в безопасном режиме. Запустить DDU → «Clean and Restart». Установить 26.3.1. Перезагрузка. Запустить Bannerlord → главное меню → «Build Shader Cache» ещё раз — на этот раз sack соберётся с рабочим компилятором. Это самый надёжный фикс по репортам сообщества по нескольким играм."
      - "Если откатить прямо сейчас не получается: в AMD Adrenalin выключить HYPR-RX, AMD Anti-Lag, AFMF / AFMF 2, Radeon Boost, Image Sharpening в профиле Bannerlord. Также выключить AMD FreeSync, если монитор 144 Гц / с переменной частотой — это одна из known issues 26.5.x по официальным release notes."
      - "Если стоит именно Adrenalin 26.5.1: обновись на 26.5.2 — AMD починила там часть регрессий 26.5.1. Учти, что у игрока, по чьему крашу это правило сделано, стоял уже 26.5.2 и краш всё равно был; 26.3.1 — более безопасная цель."
      - "Подождать Adrenalin 26.5.3 / 26.6 — AMD выпускает 1-2 драйвера в месяц. Подписаться на RSS release notes AMD."
      - "Долгосрочно — обновиться до Windows 11. Windows 10 22H2 вышла из поддержки 14 октября 2025, а AMD приоритизирует QA новых карт под Windows 11. Это не прямая причина краша, но именно поэтому регрессии драйверов на этом железе бьют сильнее."
  match:
    all:
      - log_line:
          contains: "Missing shader from sack: pbr_terrain"
          count_at_least: "30"
      - system:
          field: active_gpu_name
          regex: "Radeon\\s+RX\\s+9[0-9]{3}"
      - system:
          field: active_gpu_driver_newer_than
          newer_than: "2026-03-01"

- id: gpu.shader_sack_corrupted
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "Real client crash 2026-05-20 — TOR + LoreHardcore + CrashDoctor on RX 9070 XT. Log shows rglShader_manager::read_compressed_shader_cache_package at startup (cache was read), but later Bake Terrain triggers Missing shader from sack: pbr_terrain × 60+ in a single frame and the game falls into access violation 0xC0000005. The user reported that 'Build Shader Cache' was run multiple times without effect. The shipped sack file is being read but does not contain the requested shader entries — i.e. the sack itself is corrupt or incomplete, not the user-built cache."
  requires_sources: [log_line]
  title:
    en: "Shader sack file is corrupt — rebuild does not help, files must be re-downloaded"
    ru: "Sack-файл шейдеров повреждён — пересборка не помогает, нужно скачать файлы заново"
  description:
    en: |
      The save loads, the campaign map opens, but the moment a terrain tile
      has to be drawn the engine asks for the `pbr_terrain` family of shaders
      and gets nothing. Tens of "Missing shader from sack: pbr_terrain" lines
      fire in a single frame and the game falls into a native access violation
      in D3D11.

      Crucially, the log shows `read_compressed_shader_cache_package` at
      startup — that means the shader cache package WAS opened successfully.
      The package is present, the engine can read it, but the shader entries
      inside it are missing. This is NOT a cache-build problem. Running 'Build
      Shader Cache' again regenerates the user cache from the shipped sack
      files — if those source sack files themselves are corrupt or incomplete,
      no number of cache rebuilds will fix it.

      Typical reasons: Steam download was interrupted or partially deleted by
      antivirus, a Workshop mod that ships its own shader pack got corrupted,
      or a brand-new GPU driver fails to compile a specific TOR terrain
      shader permutation and stores the failure in the sack.
    ru: |
      Сейв грузится, карта кампании открывается, но как только нужно
      нарисовать тайл ландшафта — движок просит семейство шейдеров
      `pbr_terrain`, а в архиве пусто. В одном кадре десятки строк «Missing
      shader from sack: pbr_terrain», и игра падает с access violation в
      D3D11.

      Важная деталь: в логе есть строка `read_compressed_shader_cache_package`
      на старте — значит, sack-файл с кэшем шейдеров был успешно прочитан.
      Файл на месте, движок его читает, но самих записей нужных шейдеров
      внутри нет. Это НЕ проблема сборки кэша. «Build Shader Cache» собирает
      пользовательский кэш из исходных sack-файлов, поставляемых с игрой и
      модами — если повреждены сами эти исходники, никакая пересборка не
      поможет.

      Типичные причины: Steam недокачал/повредил файлы (или антивирус удалил
      кусок), мод из Workshop, который везёт свой собственный shader pack,
      повредился при скачивании, или свежий драйвер GPU не может скомпилить
      какую-то конкретную TOR-перестановку и сохранил факап в sack.
  fix:
    en:
      - "Steam → Bannerlord → Properties → Installed Files → Verify Integrity of Game Files. This is the primary fix — Steam re-downloads any sack files whose checksum doesn't match. After it finishes, launch the game and check whether the crash is gone. If not, do step 2."
      - "Unsubscribe and re-subscribe to TOR_Core, TOR_Environment, and TOR_Armory in the Steam Workshop one by one. Wait for each download to finish completely before re-subscribing the next one. Workshop content sometimes downloads partially and Steam silently leaves the half-downloaded files in place."
      - "Only AFTER Steam Verify + Workshop re-subscribe: Main menu → 'Build Shader Cache' once more. Wait 10–50 minutes WITHOUT Alt+Tab. This is verification, not the actual fix."
      - "Brand-new GPU (RTX 50-series, RX 9000-series): consider rolling back to the previous WHQL driver via DDU in Safe Mode. The newest drivers occasionally fail to compile specific TOR shader permutations and the failure gets cached in the sack."
      - "Last resort if nothing else helps: completely uninstall Bannerlord through Steam, manually delete the leftover game folder, reinstall. This forces every byte to be re-downloaded fresh."
    ru:
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность. Это главный фикс — Steam перекачает sack-файлы, у которых не сходится контрольная сумма. После завершения запусти игру и проверь, ушёл ли краш. Если нет — переходи к шагу 2."
      - "В Steam Workshop отпишись и подпишись заново на TOR_Core, TOR_Environment и TOR_Armory по одному. Дождись, пока каждый мод полностью докачается, прежде чем подписываться на следующий. Workshop иногда докачивает контент частично и Steam молча оставляет обрезки лежать."
      - "Только ПОСЛЕ Steam Verify и переподписки на TOR: главное меню → «Build Shader Cache» ещё раз. Подожди 10–50 минут БЕЗ Alt+Tab. Это контрольная проверка, не сам фикс."
