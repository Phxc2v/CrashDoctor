    en: |
      The crash_tags Runtime/GPU Crash flag is set AND App Run Time is over
      3 hours. This pairing is the signature of a driver descriptor-pool leak:
      Bannerlord's DX11 renderer keeps allocating texture-array, shader-resource,
      and constant-buffer handles; on certain driver versions (notably NVIDIA
      Blackwell early 566.x–570.x and AMD RDNA 4 Adrenalin previews) those
      handles are never returned to the pool. After 3–10 hours the pool is
      exhausted and the next CreateTexture2D / CreateShaderResourceView returns
      E_INVALIDARG, killing the game.

      This is NOT a TOR-specific bug, NOT a hardware fault, and NOT something
      lowering graphics will fix on its own — the leak rate is independent of
      quality settings. The proven mitigation is to break long sessions:
      quit to desktop (not just to main menu) every 2–3 hours, then relaunch.
      The descriptor pool resets on full process exit.
    ru: |
      В crash_tags стоит флаг Runtime/GPU Crash И App Run Time больше 3 часов.
      Эта связка — подпись утечки пула дескрипторов в драйвере: DX11-рендерер
      Bannerlord постоянно выделяет texture-array, shader-resource и
      constant-buffer хэндлы; на некоторых версиях драйверов (NVIDIA Blackwell
      ранние 566.x–570.x, AMD RDNA 4 Adrenalin preview) эти хэндлы не
      возвращаются в пул. Через 3–10 часов пул исчерпан и следующий
      CreateTexture2D / CreateShaderResourceView возвращает E_INVALIDARG —
      игра падает.

      Это НЕ баг TOR, НЕ аппаратная неисправность, и снижение графики само по
      себе НЕ лечит — скорость утечки не зависит от качества. Рабочая
      профилактика — дробить длинные сессии: каждые 2–3 часа выходи на
      рабочий стол (не в главное меню), потом запускай заново. Пул
      дескрипторов сбрасывается только при полном выходе из процесса.
  fix:
    en:
      - "Right now: relaunch the game; the descriptor pool is fresh after a process restart, so the next session will run normally for ~3 more hours."
      - "Habit: every 2–3 hours of play — Save → Quit to Desktop → wait 30 sec → launch again. NOT 'main menu → Continue' (that doesn't reset the pool, the process is the same)."
      - "Update the GPU driver to the latest WHQL straight from the NVIDIA / AMD website (Windows Update is months behind). NVIDIA Blackwell 580.x+ and AMD Adrenalin 25.4+ are the first releases with the leak partially patched."
      - "If you're already on the latest driver and still leaking: NVIDIA Control Panel → 3D Settings → Bannerlord.exe → Power management = Prefer maximum performance, Shader Cache Size = Unlimited, OFF Image Sharpening / DLSS Frame Generation. AMD Adrenalin → Bannerlord.exe profile → OFF AFMF, Anti-Lag, HYPR-RX, Radeon Boost."
      - "Keep an eye on Task Manager → Performance → GPU → Dedicated GPU memory while playing. If usage is climbing 50–100 MB / 10 min and never drops in main menu — that's the leak; restart cycle is the only fix until your GPU vendor patches it."
      - "Lower Texture Quality to Medium if you can't restart often (smaller textures = fewer handles consumed per minute, buys you longer sessions)."
    ru:
      - "Прямо сейчас: перезапусти игру — после рестарта процесса пул дескрипторов чистый, следующая сессия пройдёт нормально ещё ~3 часа."
      - "Привычка: каждые 2–3 часа игры — Сохранить → Выйти на рабочий стол → подожди 30 сек → запусти заново. НЕ «главное меню → Continue» (это не сбрасывает пул, процесс тот же)."
      - "Обнови драйвер GPU до последней WHQL прямо с сайта NVIDIA / AMD (Windows Update отстаёт на месяцы). NVIDIA Blackwell 580.x+ и AMD Adrenalin 25.4+ — первые релизы где утечка частично починена."
      - "Если уже на последнем драйвере и всё равно течёт: NVIDIA Control Panel → 3D Settings → Bannerlord.exe → Power management = Prefer maximum performance, Shader Cache Size = Unlimited, ВЫКЛ Image Sharpening / DLSS Frame Generation. AMD Adrenalin → профиль Bannerlord.exe → ВЫКЛ AFMF, Anti-Lag, HYPR-RX, Radeon Boost."
      - "Следи в Task Manager → Performance → GPU → Dedicated GPU memory во время игры. Если прибавляет 50–100 МБ за каждые 10 мин и не сбрасывается в главном меню — это та самая утечка; цикл рестартов — единственный фикс, пока вендор GPU не починит."
      - "Понизь Texture Quality до Medium если не получается часто рестартовать (меньше текстур = меньше хэндлов в минуту = сессия длиннее)."
  match:
    all:
      - crash_tag:
          path: "Runtime/GPU Crash"
          equals: "1"
      - crash_tag:
          path: "Runtime/App Run Time"
          numeric_gt: "10800"
