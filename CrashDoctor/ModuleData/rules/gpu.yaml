- id: gpu.amd_integrated_default
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "https://docs.bannerlordmodding.com/integrated-gpu-issues"
  requires_sources: [crash_tag, engine_config]
  title:
    en: "Game is rendering on the integrated AMD GPU"
    ru: "Игра рендерится на встроенной AMD-видеокарте"
  description:
    en: |
      Bannerlord launched on the integrated AMD Radeon GPU instead of the
      discrete card detected on this machine. The integrated GPU has very
      little dedicated VRAM and is the most likely cause of the crash.
    ru: |
      Bannerlord запустился на встроенной видеокарте AMD Radeon вместо
      дискретной, которая есть в этой машине. У встроенной мало видеопамяти —
      почти наверняка из-за этого и был краш.
  fix:
    en:
      - "In-game: Options → Graphics → first tab → Graphics Adapter → choose the discrete GPU."
      - "If the option is missing: open Documents/Mount and Blade II Bannerlord/engine_config.txt and change graphics_adapter from 0 to 1."
      - "Windows fallback: Settings → System → Display → Graphics → add Bannerlord.exe → High performance."
      - "Update both AMD and the discrete GPU drivers."
    ru:
      - "В игре: Опции → Графика → первая вкладка → Графический адаптер → выбрать дискретную видеокарту."
      - "Если такой опции нет: в Documents/Mount and Blade II Bannerlord/engine_config.txt поменять graphics_adapter с 0 на 1."
      - "Через Windows: Параметры → Система → Дисплей → Графика → добавить Bannerlord.exe → Высокая производительность."
      - "Обновить драйвер AMD и драйвер дискретной видеокарты."
  match:
    all:
      - engine_config:
          key: graphics_adapter
          equals: "0"
      - crash_tag:
          path: "Display Devices 0/Card name"
          contains: "Radeon"
      - any:
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "NVIDIA"
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "Radeon RX"

- id: gpu.shader_cache_corrupt
  category: gpu
  severity: warning
  confidence: high
  evidence_source: "https://forums.taleworlds.com/threads/missing-shader-from-sack.444678/"
  requires_sources: [log_line]
  title:
    en: "Shader cache appears to be corrupt or unavailable"
    ru: "Кэш шейдеров повреждён или недоступен"
  description:
    en: |
      What the shader cache is: a precompiled archive of every visual effect Bannerlord
      uses (lighting, particles, terrain, character skin, weather...). The game compiles
      it once on the first run for your specific GPU + driver combo and then reuses it.
      Without a valid cache the engine has to compile shaders on the fly while loading
      a battle — that is what causes the long freeze followed by a crash.

      The log here shows hundreds of "Missing shader from sack" messages, which means
      the cache is either broken, the GPU driver does not support the shader pipeline,
      or the disk had write errors during installation.

      Important: do NOT disable the Windows page file. Compiling TOR shaders peaks at
      30+ GB of committed memory; with a disabled or tiny page file Windows runs out of
      commit and crashes the game on the very next battle load. The fix is the opposite —
      raise the page file, not turn it off.
    ru: |
      Что такое кэш шейдеров: предкомпилированный архив всех визуальных эффектов
      Bannerlord (свет, частицы, ландшафт, кожа персонажа, погода…). Игра компилирует
      его один раз при первом запуске под твою связку GPU + драйвер и потом
      переиспользует. Без валидного кэша движку приходится компилировать шейдеры
      на лету при загрузке битвы — именно поэтому долгий «зависший» loading
      заканчивается крашем.

      В логе сотни сообщений «Missing shader from sack» — кэш либо сломан, либо
      драйвер не тянет нужный pipeline, либо при установке игры/мода были ошибки
      записи на диск.

      ВАЖНО: НЕ ОТКЛЮЧАЙ файл подкачки. Компиляция шейдеров TOR требует пиково 30+ ГБ
      committed-памяти; при выключенном или маленьком файле подкачки Windows исчерпает
      commit и игра упадёт ровно при загрузке следующей битвы. Фикс ровно
      противоположный — увеличить файл подкачки, а не выключать.
  fix:
    en:
      - "Open Crash Doctor → System tune-up → 'Increase pagefile' (sets it to 40 / 60 GB) — required for TOR."
      - "Open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache' (sends old cache to Recycle Bin)."
      - "Launch the game and pick 'Build Shader Cache' from the main menu — it takes 10–60 minutes; do not interrupt."
      - "Steam → Bannerlord → Properties → Installed Files → Verify integrity of game files."
      - "Update the GPU driver."
      - "If you already disabled the page file, turn it back on (Custom 40000–60000 MB on C:) before doing anything else."
      - "Last resort: in-game Options → Graphics → Shader Quality = Low, then save and restart."
    ru:
      - "Открой Crash Doctor → Настройка системы → «Увеличить файл подкачки» (ставит 40 / 60 ГБ) — обязательно для TOR."
      - "Открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord» (старый кэш уезжает в Корзину)."
      - "Запусти игру и в главном меню нажми «Build Shader Cache» — займёт 10–60 минут, не прерывай процесс."
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность."
      - "Обновить драйвер видеокарты."
      - "Если ты уже отключил файл подкачки — ВЕРНИ его (Особый размер 40000–60000 МБ на C:) перед всем остальным."
      - "В крайнем случае: Опции → Графика → Качество шейдеров = Low, сохрани и перезапусти."
  match:
    all:
      - log_line:
          contains: "Missing shader"
          count_at_least: "100"

- id: gpu.dxgi_device_removed
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "https://learn.microsoft.com/en-us/windows/win32/direct3ddxgi/dxgi-error"
  requires_sources: [log_line]
  title:
    en: "DXGI_ERROR_DEVICE_REMOVED — GPU lost"
    ru: "DXGI_ERROR_DEVICE_REMOVED — GPU отвалился"
  description:
    en: |
      The graphics card stopped responding to Windows. Usually caused by
      driver crash, GPU overheat, or unstable overclock.
    ru: |
      Видеокарта перестала отвечать Windows. Обычно — краш драйвера, перегрев
      GPU или нестабильный разгон.
  fix:
    en:
      - "In-game: lower Texture/Shadow Quality to Medium."
      - "Disable any GPU overclock (MSI Afterburner, AMD Wattman)."
      - "Clean reinstall of GPU driver via DDU + freshly downloaded driver."
      - "Check GPU temps with HWInfo64 — > 85°C means cleaning/repaste needed."
    ru:
      - "В игре: понизь Texture/Shadow Quality до Medium."
      - "Отключи разгон GPU (MSI Afterburner, AMD Wattman) если есть."
      - "Чистая переустановка драйвера через DDU + свежий драйвер с сайта."
      - "Проверь температуру GPU через HWInfo64 — >85°C значит надо чистить/менять термопасту."
  match:
    any:
      - log_line:
          contains: "DXGI_ERROR_DEVICE_REMOVED"
      - log_line:
          contains: "DEVICE_REMOVED"
      - log_line:
          regex: "0x887A0005|0x887A0020"

- id: gpu.device_hung_siege
  category: gpu
  severity: critical
  confidence: medium
  evidence_source: "https://forums.taleworlds.com/threads/device-hung-on-siege.452119/"
  requires_sources: [log_line]
  title:
    en: "GPU hang on big siege battle"
    ru: "GPU подвис на крупной осаде"
  description:
    en: |
      Device hung 0x887A0006 fires on busy scenes (sieges, large field battles).
      The GPU exceeded the timeout detection limit because of too many draw calls.
    ru: |
      Device hung 0x887A0006 возникает на нагруженных сценах (осады, большие
      полевые битвы). GPU не уложился в TDR (timeout detection) из-за лавины
      draw call'ов.
  fix:
    en:
      - "In-game: lower Battle Size in Options → Game (try 200, then 100)."
      - "Lower Texture/Shadow/PostFX one notch each."
      - "If you have a 60Hz monitor, cap framerate to 60 (Options → Graphics)."
      - "Update GPU driver."
    ru:
      - "В игре: понизь Battle Size в Опции → Игра (попробуй 200, потом 100)."
      - "Понизь Texture/Shadow/PostFX на ступень."
      - "Если монитор 60 Гц — ограничь FPS до 60 (Опции → Графика)."
      - "Обнови драйвер GPU."
  match:
    all:
      - log_line:
          contains: "0x887A0006"

- id: gpu.shader_compile_oom
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "https://steamcommunity.com/workshop/filedetails/discussion/3025574678/800093831719686553/"
  requires_sources: [log_line]
  title:
    en: "Shader compilation runs out of memory (TOR pbr_metallic / horse / faceshader)"
    ru: "Не хватает памяти при компиляции шейдеров TOR (pbr_metallic / horse / faceshader)"
  description:
    en: |
      The Direct3D shader compiler ran out of memory while building TOR's heaviest
      shaders (pbr_metallic.rs, horse.rs, faceshader_high.rs). Symptoms: cascading
      Windows error dialogs "Error compiling shader file ... out of memory during
      compilation" or "internal error: pdb append failed / debug info append failed,
      byte count too large". The game crashes after ~15 min of "Build Shader Cache".

      This is NOT the same as "system page file too small". The D3DCompiler has its
      own per-process address-space limits and chokes on TOR's complex shaders even
      when the page file is huge. The proven workaround is to delete BOTH shader caches
      (game + ProgramData), make sure terrain_quality is 2 or higher, free 50+ GB on
      the system drive, and update the GPU driver.
    ru: |
      Компилятор Direct3D исчерпал память при сборке самых тяжёлых шейдеров TOR
      (pbr_metallic.rs, horse.rs, faceshader_high.rs). Симптомы: каскад окошек
      Windows «Error compiling shader file ... out of memory during compilation»
      или «internal error: pdb append failed / debug info append failed, byte count
      too large». Игра падает после ~15 минут «Build Shader Cache».

      Это НЕ то же самое, что «маленький файл подкачки». У D3DCompiler свои лимиты
      адресного пространства, и он давится на сложных шейдерах TOR даже при
      огромном pagefile. Рабочий обходной путь: удалить ОБА кэша шейдеров
      (игровой + ProgramData), убедиться что terrain_quality ≥ 2, освободить
      50+ ГБ на системном диске и обновить драйвер GPU.
  fix:
    en:
      - "Crash Doctor → System tune-up → 'Clear Bannerlord shader cache' (deletes BOTH game/Shaders/D3D11/compressed_shaders_cache.sack AND C:\ProgramData\Mount and Blade II Bannerlord\Shaders)."
      - "Crash Doctor → System tune-up → if engine_config card appears, apply it (sets terrain_quality to 2 — required, lower values cause this exact crash on TOR)."
      - "Free at least 50 GB on C: (Disk Cleanup → Temporary files; Steam → Properties → Installed Files → Verify integrity)."
      - "Update the GPU driver to the latest WHQL (NVIDIA / AMD website, not Windows Update)."
      - "Unsubscribe from any OLD versions of TOR (e.g. Core, RoR, Music) in Steam Workshop and delete leftover folders in Modules/. Re-subscribe to the current ones only."
      - "Lower in-game Texture Quality to Medium before launching 'Build Shader Cache' the next time — TOR documents 32+ GB RAM peaks for High textures."
      - "Reboot once before relaunching so the page file is reset."
      - "Patience: 'Build Shader Cache' on TOR takes 10–50 minutes. Don't close the game, don't open Chrome / Discord during compilation."
    ru:
      - "Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord» (удаляет ОБА: game\Shaders\D3D11\compressed_shaders_cache.sack И C:\ProgramData\Mount and Blade II Bannerlord\Shaders)."
      - "Crash Doctor → Настройка системы → если появилась карточка про engine_config — применить (поднимает terrain_quality до 2 — обязательно, ниже даёт ровно этот краш на TOR)."
      - "Освободить минимум 50 ГБ на C: (Очистка диска → временные файлы; Steam → Свойства → Установленные файлы → Проверить целостность)."
      - "Обновить драйвер GPU до последней WHQL (с сайта NVIDIA / AMD, не через Windows Update)."
      - "Отписаться от СТАРЫХ версий TOR (Core, RoR, Music) в Steam Workshop и удалить оставшиеся папки в Modules/. Подписаться только на актуальные."
      - "В игре понизить Texture Quality до Medium перед следующим «Build Shader Cache» — TOR документирует пики 32+ ГБ ОЗУ на High."
      - "Перезагрузить ПК один раз перед перезапуском, чтобы page file сбросился."
      - "Терпение: «Build Shader Cache» в TOR идёт 10–50 минут. Не закрывай игру, не открывай Chrome / Discord на время компиляции."
  match:
    any:
      - log_line:
          contains: "out of memory during compilation"
      - log_line:
          contains: "pdb append failed"
      - log_line:
          contains: "debug info append failed"
