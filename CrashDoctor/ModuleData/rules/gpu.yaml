- id: gpu.amd_integrated_default
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "https://docs.bannerlordmodding.com/integrated-gpu-issues"
  requires_sources: [crash_tag, engine_config]
  title:
    en: "Game is rendering on the integrated AMD GPU"
    ru: "Игра рендерится на встроенной AMD-видеокарте"
  description:
    en: |
      Bannerlord launched on the integrated AMD Radeon GPU instead of the
      discrete card detected on this machine. The integrated GPU has very
      little dedicated VRAM and is the most likely cause of the crash.
    ru: |
      Bannerlord запустился на встроенной видеокарте AMD Radeon вместо
      дискретной, которая есть в этой машине. У встроенной мало видеопамяти —
      почти наверняка из-за этого и был краш.
  fix:
    en:
      - "In-game: Options → Graphics → first tab → Graphics Adapter → choose the discrete GPU."
      - "If the option is missing: open Documents/Mount and Blade II Bannerlord/engine_config.txt and change graphics_adapter from 0 to 1."
      - "Windows fallback: Settings → System → Display → Graphics → add Bannerlord.exe → High performance."
      - "Update both AMD and the discrete GPU drivers."
    ru:
      - "В игре: Опции → Графика → первая вкладка → Графический адаптер → выбрать дискретную видеокарту."
      - "Если такой опции нет: в Documents/Mount and Blade II Bannerlord/engine_config.txt поменять graphics_adapter с 0 на 1."
      - "Через Windows: Параметры → Система → Дисплей → Графика → добавить Bannerlord.exe → Высокая производительность."
      - "Обновить драйвер AMD и драйвер дискретной видеокарты."
  match:
    all:
      - engine_config:
          key: graphics_adapter
          equals: "0"
      - crash_tag:
          path: "Display Devices 0/Card name"
          contains: "Radeon"
      - any:
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "NVIDIA"
          - crash_tag:
              path: "Display Devices 1/Card name"
              contains: "Radeon RX"

- id: gpu.shader_compile_x3004_tbn
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "BL-001/002 catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "Shader compile error X3004 — undeclared identifier '_TBN'"
    ru: "Ошибка компиляции шейдера X3004 — неопределённый '_TBN'"
  description:
    en: |
      The HLSL compiler rejected particle_shading.rsh (or similar .rs/.rsh) with
      X3004 'undeclared identifier _TBN'. Triggered by an ancient/corrupt shader
      cache after a Bannerlord update — the compiled cache was built against a
      different shader source. Common after BL 1.4–1.5, 1.7–1.8, or any major
      patch where TaleWorlds renamed a varying.
    ru: |
      HLSL-компилятор отклонил particle_shading.rsh (или похожий .rs/.rsh) с
      X3004 'undeclared identifier _TBN'. Триггер — древний/сломанный кэш
      шейдеров после апдейта Bannerlord: скомпилированный кэш собран против
      другой версии исходников. Часто после BL 1.4–1.5, 1.7–1.8 или любого
      крупного патча где TaleWorlds переименовали varying.
  fix:
    en:
      - "Open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache'."
      - "Steam → Bannerlord → Properties → Installed Files → Verify integrity."
      - "Launch the game and pick 'Build Shader Cache' from main menu — wait it out."
      - "If on AMD: NVIDIA Shader Cache settings don't apply, but lower in-game Shader Quality to Medium."
      - "If on NVIDIA: NVIDIA Control Panel → Manage 3D settings → Shader Cache Size = Unlimited."
    ru:
      - "Открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord»."
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность."
      - "Запусти игру и нажми «Build Shader Cache» в главном меню — дождись завершения."
      - "На AMD: настройки NVIDIA Shader Cache не применимы, но в игре понизь Shader Quality до Medium."
      - "На NVIDIA: NVIDIA Control Panel → Manage 3D settings → Shader Cache Size = Unlimited."
  match:
    any:
      - log_line:
          contains: "X3004"
      - log_line:
          contains: "undeclared identifier '_TBN'"
      - log_line:
          contains: "Error compiling shader file"

- id: gpu.create_shader_resource_view_fail
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "TOR-007 catalog 2026-05-02"
  requires_sources: [log_line]
  title:
    en: "D3D11 CreateShaderResourceView failed — tessellation overflow on TOR"
    ru: "D3D11 CreateShaderResourceView упал — переполнение тесселяции в TOR"
  description:
    en: |
      rglGPU_device::create_gpu_buffer hit CreateShaderResourceView fail, GPU
      device suspended, often DXGI_ERROR_DEVICE_REMOVED right after. Known TOR
      pattern: tessellation + scene buffer overflow on heavy locations
      (Bretonnian villages, Mousillon tavern). The driver kills the device.
    ru: |
      rglGPU_device::create_gpu_buffer наткнулся на падение CreateShaderResourceView,
      GPU device suspended, часто следом DXGI_ERROR_DEVICE_REMOVED. Известный
      TOR-паттерн: переполнение буфера сцены при тесселяции на тяжёлых локациях
      (бретонские деревни, таверна Мусийона). Драйвер убивает device.
  fix:
    en:
      - "Documents/Mount and Blade II Bannerlord/engine_config.txt → set tesselation = 0."
      - "In-game: Options → Graphics → Terrain Quality = Medium, Static Shadows ON."
      - "Open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache'."
      - "Update GPU driver to latest WHQL."
    ru:
      - "Documents/Mount and Blade II Bannerlord/engine_config.txt → tesselation = 0."
      - "В игре: Опции → Графика → Terrain Quality на Medium, Static Shadows ВКЛ."
      - "Открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord»."
      - "Обнови драйвер GPU до последней WHQL."
  match:
    any:
      - log_line:
          contains: "CreateShaderResourceView failed"
      - log_line:
          contains: "create_gpu_buffer"

- id: gpu.shader_cache_corrupt
  category: gpu
  severity: warning
  confidence: high
  evidence_source: "https://forums.taleworlds.com/threads/missing-shader-from-sack.444678/"
  requires_sources: [log_line]
  title:
    en: "Shader cache appears to be corrupt or unavailable"
    ru: "Кэш шейдеров повреждён или недоступен"
  description:
    en: |
      What the shader cache is: a precompiled archive of every visual effect Bannerlord
      uses (lighting, particles, terrain, character skin, weather...). The game compiles
      it once on the first run for your specific GPU + driver combo and then reuses it.
      Without a valid cache the engine has to compile shaders on the fly while loading
      a battle — that is what causes the long freeze followed by a crash.

      The log here shows hundreds of "Missing shader from sack" messages, which means
      the cache is either broken, the GPU driver does not support the shader pipeline,
      or the disk had write errors during installation.

      Important: do NOT disable the Windows page file. Compiling TOR shaders peaks at
      30+ GB of committed memory; with a disabled or tiny page file Windows runs out of
      commit and crashes the game on the very next battle load. The fix is the opposite —
      raise the page file, not turn it off.
    ru: |
      Что такое кэш шейдеров: предкомпилированный архив всех визуальных эффектов
      Bannerlord (свет, частицы, ландшафт, кожа персонажа, погода…). Игра компилирует
      его один раз при первом запуске под твою связку GPU + драйвер и потом
      переиспользует. Без валидного кэша движку приходится компилировать шейдеры
      на лету при загрузке битвы — именно поэтому долгий «зависший» loading
      заканчивается крашем.

      В логе сотни сообщений «Missing shader from sack» — кэш либо сломан, либо
      драйвер не тянет нужный pipeline, либо при установке игры/мода были ошибки
      записи на диск.

      ВАЖНО: НЕ ОТКЛЮЧАЙ файл подкачки. Компиляция шейдеров TOR требует пиково 30+ ГБ
      committed-памяти; при выключенном или маленьком файле подкачки Windows исчерпает
      commit и игра упадёт ровно при загрузке следующей битвы. Фикс ровно
      противоположный — увеличить файл подкачки, а не выключать.
  fix:
    en:
      - "Open Crash Doctor → System tune-up → 'Increase pagefile' (sets it to 40 / 60 GB) — required for TOR."
      - "Open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache' (sends old cache to Recycle Bin)."
      - "Launch the game and pick 'Build Shader Cache' from the main menu — it takes 10–60 minutes; do not interrupt."
      - "Steam → Bannerlord → Properties → Installed Files → Verify integrity of game files."
      - "Update the GPU driver."
      - "If you already disabled the page file, turn it back on (Custom 40000–60000 MB on C:) before doing anything else."
      - "Last resort: in-game Options → Graphics → Shader Quality = Low, then save and restart."
    ru:
      - "Открой Crash Doctor → Настройка системы → «Увеличить файл подкачки» (ставит 40 / 60 ГБ) — обязательно для TOR."
      - "Открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord» (старый кэш уезжает в Корзину)."
      - "Запусти игру и в главном меню нажми «Build Shader Cache» — займёт 10–60 минут, не прерывай процесс."
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность."
      - "Обновить драйвер видеокарты."
      - "Если ты уже отключил файл подкачки — ВЕРНИ его (Особый размер 40000–60000 МБ на C:) перед всем остальным."
      - "В крайнем случае: Опции → Графика → Качество шейдеров = Low, сохрани и перезапусти."
  match:
    all:
      - log_line:
          contains: "Missing shader"
          count_at_least: "100"

- id: gpu.dxgi_device_removed
