- id: gpu.create_texture_array_invalidarg
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "https://learn.microsoft.com/en-us/windows/win32/api/d3d11/nf-d3d11-id3d11device-createtexture2d"
  requires_sources: [log_line]
  title:
    en: "D3D11 CreateTexture2D failed (E_INVALIDARG) — texture-array limit hit"
    ru: "D3D11 CreateTexture2D не сработал (E_INVALIDARG) — превышен лимит texture-array"
    zh: "D3D11 CreateTexture2D 失败（E_INVALIDARG）— 触及 texture-array 上限"
    tr: "D3D11 CreateTexture2D başarısız (E_INVALIDARG) — texture-array sınırına ulaşıldı"
  description:
    en: |
      The Bannerlord renderer (rglGPU_device::create_texture_array) called
      ID3D11Device::CreateTexture2D and got back E_INVALIDARG ("The parameter
      is incorrect" / "Параметр задан неверно"). This is NOT out of memory and
      NOT TDR — D3D11 rejected the texture-array descriptor itself.

      Most common trigger on TOR: an oversized Battle Size (BattleSizeResized
      mod) combined with TOR_Armory + custom troop mods produces a unit-material
      array that exceeds D3D11's hard limits — ArraySize > 2048, or a format /
      MipLevels combination the driver refuses. New AMD RDNA 4 cards (RX 9070,
      9070 XT) are stricter about these descriptors than older NVIDIA drivers,
      so the same setup that "worked" on a 30-series card crashes on a 9070 XT.

      Second common trigger: a VR runtime is running in the background. Oculus
      / Meta Quest Link (OVRServer_x64), SteamVR (vrcompositor / vrserver), and
      Windows Mixed Reality reserve 1.5–3 GB of VRAM for the headset compositor
      even when the headset is idle / not on your face. With TOR + a 1440p+
      desktop already eating most of the card, that reservation is enough to
      starve the texture-array allocation and make CreateTexture2D fail.

      Third common trigger: a NVIDIA Blackwell card (RTX 50-series — 5070 /
      5070 Ti / 5080 / 5090) after a long uninterrupted session (3+ hours).
      The Blackwell DX11 driver path leaks descriptor handles slowly; once the
      pool is exhausted, every subsequent texture-array allocation returns
      E_INVALIDARG. Symptoms match this exactly: app run time 9+ hours, no VR,
      discrete NVIDIA selected ("Selected graphics adapter: [1] NVIDIA GeForce
      RTX 50xx" in rgl_log), GPU Crash flag = 1 in crash_tags. Quitting to
      desktop and relaunching restores the descriptor pool — that is why
      "I haven't crashed since I restart every 2 hours" works on this hardware.

      Fourth — and the most common one on mid-range / older hardware: a 4 GB-class
      GPU (RTX 3050, GTX 1650) driving a 1440p desktop with the shader cache
      never built. Tell-tale sign in rgl_log: only a handful of
      read_compressed_shader_cache_package lines but THOUSANDS of live
      `compile_shader: pbr_terrain` lines — the engine is recompiling terrain
      shaders from scratch every launch instead of loading a prebuilt cache. On a
      VRAM-starved card the live-compile storm stacked on top of TOR's texture
      arrays tips CreateTexture2D past its limit a few minutes into the first
      scene load, so it looks like "crashes at startup, every time". An
      out-of-date GPU driver (a year or older) validates the descriptor more
      strictly and makes it worse.
    zh: |
      Bannerlord 渲染器（rglGPU_device::create_texture_array）调用了
      ID3D11Device::CreateTexture2D 并收到了 E_INVALIDARG（"参数不正确"）。
      这不是显存不足，也不是 TDR——而是 D3D11 拒绝了 texture-array 描述符本身。

      TOR 上最常见的触发原因：过大的 Battle Size（BattleSizeResized 模组）配合
      TOR_Armory + 自定义兵种模组，生成的单位材质数组超出了 D3D11 的硬性限制——
      ArraySize > 2048，或某个驱动拒绝的 格式 / MipLevels 组合。新的 AMD RDNA 4
      显卡（RX 9070、9070 XT）对这些描述符的检查比旧的 NVIDIA 驱动更严格，所以
      在 30 系显卡上"能用"的同一套配置，在 9070 XT 上会崩溃。

      第二个常见触发原因：后台运行着 VR 运行时。Oculus / Meta Quest Link
      (OVRServer_x64)、SteamVR (vrcompositor / vrserver) 和 Windows Mixed Reality
      会为头显合成器预留 1.5–3 GB VRAM，即使头显处于闲置 / 没戴在脸上。在 TOR +
      1440p 以上桌面已经占用了显卡大部分显存的情况下，这点预留就足以让 texture-array
      分配饿死，使 CreateTexture2D 失败。

      第三个常见触发原因：NVIDIA Blackwell 显卡（RTX 50 系列——5070 / 5070 Ti /
      5080 / 5090）在长时间不间断游戏（3 小时以上）之后。Blackwell 的 DX11 驱动
      路径会缓慢泄漏描述符句柄；一旦句柄池耗尽，之后每一次 texture-array 分配都会
      返回 E_INVALIDARG。症状完全吻合：应用运行时长 9 小时以上、无 VR、选中的是
      独立 NVIDIA 显卡（rgl_log 中 "Selected graphics adapter: [1] NVIDIA GeForce
      RTX 50xx"）、crash_tags 中 GPU Crash flag = 1。退出到桌面再重启即可恢复
      句柄池——这就是"我每 2 小时重启一次就不崩"在这套硬件上有效的原因。

      第四个——也是中端 / 老旧硬件上最常见的：一块 4 GB 级别的显卡
      (RTX 3050、GTX 1650) 驱动 1440p 桌面，而着色器缓存从未构建。rgl_log 中的
      明显特征：只有寥寥几行 read_compressed_shader_cache_package，却有
      成千上万行实时 `compile_shader: pbr_terrain`——引擎每次启动都在从头重新
      编译地形着色器，而不是加载预先构建好的缓存。在显存吃紧的显卡上，这场实时
      编译风暴叠加 TOR 的 texture-array，会在第一个场景加载开始几分钟后把
      CreateTexture2D 顶过上限，于是看起来像"每次都在启动时崩溃"。过时的显卡驱动
      （一年或更老）对描述符检查更严格，会让情况更糟。
    tr: |
      Bannerlord render motoru (rglGPU_device::create_texture_array),
      ID3D11Device::CreateTexture2D'i çağırdı ve E_INVALIDARG ("Parametre hatalı")
      döndü. Bu bellek yetersizliği DEĞİL ve TDR DEĞİL — D3D11, texture-array
      tanımlayıcısının kendisini reddetti.

      TOR'da en sık tetikleyici: aşırı büyük bir Battle Size (BattleSizeResized
      modu) ile TOR_Armory + özel birlik modları, D3D11'in sabit sınırlarını aşan
      bir birim malzeme dizisi üretir — ArraySize > 2048 ya da sürücünün reddettiği
      bir format / MipLevels kombinasyonu. Yeni AMD RDNA 4 kartları (RX 9070,
      9070 XT) bu tanımlayıcıları eski NVIDIA sürücülerinden daha katı denetler,
      bu yüzden 30 serisi kartta "çalışan" aynı kurulum 9070 XT'de çöker.

      İkinci sık tetikleyici: arka planda bir VR çalışma zamanı çalışıyor. Oculus /
      Meta Quest Link (OVRServer_x64), SteamVR (vrcompositor / vrserver) ve Windows
      Mixed Reality, başlık boştayken / yüzünüzde değilken bile başlık kompozitörü
      için 1.5–3 GB VRAM ayırır. TOR + 1440p ve üzeri bir masaüstü kartın çoğunu
      zaten yerken bu ayırma, texture-array ayırmasını aç bırakıp CreateTexture2D'i
      başarısız kılmaya yeter.

      Üçüncü sık tetikleyici: uzun ve kesintisiz bir oturumdan (3+ saat) sonra bir
      NVIDIA Blackwell kartı (RTX 50 serisi — 5070 / 5070 Ti / 5080 / 5090).
      Blackwell DX11 sürücü yolu, tanımlayıcı tutamaçlarını yavaşça sızdırır; havuz
      tükendiğinde sonraki her texture-array ayırması E_INVALIDARG döndürür.
      Belirtiler tam olarak buna uyar: uygulama çalışma süresi 9+ saat, VR yok,
      ayrık NVIDIA seçili (rgl_log'da "Selected graphics adapter: [1] NVIDIA GeForce
      RTX 50xx"), crash_tags'te GPU Crash flag = 1. Masaüstüne çıkıp yeniden
      başlatmak tanımlayıcı havuzunu geri yükler — "her 2 saatte bir yeniden
      başlatınca çökmüyorum" bu donanımda bu yüzden işe yarar.

      Dördüncü — ve orta seviye / eski donanımda en sık görüleni: 4 GB sınıfı bir
      kart (RTX 3050, GTX 1650) 1440p masaüstü çalıştırırken gölgelendirici
      önbelleği hiç oluşturulmamış. rgl_log'daki belirgin işaret: yalnızca birkaç
      read_compressed_shader_cache_package satırı ama BİNLERCE canlı
      `compile_shader: pbr_terrain` satırı — motor, önceden oluşturulmuş bir önbellek
      yüklemek yerine her açılışta arazi gölgelendiricilerini sıfırdan yeniden
      derliyor. VRAM'i kısıtlı bir kartta, TOR'un texture-array'lerinin üstüne binen
      bu canlı derleme fırtınası, ilk sahne yüklemesinin birkaç dakika içinde
      CreateTexture2D'i sınırın ötesine iter; bu yüzden "her seferinde açılışta
      çöküyor" gibi görünür. Eski bir ekran kartı sürücüsü (bir yıl ya da daha eski)
      tanımlayıcıyı daha katı denetler ve durumu kötüleştirir.
    ru: |
      Рендерер Bannerlord (rglGPU_device::create_texture_array) вызвал
      ID3D11Device::CreateTexture2D и получил E_INVALIDARG («Параметр задан
      неверно»). Это НЕ нехватка памяти и НЕ TDR — сам дескриптор
      texture-array отвергнут D3D11.

      Самая частая причина на TOR: задранный Battle Size (через мод
      BattleSizeResized) в связке с TOR_Armory и кастомными trooper-модами
      даёт массив материалов юнитов, который пробивает жёсткие лимиты D3D11 —
      ArraySize > 2048 или несовместимая комбинация формата / MipLevels.
      Новые карты AMD RDNA 4 (RX 9070, 9070 XT) проверяют дескрипторы строже,
      чем старые драйверы NVIDIA — то же самое сочетание, которое «работало»
      на 30-серии, падает на 9070 XT.

      Вторая частая причина: в фоне работает VR-runtime. Oculus / Meta Quest
      Link (OVRServer_x64), SteamVR (vrcompositor / vrserver), Windows Mixed
      Reality резервируют 1.5–3 ГБ VRAM под compositor шлема — даже если шлем
      в покое и не на голове. На TOR + 1440p+ десктопе, где карта уже под
      нагрузкой, этого резерва хватает чтобы съесть бюджет под texture-array
      и уронить CreateTexture2D.

      Третья частая причина: NVIDIA Blackwell (RTX 50-серия — 5070 / 5070 Ti /
      5080 / 5090) после длинной непрерывной сессии (3+ часа). DX11-драйвер
      Blackwell медленно течёт descriptor handles; когда пул исчерпан, каждое
      следующее выделение texture-array возвращает E_INVALIDARG. Симптомы
      совпадают: app run time 9+ часов, без VR, выбрана дискретка NVIDIA
      («Selected graphics adapter: [1] NVIDIA GeForce RTX 50xx» в rgl_log),
      GPU Crash flag = 1 в crash_tags. Выход на рабочий стол и перезапуск
      возвращают пул дескрипторов — поэтому «я не падаю, если рестартую
      каждые 2 часа» работает на этой железке.

      Четвёртая — и самая частая на средних / старых картах: видеокарта с 4 ГБ
      (RTX 3050, GTX 1650) на мониторе 1440p, когда кэш шейдеров так и не собран.
      Признак в rgl_log: всего несколько строк read_compressed_shader_cache_package,
      но ТЫСЯЧИ строк живой компиляции `compile_shader: pbr_terrain` — движок
      каждый запуск пересобирает терреновые шейдеры с нуля вместо загрузки
      готового кэша. На карте с дефицитом видеопамяти эта лавина компиляции
      поверх texture-array'ев TOR пробивает лимит CreateTexture2D через пару минут
      после начала прогрузки первой сцены — выглядит как «падает на старте, каждый
      раз». Устаревший драйвер (старше года) проверяет дескриптор строже и
      усугубляет.
  fix:
    en:
      - "FIRST, if rgl_log shows thousands of `compile_shader` lines and only a few `read_compressed_shader_cache_package` — your shader cache is not built. Open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache', REBOOT, launch the game, Main Menu → 'Build Shader Cache', wait 20–60 min. This removes the live-compile storm that triggers the crash on weak cards."
      - "On a 4 GB card (RTX 3050 / GTX 1650) at 1440p: drop the in-game resolution to 1920×1080 and Texture Quality to Low/Medium. 4 GB at 1440p in TOR is on the edge."
      - "Update the GPU driver to the latest (NVIDIA: GeForce Game Ready). A driver older than ~1 year validates D3D11 descriptors more strictly and is a frequent cause here."
      - "If you have a VR headset: fully close Oculus/Meta Quest Link AND SteamVR AND Windows Mixed Reality Portal before launching Bannerlord. Check Task Manager for OVRServer_x64.exe / vrcompositor.exe / vrserver.exe / MixedRealityPortal.exe — kill them. Disconnect the headset cable. They reserve 1.5–3 GB of VRAM each, even idle."
      - "Lower Battle Size first. If you use BattleSizeResized — try 200, then 128 (native cap). If a 200-vs-200 fight loads cleanly, you've confirmed the texture-array limit was the cause."
      - "If lowering Battle Size still crashes — temporarily disable troop/armor mods that add many unique materials (LoreHardcore, custom-troop overhauls). Re-enable one at a time."
      - "In-game: Options → Graphics → Texture Quality = Medium. Smaller textures shrink the array footprint."
      - "AMD Adrenalin: open the Bannerlord.exe profile and turn OFF AFMF, Anti-Lag/Anti-Lag+, HYPR-RX, Image Sharpening, Radeon Boost. The driver overlay can also corrupt texture descriptors — disable it (Alt+R)."
      - "If on a brand-new RDNA 4 card (RX 9070 / 9070 XT): try the previous WHQL Adrenalin instead of the latest one. Beta/Preview drivers regularly break old DX11 games."
      - "If on a brand-new NVIDIA Blackwell card (RTX 5070 / 5070 Ti / 5080 / 5090): break long sessions — quit to desktop and relaunch every 2–3 hours. The DX11 descriptor pool leak resets only on full process exit. NVIDIA Control Panel → Manage 3D settings → Bannerlord.exe → 'Shader Cache Size = 100 GB or Unlimited', 'Power management mode = Prefer maximum performance', turn OFF Image Sharpening / DLSS Frame Generation / Reflex (these add their own descriptors)."
      - "If on RTX 50-series: try the latest GeForce Game Ready (or Studio) driver — early Blackwell drivers (566.x / 570.x) are known to leak; updates 580.x+ behave better."
      - "Toggle the renderer: Bannerlord launcher → Options → Use DirectX 12 (or back to DX11). RDNA 4 is often more stable on DX12 path."
      - "AFTER changing any graphics setting (Texture Quality / Shader Quality / etc.): REBOOT the PC, open Crash Doctor → System tune-up → 'Clear Bannerlord shader cache', launch the game, Main Menu → 'Build Shader Cache' and wait 20–60 minutes. Skip any of these and the next launch crashes on the imperial-soldier splash."
      - "If nothing helps — file a screenshot of the error popup plus rgl_log_<PID>.txt + watchdog_log_<PID>.txt to the mod author."
    zh:
      - "首先，如果 rgl_log 显示有成千上万行 `compile_shader` 而只有寥寥几行 `read_compressed_shader_cache_package`——说明你的着色器缓存没有构建。打开 Crash Doctor → 系统调优 → '清理着色器缓存'，重启电脑，启动游戏，主菜单 → 'Build Shader Cache'，等待 20–60 分钟。这会消除导致弱显卡崩溃的实时编译风暴。"
      - "在 4 GB 显卡（RTX 3050 / GTX 1650）上跑 1440p：把游戏内分辨率降到 1920×1080，把 Texture Quality 降到 Low/Medium。4 GB 在 TOR 1440p 下已经到极限了。"
      - "把显卡驱动更新到最新版（NVIDIA：GeForce Game Ready）。超过约 1 年的驱动对 D3D11 描述符检查更严格，是这里常见的原因。"
      - "如果你有 VR 头显：启动 Bannerlord 之前，彻底关闭 Oculus/Meta Quest Link、SteamVR 以及 Windows Mixed Reality Portal。在任务管理器中查找 OVRServer_x64.exe / vrcompositor.exe / vrserver.exe / MixedRealityPortal.exe——把它们结束掉。拔掉头显的连接线。它们每个都会预留 1.5–3 GB VRAM，即使闲置也是如此。"
      - "首先降低 Battle Size。如果你用 BattleSizeResized——试试 200，再试 128（原生上限）。如果 200 对 200 的战斗能正常加载，就确认了 texture-array 上限正是原因。"
      - "如果降低 Battle Size 后仍然崩溃——临时禁用那些会添加大量独特材质的兵种/护甲模组（LoreHardcore、自定义兵种翻新）。逐个重新启用。"
      - "游戏内：Options → Graphics → Texture Quality = Medium。更小的贴图会缩小数组占用。"
      - "AMD Adrenalin：打开 Bannerlord.exe 的配置，关闭 AFMF、Anti-Lag/Anti-Lag+、HYPR-RX、Image Sharpening、Radeon Boost。驱动覆盖层也会破坏纹理描述符——把它关掉（Alt+R）。"
      - "如果用的是全新的 RDNA 4 显卡（RX 9070 / 9070 XT）：试试上一版 WHQL Adrenalin，而不是最新版。Beta/Preview 驱动经常会破坏老的 DX11 游戏。"
      - "如果用的是全新的 NVIDIA Blackwell 显卡（RTX 5070 / 5070 Ti / 5080 / 5090）：把长时间游戏拆开——每 2–3 小时退出到桌面再重启。DX11 描述符池泄漏只有在进程完全退出时才会重置。NVIDIA Control Panel → Manage 3D settings → Bannerlord.exe → 'Shader Cache Size = 100 GB 或 Unlimited'、'Power management mode = Prefer maximum performance'，关闭 Image Sharpening / DLSS Frame Generation / Reflex（它们会添加各自的描述符）。"
      - "如果是 RTX 50 系列：试试最新的 GeForce Game Ready（或 Studio）驱动——早期的 Blackwell 驱动（566.x / 570.x）已知存在泄漏；580.x+ 的更新表现更好。"
      - "切换渲染器：Bannerlord 启动器 → Options → Use DirectX 12（或切回 DX11）。RDNA 4 在 DX12 路径上往往更稳定。"
      - "更改任何图形设置之后（Texture Quality / Shader Quality 等）：重启电脑，打开 Crash Doctor → 系统调优 → '清理着色器缓存'，启动游戏，主菜单 → 'Build Shader Cache'，等待 20–60 分钟。漏掉任一步，下次启动就会在帝国士兵的启动画面崩溃。"
      - "如果都没用——把错误弹窗的截图连同 rgl_log_<PID>.txt + watchdog_log_<PID>.txt 提交给模组作者。"
    tr:
      - "ÖNCE, rgl_log binlerce `compile_shader` satırı ve yalnızca birkaç `read_compressed_shader_cache_package` gösteriyorsa — gölgelendirici önbelleğiniz oluşturulmamış. Crash Doctor → Sistem ayarı → 'gölgelendirici önbelleğini temizle' açın, bilgisayarı YENİDEN BAŞLATIN, oyunu açın, Ana Menü → 'Build Shader Cache', 20–60 dk bekleyin. Bu, zayıf kartlarda çökmeye yol açan canlı derleme fırtınasını ortadan kaldırır."
      - "1440p'de 4 GB kartta (RTX 3050 / GTX 1650): oyun içi çözünürlüğü 1920×1080'e, Texture Quality değerini Low/Medium'a düşürün. TOR'da 1440p'de 4 GB sınırdadır."
      - "Ekran kartı sürücüsünü en sona güncelleyin (NVIDIA: GeForce Game Ready). ~1 yıldan eski bir sürücü D3D11 tanımlayıcılarını daha katı denetler ve burada sık görülen bir nedendir."
      - "Bir VR başlığınız varsa: Bannerlord'u başlatmadan önce Oculus/Meta Quest Link, SteamVR VE Windows Mixed Reality Portal'ı tamamen kapatın. Görev Yöneticisi'nde OVRServer_x64.exe / vrcompositor.exe / vrserver.exe / MixedRealityPortal.exe arayın — sonlandırın. Başlık kablosunu çıkarın. Her biri boştayken bile 1.5–3 GB VRAM ayırır."
      - "Önce Battle Size'ı düşürün. BattleSizeResized kullanıyorsanız — 200, sonra 128 (yerel üst sınır) deneyin. 200'e 200 bir savaş sorunsuz yükleniyorsa, nedenin texture-array sınırı olduğunu doğrulamış olursunuz."
      - "Battle Size'ı düşürmek yine çökerse — çok sayıda benzersiz malzeme ekleyen birlik/zırh modlarını (LoreHardcore, özel birlik elden geçirmeleri) geçici olarak devre dışı bırakın. Birer birer yeniden etkinleştirin."
      - "Oyun içinde: Options → Graphics → Texture Quality = Medium. Daha küçük dokular dizi ayak izini küçültür."
      - "AMD Adrenalin: Bannerlord.exe profilini açın ve AFMF, Anti-Lag/Anti-Lag+, HYPR-RX, Image Sharpening, Radeon Boost'u KAPATIN. Sürücü yer paylaşımı da doku tanımlayıcılarını bozabilir — kapatın (Alt+R)."
      - "Yepyeni bir RDNA 4 kartındaysanız (RX 9070 / 9070 XT): en sonu yerine bir önceki WHQL Adrenalin'i deneyin. Beta/Preview sürücüler eski DX11 oyunlarını düzenli olarak bozar."
      - "Yepyeni bir NVIDIA Blackwell kartındaysanız (RTX 5070 / 5070 Ti / 5080 / 5090): uzun oturumları bölün — her 2–3 saatte bir masaüstüne çıkıp yeniden başlatın. DX11 tanımlayıcı havuzu sızıntısı yalnızca tam işlem çıkışında sıfırlanır. NVIDIA Control Panel → Manage 3D settings → Bannerlord.exe → 'Shader Cache Size = 100 GB veya Unlimited', 'Power management mode = Prefer maximum performance', Image Sharpening / DLSS Frame Generation / Reflex'i KAPATIN (kendi tanımlayıcılarını eklerler)."
      - "RTX 50 serisindeyseniz: en son GeForce Game Ready (veya Studio) sürücüsünü deneyin — erken Blackwell sürücülerinin (566.x / 570.x) sızdırdığı bilinir; 580.x+ güncellemeleri daha iyi davranır."
      - "Render motorunu değiştirin: Bannerlord başlatıcısı → Options → Use DirectX 12 (ya da DX11'e geri). RDNA 4 genelde DX12 yolunda daha kararlıdır."
      - "Herhangi bir grafik ayarını değiştirdikten SONRA (Texture Quality / Shader Quality vb.): bilgisayarı YENİDEN BAŞLATIN, Crash Doctor → Sistem ayarı → 'gölgelendirici önbelleğini temizle' açın, oyunu başlatın, Ana Menü → 'Build Shader Cache' ve 20–60 dakika bekleyin. Bunlardan herhangi birini atlarsanız bir sonraki açılış imparatorluk askeri açılış ekranında çöker."
      - "Hiçbir şey işe yaramazsa — hata penceresinin ekran görüntüsünü artı rgl_log_<PID>.txt + watchdog_log_<PID>.txt dosyalarını mod yazarına gönderin."
    ru:
      - "СНАЧАЛА: если в логе тысячи строк `compile_shader` и лишь несколько `read_compressed_shader_cache_package` — кэш шейдеров не собран. Открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord», ПЕРЕЗАГРУЗИ ПК, запусти игру, Главное меню → «Build Shader Cache», подожди 20–60 мин. Это убирает лавину живой компиляции, которая и роняет слабые карты."
      - "На карте с 4 ГБ (RTX 3050 / GTX 1650) при мониторе 1440p — снизь разрешение в игре до 1920×1080 и Качество текстур до Low/Medium. 4 ГБ на 1440p в TOR — на пределе."
      - "Обнови драйвер видеокарты до последнего (NVIDIA: GeForce Game Ready). Драйвер старше ~года строже проверяет дескрипторы D3D11 и часто виноват именно в этом."
      - "Если есть VR-шлем — полностью закрой Oculus/Meta Quest Link, SteamVR и Windows Mixed Reality Portal перед запуском Bannerlord. В Диспетчере задач прибей OVRServer_x64.exe / vrcompositor.exe / vrserver.exe / MixedRealityPortal.exe. Отключи кабель шлема. Каждый из них держит 1.5–3 ГБ VRAM даже когда шлем не активен."
      - "Снизь Battle Size в первую очередь. Если стоит BattleSizeResized — попробуй 200, потом 128 (нативный потолок). Если бой 200 на 200 грузится без вылета — корень найден, лимит texture-array."
      - "Если падает и на сниженном размере — временно отключи моды на отряды/броню с большим числом уникальных материалов (LoreHardcore, кастомные trooper-моды). Включай по одному."
      - "В игре: Опции → Графика → Качество текстур = Medium. Текстуры меньше — массив занимает меньше."
      - "AMD Adrenalin: открой профиль Bannerlord.exe и ВЫКЛЮЧИ AFMF, Anti-Lag/Anti-Lag+, HYPR-RX, Image Sharpening, Radeon Boost. Оверлей драйвера тоже бьёт по дескрипторам — выключи (Alt+R)."
      - "Если карта свежая RDNA 4 (RX 9070 / 9070 XT) — поставь предыдущую WHQL Adrenalin вместо последней. Beta/Preview-драйверы регулярно ломают старые DX11-игры."
      - "Если карта свежая NVIDIA Blackwell (RTX 5070 / 5070 Ti / 5080 / 5090): дроби длинные сессии — выходи на рабочий стол и запускай заново каждые 2–3 часа. Утечка пула DX11-дескрипторов сбрасывается только при полном выходе из процесса. NVIDIA Control Panel → Manage 3D settings → Bannerlord.exe → «Shader Cache Size = 100 GB или Unlimited», «Power management mode = Prefer maximum performance», ВЫКЛ Image Sharpening / DLSS Frame Generation / Reflex (они добавляют свои дескрипторы)."
      - "Если RTX 50-серия — обнови GeForce Game Ready (или Studio) до последнего; ранние Blackwell-драйверы (566.x / 570.x) известны утечкой, апдейты 580.x+ ведут себя лучше."
      - "Попробуй сменить рендерер: лаунчер Bannerlord → Опции → Use DirectX 12 (или обратно на DX11). RDNA 4 чаще стабильнее на DX12."
      - "ПОСЛЕ любого изменения настройки графики (Texture Quality / Shader Quality и т.д.): ПЕРЕЗАГРУЗИ ПК, открой Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord», запусти игру, Главное меню → «Build Shader Cache» и жди 20–60 мин. Пропустишь хоть один шаг — на следующем запуске игра упадёт на заставке с имперским солдатом."
      - "Если ничего не помогло — приложи скриншот окна ошибки + rgl_log_<PID>.txt + watchdog_log_<PID>.txt и пришли автору мода."
  match:
    any:
      - log_line:
          contains: "create_texture_array failed"
      - log_line:
          contains: "rglGPU_device::create_texture_array"

- id: gpu.shader_compile_oom
  category: gpu
  severity: critical
  confidence: high
  evidence_source: "https://steamcommunity.com/workshop/filedetails/discussion/3025574678/800093831719686553/"
  requires_sources: [log_line]
  title:
    en: "Shader compilation runs out of memory (TOR pbr_metallic / horse / faceshader)"
    ru: "Не хватает памяти при компиляции шейдеров TOR (pbr_metallic / horse / faceshader)"
    zh: "着色器编译内存耗尽（TOR pbr_metallic / horse / faceshader）"
    tr: "Gölgelendirici derlemesi bellek tükeniyor (TOR pbr_metallic / horse / faceshader)"
  description:
    en: |
      The Direct3D shader compiler ran out of memory while building TOR's heaviest
      shaders (pbr_metallic.rs, horse.rs, faceshader_high.rs). Symptoms: cascading
      Windows error dialogs "Error compiling shader file ... out of memory during
      compilation" or "internal error: pdb append failed / debug info append failed,
      byte count too large". The game crashes after ~15 min of "Build Shader Cache".

      This is NOT the same as "system page file too small". The D3DCompiler has its
      own per-process address-space limits and chokes on TOR's complex shaders even
      when the page file is huge. The proven workaround is to delete BOTH shader caches
      (game + ProgramData), make sure terrain_quality is 2 or higher, free 50+ GB on
      the system drive, and update the GPU driver.
    zh: |
      Direct3D 着色器编译器在构建 TOR 最重的几个着色器（pbr_metallic.rs、horse.rs、
      faceshader_high.rs）时内存耗尽。症状：连串的 Windows 错误对话框
      "Error compiling shader file ... out of memory during compilation" 或
      "internal error: pdb append failed / debug info append failed, byte count
      too large"。游戏在 "Build Shader Cache" 约 15 分钟后崩溃。

      这与"系统页面文件太小"不是一回事。D3DCompiler 有它自己的每进程地址空间
      限制，即便页面文件很大，它也会在 TOR 的复杂着色器上卡住。经过验证的解决办法是：
      删除两个着色器缓存（游戏 + ProgramData），确保 terrain_quality 为 2 或更高，
      在系统盘上腾出 50 GB 以上空间，并更新显卡驱动。
    tr: |
      Direct3D gölgelendirici derleyicisi, TOR'un en ağır gölgelendiricilerini
      (pbr_metallic.rs, horse.rs, faceshader_high.rs) oluştururken bellek tüketti.
      Belirtiler: ardışık Windows hata pencereleri "Error compiling shader file ...
      out of memory during compilation" ya da "internal error: pdb append failed /
      debug info append failed, byte count too large". Oyun, "Build Shader Cache"in
      ~15 dakikasından sonra çöker.

      Bu, "sistem sayfa dosyası çok küçük" ile AYNI ŞEY DEĞİL. D3DCompiler'in
      işlem başına kendi adres alanı sınırları vardır ve sayfa dosyası çok büyük olsa
      bile TOR'un karmaşık gölgelendiricilerinde tıkanır. Kanıtlanmış geçici çözüm:
      HER İKİ gölgelendirici önbelleğini de (oyun + ProgramData) silmek,
      terrain_quality'nin 2 veya üzeri olduğundan emin olmak, sistem diskinde 50+ GB
      boşaltmak ve ekran kartı sürücüsünü güncellemek.
    ru: |
      Компилятор Direct3D исчерпал память при сборке самых тяжёлых шейдеров TOR
      (pbr_metallic.rs, horse.rs, faceshader_high.rs). Симптомы: каскад окошек
      Windows «Error compiling shader file ... out of memory during compilation»
      или «internal error: pdb append failed / debug info append failed, byte count
      too large». Игра падает после ~15 минут «Build Shader Cache».

      Это НЕ то же самое, что «маленький файл подкачки». У D3DCompiler свои лимиты
      адресного пространства, и он давится на сложных шейдерах TOR даже при
      огромном pagefile. Рабочий обходной путь: удалить ОБА кэша шейдеров
      (игровой + ProgramData), убедиться что terrain_quality ≥ 2, освободить
      50+ ГБ на системном диске и обновить драйвер GPU.
  fix:
    en:
      - "Crash Doctor → System tune-up → 'Clear Bannerlord shader cache' (deletes BOTH game/Shaders/D3D11/compressed_shaders_cache.sack AND C:/ProgramData/Mount and Blade II Bannerlord/Shaders)."
      - "Crash Doctor → System tune-up → if engine_config card appears, apply it (sets terrain_quality to 2 — required, lower values cause this exact crash on TOR)."
      - "Free at least 50 GB on C: (Disk Cleanup → Temporary files; Steam → Properties → Installed Files → Verify integrity)."
      - "Update the GPU driver to the latest WHQL (NVIDIA / AMD website, not Windows Update)."
      - "Unsubscribe from any OLD versions of TOR (e.g. Core, RoR, Music) in Steam Workshop and delete leftover folders in Modules/. Re-subscribe to the current ones only."
      - "Lower in-game Texture Quality to Medium before launching 'Build Shader Cache' the next time — TOR documents 32+ GB RAM peaks for High textures."
      - "Reboot once before relaunching so the page file is reset."
      - "Patience: 'Build Shader Cache' on TOR takes 10–50 minutes. Don't close the game, don't open Chrome / Discord during compilation."
    zh:
      - "Crash Doctor → 系统调优 → '清理着色器缓存'（删除两者：game/Shaders/D3D11/compressed_shaders_cache.sack 以及 C:/ProgramData/Mount and Blade II Bannerlord/Shaders）。"
      - "Crash Doctor → 系统调优 → 如果出现关于 engine_config 的卡片，就应用它（把 terrain_quality 设为 2——必需，更低的值会在 TOR 上引发正是这个崩溃）。"
      - "在 C: 盘腾出至少 50 GB（磁盘清理 → 临时文件；Steam → 属性 → 已安装文件 → 验证完整性）。"
      - "把显卡驱动更新到最新 WHQL（从 NVIDIA / AMD 官网，不要用 Windows Update）。"
      - "在 Steam Workshop 取消订阅任何旧版本的 TOR（例如 Core、RoR、Music），并删除 Modules/ 中残留的文件夹。只重新订阅当前版本。"
      - "下次启动 'Build Shader Cache' 之前，先在游戏内把 Texture Quality 降到 Medium——TOR 在 High 贴图下记录到 32 GB 以上的内存峰值。"
      - "重启一次再重新启动，让页面文件复位。"
      - "耐心：TOR 上的 'Build Shader Cache' 需要 10–50 分钟。编译期间不要关闭游戏，不要打开 Chrome / Discord。"
    tr:
      - "Crash Doctor → Sistem ayarı → 'gölgelendirici önbelleğini temizle' (HER İKİSİNİ siler: game/Shaders/D3D11/compressed_shaders_cache.sack VE C:/ProgramData/Mount and Blade II Bannerlord/Shaders)."
      - "Crash Doctor → Sistem ayarı → engine_config kartı çıkarsa uygulayın (terrain_quality'yi 2 yapar — zorunlu, daha düşük değerler TOR'da tam olarak bu çökmeye neden olur)."
      - "C: üzerinde en az 50 GB boşaltın (Disk Temizleme → Geçici dosyalar; Steam → Özellikler → Yüklü Dosyalar → Bütünlüğü doğrula)."
      - "Ekran kartı sürücüsünü en son WHQL'ye güncelleyin (Windows Update değil, NVIDIA / AMD web sitesinden)."
      - "Steam Workshop'ta TOR'un ESKİ sürümlerinin (ör. Core, RoR, Music) aboneliğini kaldırın ve Modules/ içinde kalan klasörleri silin. Yalnızca güncel olanlara yeniden abone olun."
      - "Bir sonraki 'Build Shader Cache'ten önce oyun içi Texture Quality değerini Medium'a düşürün — TOR, High dokular için 32+ GB RAM tepe değerleri belgeler."
      - "Sayfa dosyasının sıfırlanması için yeniden başlatmadan önce bilgisayarı bir kez yeniden başlatın."
      - "Sabır: TOR'da 'Build Shader Cache' 10–50 dakika sürer. Derleme sırasında oyunu kapatmayın, Chrome / Discord açmayın."
    ru:
      - "Crash Doctor → Настройка системы → «Очистить кэш шейдеров Bannerlord» (удаляет ОБА: game/Shaders/D3D11/compressed_shaders_cache.sack И C:/ProgramData/Mount and Blade II Bannerlord/Shaders)."
      - "Crash Doctor → Настройка системы → если появилась карточка про engine_config — применить (поднимает terrain_quality до 2 — обязательно, ниже даёт ровно этот краш на TOR)."
      - "Освободить минимум 50 ГБ на C: (Очистка диска → временные файлы; Steam → Свойства → Установленные файлы → Проверить целостность)."
      - "Обновить драйвер GPU до последней WHQL (с сайта NVIDIA / AMD, не через Windows Update)."
      - "Отписаться от СТАРЫХ версий TOR (Core, RoR, Music) в Steam Workshop и удалить оставшиеся папки в Modules/. Подписаться только на актуальные."
      - "В игре понизить Texture Quality до Medium перед следующим «Build Shader Cache» — TOR документирует пики 32+ ГБ ОЗУ на High."
      - "Перезагрузить ПК один раз перед перезапуском, чтобы page file сбросился."
      - "Терпение: «Build Shader Cache» в TOR идёт 10–50 минут. Не закрывай игру, не открывай Chrome / Discord на время компиляции."
  match:
    any:
      - log_line:
          contains: "out of memory during compilation"
      - log_line:
          contains: "pdb append failed"
      - log_line:
          contains: "debug info append failed"

- id: gpu.long_session_gpu_crash
  category: gpu
  severity: warning
  confidence: high
  evidence_source: "Real client crash 2026-05-08 06:37 — RTX 5070 (Blackwell), Driver 32.0.15.9636 (23.04.2026), App Run Time 33448 sec (9.3 h), GPU Crash flag = 1, create_texture_array failed. Pattern: descriptor-pool leak in DX11 Blackwell driver after multi-hour session."
  requires_sources: [crash_tag]
  title:
    en: "GPU crashed after a long session (3+ hours) — driver descriptor leak"
    ru: "GPU упал после длинной сессии (3+ часов) — утечка дескрипторов драйвера"
    zh: "长时间游戏（3 小时以上）后显卡崩溃 — 驱动描述符泄漏"
    tr: "Uzun bir oturumdan (3+ saat) sonra ekran kartı çöktü — sürücü tanımlayıcı sızıntısı"
  description:
    en: |
      The crash_tags Runtime/GPU Crash flag is set AND App Run Time is over
      3 hours. This pairing is the signature of a driver descriptor-pool leak:
      Bannerlord's DX11 renderer keeps allocating texture-array, shader-resource,
      and constant-buffer handles; on certain driver versions (notably NVIDIA
      Blackwell early 566.x–570.x and AMD RDNA 4 Adrenalin previews) those
      handles are never returned to the pool. After 3–10 hours the pool is
      exhausted and the next CreateTexture2D / CreateShaderResourceView returns
      E_INVALIDARG, killing the game.

      This is NOT a TOR-specific bug, NOT a hardware fault, and NOT something
      lowering graphics will fix on its own — the leak rate is independent of
      quality settings. The proven mitigation is to break long sessions:
      quit to desktop (not just to main menu) every 2–3 hours, then relaunch.
      The descriptor pool resets on full process exit.
    zh: |
      crash_tags 中的 Runtime/GPU Crash 标志被置位，并且 App Run Time 超过 3 小时。
      这种组合是驱动描述符池泄漏的标志：Bannerlord 的 DX11 渲染器不断分配
      texture-array、shader-resource 和 constant-buffer 句柄；在某些驱动版本上
      （尤其是早期的 NVIDIA Blackwell 566.x–570.x 和 AMD RDNA 4 Adrenalin 预览版），
      这些句柄从未归还到池中。3–10 小时后池被耗尽，下一次 CreateTexture2D /
      CreateShaderResourceView 返回 E_INVALIDARG，导致游戏崩溃。

      这不是 TOR 特有的 bug，不是硬件故障，单靠降低画质也修不好——泄漏速度与画质
      设置无关。经过验证的缓解办法是拆分长时间游戏：每 2–3 小时退出到桌面
      （而不仅仅是回主菜单），然后重新启动。描述符池只有在进程完全退出时才会重置。
    tr: |
      crash_tags'teki Runtime/GPU Crash bayrağı ayarlı VE App Run Time 3 saatin
      üzerinde. Bu eşleşme, bir sürücü tanımlayıcı havuzu sızıntısının imzasıdır:
      Bannerlord'un DX11 render motoru sürekli texture-array, shader-resource ve
      constant-buffer tutamaçları ayırır; belirli sürücü sürümlerinde (özellikle
      erken NVIDIA Blackwell 566.x–570.x ve AMD RDNA 4 Adrenalin önizlemeleri) bu
      tutamaçlar havuza hiç geri verilmez. 3–10 saat sonra havuz tükenir ve sonraki
      CreateTexture2D / CreateShaderResourceView E_INVALIDARG döndürerek oyunu öldürür.

      Bu TOR'a özgü bir hata DEĞİL, donanım arızası DEĞİL ve grafiği düşürmenin tek
      başına düzelteceği bir şey DEĞİL — sızıntı hızı kalite ayarlarından bağımsızdır.
      Kanıtlanmış önlem, uzun oturumları bölmektir: her 2–3 saatte bir masaüstüne
      çıkın (sadece ana menüye değil), sonra yeniden başlatın. Tanımlayıcı havuzu
      yalnızca tam işlem çıkışında sıfırlanır.
    ru: |
      В crash_tags стоит флаг Runtime/GPU Crash И App Run Time больше 3 часов.
      Эта связка — подпись утечки пула дескрипторов в драйвере: DX11-рендерер
      Bannerlord постоянно выделяет texture-array, shader-resource и
      constant-buffer хэндлы; на некоторых версиях драйверов (NVIDIA Blackwell
      ранние 566.x–570.x, AMD RDNA 4 Adrenalin preview) эти хэндлы не
      возвращаются в пул. Через 3–10 часов пул исчерпан и следующий
      CreateTexture2D / CreateShaderResourceView возвращает E_INVALIDARG —
      игра падает.

      Это НЕ баг TOR, НЕ аппаратная неисправность, и снижение графики само по
      себе НЕ лечит — скорость утечки не зависит от качества. Рабочая
      профилактика — дробить длинные сессии: каждые 2–3 часа выходи на
      рабочий стол (не в главное меню), потом запускай заново. Пул
      дескрипторов сбрасывается только при полном выходе из процесса.
  fix:
    en:
      - "Right now: relaunch the game; the descriptor pool is fresh after a process restart, so the next session will run normally for ~3 more hours."
      - "Habit: every 2–3 hours of play — Save → Quit to Desktop → wait 30 sec → launch again. NOT 'main menu → Continue' (that doesn't reset the pool, the process is the same)."
      - "Update the GPU driver to the latest WHQL straight from the NVIDIA / AMD website (Windows Update is months behind). NVIDIA Blackwell 580.x+ and AMD Adrenalin 25.4+ are the first releases with the leak partially patched."
      - "If you're already on the latest driver and still leaking: NVIDIA Control Panel → 3D Settings → Bannerlord.exe → Power management = Prefer maximum performance, Shader Cache Size = Unlimited, OFF Image Sharpening / DLSS Frame Generation. AMD Adrenalin → Bannerlord.exe profile → OFF AFMF, Anti-Lag, HYPR-RX, Radeon Boost."
      - "Keep an eye on Task Manager → Performance → GPU → Dedicated GPU memory while playing. If usage is climbing 50–100 MB / 10 min and never drops in main menu — that's the leak; restart cycle is the only fix until your GPU vendor patches it."
      - "Lower Texture Quality to Medium if you can't restart often (smaller textures = fewer handles consumed per minute, buys you longer sessions)."
    zh:
      - "现在就：重新启动游戏；进程重启后描述符池是干净的，下一次游戏可以正常持续约 3 小时。"
      - "养成习惯：每玩 2–3 小时——保存 → 退出到桌面 → 等 30 秒 → 再次启动。不是'主菜单 → Continue'（那不会重置池，进程还是同一个）。"
      - "直接从 NVIDIA / AMD 官网把显卡驱动更新到最新 WHQL（Windows Update 落后好几个月）。NVIDIA Blackwell 580.x+ 和 AMD Adrenalin 25.4+ 是首批部分修复了泄漏的版本。"
      - "如果你已经是最新驱动却仍在泄漏：NVIDIA Control Panel → 3D Settings → Bannerlord.exe → Power management = Prefer maximum performance、Shader Cache Size = Unlimited，关闭 Image Sharpening / DLSS Frame Generation。AMD Adrenalin → Bannerlord.exe 配置 → 关闭 AFMF、Anti-Lag、HYPR-RX、Radeon Boost。"
      - "游戏时留意 任务管理器 → 性能 → GPU → 专用 GPU 内存。如果每 10 分钟上涨 50–100 MB 且回到主菜单也从不下降——那就是泄漏；在你的显卡厂商修复之前，重启循环是唯一的办法。"
      - "如果没法经常重启，就把 Texture Quality 降到 Medium（贴图更小 = 每分钟消耗的句柄更少，让单次游戏更久）。"
    tr:
      - "Hemen şimdi: oyunu yeniden başlatın; işlem yeniden başladıktan sonra tanımlayıcı havuzu tertemizdir, bir sonraki oturum yaklaşık 3 saat daha normal çalışır."
      - "Alışkanlık: her 2–3 saatlik oyundan sonra — Kaydet → Masaüstüne Çık → 30 sn bekle → tekrar başlat. 'Ana menü → Continue' DEĞİL (bu havuzu sıfırlamaz, işlem aynıdır)."
      - "Ekran kartı sürücüsünü doğrudan NVIDIA / AMD web sitesinden en son WHQL'ye güncelleyin (Windows Update aylarca geridedir). NVIDIA Blackwell 580.x+ ve AMD Adrenalin 25.4+, sızıntının kısmen düzeltildiği ilk sürümlerdir."
      - "Zaten en son sürücüdeyseniz ve hâlâ sızıntı varsa: NVIDIA Control Panel → 3D Settings → Bannerlord.exe → Power management = Prefer maximum performance, Shader Cache Size = Unlimited, Image Sharpening / DLSS Frame Generation KAPALI. AMD Adrenalin → Bannerlord.exe profili → AFMF, Anti-Lag, HYPR-RX, Radeon Boost KAPALI."
      - "Oynarken Görev Yöneticisi → Performans → GPU → Ayrılmış GPU belleğine göz atın. Kullanım her 10 dakikada 50–100 MB artıyor ve ana menüde hiç düşmüyorsa — sızıntı budur; ekran kartı üreticiniz düzeltene kadar yeniden başlatma döngüsü tek çözümdür."
      - "Sık yeniden başlatamıyorsanız Texture Quality değerini Medium yapın (daha küçük dokular = dakikada daha az tutamaç tüketimi, daha uzun oturumlar kazandırır)."
    ru:
      - "Прямо сейчас: перезапусти игру — после рестарта процесса пул дескрипторов чистый, следующая сессия пройдёт нормально ещё ~3 часа."
      - "Привычка: каждые 2–3 часа игры — Сохранить → Выйти на рабочий стол → подожди 30 сек → запусти заново. НЕ «главное меню → Continue» (это не сбрасывает пул, процесс тот же)."
      - "Обнови драйвер GPU до последней WHQL прямо с сайта NVIDIA / AMD (Windows Update отстаёт на месяцы). NVIDIA Blackwell 580.x+ и AMD Adrenalin 25.4+ — первые релизы где утечка частично починена."
      - "Если уже на последнем драйвере и всё равно течёт: NVIDIA Control Panel → 3D Settings → Bannerlord.exe → Power management = Prefer maximum performance, Shader Cache Size = Unlimited, ВЫКЛ Image Sharpening / DLSS Frame Generation. AMD Adrenalin → профиль Bannerlord.exe → ВЫКЛ AFMF, Anti-Lag, HYPR-RX, Radeon Boost."
      - "Следи в Task Manager → Performance → GPU → Dedicated GPU memory во время игры. Если прибавляет 50–100 МБ за каждые 10 мин и не сбрасывается в главном меню — это та самая утечка; цикл рестартов — единственный фикс, пока вендор GPU не починит."
      - "Понизь Texture Quality до Medium если не получается часто рестартовать (меньше текстур = меньше хэндлов в минуту = сессия длиннее)."
  match:
    all:
      - crash_tag:
          path: "Runtime/GPU Crash"
          equals: "1"
      - crash_tag:
          path: "Runtime/App Run Time"
          numeric_gt: "10800"
