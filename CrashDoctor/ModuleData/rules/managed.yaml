      - "Держи также ВКЛ «Чинить сломанные отряды при загрузке» — при следующей загрузке сейва он просканирует все отряды и уберёт битые/зависшие записи бойцов, вызывающие это, починив сам сейв."
      - "Корень — битое состояние отряда из-за другого мода, который убрал тип войск, пока солдаты этого типа ещё были в игре. Если повторяется, вспомни, какой мод на войска/оверхол ты недавно менял или удалял."
      - "НЕ пересобирай шейдеры и не меняй драйвер — это битое состояние сейва/отряда, не поможет."
    zh:
