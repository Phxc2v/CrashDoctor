# Managed (.NET) crash verdicts. These fire when Crash Doctor captured the actual managed
# exception for this crash (our own capture, works without ButterLib / BetterExceptionWindow).
# A managed exception means a CODE bug with a real culprit — rebuilding shaders or changing
# drivers will NOT help. critical severity so this verdict sorts ABOVE the shader/GPU cards.
# The matcher fills the evidence with the exact subsystem, culprit module and top stack frames
# — that's what the player copies into the report for the developer.

- id: managed.code_bug
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Crash Doctor managed-exception capture (Module.OnApplicationTick finalizer + AppDomain handler)"
  requires_sources: [managed_exception]
  title:
    en: "Code-level crash — a mod's code threw, NOT a shader/driver problem"
    ru: "Краш в коде — упал код мода, это НЕ проблема шейдеров/драйвера"
    zh: "代码级崩溃——是某个模组的代码抛出的，而非着色器/驱动问题"
    zht: "程式碼層級崩潰——是某個模組的程式碼擲出的，而非著色器/驅動問題"
    tr: "Kod düzeyinde çökme — bir modun kodu hata verdi, bu bir gölgelendirici/sürücü sorunu DEĞİL"
  description:
    en: |
      Crash Doctor captured the actual .NET exception for this crash. That means the game
      crashed because a piece of mod/game CODE threw — not because of shaders, drivers or
      your GPU. Rebuilding the shader cache or updating the driver will NOT fix this.
      The affected subsystem, the likely culprit module and the top stack frames are listed
      in the evidence below — that is exactly what the developer needs to write a patch.
    ru: |
      Crash Doctor поймал само .NET-исключение этого краша. Значит игра упала из-за того,
      что упал КОД мода/игры — а не из-за шейдеров, драйвера или видеокарты. Пересборка
      кэша шейдеров или обновление драйвера это НЕ починит. Затронутая подсистема,
      вероятный виновник-мод и верхние кадры стека перечислены ниже в уликах — это ровно
      то, что нужно разработчику, чтобы сделать патч.
    zh: |
      Crash Doctor 捕获到了本次崩溃的真实 .NET 异常。这意味着游戏崩溃是因为某段
      模组/游戏代码抛出了异常——而不是着色器、驱动或显卡的问题。重建着色器缓存或
      更新驱动都无法修复它。受影响的子系统、可能的肇事模组以及顶部堆栈帧已列在下方
      证据中——这正是开发者编写补丁所需要的信息。
    zht: |
      Crash Doctor 捕獲到了本次崩潰的真實 .NET 例外。這代表遊戲崩潰是因為某段
      模組/遊戲程式碼擲出了例外——而不是著色器、驅動或顯示卡的問題。重建著色器快取或
      更新驅動都無法修復它。受影響的子系統、可能的肇事模組以及頂部堆疊框架已列在下方
      證據中——這正是開發者編寫修補程式所需要的資訊。
    tr: |
      Crash Doctor bu çökmenin gerçek .NET istisnasını yakaladı. Bu, oyunun bir mod/oyun
      KODU hata fırlattığı için çöktüğü anlamına gelir — gölgelendiriciler, sürücüler veya
      ekran kartın yüzünden değil. Gölgelendirici önbelleğini yeniden oluşturmak ya da
      sürücüyü güncellemek bunu DÜZELTMEZ. Etkilenen alt sistem, olası suçlu mod ve üstteki
      yığın çerçeveleri aşağıdaki kanıtlarda listelenmiştir — geliştiricinin bir yama
      yazması için ihtiyaç duyduğu tam olarak budur.
  fix:
    en:
      - "Click «Open folder» at the bottom and send the developer the report.txt file inside it — it already holds the exception, the culprit mod and the full stack trace, everything needed for a patch."
      - "Report channel: https://t.me/CodeRickTg . Mention what you were doing when it crashed (battle / menu / save load / which mods)."
      - "Copy the evidence below (subsystem, culprit mod, stack frames) into your message — that's exactly what pinpoints the bug."
      - "Do NOT rebuild shaders or change drivers for this crash — it's a code bug, that won't help. If the culprit is a specific mod, try disabling it as a temporary workaround."
    ru:
      - "Нажми «Открыть папку» внизу и пришли разработчику файл report.txt из неё — в нём уже есть исключение, виновник-мод и полный стек, всё что нужно для патча."
      - "Канал для отчётов: https://t.me/CodeRickTg . Напиши, что делал в момент краша (бой / меню / загрузка сейва / какие моды)."
      - "Скопируй улики ниже (подсистема, виновник-мод, кадры стека) в сообщение — именно они указывают на баг."
      - "НЕ пересобирай шейдеры и не меняй драйвер из-за этого краша — это баг кода, не поможет. Если виновник — конкретный мод, попробуй временно отключить его."
    zh:
      - "点击下方「打开文件夹」，把里面的 report.txt 文件发给开发者——它已包含异常、肇事模组和完整堆栈，做补丁所需的一切都在里面。"
      - "反馈频道：https://t.me/CodeRickTg 。说明崩溃时你在做什么（战斗 / 菜单 / 读取存档 / 哪些模组）。"
      - "把下方证据（子系统、肇事模组、堆栈帧）复制到你的消息里——正是它们定位了 bug。"
      - "不要为这次崩溃重建着色器或更换驱动——这是代码 bug，没用。如果肇事者是某个具体模组，可尝试临时禁用它。"
    zht:
      - "點擊下方「開啟資料夾」，把裡面的 report.txt 檔案傳給開發者——它已包含例外、肇事模組和完整堆疊，做修補程式所需的一切都在裡面。"
      - "回報頻道：https://t.me/CodeRickTg 。說明崩潰時你在做什麼（戰鬥 / 選單 / 讀取存檔 / 哪些模組）。"
      - "把下方證據（子系統、肇事模組、堆疊框架）複製到你的訊息裡——正是它們定位了 bug。"
      - "不要為這次崩潰重建著色器或更換驅動——這是程式碼 bug，沒用。如果肇事者是某個具體模組，可嘗試暫時停用它。"
    tr:
      - "Aşağıdaki «Klasörü aç» düğmesine tıkla ve içindeki report.txt dosyasını geliştiriciye gönder — istisnayı, suçlu modu ve tam yığın izini, yani yama için gereken her şeyi zaten içerir."
      - "Rapor kanalı: https://t.me/CodeRickTg . Çökme anında ne yaptığını belirt (savaş / menü / kayıt yükleme / hangi modlar)."
      - "Aşağıdaki kanıtları (alt sistem, suçlu mod, yığın çerçeveleri) mesajına kopyala — hatayı tam olarak bunlar gösterir."
      - "Bu çökme için gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — bu bir kod hatası, yardımcı olmaz. Suçlu belirli bir modsa geçici çözüm olarak onu devre dışı bırakmayı dene."
  # present:true fires for ANY managed crash. Exclude the signatures that have a
  # dedicated rule below (mount status-effect, prisoner-sell underflow) so we don't
  # stack a generic "code bug" card on top of the specific verdict at equal severity.
  # Each exclusion must match the SAME frame AND exception type as the specific rule it
  # defers to (one `all:` per rule) — NOT frame alone. Excluding on frame only would
  # suppress this catch-all for, say, an NRE thrown through SellPrisonersAction while the
  # specific (UnderFlow-gated) rule does not fire either, leaving that crash with no verdict.
  # (Two args in one managed_exception node are OR-combined by the matcher, so AND needs
  # two separate nodes under an `all:`.)
  match:
    all:
      - managed_exception:
          present: true
      - none:
          - all:
              - managed_exception: { frame_contains: "SetDynamicMountMovementProperties" }
              - managed_exception: { type_contains: "ArgumentException" }
          - all:
              - managed_exception: { frame_contains: "SellPrisonersAction" }
              - managed_exception: { type_contains: "UnderFlow" }
          - all:
              - managed_exception: { frame_contains: "NavalMobilePartyVisual" }
              - managed_exception: { type_contains: "AccessViolation" }
          - all:
              - managed_exception: { frame_contains: "game_menu_encounter_on_init" }
              - managed_exception: { type_contains: "NullReference" }
          - all:
              - managed_exception: { frame_contains: "NAudio" }
              - managed_exception: { type_contains: "FileNotFoundException" }
          - all:
              - managed_exception: { frame_contains: "CalculateAICastMatrixFrame" }
              - managed_exception: { type_contains: "NullReferenceException" }

- id: tor.audio_dependency_missing
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-09 report(3).txt — System.IO.FileNotFoundException 'System.Memory 4.0.1.1' via NAudio.Vorbis.VorbisSampleProvider..ctor <- TOR_Core.Audio.CachedSound <- TORAudioManager.RegisterSound <- InkStory.PlayMusic (hourly-tick custom Ink event, world map). Captured by Crash Doctor managed capture."
  requires_sources: [managed_exception]
  title:
    en: "TOR audio crash — a required .NET library (System.Memory) couldn't load"
    ru: "Вылет аудио TOR — не загрузилась нужная .NET-библиотека (System.Memory)"
    zh: "TOR 音频崩溃——所需的 .NET 库（System.Memory）无法加载"
    zht: "TOR 音訊崩潰——所需的 .NET 函式庫（System.Memory）無法載入"
    tr: "TOR ses çökmesi — gerekli bir .NET kütüphanesi (System.Memory) yüklenemedi"
  description:
    en: |
      A TOR narrative event tried to play OGG music (NAudio.Vorbis) and the game crashed
      because a required .NET library — System.Memory (or a sibling System.* helper) — could
      not be loaded. This is NOT a shader, driver or Crash Doctor problem, and not a code bug
      in TOR — the library is simply missing or unresolvable on this install. It usually fires
      while you are just walking the campaign map (a scripted music event runs on the hourly
      tick), so it looks random. System.Memory normally ships with the game's own .NET runtime;
      some mods (e.g. ButterLib) also provide it.
    ru: |
      Сюжетное событие TOR попыталось проиграть OGG-музыку (NAudio.Vorbis), и игра упала,
      потому что не удалось загрузить нужную .NET-библиотеку — System.Memory (или соседний
      System.*-помощник). Это НЕ проблема шейдеров, драйвера или Crash Doctor и не баг кода
      TOR — библиотека просто отсутствует или не находится на этой установке. Обычно вылетает,
      когда ты просто идёшь по карте кампании (скриптовое музыкальное событие срабатывает на
      часовом тике), поэтому выглядит случайным. System.Memory обычно идёт с .NET-рантаймом
      самой игры; её также приносит ButterLib.
    zh: |
      一个 TOR 剧情事件尝试播放 OGG 音乐（NAudio.Vorbis），而游戏崩溃，因为无法加载
      所需的 .NET 库——System.Memory（或同类 System.* 辅助库）。这不是着色器、驱动或
      Crash Doctor 的问题，也不是 TOR 的代码 bug——该库只是在此安装中缺失或无法解析。
      它通常在你只是走在战役大地图上时触发（脚本音乐事件在每小时 tick 运行），所以看起来
      很随机。System.Memory 通常随游戏自带的 .NET 运行时一起提供；ButterLib 等模组也会提供它。
    zht: |
      一個 TOR 劇情事件嘗試播放 OGG 音樂（NAudio.Vorbis），而遊戲崩潰，因為無法載入
      所需的 .NET 函式庫——System.Memory（或同類 System.* 輔助函式庫）。這不是著色器、驅動或
      Crash Doctor 的問題，也不是 TOR 的程式碼 bug——該函式庫只是在此安裝中缺失或無法解析。
      它通常在你只是走在戰役大地圖上時觸發（指令稿音樂事件在每小時 tick 執行），所以看起來
      很隨機。System.Memory 通常隨遊戲自帶的 .NET 執行階段一起提供；ButterLib 等模組也會提供它。
    tr: |
      Bir TOR anlatı olayı OGG müzik (NAudio.Vorbis) çalmaya çalıştı ve oyun çöktü çünkü
      gerekli bir .NET kütüphanesi — System.Memory (veya kardeş bir System.* yardımcı
      kütüphanesi) — yüklenemedi. Bu bir gölgelendirici, sürücü ya da Crash Doctor sorunu
      DEĞİL ve TOR'da bir kod hatası da değil — kütüphane bu kurulumda eksik ya da çözümlenemiyor.
      Genelde sadece sefer haritasında gezerken tetiklenir (betikli bir müzik olayı saatlik
      tick'te çalışır), bu yüzden rastgele görünür. System.Memory normalde oyunun kendi .NET
      çalışma zamanıyla gelir; ButterLib gibi modlar da onu sağlar.
  fix:
    en:
      - "Steam → Bannerlord → Properties → Installed Files → Verify integrity of game files. This restores the game's bundled .NET runtime (where System.Memory lives) — the most common fix."
      - "Then reboot and launch the game once before loading the save."
      - "Not on Steam, or it still crashes? Reinstall/repair the Microsoft .NET Desktop Runtime, then reboot."
      - "Reliable fallback: install «Bannerlord.ButterLib» (Steam Workshop 2859232415, or Nexus) and enable it — it ships System.Memory.dll and the related System.* libraries NAudio needs. Most TOR setups run it anyway."
      - "Make sure the DLLs aren't blocked by Windows: Crash Doctor → System Tune-Up → «Unblock DLLs», or right-click the file → Properties → Unblock. A blocked System.Memory.dll can't load either."
      - "Do NOT rebuild shaders or change drivers — this is a missing-library issue, that won't help."
    ru:
      - "Steam → Bannerlord → Свойства → Установленные файлы → Проверить целостность файлов игры. Это восстановит встроенный в игру .NET-рантайм (где лежит System.Memory) — самый частый фикс."
      - "Затем перезагрузи ПК и один раз запусти игру до загрузки сейва."
      - "Игра не из Steam или вылет остаётся? Переустанови/почини Microsoft .NET Desktop Runtime, затем перезагрузись."
      - "Надёжный запасной вариант: поставь «Bannerlord.ButterLib» (Steam Workshop 2859232415 или Nexus) и включи — он приносит System.Memory.dll и сопутствующие System.*-библиотеки, нужные NAudio. Почти все сборки TOR его и так используют."
      - "Проверь, что DLL не заблокированы Windows: Crash Doctor → Настройка системы → «Разблокировать DLL», или ПКМ по файлу → Свойства → Разблокировать. Заблокированная System.Memory.dll тоже не загрузится."
      - "НЕ пересобирай шейдеры и не меняй драйвер — это проблема отсутствующей библиотеки, не поможет."
    zh:
      - "Steam → 骑马与砍杀2 → 属性 → 已安装文件 → 验证游戏文件完整性。这会恢复游戏自带的 .NET 运行时（System.Memory 所在处）——最常见的修复。"
      - "然后重启电脑，并在读取存档前先启动一次游戏。"
      - "不是 Steam 版，或仍然崩溃？重新安装/修复 Microsoft .NET 桌面运行时，然后重启。"
      - "可靠的备选：安装「Bannerlord.ButterLib」（Steam 创意工坊 2859232415，或 Nexus）并启用——它附带 System.Memory.dll 及 NAudio 所需的相关 System.* 库。大多数 TOR 配置本来就用它。"
      - "确认 DLL 未被 Windows 阻止：Crash Doctor → 系统调优 →「解锁 DLL」，或右键文件 → 属性 → 解除锁定。被阻止的 System.Memory.dll 同样无法加载。"
      - "不要重建着色器或更换驱动——这是库缺失问题，没用。"
    zht:
      - "Steam → 騎馬與砍殺2 → 內容 → 已安裝檔案 → 驗證遊戲檔案完整性。這會還原遊戲自帶的 .NET 執行階段（System.Memory 所在處）——最常見的修復。"
      - "然後重新啟動電腦，並在讀取存檔前先啟動一次遊戲。"
      - "不是 Steam 版，或仍然崩潰？重新安裝/修復 Microsoft .NET 桌面執行階段，然後重新啟動。"
      - "可靠的備選：安裝「Bannerlord.ButterLib」（Steam 創意工坊 2859232415，或 Nexus）並啟用——它附帶 System.Memory.dll 及 NAudio 所需的相關 System.* 函式庫。大多數 TOR 配置本來就用它。"
      - "確認 DLL 未被 Windows 阻擋：Crash Doctor → 系統調校 →「解鎖 DLL」，或右鍵檔案 → 內容 → 解除鎖定。被阻擋的 System.Memory.dll 同樣無法載入。"
      - "不要重建著色器或更換驅動——這是函式庫缺失問題，沒用。"
    tr:
      - "Steam → Bannerlord → Özellikler → Yüklü Dosyalar → Oyun dosyalarının bütünlüğünü doğrula. Bu, oyunun paketlenmiş .NET çalışma zamanını (System.Memory'nin bulunduğu yer) geri yükler — en sık çözüm."
      - "Sonra bilgisayarı yeniden başlat ve kaydı yüklemeden önce oyunu bir kez aç."
      - "Steam'de değil misin ya da hâlâ çöküyor mu? Microsoft .NET Desktop Runtime'ı yeniden kur/onar, sonra yeniden başlat."
      - "Güvenilir yedek: «Bannerlord.ButterLib» kur (Steam Atölyesi 2859232415 veya Nexus) ve etkinleştir — System.Memory.dll ve NAudio'nun ihtiyaç duyduğu ilgili System.* kütüphanelerini içerir. Çoğu TOR kurulumu zaten onu kullanır."
      - "DLL'lerin Windows tarafından engellenmediğinden emin ol: Crash Doctor → Sistem İnce Ayar → «DLL engelini kaldır», ya da dosyaya sağ tık → Özellikler → Engeli kaldır. Engellenmiş bir System.Memory.dll de yüklenemez."
      - "Gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — bu eksik kütüphane sorunu, yardımcı olmaz."
  match:
    all:
      - managed_exception: { type_contains: "FileNotFoundException" }
      - managed_exception: { frame_contains: "NAudio" }
      - managed_exception: { frame_contains: "TOR_Core.Audio" }

- id: campaign.sell_prisoners_underflow
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-03 report2.txt — MBUnderFlowException ItemRosterElement::Character via SellPrisonersAction.ApplyInternal ← PartiesSellPrisonerCampaignBehavior.OnSettlementEntered. Captured by Crash Doctor managed capture."
  requires_sources: [managed_exception]
  title:
    en: "Prisoner auto-sell underflow (roster desync) — guarded by Crash Doctor"
    ru: "Андерфлоу при автопродаже пленных (рассинхрон ростера) — перехвачено Crash Doctor"
    zh: "俘虏自动出售下溢（名册不同步）——已被 Crash Doctor 拦截"
    zht: "俘虜自動出售下溢（名冊不同步）——已被 Crash Doctor 攔截"
    tr: "Esir otomatik satış alt taşması (kadro uyumsuzluğu) — Crash Doctor tarafından korunuyor"
  description:
    en: |
      MBUnderFlowException ("ItemRosterElement::Character") thrown from
      SellPrisonersAction.ApplyInternal while a party auto-sold prisoners on
      entering a town (PartiesSellPrisonerCampaignBehavior.OnSettlementEntered)
      or on a settlement's daily tick. ApplyInternal subtracts the sold counts
      from the seller's live prison roster; when that roster is out of sync
      (more troops, or more wounded, than are actually present) a roster count
      goes below zero and the engine throws — taking the whole campaign tick down.
      The desync comes from a corrupt/edited prison roster or another mod mutating
      prisoners; vanilla has no guard. This is a code/roster bug, NOT a shader or
      driver problem — rebuilding shaders will not help.
    ru: |
      MBUnderFlowException («ItemRosterElement::Character») из
      SellPrisonersAction.ApplyInternal в момент, когда отряд автоматически
      продавал пленных при входе в город
      (PartiesSellPrisonerCampaignBehavior.OnSettlementEntered) или на дневном
      тике поселения. ApplyInternal вычитает проданное из живого ростера пленных
      продавца; если ростер рассинхронизирован (больше бойцов или раненых, чем
      есть на самом деле) — счётчик уходит в минус и движок падает, унося весь
      тик кампании. Рассинхрон — от повреждённого/отредактированного ростера
      пленных или другого мода, меняющего пленных; в ванили защиты нет. Это баг
      кода/ростера, а НЕ проблема шейдеров или драйвера — пересборка шейдеров не
      поможет.
    zh: |
      MBUnderFlowException（"ItemRosterElement::Character"）从
      SellPrisonersAction.ApplyInternal 抛出，发生在某支队伍进入城镇时自动
      出售俘虏（PartiesSellPrisonerCampaignBehavior.OnSettlementEntered）或定居点
      每日结算时。ApplyInternal 会从卖方的实时俘虏名册中扣除售出数量；当名册
      不同步（士兵或伤员多于实际存在的数量）时，名册计数会降到零以下，引擎抛出
      异常——拖垮整个战役 tick。不同步源自损坏/被编辑的俘虏名册或其他修改俘虏的
      模组；原版没有防护。这是代码/名册 bug，不是着色器或驱动问题——重建着色器
      没有用。
    zht: |
      MBUnderFlowException（"ItemRosterElement::Character"）從
      SellPrisonersAction.ApplyInternal 擲出，發生在某支隊伍進入城鎮時自動
      出售俘虜（PartiesSellPrisonerCampaignBehavior.OnSettlementEntered）或聚落
      每日結算時。ApplyInternal 會從賣方的即時俘虜名冊中扣除售出數量；當名冊
      不同步（士兵或傷員多於實際存在的數量）時，名冊計數會降到零以下，引擎擲出
      例外——拖垮整個戰役 tick。不同步源自損壞/被編輯的俘虜名冊或其他修改俘虜的
      模組；原版沒有防護。這是程式碼/名冊 bug，不是著色器或驅動問題——重建著色器
      沒有用。
    tr: |
      Bir grup kasabaya girerken esirleri otomatik satarken
      (PartiesSellPrisonerCampaignBehavior.OnSettlementEntered) ya da bir
      yerleşimin günlük tick'inde SellPrisonersAction.ApplyInternal'dan
      MBUnderFlowException ("ItemRosterElement::Character") fırlatıldı.
      ApplyInternal, satılan sayıları satıcının canlı esir kadrosundan çıkarır;
      bu kadro uyumsuz olduğunda (gerçekte var olandan daha fazla asker veya yaralı)
      bir kadro sayısı sıfırın altına iner ve motor hata fırlatır — tüm sefer
      tick'ini düşürür. Uyumsuzluk, bozuk/düzenlenmiş bir esir kadrosundan ya da
      esirleri değiştiren başka bir moddan gelir; orijinalde koruma yoktur. Bu bir
      kod/kadro hatasıdır, gölgelendirici veya sürücü sorunu DEĞİL — gölgelendirici
      yeniden oluşturmak yardımcı olmaz.
  fix:
    en:
      - "Crash Doctor already guards this — its safety net swallows the underflow so the game continues; the affected party just skips that one auto-sell. Keep the «exception guards» setting ON."
      - "If it keeps happening on the same save: a prison roster on that save is corrupt. Sell/release the prisoners of the party that crashes (often a specific lord's party near a town you just entered)."
      - "Suspect any mod that edits prisoners/rosters (recruit-prisoners, garrison, troop-editor mods). Disable them one at a time to find the source."
      - "Do NOT rebuild shaders or change drivers — this is a roster bug, that won't help."
    ru:
      - "Crash Doctor уже это перехватывает — safety net глушит андерфлоу, игра продолжается; задетый отряд просто пропускает одну автопродажу. Держи настройку «перехват ошибок» ВКЛ."
      - "Если повторяется на том же сейве — ростер пленных в этом сейве повреждён. Продай/отпусти пленных у отряда, на котором падает (часто это конкретный лорд рядом с городом, в который ты только что вошёл)."
      - "Подозревай любой мод, меняющий пленных/ростеры (вербовка пленных, гарнизоны, редакторы отрядов). Отключай по одному, чтобы найти источник."
      - "НЕ пересобирай шейдеры и не меняй драйвер — это баг ростера, не поможет."
    zh:
      - "Crash Doctor 已经拦截了它——安全网吞掉了下溢，游戏继续；受影响的队伍只是跳过那一次自动出售。保持「异常防护」设置为开。"
      - "如果在同一个存档上反复发生：该存档上的某个俘虏名册已损坏。出售/释放崩溃队伍的俘虏（通常是你刚进入的城镇附近某个特定领主的队伍）。"
      - "怀疑任何编辑俘虏/名册的模组（招募俘虏、驻军、部队编辑器类）。逐个禁用以找到来源。"
      - "不要重建着色器或更换驱动——这是名册 bug，没用。"
    zht:
      - "Crash Doctor 已經攔截了它——安全網吞掉了下溢，遊戲繼續；受影響的隊伍只是跳過那一次自動出售。保持「例外防護」設定為開啟。"
      - "如果在同一個存檔上反覆發生：該存檔上的某個俘虜名冊已損壞。出售/釋放崩潰隊伍的俘虜（通常是你剛進入的城鎮附近某個特定領主的隊伍）。"
      - "懷疑任何編輯俘虜/名冊的模組（招募俘虜、駐軍、部隊編輯器類）。逐個停用以找到來源。"
      - "不要重建著色器或更換驅動——這是名冊 bug，沒用。"
    tr:
      - "Crash Doctor bunu zaten koruyor — güvenlik ağı alt taşmayı yutar, oyun devam eder; etkilenen grup sadece o tek otomatik satışı atlar. «İstisna korumaları» ayarını AÇIK tut."
      - "Aynı kayıtta tekrarlanıyorsa: o kayıttaki bir esir kadrosu bozuk. Çöken grubun esirlerini sat/serbest bırak (genellikle yeni girdiğin bir kasabanın yakınındaki belirli bir lordun grubu)."
      - "Esirleri/kadroları düzenleyen her modu şüpheli gör (esir devşirme, garnizon, birlik düzenleyici modları). Kaynağı bulmak için teker teker devre dışı bırak."
      - "Gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — bu bir kadro hatası, yardımcı olmaz."
  match:
    all:
      - managed_exception: { frame_contains: "SellPrisonersAction" }
      - managed_exception: { type_contains: "UnderFlow" }

- id: campaign.encounter_menu_init_nre
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-07 report(4).txt — NullReferenceException EncounterGameMenuBehavior.game_menu_encounter_on_init ← GameMenu.RunOnInit ← MenuContext.HandleStates ← MapState.EnterMenuMode ← MapState.OnLoadingFinished. Captured by Crash Doctor managed capture."
  requires_sources: [managed_exception]
  title:
    en: "Save-load crash — broken encounter in the save — guarded by Crash Doctor"
    ru: "Вылет при загрузке — повреждённое столкновение в сейве — перехвачено Crash Doctor"
    zh: "读档崩溃——存档中的遭遇已损坏——已被 Crash Doctor 拦截"
    zht: "讀檔崩潰——存檔中的遭遇已損壞——已被 Crash Doctor 攔截"
    tr: "Kayıt yükleme çökmesi — kayıtta bozuk karşılaşma — Crash Doctor tarafından korunuyor"
  description:
    en: |
      NullReferenceException thrown from EncounterGameMenuBehavior.game_menu_encounter_on_init
      right after a save finished loading (MapState.OnLoadingFinished → EnterMenuMode → RunOnInit).
      The save's last menu was the "encounter" menu (you saved during a battle / siege /
      settlement entry), but the PlayerEncounter state did not restore: PlayerEncounter.Current
      and MobileParty.MainParty.MapEvent are both null. Vanilla init then calls
      PlayerEncounter.StartBattle()/Update(), which dereference the null encounter and crash the
      whole load. This is a broken/dangling encounter saved into THAT save file — a state bug,
      NOT a shader or driver problem, and not specific to one mod's code (TOR also patches this
      menu but its prefix passes through to vanilla here).
    ru: |
      NullReferenceException из EncounterGameMenuBehavior.game_menu_encounter_on_init сразу
      после того, как сейв догрузился (MapState.OnLoadingFinished → EnterMenuMode → RunOnInit).
      Последним меню в сейве было меню «столкновения» (сохранялись во время боя / осады /
      входа в поселение), но состояние PlayerEncounter не восстановилось: PlayerEncounter.Current
      и MobileParty.MainParty.MapEvent оба null. Ванильный код вызывает
      PlayerEncounter.StartBattle()/Update() по null-столкновению и роняет всю загрузку. Это
      повреждённое/висящее столкновение, записанное именно в ЭТОТ сейв — баг состояния, а НЕ
      проблема шейдеров или драйвера, и не вина кода конкретного мода (TOR тоже патчит это меню,
      но его prefix здесь пропускает в ваниль).
    zh: |
      存档刚加载完毕（MapState.OnLoadingFinished → EnterMenuMode → RunOnInit）后，
      EncounterGameMenuBehavior.game_menu_encounter_on_init 抛出空引用异常。存档的最后一个菜单
      是“遭遇”菜单（你在战斗／围城／进入定居点时保存），但 PlayerEncounter 状态未能恢复：
      PlayerEncounter.Current 和 MobileParty.MainParty.MapEvent 都为 null。原版代码随后调用
      PlayerEncounter.StartBattle()/Update()，对空遭遇取引用，导致整个读档崩溃。这是写入“该”
      存档的损坏／悬空遭遇——是状态 bug，不是着色器或驱动问题，也不是某个模组代码的错（TOR 也
      会修补此菜单，但其前缀在此处放行到原版）。
    zht: |
      存檔剛載入完畢（MapState.OnLoadingFinished → EnterMenuMode → RunOnInit）後，
      EncounterGameMenuBehavior.game_menu_encounter_on_init 擲出空參考例外。存檔的最後一個選單
      是「遭遇」選單（你在戰鬥／圍城／進入聚落時存檔），但 PlayerEncounter 狀態未能恢復：
      PlayerEncounter.Current 和 MobileParty.MainParty.MapEvent 都為 null。原版程式碼隨後呼叫
      PlayerEncounter.StartBattle()/Update()，對空遭遇取參考，導致整個讀檔崩潰。這是寫入「該」
      存檔的損壞／懸空遭遇——是狀態 bug，不是著色器或驅動問題，也不是某個模組程式碼的錯（TOR 也
      會修補此選單，但其前綴在此處放行到原版）。
    tr: |
      Bir kayıt yüklenmeyi bitirir bitirmez (MapState.OnLoadingFinished → EnterMenuMode →
      RunOnInit) EncounterGameMenuBehavior.game_menu_encounter_on_init'ten
      NullReferenceException fırlatıldı. Kaydın son menüsü "karşılaşma" menüsüydü (savaş /
      kuşatma / yerleşime giriş sırasında kaydetmişsin), ama PlayerEncounter durumu geri
      yüklenemedi: PlayerEncounter.Current ve MobileParty.MainParty.MapEvent ikisi de null.
      Orijinal kod sonra PlayerEncounter.StartBattle()/Update() çağırır, null karşılaşmaya
      başvurur ve tüm yüklemeyi çökertir. Bu, O kayıt dosyasına yazılmış bozuk/asılı bir
      karşılaşmadır — bir durum hatası, gölgelendirici veya sürücü sorunu DEĞİL ve belirli bir
      modun kodunun suçu değil (TOR da bu menüyü yamalar ama ön eki burada orijinale geçiş yapar).
  fix:
    en:
      - "Crash Doctor already guards this — its safety net returns you to the campaign map instead of crashing, so the save opens. Keep the «Save-load crash guard (broken encounter)» fix ON (Crash Fixes tab)."
      - "That specific save is damaged in its encounter state. Load an EARLIER save — one made BEFORE you entered that battle / siege / settlement (an autosave from before the encounter works)."
      - "If you land on the map via the safety net, save immediately to a fresh slot — that new save is clean."
      - "Do NOT rebuild shaders or change drivers — this is a save-state bug, that won't help."
    ru:
      - "Crash Doctor уже это перехватывает — safety net возвращает тебя на карту кампании вместо вылета, и сейв открывается. Держи фикс «Защита от вылета при загрузке (повреждённое столкновение)» ВКЛ (вкладка «Фиксы крашей»)."
      - "Конкретно этот сейв повреждён в части столкновения. Загрузи БОЛЕЕ РАННИЙ сейв — сделанный ДО входа в тот бой / осаду / поселение (подойдёт автосейв до столкновения)."
      - "Если safety net вернул тебя на карту — сразу сохранись в новый слот, этот новый сейв уже чистый."
      - "НЕ пересобирай шейдеры и не меняй драйвер — это баг состояния сейва, не поможет."
    zh:
      - "Crash Doctor 已经拦截了它——安全网会把你送回战役大地图而非崩溃，存档即可打开。在「崩溃修复」页保持「读档崩溃防护（损坏的遭遇）」为开。"
      - "该存档在遭遇状态上已损坏。请加载更早的存档——在你进入那场战斗／围城／定居点之前所存的（遭遇之前的自动存档即可）。"
      - "如果安全网把你送回了大地图，立即另存到新槽位——这个新存档是干净的。"
      - "不要重建着色器或更换驱动——这是存档状态 bug，没用。"
    zht:
      - "Crash Doctor 已經攔截了它——安全網會把你送回戰役大地圖而非崩潰，存檔即可開啟。在「崩潰修復」頁保持「讀檔崩潰防護（損壞的遭遇）」為開。"
      - "該存檔在遭遇狀態上已損壞。請載入更早的存檔——在你進入那場戰鬥／圍城／聚落之前所存的（遭遇之前的自動存檔即可）。"
      - "如果安全網把你送回了大地圖，立即另存到新欄位——這個新存檔是乾淨的。"
      - "不要重建著色器或更換驅動——這是存檔狀態 bug，沒用。"
    tr:
      - "Crash Doctor bunu zaten koruyor — güvenlik ağı çökmek yerine seni sefer haritasına döndürür, böylece kayıt açılır. «Kayıt yükleme çökme koruması (bozuk karşılaşma)» düzeltmesini AÇIK tut (Çökme Düzeltmeleri sekmesi)."
      - "O kayıt, karşılaşma durumunda hasarlı. DAHA ÖNCEKİ bir kaydı yükle — o savaşa / kuşatmaya / yerleşime girMEDEN önce yapılmış olanı (karşılaşmadan önceki bir otomatik kayıt işe yarar)."
      - "Güvenlik ağıyla haritaya inersen hemen yeni bir yuvaya kaydet — o yeni kayıt temizdir."
      - "Gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — bu bir kayıt durumu hatası, yardımcı olmaz."
  match:
    all:
      - managed_exception: { frame_contains: "game_menu_encounter_on_init" }
      - managed_exception: { type_contains: "NullReference" }

# War Sails (official naval DLC, module id "NavalDLC") world-map ship-visual crash, caused by a
# BROKEN third-party "Faster Ships" mod. AccessViolationException (0xC0000005) thrown from
# NavalMobilePartyVisual.UpdateEntityPosition inside NavalMobilePartyVisualManager.OnTick →
# TWParallel.For (parallel worker thread, native memory). NavalDLC is the OFFICIAL DLC (the game
# does NOT list it under "Unofficial modules"; warsails assets everywhere) — do NOT tell the
# player to delete it. Client 2026-06-05 ROOT CAUSE found in rgl_log: right after the valid
# NavalDLC/ModuleData/ship_hulls.xml, the game opens Modules/Faster Ships/ModuleData/faster_ships.xml
# and ShipHulls.xsd rejects every entry — ~92 ship hulls each MISSING 19 required attributes,
# including map_visual_scale and mission_ship (the exact data UpdateEntityPosition reads to place
# the ship entity on the map). Faster Ships overrides the hull table with junk; ships built on those
# hulls have a null/zero map-visual entity, and once enough naval parties exist (~50h) one ticks
# through the parallel visual update with a bad native pointer → AV. Crash lands in official DLC code
# because that's the consumer of Faster Ships' broken data. This is a corrupted-state exception on a
# worker thread, NOT a managed exception we can swallow — Crash Doctor can only NAME it. Opening
# Crash Doctor over the naval map keeps the naval tick alive → fires there too (same crash).
- id: engine.warsails_ship_visual_av
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-05 report.txt — AccessViolationException at NavalDLC.View.Map.Visuals.NavalMobilePartyVisual.UpdateEntityPosition ← NavalMobilePartyVisualManager.OnTick ← TWParallel.For ← MapState.OnMapModeTick. Native rgl_log_errors: 0xC0000005, bottom frame NavalDLC.View.pdb. rgl_log: NavalDLC absent from 'Unofficial modules' (= official War Sails DLC); 'Faster Ships/ModuleData/faster_ships.xml' fails ShipHulls.xsd with 1748 'required attribute missing' errors over 92 hulls (map_visual_scale, mission_ship, max_hitpoints, sea_worthiness, …). Captured by Crash Doctor managed capture (no BEW)."
  requires_sources: [managed_exception]
  title:
    en: "War Sails ship-visual crash caused by the broken 'Faster Ships' mod — remove Faster Ships, keep the DLC"
    ru: "Краш визуала кораблей War Sails из-за сломанного мода «Faster Ships» — удали Faster Ships, DLC оставь"
    zh: "War Sails 船只视觉崩溃，由损坏的「Faster Ships」模组引起——移除 Faster Ships，保留 DLC"
    zht: "War Sails 船隻視覺崩潰，由損壞的「Faster Ships」模組引起——移除 Faster Ships，保留 DLC"
    tr: "Bozuk 'Faster Ships' modunun yol açtığı War Sails gemi-görsel çökmesi — Faster Ships'i kaldır, DLC'yi koru"
  description:
    en: |
      AccessViolationException (0xC0000005 — read/write of protected memory) thrown from
      NavalMobilePartyVisual.UpdateEntityPosition (official "War Sails" DLC, module "NavalDLC"),
      called inside NavalMobilePartyVisualManager.OnTick through TWParallel.For — a parallel
      worker thread that positions every ship on the world map. The DLC itself is fine and is
      part of your game; the real cause is the third-party "Faster Ships" mod. In the log, right
      after the game loads the valid NavalDLC ship_hulls.xml it loads Faster Ships'
      faster_ships.xml, and the ship-hull validator rejects all ~92 of its hull entries — each is
      MISSING 19 required attributes, including map_visual_scale and mission_ship, the exact data
      this crash method reads to place the ship's 3D entity on the map. Faster Ships overwrites the
      ship-hull table with junk; ships built on those hulls get a null/zero map entity, and once
      enough naval parties exist (about 50h in) one of them ticks through the parallel visual update
      with a bad pointer and the engine instantly dies. That is why a fresh start scans clean (no
      such ship yet) and the crash only appears after hours of play. NOTE: opening Crash Doctor over
      the naval map (Ctrl+Alt+D) keeps the naval tick running, so it crashes there too — same crash.
    ru: |
      AccessViolationException (0xC0000005 — чтение/запись защищённой памяти) из метода
      NavalMobilePartyVisual.UpdateEntityPosition (официальное DLC «War Sails», модуль «NavalDLC»),
      вызванного внутри NavalMobilePartyVisualManager.OnTick через TWParallel.For — параллельный
      рабочий поток, который расставляет каждый корабль на карте мира. Само DLC исправно и является
      частью игры; настоящая причина — сторонний мод «Faster Ships». В логе сразу после того, как
      игра грузит корректный NavalDLC ship_hulls.xml, открывается faster_ships.xml этого мода, и
      валидатор корпусов кораблей отвергает все ~92 его записи — у каждой ОТСУТСТВУЮТ 19 обязательных
      атрибутов, включая map_visual_scale и mission_ship — ровно те данные, которые этот падающий
      метод читает, чтобы поставить 3D-модель корабля на карту. Faster Ships перезаписывает таблицу
      корпусов мусором; у кораблей на таких корпусах модель на карте оказывается null/нулевой, и как
      только морских отрядов накапливается достаточно (примерно к 50 часам), один из них проходит
      через параллельное обновление визуала с битым указателем — и движок мгновенно падает. Поэтому
      свежий старт сканируется чисто (такого корабля ещё нет), а краш появляется только спустя часы
      игры. ВАЖНО: открытие Crash Doctor поверх морской карты (Ctrl+Alt+D) не останавливает морской
      тик, поэтому там падает тоже — это тот же краш.
    zh: |
      AccessViolationException（0xC0000005——读写受保护内存）从
      NavalMobilePartyVisual.UpdateEntityPosition（官方「War Sails」DLC，模块「NavalDLC」）抛出，
      该方法在 NavalMobilePartyVisualManager.OnTick 中通过 TWParallel.For 调用——这是一个在世界
      地图上为每艘船定位的并行工作线程。DLC 本身没问题，是你游戏的一部分；真正的原因是第三方
      「Faster Ships」模组。日志显示：游戏加载了有效的 NavalDLC ship_hulls.xml 之后，紧接着加载
      Faster Ships 的 faster_ships.xml，而船体验证器拒绝了它全部约 92 条船体条目——每条都缺少
      19 个必需属性，包括 map_visual_scale 和 mission_ship，正是这个崩溃方法用来把船的 3D 实体
      放到地图上的数据。Faster Ships 用垃圾数据覆盖了船体表；基于这些船体的船只在地图上得到一个
      空/零实体，一旦海军队伍积累到足够多（大约 50 小时后），其中一个在并行视觉更新中带着错误
      指针被处理，引擎立即崩溃。这就是为什么全新开局扫描是干净的（还没有这种船），崩溃只在游戏
      数小时后出现。注意：在海图上打开 Crash Doctor（Ctrl+Alt+D）不会停止海军 tick，所以在那里
      也会崩溃——同一个崩溃。
    zht: |
      AccessViolationException（0xC0000005——讀寫受保護記憶體）從
      NavalMobilePartyVisual.UpdateEntityPosition（官方「War Sails」DLC，模組「NavalDLC」）擲出，
      該方法在 NavalMobilePartyVisualManager.OnTick 中透過 TWParallel.For 呼叫——這是一個在世界
      地圖上為每艘船定位的並行工作執行緒。DLC 本身沒問題，是你遊戲的一部分；真正的原因是第三方
      「Faster Ships」模組。日誌顯示：遊戲載入了有效的 NavalDLC ship_hulls.xml 之後，緊接著載入
      Faster Ships 的 faster_ships.xml，而船體驗證器拒絕了它全部約 92 條船體條目——每條都缺少
      19 個必要屬性，包括 map_visual_scale 和 mission_ship，正是這個崩潰方法用來把船的 3D 實體
      放到地圖上的資料。Faster Ships 用垃圾資料覆寫了船體表；基於這些船體的船隻在地圖上得到一個
      空/零實體，一旦海軍隊伍累積到足夠多（大約 50 小時後），其中一個在並行視覺更新中帶著錯誤
      指標被處理，引擎立即崩潰。這就是為什麼全新開局掃描是乾淨的（還沒有這種船），崩潰只在遊戲
      數小時後出現。注意：在海圖上開啟 Crash Doctor（Ctrl+Alt+D）不會停止海軍 tick，所以在那裡
      也會崩潰——同一個崩潰。
    tr: |
      NavalMobilePartyVisual.UpdateEntityPosition metodundan (resmî "War Sails" DLC, modül
      "NavalDLC") AccessViolationException (0xC0000005 — korumalı belleğin okunması/yazılması)
      fırlatıldı; bu metot NavalMobilePartyVisualManager.OnTick içinde TWParallel.For aracılığıyla
      çağrılır — dünya haritasındaki her gemiyi konumlandıran paralel bir çalışan iş parçacığı.
      DLC'nin kendisi sağlamdır ve oyunun bir parçasıdır; asıl neden üçüncü taraf "Faster Ships"
      modudur. Günlükte, oyun geçerli NavalDLC ship_hulls.xml dosyasını yükledikten hemen sonra
      Faster Ships'in faster_ships.xml dosyasını yükler ve gemi-gövdesi doğrulayıcısı onun ~92
      gövde girişinin tümünü reddeder — her biri map_visual_scale ve mission_ship dahil 19 zorunlu
      özniteliği EKSİK; bunlar tam olarak bu çöken metodun geminin 3B nesnesini haritaya yerleştirmek
      için okuduğu verilerdir. Faster Ships gövde tablosunu çöple ezer; bu gövdelere dayalı gemiler
      haritada null/sıfır bir nesne alır ve yeterince deniz grubu oluştuğunda (yaklaşık 50 saat sonra)
      bunlardan biri paralel görsel güncellemeden hatalı bir işaretçiyle geçer ve motor anında çöker.
      Bu yüzden yeni bir başlangıç temiz taranır (henüz böyle bir gemi yoktur) ve çökme yalnızca
      saatlerce oynadıktan sonra ortaya çıkar. NOT: Crash Doctor'u deniz haritasının üzerinde açmak
      (Ctrl+Alt+D) deniz tick'ini durdurmaz, orada da çöker — aynı çökme.
  fix:
    en:
      - "Remove the 'Faster Ships' mod (folder Modules/Faster Ships). Its faster_ships.xml overwrites the ship-hull table with entries missing the required map data (map_visual_scale, mission_ship, …), which is what corrupts War Sails' ship visuals."
      - "Do NOT delete NavalDLC — it is the official War Sails naval DLC, part of your game. The crash is in its code only because it consumes Faster Ships' broken data."
      - "After removing Faster Ships, try loading your existing save first — the hull table reverts to the DLC's valid one, so it will likely stop crashing without a new game. If it still crashes, start a new campaign."
      - "Do NOT disable your other mods one by one, and do NOT rebuild shaders or change drivers — the log already names Faster Ships, and this is a native memory bug those won't fix."
      - "Why Crash Doctor can't swallow it: it's native memory corruption (AccessViolation) on a parallel worker thread inside the DLC's own code. .NET does not let such corrupted-state errors be caught safely, and swallowing one risks silently corrupting your save — a clean crash is safer."
    ru:
      - "Удали мод «Faster Ships» (папка Modules/Faster Ships). Его faster_ships.xml перезаписывает таблицу корпусов кораблей записями без обязательных данных модели (map_visual_scale, mission_ship и др.) — именно это ломает визуал кораблей War Sails."
      - "НЕ удаляй NavalDLC — это официальное морское DLC «War Sails», часть игры. Падает его код только потому, что он использует битые данные Faster Ships."
      - "После удаления Faster Ships сначала попробуй загрузить текущий сейв — таблица корпусов вернётся к корректной из DLC, так что краш, скорее всего, прекратится без новой игры. Если всё равно падает — начинай новую катку."
      - "НЕ отключай остальные моды по одному и НЕ пересобирай шейдеры/драйвер — лог уже назвал Faster Ships, а это баг нативной памяти, шейдеры/драйвер не помогут."
      - "Почему Crash Doctor это не глушит: это порча нативной памяти (AccessViolation) на параллельном рабочем потоке внутри кода самого DLC. .NET не даёт безопасно ловить такие ошибки «испорченного состояния», а проглотить её — риск тихо запороть сейв; чистый краш безопаснее."
    zh:
      - "移除「Faster Ships」模组（文件夹 Modules/Faster Ships）。它的 faster_ships.xml 用缺少必需地图数据（map_visual_scale、mission_ship 等）的条目覆盖了船体表——正是这破坏了 War Sails 的船只视觉。"
      - "不要删除 NavalDLC——它是官方 War Sails 海战 DLC，是游戏的一部分。崩溃发生在它的代码里，只是因为它使用了 Faster Ships 的损坏数据。"
      - "移除 Faster Ships 后，先尝试加载现有存档——船体表会恢复为 DLC 的有效版本，所以很可能无需开新档就不再崩溃。若仍崩溃，再开新战役。"
      - "不要逐个禁用其他模组，也不要重建着色器或更换驱动——日志已点名 Faster Ships，而且这是本地内存 bug，着色器/驱动都没用。"
      - "为什么 Crash Doctor 无法吞掉它：这是 DLC 自身代码中、在并行工作线程上的本地内存损坏（访问越界）。.NET 不允许安全地捕获这类「损坏状态」错误，吞掉它有可能悄悄损坏你的存档——干净地崩溃更安全。"
    zht:
      - "移除「Faster Ships」模組（資料夾 Modules/Faster Ships）。它的 faster_ships.xml 用缺少必要地圖資料（map_visual_scale、mission_ship 等）的條目覆寫了船體表——正是這破壞了 War Sails 的船隻視覺。"
      - "不要刪除 NavalDLC——它是官方 War Sails 海戰 DLC，是遊戲的一部分。崩潰發生在它的程式碼裡，只是因為它使用了 Faster Ships 的損壞資料。"
      - "移除 Faster Ships 後，先嘗試載入現有存檔——船體表會恢復為 DLC 的有效版本，所以很可能無需開新檔就不再崩潰。若仍崩潰，再開新戰役。"
      - "不要逐個停用其他模組，也不要重建著色器或更換驅動——日誌已點名 Faster Ships，而且這是本機記憶體 bug，著色器/驅動都沒用。"
      - "為什麼 Crash Doctor 無法吞掉它：這是 DLC 自身程式碼中、在並行工作執行緒上的本機記憶體損壞（存取違規）。.NET 不允許安全地捕獲這類「損壞狀態」錯誤，吞掉它有可能悄悄損壞你的存檔——乾淨地崩潰更安全。"
    tr:
      - "'Faster Ships' modunu kaldır (klasör Modules/Faster Ships). faster_ships.xml dosyası gemi-gövdesi tablosunu, gerekli harita verilerini (map_visual_scale, mission_ship, …) içermeyen girişlerle ezer — War Sails'in gemi görsellerini bozan tam olarak budur."
      - "NavalDLC'yi SİLME — bu resmî War Sails deniz DLC'sidir, oyunun bir parçasıdır. Çökme yalnızca Faster Ships'in bozuk verisini kullandığı için onun kodunda olur."
      - "Faster Ships'i kaldırdıktan sonra önce mevcut kaydını yüklemeyi dene — gövde tablosu DLC'nin geçerli haline döner, bu yüzden büyük olasılıkla yeni bir oyuna gerek kalmadan çökme durur. Hâlâ çöküyorsa yeni bir sefer başlat."
      - "Diğer modlarını teker teker kapatma ve gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — günlük zaten Faster Ships'i adlandırdı ve bu, gölgelendirici/sürücünün düzeltemeyeceği yerel bir bellek hatasıdır."
      - "Crash Doctor neden yutamaz: bu, DLC'nin kendi kodunda paralel bir çalışan iş parçacığında oluşan yerel bellek bozulmasıdır (AccessViolation). .NET bu tür «bozuk durum» hatalarının güvenle yakalanmasına izin vermez ve birini yutmak kaydını sessizce bozma riski taşır — temiz bir çökme daha güvenlidir."
  match:
