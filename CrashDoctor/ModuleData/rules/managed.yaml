      - "«Kayıt yüklenirken bozuk birlikleri onar» seçeneğini de AÇIK tut — sonraki kayıt yüklemesinde tüm grupları tarar ve buna yol açan bozuk/sarkan birlik kayıtlarını kaldırarak kaydın kendisini onarır."
