      - "Kök neden, takımı olmayan bir askeri doğuran/çağıran bir moddur. Çağırma / ölü diriltme yetenekleri (TOR) ya da savaş ortasında takviye ekleyen bir mod kullanıyorsan kaynak odur; etki kozmetiktir, koruma açıkken bir şey yapmana gerek yok."
      - "Gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — bu bir savaş durumu hatası, yardımcı olmaz."
  match:
