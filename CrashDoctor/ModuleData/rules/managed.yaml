# SAVE crash: ArgumentException "An item with the same key has already been added." thrown from
# MBSaveLoad.GetSaveMetaData while writing a save (SaveHandler.SaveTick → SaveAsCurrentGame →
# OverwriteSaveAux → GetSaveMetaData → Dictionary.Insert(add)). GetSaveMetaData feeds every entry of
# CampaignSaveMetaDataArgs.OtherData into metaData.Add(...), which throws on a duplicate key. Vanilla
# SaveHandler supplies 15 distinct keys, none colliding with the reserved engine keys (Modules /
# Module_* / ApplicationVersion / CreationTime), so the base game never throws. A third-party mod
# Harmony-patching SaveHandler.GetSaveMetaData to append its own metadata can inject a duplicate or
# reserved key — and then EVERY save (auto/quick/manual) crashes the game on the tick. Reported on a
# vanilla 1.4.5 + utility-mods list (no TOR), seen 5×.
- id: campaign.save_metadata_dupe_key
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Client report (23) 2026-06-16 crash 1799f5bb — ArgumentException 'An item with the same key has already been added.' at TaleWorlds.Core.MBSaveLoad.GetSaveMetaData ← OverwriteSaveAux ← SaveAsCurrentGame ← SaveHandler.SaveTick ← Module.OnApplicationTick_Patch1. Game 1.4.5, no TOR; modlist BetterCore/BetterHUD/BetterTime/ButterAchievements/TroopTrainingExpanded/etc. Engine MBSaveLoad.GetSaveMetaData verified in decompiled source: OtherData fed into Dictionary.Add."
  requires_sources: [managed_exception]
  title:
    en: "Save crash — a mod added a duplicate save-metadata key — guarded by Crash Doctor"
    ru: "Вылет при сохранении — мод добавил дубль ключа метаданных сейва — перехвачено Crash Doctor"
    zh: "保存崩溃——某模组添加了重复的存档元数据键——已被 Crash Doctor 拦截"
    zht: "存檔當機——某模組加入了重複的存檔中繼資料鍵——已被 Crash Doctor 攔截"
    tr: "Kayıt çökmesi — bir mod yinelenen bir kayıt meta-veri anahtarı ekledi — Crash Doctor koruyor"
  description:
    en: |
      ArgumentException "An item with the same key has already been added." thrown from
      TaleWorlds.Core.MBSaveLoad.GetSaveMetaData while the game writes a save (SaveHandler.SaveTick →
      SaveAsCurrentGame → OverwriteSaveAux → GetSaveMetaData → Dictionary.Insert). GetSaveMetaData
      builds the save's metadata dictionary and uses Dictionary.Add for "ApplicationVersion",
      "CreationTime" and every entry of the metadata's OtherData list; Add throws if the key already
      exists. The base game supplies 15 distinct keys, so vanilla never throws — meaning a third-party
      mod that patches the metadata builder to append its own entry has injected a duplicate key (or
      one colliding with a reserved key: Modules / Module_* / ApplicationVersion / CreationTime). Once
      it does, every save (auto / quick / manual) crashes on the tick. This is a mod conflict, NOT a
      shader/driver problem, NOT a TOR bug and NOT a Crash Doctor bug.
    ru: |
      ArgumentException «An item with the same key has already been added.» из
      TaleWorlds.Core.MBSaveLoad.GetSaveMetaData в момент записи сейва (SaveHandler.SaveTick →
      SaveAsCurrentGame → OverwriteSaveAux → GetSaveMetaData → Dictionary.Insert). GetSaveMetaData
      строит словарь метаданных сейва и кладёт через Dictionary.Add ключи «ApplicationVersion»,
      «CreationTime» и каждый элемент списка OtherData; Add падает, если ключ уже есть. Базовая игра
      кладёт 15 уникальных ключей, поэтому ваниль не падает — значит сторонний мод, патчащий сборку
      метаданных, чтобы дописать своё, добавил дублирующий ключ (или совпавший с зарезервированным:
      Modules / Module_* / ApplicationVersion / CreationTime). После этого КАЖДОЕ сохранение
      (авто / быстрое / ручное) роняет игру на тике. Это конфликт модов, а НЕ проблема шейдеров/драйвера,
      НЕ баг TOR и НЕ баг Crash Doctor.
    zh: |
      游戏写入存档时（SaveHandler.SaveTick → SaveAsCurrentGame → OverwriteSaveAux → GetSaveMetaData →
      Dictionary.Insert），TaleWorlds.Core.MBSaveLoad.GetSaveMetaData 抛出 ArgumentException
      “An item with the same key has already been added.”。GetSaveMetaData 构建存档的元数据字典，并对
      “ApplicationVersion”“CreationTime”以及元数据 OtherData 列表的每一项使用 Dictionary.Add；若键已存在，
      Add 会抛异常。原版提供 15 个不同的键，因此原版从不报错——这意味着某个修改元数据构建过程以追加自身条目的
      第三方模组注入了重复键（或与保留键冲突：Modules / Module_* / ApplicationVersion / CreationTime）。
      此后每次保存（自动／快速／手动）都会在 tick 上崩溃。这是模组冲突，不是着色器／驱动问题，不是 TOR 的
      bug，也不是 Crash Doctor 的 bug。
    zht: |
      遊戲寫入存檔時（SaveHandler.SaveTick → SaveAsCurrentGame → OverwriteSaveAux → GetSaveMetaData →
      Dictionary.Insert），TaleWorlds.Core.MBSaveLoad.GetSaveMetaData 擲出 ArgumentException
      「An item with the same key has already been added.」。GetSaveMetaData 建構存檔的中繼資料字典，並對
      「ApplicationVersion」「CreationTime」以及中繼資料 OtherData 清單的每一項使用 Dictionary.Add；若鍵已存在，
      Add 會擲出例外。原版提供 15 個不同的鍵，因此原版從不報錯——這代表某個修改中繼資料建構過程以附加自身項目的
      第三方模組注入了重複鍵（或與保留鍵衝突：Modules / Module_* / ApplicationVersion / CreationTime）。
      此後每次存檔（自動／快速／手動）都會在 tick 上當機。這是模組衝突，不是著色器／驅動問題，不是 TOR 的
      bug，也不是 Crash Doctor 的 bug。
    tr: |
      Oyun bir kaydı yazarken (SaveHandler.SaveTick → SaveAsCurrentGame → OverwriteSaveAux →
      GetSaveMetaData → Dictionary.Insert) TaleWorlds.Core.MBSaveLoad.GetSaveMetaData'dan
      ArgumentException "An item with the same key has already been added." fırlatıldı. GetSaveMetaData
      kaydın meta-veri sözlüğünü kurar ve "ApplicationVersion", "CreationTime" ile meta-verinin OtherData
      listesindeki her giriş için Dictionary.Add kullanır; anahtar zaten varsa Add hata fırlatır. Temel
      oyun 15 farklı anahtar sağlar, dolayısıyla orijinal asla hata vermez — yani meta-veri oluşturucuyu
      kendi girişini eklemek için yamalayan üçüncü taraf bir mod, yinelenen bir anahtar (veya ayrılmış
      bir anahtarla çakışan: Modules / Module_* / ApplicationVersion / CreationTime) enjekte etmiştir.
      Bunun ardından her kayıt (otomatik / hızlı / elle) tick'te çöker. Bu bir mod çakışmasıdır;
      gölgelendirici/sürücü sorunu DEĞİL, TOR hatası DEĞİL ve Crash Doctor hatası DEĞİL.
  fix:
    en:
      - "Crash Doctor already guards this — the «Save crash guard (duplicate mod metadata key)» fix drops the duplicate metadata key before the save is written, so the save completes. Keep it ON (Crash Fixes tab). Update Crash Doctor to the latest version — older builds don't have this guard."
      - "Root is a mod conflict: another mod adds a save-metadata entry whose key duplicates an existing one. To find it, disable recently-added utility mods (the ones that touch saves/UI) one group at a time and save after each — when the crash stops, the last group disabled contains the culprit; report it to that mod's author."
      - "Do NOT rebuild shaders or change drivers — this is a save-metadata conflict, that won't help."
    ru:
      - "Crash Doctor уже это перехватывает — фикс «Защита от вылета при сохранении (дубль ключа метаданных мода)» убирает дублирующий ключ до записи сейва, и сохранение проходит. Держи его ВКЛ (вкладка «Фиксы крашей»). Обнови Crash Doctor до последней версии — в старых сборках этой защиты нет."
      - "Корень — конфликт модов: другой мод дописывает в метаданные сейва ключ, совпадающий с уже существующим. Чтобы найти его, отключай недавно добавленные служебные моды (которые трогают сейвы/интерфейс) группами и сохраняйся после каждой — когда вылет прекратится, виновник в последней отключённой группе; сообщи автору того мода."
      - "НЕ пересобирай шейдеры и не меняй драйвер — это конфликт метаданных сейва, не поможет."
    zh:
      - "Crash Doctor 已经拦截了它——「保存崩溃防护（模组元数据键重复）」会在写入存档前移除重复的元数据键，于是保存得以完成。保持开启（「崩溃修复」页）。请将 Crash Doctor 更新到最新版本——旧版本没有此防护。"
      - "根源是模组冲突：另一个模组向存档元数据写入了与已有键重复的键。要定位它，请按组逐次禁用最近添加的、会触及存档／界面的工具类模组，并在每次之后保存——崩溃停止时，最后禁用的那一组里就有元凶；请向该模组作者反馈。"
      - "不要重建着色器或更换驱动——这是存档元数据冲突，没用。"
    zht:
      - "Crash Doctor 已經攔截了它——「存檔當機防護（模組中繼資料鍵重複）」會在寫入存檔前移除重複的中繼資料鍵，於是存檔得以完成。保持開啟（「崩潰修復」頁）。請將 Crash Doctor 更新到最新版本——舊版本沒有此防護。"
      - "根源是模組衝突：另一個模組向存檔中繼資料寫入了與既有鍵重複的鍵。要定位它，請按組逐次停用最近加入的、會觸及存檔／介面的工具類模組，並在每次之後存檔——當機停止時，最後停用的那一組裡就有元兇；請向該模組作者回報。"
      - "不要重建著色器或更換驅動——這是存檔中繼資料衝突，沒用。"
    tr:
      - "Crash Doctor bunu zaten koruyor — «Kayıt çökme koruması (yinelenen mod meta-veri anahtarı)» düzeltmesi kayıt yazılmadan önce yinelenen meta-veri anahtarını düşürür, böylece kayıt tamamlanır. AÇIK tut (Çökme Düzeltmeleri sekmesi). Crash Doctor'ı en son sürüme güncelle — eski sürümlerde bu koruma yok."
      - "Kök bir mod çakışmasıdır: başka bir mod, anahtarı mevcut biriyle aynı olan bir kayıt meta-veri girişi ekler. Bulmak için, son eklenen yardımcı modları (kayıtlara/arayüze dokunanları) grup grup devre dışı bırak ve her seferinde kaydet — çökme durduğunda, son devre dışı bırakılan grupta suçlu vardır; o modun yazarına bildir."
      - "Gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — bu bir kayıt meta-veri çakışmasıdır, yardımcı olmaz."
  match:
    all:
      - managed_exception: { frame_contains: "GetSaveMetaData" }
      - managed_exception: { type_contains: "ArgumentException" }

# MISSION-tick crash during SIEGE DEPLOYMENT. NullReferenceException from
# TaleWorlds.MountAndBlade.MovementOrder.IsApplicable ← MovementOrder.CreateNewOrderWorldPositionMT
# ← BehaviorComponent.PrecalculateMovementOrder ← FormationAI.FindBestBehavior ← TickOccasionally ←
# Tick ← Formation.Tick ← Team.Tick ← SiegeDeploymentHandler.AutoDeployTeamUsingTeamAI ←
# MissionOrderDeploymentControllerVM.DeployFormationsOfPlayer/ExecuteDeployPlayerSide ←
# Mission.OnBattleSideDeployed ← ... ← DeploymentMissionController.OnMissionTick. The player presses
# "Deploy" in a siege; the engine auto-deploys the team's formations through the team AI, which
# re-evaluates each formation's movement order via IsApplicable. IsApplicable switches on the order
# kind and dereferences its stored target WITHOUT a null guard (AttackEntity/FollowEntity →
# TargetEntity, ChargeToTarget → TargetFormation, Follow → _targetAgent). A formation carrying an
# order whose target has gone null (destroyed siege machine, emptied formation, removed agent
# between phases) NREs and the whole mission tick dies before the assault begins. Endemic vanilla
# formation-AI fragility around siege deployment; NOT a shader/driver problem and not a TOR bug.
- id: mission.movement_order_applicable_nre
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-19 report(25).txt — NullReferenceException TaleWorlds.MountAndBlade.MovementOrder.IsApplicable ← MovementOrder.CreateNewOrderWorldPositionMT ← BehaviorComponent.PrecalculateMovementOrder ← FormationAI.FindBestBehavior ← FormationAI.TickOccasionally ← Formation.Tick_Patch1 ← Team.Tick ← SiegeDeploymentHandler.AutoDeployTeamUsingTeamAI ← MissionOrderDeploymentControllerVM.DeployFormationsOfPlayer ← Mission.OnBattleSideDeployed ← DeploymentMissionController.OnMissionTick. Bannerlord 1.3.15, modlist TOR_Core + RTSCameraUniversal + ReinforcementSystem + BattleSizeResized etc. Engine MovementOrder.IsApplicable verified in decompiled source: switch dereferences TargetEntity/TargetFormation/_targetAgent without null guard. Captured by Crash Doctor managed capture, seen 2×."
  requires_sources: [managed_exception]
  title:
    en: "Siege-deploy crash — a formation had a stale movement order — guarded by Crash Doctor"
    ru: "Вылет при расстановке в осаде — у построения был устаревший приказ движения — перехвачено Crash Doctor"
    zh: "围城布阵崩溃——某阵型残留了陈旧的移动命令——已被 Crash Doctor 拦截"
    zht: "圍城佈陣崩潰——某陣型殘留了陳舊的移動命令——已被 Crash Doctor 攔截"
    tr: "Kuşatma yerleşimi çökmesi — bir dizilimde eski bir hareket emri vardı — Crash Doctor koruyor"
  description:
    en: |
      NullReferenceException from TaleWorlds.MountAndBlade.MovementOrder.IsApplicable on the mission
      tick, when you press "Deploy" in a siege and the engine auto-deploys the team's formations
      through the team AI (SiegeDeploymentHandler.AutoDeployTeamUsingTeamAI → Team.Tick →
      Formation.Tick → FormationAI.FindBestBehavior → PrecalculateMovementOrder →
      CreateNewOrderWorldPositionMT → IsApplicable). IsApplicable checks whether a formation's
      movement order is still valid; it switches on the order kind and dereferences the order's
      stored target — TargetEntity (attack/follow an object), TargetFormation (charge a formation) or
      _targetAgent (follow a soldier) — without a null check. A formation can carry an order whose
      target has since gone null (a destroyed siege machine, an emptied enemy formation, a removed
      agent between battle phases). When the deploy handler force-ticks the AI to auto-place
      formations, that dead target dereferences null and the whole mission tick crashes before the
      assault even starts. This is vanilla engine fragility in the formation AI, NOT a shader or
      driver problem and not a TOR bug; large mod lists that churn formations/orders make it likelier.
    ru: |
      NullReferenceException из TaleWorlds.MountAndBlade.MovementOrder.IsApplicable на тике миссии,
      когда ты жмёшь «Развернуть» в осаде и движок сам расставляет построения команды через боевой
      ИИ (SiegeDeploymentHandler.AutoDeployTeamUsingTeamAI → Team.Tick → Formation.Tick →
      FormationAI.FindBestBehavior → PrecalculateMovementOrder → CreateNewOrderWorldPositionMT →
      IsApplicable). IsApplicable проверяет, актуален ли ещё приказ движения построения; он смотрит на
      тип приказа и разыменовывает его цель — TargetEntity (атаковать/следовать за объектом),
      TargetFormation (идти на построение) или _targetAgent (следовать за бойцом) — без проверки на
      null. У построения может остаться приказ, чья цель к этому моменту стала null (разрушенная
      осадная машина, опустевшее вражеское построение, удалённый боец между фазами боя). Когда
      обработчик расстановки принудительно прогоняет ИИ для авто-размещения построений, эта мёртвая
      цель разыменовывает null, и весь тик миссии падает ещё до начала штурма. Это хрупкость движка в
      формейшн-ИИ, а НЕ проблема шейдеров/драйвера и не баг TOR; большие сборки модов, тасующие
      построения/приказы, повышают шанс.
    zh: |
      当你在围城中按下“布阵”、引擎通过队伍 AI 自动布置队伍的阵型时
      （SiegeDeploymentHandler.AutoDeployTeamUsingTeamAI → Team.Tick → Formation.Tick →
      FormationAI.FindBestBehavior → PrecalculateMovementOrder → CreateNewOrderWorldPositionMT →
      IsApplicable），TaleWorlds.MountAndBlade.MovementOrder.IsApplicable 在任务 tick 上抛出空引用异常。
      IsApplicable 检查某阵型的移动命令是否仍然有效；它根据命令类型对其存储的目标取引用——
      TargetEntity（攻击／跟随某物）、TargetFormation（冲锋某阵型）或 _targetAgent（跟随某士兵）——
      却未做空检查。阵型可能残留着一条其目标此时已变为 null 的命令（被摧毁的攻城器械、已清空的敌方
      阵型、阶段之间被移除的士兵）。当布阵处理器强制运行 AI 自动放置阵型时，这个失效目标对空取引用，
      整个任务 tick 在攻城开始前就崩溃。这是阵型 AI 中的原版引擎脆弱性，不是着色器或驱动问题，也不是
      TOR 的 bug；频繁改动阵型／命令的大型模组列表会增加概率。
    zht: |
      當你在圍城中按下「佈陣」、引擎透過隊伍 AI 自動佈置隊伍的陣型時
      （SiegeDeploymentHandler.AutoDeployTeamUsingTeamAI → Team.Tick → Formation.Tick →
      FormationAI.FindBestBehavior → PrecalculateMovementOrder → CreateNewOrderWorldPositionMT →
      IsApplicable），TaleWorlds.MountAndBlade.MovementOrder.IsApplicable 在任務 tick 上擲出空參考例外。
      IsApplicable 檢查某陣型的移動命令是否仍然有效；它根據命令類型對其儲存的目標取參考——
      TargetEntity（攻擊／跟隨某物）、TargetFormation（衝鋒某陣型）或 _targetAgent（跟隨某士兵）——
      卻未做空檢查。陣型可能殘留著一條其目標此時已變為 null 的命令（被摧毀的攻城器械、已清空的敵方
      陣型、階段之間被移除的士兵）。當佈陣處理器強制執行 AI 自動放置陣型時，這個失效目標對空取參考，
      整個任務 tick 在攻城開始前就崩潰。這是陣型 AI 中的原版引擎脆弱性，不是著色器或驅動問題，也不是
      TOR 的 bug；頻繁改動陣型／命令的大型模組列表會增加機率。
    tr: |
      Bir kuşatmada "Yerleştir"e bastığında ve motor takımın dizilimlerini takım yapay zekâsı üzerinden
      otomatik yerleştirirken (SiegeDeploymentHandler.AutoDeployTeamUsingTeamAI → Team.Tick →
      Formation.Tick → FormationAI.FindBestBehavior → PrecalculateMovementOrder →
      CreateNewOrderWorldPositionMT → IsApplicable) görev tick'inde
      TaleWorlds.MountAndBlade.MovementOrder.IsApplicable'dan NullReferenceException fırlatıldı.
      IsApplicable bir dizilimin hareket emrinin hâlâ geçerli olup olmadığını kontrol eder; emir
      türüne göre saklanan hedefini — TargetEntity (bir nesneye saldır/takip et), TargetFormation (bir
      dizilime hücum) veya _targetAgent (bir askeri takip et) — null kontrolü yapmadan başvurur. Bir
      dizilim, hedefi o ana kadar null olmuş bir emir taşıyabilir (yıkılmış bir kuşatma makinesi,
      boşalmış bir düşman dizilimi, aşamalar arasında kaldırılmış bir asker). Yerleştirme işleyicisi
      dizilimleri otomatik yerleştirmek için AI'yı zorla işlettiğinde, bu ölü hedef null'a başvurur ve
      tüm görev tick'i saldırı başlamadan çöker. Bu, dizilim yapay zekâsındaki orijinal motor
      kırılganlığıdır; gölgelendirici veya sürücü sorunu DEĞİL ve bir TOR hatası değil; dizilimleri/
      emirleri sık değiştiren büyük mod listeleri olasılığı artırır.
  fix:
    en:
      - "Crash Doctor already guards this — its safety net treats the stale order as no-longer-applicable, so the formation drops it and falls back to a default position; the deploy completes and the assault continues. Keep the «Siege-deploy crash guard (stale formation order)» fix ON (Crash Fixes tab). Update Crash Doctor to the latest version — older builds don't have this guard."
      - "If you'd rather avoid it entirely while unpatched: in the siege, place your formations manually instead of using auto-deploy (the crash is in the auto-deploy AI path)."
      - "Do NOT rebuild shaders or change drivers — this is a battle-state bug, that won't help."
    ru:
      - "Crash Doctor уже это перехватывает — safety net считает устаревший приказ неактуальным, построение сбрасывает его и встаёт на стандартную позицию; расстановка завершается, штурм продолжается. Держи фикс «Защита от вылета при расстановке в осаде (устаревший приказ строя)» ВКЛ (вкладка «Фиксы крашей»). Обнови Crash Doctor до последней версии — в старых сборках этой защиты нет."
      - "Если хочешь полностью избежать вылета без патча: в осаде расставляй построения вручную, а не через авто-расстановку (вылет в ветке авто-ИИ)."
      - "НЕ пересобирай шейдеры и не меняй драйвер — это баг состояния боя, не поможет."
    zh:
      - "Crash Doctor 已经拦截了它——安全网将陈旧命令视为不再有效，于是阵型丢弃它并回退到默认位置；布阵完成，攻城继续。在「崩溃修复」页保持「围城布阵崩溃防护（陈旧的阵型命令）」为开。请将 Crash Doctor 更新到最新版本——旧版本没有此防护。"
      - "若在未打补丁时想完全避免：在围城中手动布置阵型，而非使用自动布阵（崩溃在自动布阵 AI 路径中）。"
      - "不要重建着色器或更换驱动——这是战斗状态 bug，没用。"
    zht:
      - "Crash Doctor 已經攔截了它——安全網將陳舊命令視為不再有效，於是陣型丟棄它並回退到預設位置；佈陣完成，攻城繼續。在「崩潰修復」頁保持「圍城佈陣崩潰防護（陳舊的陣型命令）」為開。請將 Crash Doctor 更新到最新版本——舊版本沒有此防護。"
      - "若在未打補丁時想完全避免：在圍城中手動佈置陣型，而非使用自動佈陣（崩潰在自動佈陣 AI 路徑中）。"
      - "不要重建著色器或更換驅動——這是戰鬥狀態 bug，沒用。"
    tr:
      - "Crash Doctor bunu zaten koruyor — güvenlik ağı eski emri artık geçerli değil sayar, böylece dizilim onu bırakır ve varsayılan konuma döner; yerleştirme tamamlanır ve saldırı devam eder. «Kuşatma yerleşimi çökme koruması (eski dizilim emri)» düzeltmesini AÇIK tut (Çökme Düzeltmeleri sekmesi). Crash Doctor'ı en son sürüme güncelle — eski sürümlerde bu koruma yok."
      - "Yama olmadan tamamen kaçınmak istersen: kuşatmada dizilimlerini otomatik yerleştirme yerine elle yerleştir (çökme otomatik yerleştirme AI yolundadır)."
      - "Gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — bu bir savaş durumu hatası, yardımcı olmaz."
  match:
    all:
      - managed_exception: { frame_contains: "MovementOrder.IsApplicable" }
      - managed_exception: { type_contains: "NullReference" }
