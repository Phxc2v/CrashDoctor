      - managed_exception: { type_contains: "NullReference" }

# Campaign-map DAILY-tick crash inside the troop-training XP model. NullReferenceException from
# DefaultPartyTrainingModel.GetEffectiveDailyExperience ← TOR_Core.Models.TORPartyTrainingModel.
# GetEffectiveDailyExperience (base-call override) ← MobilePartyTrainingBehavior.OnDailyTickParty ←
# CampaignEvents.DailyTickParty ← Campaign.Tick. The model walks a party's roster and dereferences
# each troop's CharacterObject; a LIVE troop with a null Culture (e.g. tor_gs_trolls, whose
# `culture="Culture.aserai"` attribute was dropped at runtime by another data mod's XSLT transform)
# makes the model NRE and the whole daily tick dies. Same "broken soldier" class as the wage/food/
# auto-upgrade guards, different method. The troop is NOT dangling (it is a valid registered object),
# so roster cleanup doesn't remove it — Crash Doctor instead repairs the null Culture on load AND
# guards this method. NOT a shader/driver problem, not really a TOR bug — broken character data from
# another mod.
- id: campaign.party_training_nre
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Local repro 2026-06-15 report fdcfe16e — NullReferenceException DefaultPartyTrainingModel.GetEffectiveDailyExperience ← TOR_Core.Models.TORPartyTrainingModel.GetEffectiveDailyExperience ← MobilePartyTrainingBehavior.OnDailyTickParty ← Campaign.Tick. crashdoctor.log showed 'null Culture on tor_gs_trolls' (same troop earlier caught by wage/food/upgrade guards). Modlist: TOR_Core + LoreHardcore. Captured by Crash Doctor managed capture."
  requires_sources: [managed_exception]
  title:
    en: "Daily-tick crash — troop training hit a soldier with no culture — guarded by Crash Doctor"
    ru: "Вылет на дневном тике — тренировка наткнулась на бойца без культуры — перехвачено Crash Doctor"
    zh: "每日结算崩溃——训练遇到无文化的士兵——已被 Crash Doctor 拦截"
    zht: "每日結算崩潰——訓練遇到無文化的士兵——已被 Crash Doctor 攔截"
    tr: "Günlük tick çökmesi — eğitim kültürsüz bir askere rastladı — Crash Doctor tarafından korunuyor"
  description:
    en: |
      NullReferenceException from DefaultPartyTrainingModel.GetEffectiveDailyExperience (called via
      TOR's TORPartyTrainingModel override) on the daily tick, while the game grants training XP to a
      party's troops (MobilePartyTrainingBehavior.OnDailyTickParty → Campaign.Tick). The model walks
      the roster and reads each troop's CharacterObject; one live troop has a null Culture, so a
      culture-dependent read dereferences null and the whole daily tick crashes. The classic case is
      the TOR monster troop tor_gs_trolls: TOR's XML gives it culture="Culture.aserai", but the
      runtime CharacterObject lost its culture (another data mod's XSLT transform dropped the
      attribute). The troop is valid and registered — it is NOT a dangling/removed troop — so it can
      be repaired rather than deleted. This is broken character DATA from a mod, NOT a shader or
      driver problem and not a core TOR bug.
    ru: |
      NullReferenceException из DefaultPartyTrainingModel.GetEffectiveDailyExperience (через оверрайд
      TOR TORPartyTrainingModel) на дневном тике, когда игра начисляет опыт тренировки войскам отряда
      (MobilePartyTrainingBehavior.OnDailyTickParty → Campaign.Tick). Модель идёт по ростеру и читает
      CharacterObject каждого бойца; у одного живого бойца культура (Culture) равна null, и обращение,
      зависящее от культуры, разыменовывает null — весь дневной тик падает. Классический случай —
      монстр-войско TOR tor_gs_trolls: в XML у TOR прописано culture="Culture.aserai", но рантайм-
      объект потерял культуру (XSLT-преобразование другого мода данных убрало атрибут). Боец валиден и
      зарегистрирован — это НЕ висящее/удалённое войско — поэтому его можно починить, а не удалять. Это
      битые ДАННЫЕ персонажа из мода, а НЕ проблема шейдеров/драйвера и не баг ядра TOR.
    zh: |
      每日结算时，游戏为某队伍的部队发放训练经验
      （MobilePartyTrainingBehavior.OnDailyTickParty → Campaign.Tick）时，
      DefaultPartyTrainingModel.GetEffectiveDailyExperience（经 TOR 的 TORPartyTrainingModel 覆写调用）
      抛出空引用异常。模型遍历名册并读取每个部队的 CharacterObject；某个有效部队的 Culture 为 null，
      于是依赖文化的读取对空取引用，整个每日结算崩溃。典型案例是 TOR 怪物部队 tor_gs_trolls：TOR 的 XML
      给它 culture="Culture.aserai"，但运行时对象丢失了文化（另一数据模组的 XSLT 转换删除了该属性）。
      该部队有效且已注册——并非悬空／已移除部队——因此可以修复而非删除。这是来自模组的损坏角色数据，
      不是着色器或驱动问题，也不是 TOR 核心 bug。
    zht: |
      每日結算時，遊戲為某隊伍的部隊發放訓練經驗
      （MobilePartyTrainingBehavior.OnDailyTickParty → Campaign.Tick）時，
      DefaultPartyTrainingModel.GetEffectiveDailyExperience（經 TOR 的 TORPartyTrainingModel 覆寫呼叫）
      擲出空參考例外。模型走訪名冊並讀取每個部隊的 CharacterObject；某個有效部隊的 Culture 為 null，
      於是依賴文化的讀取對空取參考，整個每日結算崩潰。典型案例是 TOR 怪物部隊 tor_gs_trolls：TOR 的 XML
      給它 culture="Culture.aserai"，但執行階段物件遺失了文化（另一資料模組的 XSLT 轉換移除了該屬性）。
      該部隊有效且已註冊——並非懸空／已移除部隊——因此可以修復而非刪除。這是來自模組的損壞角色資料，
      不是著色器或驅動問題，也不是 TOR 核心 bug。
    tr: |
      Günlük tick'te, oyun bir grubun birliklerine eğitim XP'si verirken
      (MobilePartyTrainingBehavior.OnDailyTickParty → Campaign.Tick)
      DefaultPartyTrainingModel.GetEffectiveDailyExperience'tan (TOR'un TORPartyTrainingModel geçersiz
      kılması üzerinden çağrılır) NullReferenceException fırlatıldı. Model kadroyu dolaşır ve her
      birliğin CharacterObject'ini okur; canlı bir birliğin Culture'ı null olduğundan kültüre bağlı
      bir okuma null'a başvurur ve tüm günlük tick çöker. Klasik örnek TOR canavar birliği
      tor_gs_trolls'tur: TOR'un XML'i ona culture="Culture.aserai" verir, ama çalışma zamanı nesnesi
      kültürünü kaybetmiştir (başka bir veri modunun XSLT dönüşümü özniteliği düşürmüş). Birlik
      geçerli ve kayıtlıdır — asılı/kaldırılmış bir birlik DEĞİLDİR — bu yüzden silinmek yerine
      onarılabilir. Bu, bir moddan gelen bozuk karakter VERİSİdir, gölgelendirici/sürücü sorunu değil
      ve bir TOR çekirdek hatası değil.
  fix:
    en:
      - "Crash Doctor already guards this — on load it repairs troop types whose culture went missing (so wage/food/upgrade/training all stop crashing), and a backstop guard skips one party's training if anything still throws. Keep «Fix broken troops on save load» and «Troop-training crash guard» ON (Crash Fixes tab)."
      - "Root cause is a data mod whose XSLT transform drops the `culture` attribute from a TOR troop (here tor_gs_trolls). If you maintain that mod, make the transform preserve the culture attribute (identity-copy attributes). TOR's own XML is correct."
      - "Do NOT rebuild shaders or change drivers — this is broken character data, that won't help."
    ru:
      - "Crash Doctor уже это перехватывает — при загрузке он восстанавливает культуру у типов войск, где она пропала (и тогда жалованье/еда/улучшение/тренировка перестают падать), а страховочный guard пропускает тренировку одного отряда, если что-то всё же бросает исключение. Держи «Чинить сломанные отряды при загрузке» и «Защита от вылета при тренировке войск» ВКЛ (вкладка «Фиксы крашей»)."
      - "Корень — мод данных, чьё XSLT-преобразование убирает атрибут `culture` у войска TOR (здесь tor_gs_trolls). Если это твой мод — сделай, чтобы преобразование сохраняло атрибут культуры (identity-копирование атрибутов). У самого TOR в XML всё правильно."
      - "НЕ пересобирай шейдеры и не меняй драйвер — это битые данные персонажа, не поможет."
    zh:
      - "Crash Doctor 已经拦截了它——读档时它会修复丢失文化的部队类型（于是军饷／粮食／升级／训练都不再崩溃），并有兜底防护在仍抛异常时跳过某队伍的训练。在「崩溃修复」页保持「读档时修复损坏的部队」和「部队训练崩溃防护」为开。"
      - "根源是某数据模组，其 XSLT 转换删除了 TOR 部队（此处为 tor_gs_trolls）的 `culture` 属性。如果该模组由你维护，请让转换保留文化属性（按属性做恒等复制）。TOR 自身的 XML 是正确的。"
      - "不要重建着色器或更换驱动——这是损坏的角色数据，没用。"
    zht:
      - "Crash Doctor 已經攔截了它——讀檔時它會修復遺失文化的部隊類型（於是軍餉／糧食／升級／訓練都不再崩潰），並有兜底防護在仍拋例外時跳過某隊伍的訓練。在「崩潰修復」頁保持「讀檔時修復損壞的部隊」和「部隊訓練崩潰防護」為開。"
      - "根源是某資料模組，其 XSLT 轉換移除了 TOR 部隊（此處為 tor_gs_trolls）的 `culture` 屬性。如果該模組由你維護，請讓轉換保留文化屬性（按屬性做恆等複製）。TOR 自身的 XML 是正確的。"
      - "不要重建著色器或更換驅動——這是損壞的角色資料，沒用。"
    tr:
      - "Crash Doctor bunu zaten koruyor — yüklemede kültürü kaybolan birlik türlerini onarır (böylece maaş/yiyecek/yükseltme/eğitim hepsi çökmeyi bırakır) ve bir emniyet koruması hâlâ bir hata fırlatılırsa bir grubun eğitimini atlar. «Kayıt yüklenirken bozuk birlikleri onar» ve «Birlik eğitimi çökme koruması» düzeltmelerini AÇIK tut (Çökme Düzeltmeleri sekmesi)."
      - "Kök neden, XSLT dönüşümü bir TOR birliğinden (burada tor_gs_trolls) `culture` özniteliğini düşüren bir veri modudur. O modu sen yönetiyorsan, dönüşümün kültür özniteliğini koruduğundan emin ol (öznitelikleri kimlik-kopyala). TOR'un kendi XML'i doğrudur."
      - "Gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — bu bozuk karakter verisidir, yardımcı olmaz."
  match:
    all:
      - managed_exception: { frame_contains: "GetEffectiveDailyExperience" }
      - managed_exception: { type_contains: "NullReference" }

# Campaign-map DAILY-tick crash inside TOR's troop assimilation. NullReferenceException from
