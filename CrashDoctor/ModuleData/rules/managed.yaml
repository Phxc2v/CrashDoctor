# Campaign-map DAILY-tick crash inside TOR's auto-upgrader. NullReferenceException from
# TOR_Core.CampaignMechanics.TORPartyUpgraderCampaignBehavior.GetTroopUpgradeList's filter lambda
# (<>c.<GetTroopUpgradeList>b__9_0) ← GetTroopUpgradeList ← UpgradeReadyTroops ← DailyTickParty ←
# CampaignEvents.DailyTickParty ← Campaign.Tick. TOR auto-upgrades AI lord parties once a day and
# filters the roster with `t => !t.Character.IsHero && t.Character.UpgradeTargets.Length != 0`;
# a roster element whose Character is null (a dangling troop left by another mod that unregistered a
# CharacterObject without removing it from the roster, or a save referencing a troop that no longer
# exists) makes `t.Character.IsHero` NRE and the whole daily tick dies. Same "broken soldier" class
# as the wage/food guards, different TOR method. NOT a shader/driver problem, not really a TOR bug —
# broken party state introduced by another mod.
- id: campaign.tor_party_upgrade_nre
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-12 report(11).txt — NullReferenceException TOR_Core.CampaignMechanics.TORPartyUpgraderCampaignBehavior.<>c.<GetTroopUpgradeList>b__9_0 ← GetTroopUpgradeList ← UpgradeReadyTroops ← DailyTickParty ← CampaignEvents.DailyTickParty ← Campaign.Tick. TORPartyUpgraderCampaignBehavior.cs line 136 (t.Character null in roster filter). Modlist: TOR_Core + LoreHardcore. Captured by Crash Doctor managed capture."
  requires_sources: [managed_exception]
  title:
    en: "Daily-tick crash — TOR troop auto-upgrade hit a broken troop — guarded by Crash Doctor"
    ru: "Вылет на дневном тике — авто-улучшение войск TOR наткнулось на битого бойца — перехвачено Crash Doctor"
    zh: "每日结算崩溃——TOR 部队自动升级遇到损坏士兵——已被 Crash Doctor 拦截"
    zht: "每日結算崩潰——TOR 部隊自動升級遇到損壞士兵——已被 Crash Doctor 攔截"
    tr: "Günlük tick çökmesi — TOR birlik otomatik yükseltmesi bozuk birliğe çarptı — Crash Doctor tarafından korunuyor"
  description:
    en: |
      NullReferenceException on the campaign-map DAILY tick, thrown from TOR's troop auto-upgrader
      (TORPartyUpgraderCampaignBehavior.GetTroopUpgradeList → UpgradeReadyTroops → DailyTickParty).
      Once a day TOR upgrades every AI lord party's troops to match its culture template; to do that
      it filters the party's member roster, reading each entry's Character. One entry's Character is
      null — a dangling/broken troop reference left in the roster by another mod (it unregistered a
      troop type without removing the soldiers using it), or a save referencing a troop that no longer
      exists. Reading the null troop's data NREs and the whole daily tick dies, taking the campaign
      with it. This is broken party state, NOT a shader or driver problem, and not really a TOR bug.
    ru: |
      NullReferenceException на ДНЕВНОМ тике карты, из авто-улучшения войск TOR
      (TORPartyUpgraderCampaignBehavior.GetTroopUpgradeList → UpgradeReadyTroops → DailyTickParty).
      Раз в день TOR улучшает войска каждого ИИ-отряда лорда под шаблон его культуры; для этого он
      фильтрует ростер отряда, читая Character каждой записи. У одной записи Character равен null —
      это зависшая/битая ссылка на бойца, оставленная в ростере другим модом (он снял регистрацию
      типа войск, не убрав использующих его солдат), либо сейв ссылается на войско, которого больше
      нет. Чтение данных пустого бойца даёт NRE, и весь дневной тик падает вместе с кампанией. Это
      битое состояние отряда, а НЕ проблема шейдеров или драйвера, и не баг TOR как таковой.
    zh: |
      战役地图每日 tick 时抛出空引用异常，来自 TOR 的部队自动升级器
      （TORPartyUpgraderCampaignBehavior.GetTroopUpgradeList → UpgradeReadyTroops → DailyTickParty）。
      TOR 每天会按文化模板升级每支 AI 领主队伍的部队；为此它会过滤队伍名册并读取每个条目的
      Character。其中一个条目的 Character 为 null——这是其他模组在名册中遗留的悬空／损坏部队引用
      （它注销了某部队类型却未移除仍在使用它的士兵），或存档引用了已不存在的部队。读取该空部队数据
      触发 NRE，整个每日 tick 连同战役一起崩溃。这是损坏的队伍状态，不是着色器或驱动问题，也不
      算 TOR 本身的 bug。
    zht: |
      戰役地圖每日 tick 時擲出空參考例外，來自 TOR 的部隊自動升級器
      （TORPartyUpgraderCampaignBehavior.GetTroopUpgradeList → UpgradeReadyTroops → DailyTickParty）。
      TOR 每天會按文化範本升級每支 AI 領主隊伍的部隊；為此它會過濾隊伍名冊並讀取每個條目的
      Character。其中一個條目的 Character 為 null——這是其他模組在名冊中遺留的懸空／損壞部隊參考
      （它登出了某部隊類型卻未移除仍在使用它的士兵），或存檔參考了已不存在的部隊。讀取該空部隊資料
      觸發 NRE，整個每日 tick 連同戰役一起崩潰。這是損壞的隊伍狀態，不是著色器或驅動問題，也不
      算 TOR 本身的 bug。
    tr: |
      Sefer haritası GÜNLÜK tick'inde, TOR'un birlik otomatik yükseltici sisteminden bir
      NullReferenceException (TORPartyUpgraderCampaignBehavior.GetTroopUpgradeList →
      UpgradeReadyTroops → DailyTickParty). TOR günde bir kez her AI lort grubunun birliklerini
      kültür şablonuna göre yükseltir; bunun için grubun kadrosunu filtreleyip her kaydın
      Character'ını okur. Bir kaydın Character'ı null — kadroda başka bir modun bıraktığı sarkan/bozuk
      bir birlik referansı (bir birlik türünün kaydını silmiş ama onu kullanan askerleri kaldırmamış)
      ya da artık var olmayan bir birliğe başvuran bir kayıt. Null birliğin verisini okumak NRE verir
      ve tüm günlük tick seferle birlikte çöker. Bu bozuk grup durumudur; gölgelendirici veya sürücü
      sorunu DEĞİL ve aslında bir TOR hatası değil.
  fix:
    en:
      - "Crash Doctor already guards this — its safety net skips the auto-upgrade for the one broken party and keeps the game running. Keep the «Troop auto-upgrade crash guard (TOR)» fix ON (Crash Fixes tab)."
      - "Also keep «Fix broken troops on save load» ON — on the next save load it scans every party and removes the broken/dangling troop entries that cause this, fixing the save itself."
      - "Root cause is broken party state from another mod that removed a troop type while soldiers of that type still existed. If it keeps happening, recall which troop-adding/overhaul mod you recently changed or removed."
      - "Do NOT rebuild shaders or change drivers — this is broken save/party state, that won't help."
