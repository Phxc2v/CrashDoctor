# Battle crash at reinforcement spawn: vanilla ColumnFormation.GetLocalPositionOfUnit builds the
# list of agent positions on the column's vanguard (head) file, Insert(0, OrderPosition)s into it
# and then unconditionally reads element [1]. When the column has no units left at its vanguard
# file (formation wiped out / vanguard dead while the arrangement is still a column), the list has
# one element and [1] throws ArgumentOutOfRangeException, killing the whole mission tick. Battle
# formations end up in column order via mods: Immersive Battlefields (reinforcements march in,
# in columns) or RTS Camera command system's column order. Verified in the 1.3.15 decompile;
# client hit it on 1.4.6. Guarded by ColumnFormationSpawnSafetyPatch (column_formation_spawn).
- id: battle.column_formation_reinforcement_aoore
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-11 report (6).txt — ArgumentOutOfRangeException(index) at ColumnFormation.GetLocalPositionOfUnit ← GetLocalPositionOfUnitOrDefault(Int32) ← Formation.GetUnitPositionWithIndexAccordingToNewOrder ← Mission.GetTroopSpawnFrameWithIndex ← Mission.SpawnAgent ← MissionBattleSideSpawnContext.TryReinforcementSpawn ← DefaultBattleMissionAgentSpawnLogic.OnMissionTick. Game 1.4.6, mod list includes ImmersiveBattlefields 3.6.1 and RTSCamera.CommandSystem 5.3.25. User: 'happening frequently during battles when reinforcements spawn'."
  requires_sources: [managed_exception]
  title:
    en: "Battle crash when reinforcements spawn — empty column formation — guarded by Crash Doctor"
    ru: "Вылет в бою при спавне подкреплений — опустевший строй «колонна» — перехвачено Crash Doctor"
    zh: "援军生成时的战斗崩溃——已空的纵队队形——已被 Crash Doctor 拦截"
    zht: "援軍生成時的戰鬥崩潰——已空的縱隊隊形——已被 Crash Doctor 攔截"
    tr: "Takviye doğarken savaş çökmesi — boşalmış kol düzeni — Crash Doctor tarafından korunuyor"
  description:
    en: |
      ArgumentOutOfRangeException ("index") thrown from ColumnFormation.GetLocalPositionOfUnit
      while the game was placing newly spawned reinforcements
      (TryReinforcementSpawn → SpawnAgent → GetTroopSpawnFrameWithIndex). The game computes spawn
      positions against the formation's current arrangement; when that arrangement is a COLUMN
      whose head file has no soldiers left (the formation was wiped out or its lead unit died),
      vanilla code still reads the second element of a one-element position list and crashes the
      whole battle tick. Plain battles almost never use column order — it comes from mods:
      Immersive Battlefields makes reinforcements march in from the map edge in columns, and RTS
      Camera's command system offers a column order. This is a code/state bug, NOT a shader or
      driver problem — rebuilding shaders won't help.
    ru: |
      ArgumentOutOfRangeException («index») из ColumnFormation.GetLocalPositionOfUnit в момент,
      когда игра расставляла свежезаспавненные подкрепления
      (TryReinforcementSpawn → SpawnAgent → GetTroopSpawnFrameWithIndex). Позиции спавна
      считаются по текущему строю формации; если это «колонна», в голове которой не осталось
      бойцов (формацию выбили или погиб ведущий), ванильный код всё равно читает второй элемент
      списка из одного элемента — и роняет весь тик боя. В обычном бою строй «колонна» почти не
      встречается — его создают моды: Immersive Battlefields заставляет подкрепления маршировать
      от края карты колоннами, а командная система RTS Camera даёт приказ «колонна». Это баг
      кода/состояния, НЕ проблема шейдеров или драйвера — пересборка шейдеров не поможет.
    zh: |
      游戏在放置新生成的援军时（TryReinforcementSpawn → SpawnAgent →
      GetTroopSpawnFrameWithIndex），ColumnFormation.GetLocalPositionOfUnit 抛出了
      ArgumentOutOfRangeException（“index”）。生成位置按队形当前的阵型计算；当该阵型是
      纵队、且队首已没有士兵（队伍被打光或领头单位阵亡）时，原版代码仍会读取只有一个元素的
      位置列表的第二个元素——导致整个战斗 tick 崩溃。普通战斗几乎不会用纵队阵型——它来自
      模组：Immersive Battlefields 让援军从地图边缘列队行进入场，RTS Camera 的指挥系统提供
      纵队命令。这是代码/状态 bug，不是着色器或驱动问题——重建着色器没用。
    zht: |
      遊戲在放置新生成的援軍時（TryReinforcementSpawn → SpawnAgent →
      GetTroopSpawnFrameWithIndex），ColumnFormation.GetLocalPositionOfUnit 擲出了
      ArgumentOutOfRangeException（「index」）。生成位置按隊形當前的陣型計算；當該陣型是
      縱隊、且隊首已沒有士兵（隊伍被打光或領頭單位陣亡）時，原版程式碼仍會讀取只有一個元素的
      位置清單的第二個元素——導致整個戰鬥 tick 崩潰。普通戰鬥幾乎不會用縱隊陣型——它來自
      模組：Immersive Battlefields 讓援軍從地圖邊緣列隊行進入場，RTS Camera 的指揮系統提供
      縱隊命令。這是程式碼/狀態 bug，不是著色器或驅動問題——重建著色器沒用。
    tr: |
      Oyun yeni doğan takviyeleri yerleştirirken (TryReinforcementSpawn → SpawnAgent →
      GetTroopSpawnFrameWithIndex) ColumnFormation.GetLocalPositionOfUnit'ten
      ArgumentOutOfRangeException ("index") fırlatıldı. Doğma konumları birliğin mevcut düzenine
      göre hesaplanır; bu düzen, başında asker kalmamış bir KOL ise (birlik kırıldı veya öncü
      öldü), orijinal kod yine de tek elemanlı konum listesinin ikinci elemanını okur ve tüm savaş
      tick'ini düşürür. Sıradan savaşlarda kol düzeni neredeyse hiç kullanılmaz — onu modlar
      getirir: Immersive Battlefields takviyeleri harita kenarından kollar hâlinde yürüterek
      getirir, RTS Camera'nın komut sistemi de kol emri sunar. Bu bir kod/durum hatasıdır,
      gölgelendirici veya sürücü sorunu DEĞİL — gölgelendirici yeniden oluşturmak yardımcı olmaz.
  fix:
    en:
      - "Update Crash Doctor: starting with the next update it guards this crash — the «Reinforcement-spawn crash guard (column formation)» fix on the Crash Fixes tab. Keep it ON; reinforcements then use the default spawn position instead of crashing."
      - "To remove the trigger itself: in Immersive Battlefields settings disable marching/column reinforcements (or disable the mod for a test battle) — it is the usual source of column formations during reinforcement waves."
      - "If you use RTS Camera's command system: avoid leaving a formation under a column order when it is nearly wiped out — reinforcements spawning into that emptied column hit this bug."
      - "Do NOT rebuild shaders or change drivers — this is a formation/state bug, that won't help."
    ru:
      - "Обнови Crash Doctor: со следующего обновления этот вылет перехватывается — фикс «Защита от вылета при спавне подкреплений (строй «колонна»)» на вкладке «Фиксы крашей». Держи его ВКЛ — подкрепления появятся на стандартной позиции вместо вылета."
      - "Чтобы убрать сам триггер: в настройках Immersive Battlefields отключи марширующие/колонные подкрепления (или отключи мод на тестовый бой) — обычно именно он создаёт колонны в волнах подкреплений."
      - "Если пользуешься командной системой RTS Camera — не оставляй почти выбитую формацию под приказом «колонна»: подкрепления, спавнящиеся в эту опустевшую колонну, ловят этот баг."
      - "НЕ пересобирай шейдеры и не меняй драйвер — это баг формаций/состояния, не поможет."
    zh:
      - "更新 Crash Doctor：从下一个更新起会拦截此崩溃——「崩溃修复」页的「援军生成崩溃防护（纵队队形）」。保持开启；援军将改用默认生成位置而不是崩溃。"
      - "要消除触发源本身：在 Immersive Battlefields 设置中关闭行军/纵队援军（或临时禁用该模组打一场测试战斗）——援军波次中的纵队通常来自它。"
      - "如果你使用 RTS Camera 的指挥系统：不要让几乎被打光的队伍保持纵队命令——援军生成到这个已空的纵队时会触发此 bug。"
      - "不要重建着色器或更换驱动——这是阵型/状态 bug，没用。"
    zht:
      - "更新 Crash Doctor：從下一個更新起會攔截此崩潰——「崩潰修復」頁的「援軍生成崩潰防護（縱隊隊形）」。保持開啟；援軍將改用預設生成位置而不是崩潰。"
      - "要消除觸發源本身：在 Immersive Battlefields 設定中關閉行軍/縱隊援軍（或暫時停用該模組打一場測試戰鬥）——援軍波次中的縱隊通常來自它。"
      - "如果你使用 RTS Camera 的指揮系統：不要讓幾乎被打光的隊伍保持縱隊命令——援軍生成到這個已空的縱隊時會觸發此 bug。"
      - "不要重建著色器或更換驅動——這是陣型/狀態 bug，沒用。"
    tr:
      - "Crash Doctor'u güncelle: bir sonraki güncellemeden itibaren bu çökme korunuyor — Çökme Düzeltmeleri sekmesindeki «Takviye doğuşu çökme koruması (kol düzeni)» düzeltmesi. AÇIK tut; takviyeler çökmek yerine varsayılan doğma konumunu kullanır."
      - "Tetikleyiciyi tamamen kaldırmak için: Immersive Battlefields ayarlarında yürüyen/kol takviyelerini kapat (veya bir test savaşı için modu devre dışı bırak) — takviye dalgalarındaki kol düzenleri genellikle ondan gelir."
      - "RTS Camera'nın komut sistemini kullanıyorsan: neredeyse kırılmış bir birliği kol emri altında bırakma — o boşalmış kola doğan takviyeler bu hataya çarpar."
      - "Gölgelendiricileri yeniden oluşturma veya sürücü değiştirme — bu bir düzen/durum hatası, yardımcı olmaz."
  match:
    all:
      - managed_exception: { frame_contains: "ColumnFormation.GetLocalPositionOfUnit" }
      - managed_exception: { type_contains: "ArgumentOutOfRange" }

# End-of-battle mission-tick crash inside vanilla victory reactions. NullReferenceException from
# AgentVictoryLogic+<>c__DisplayClass30_0.<SetTimersOfVictoryReactionsOnRetreat>b__0 (the Where
# filter lambda) ← Enumerable.Where().ToList() ← AgentVictoryLogic.SetTimersOfVictoryReactionsOnRetreat
# ← BattleEndLogic.OnMissionTick ← Mission.OnTick. When one side retreats the engine filters agents
# with `agent.IsHuman && agent.IsAIControlled && agent.Team.Side == side`; an AI-controlled human
# agent whose Team is null makes `agent.Team.Side` NRE and the whole mission tick dies. A teamless
# human agent is produced by mods that spawn/summon units mid-battle without assigning a Team
# (TOR summons / raised dead are the common trigger). NOT a shader/driver problem and not really a
# TOR bug — vanilla engine fragility around victory cheers.
- id: mission.victory_reaction_retreat_nre
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-14 report(17).txt — NullReferenceException AgentVictoryLogic+<>c__DisplayClass30_0.<SetTimersOfVictoryReactionsOnRetreat>b__0 ← Enumerable.Where().ToList() ← AgentVictoryLogic.SetTimersOfVictoryReactionsOnRetreat ← BattleEndLogic.OnMissionTick ← Mission.OnTick. Modlist included TOR_Core. Captured by Crash Doctor managed capture."
  requires_sources: [managed_exception]
  title:
    en: "End-of-battle crash — a teamless soldier in victory reactions — guarded by Crash Doctor"
    ru: "Вылет в конце боя — боец без команды в победных реакциях — перехвачено Crash Doctor"
    zh: "战斗结束崩溃——胜利反应中有无队伍的士兵——已被 Crash Doctor 拦截"
    zht: "戰鬥結束崩潰——勝利反應中有無隊伍的士兵——已被 Crash Doctor 攔截"
    tr: "Savaş sonu çökmesi — zafer tepkilerinde takımsız bir asker — Crash Doctor tarafından korunuyor"
  description:
    en: |
      NullReferenceException from AgentVictoryLogic.SetTimersOfVictoryReactionsOnRetreat on the
      mission tick, when one side retreats and the engine picks which AI soldiers play a victory
      reaction (BattleEndLogic.OnMissionTick → SetTimersOfVictoryReactionsOnRetreat → Where().ToList()).
      The filter reads `agent.IsHuman && agent.IsAIControlled && agent.Team.Side == side`; one
      AI-controlled human agent has a null Team, so `agent.Team.Side` dereferences null and the
      whole mission tick crashes. A teamless human agent is never produced by the base game — it
      comes from a mod that spawns/summons a unit mid-battle without assigning it a Team (TOR
      summons / raised dead are the usual source). This is vanilla engine fragility, NOT a shader
      or driver problem and not really a TOR bug.
    ru: |
      NullReferenceException из AgentVictoryLogic.SetTimersOfVictoryReactionsOnRetreat на тике
      боя, когда одна сторона отступает и движок выбирает, кто из ИИ-бойцов отыграет победную
      реакцию (BattleEndLogic.OnMissionTick → SetTimersOfVictoryReactionsOnRetreat → Where().ToList()).
      Фильтр читает `agent.IsHuman && agent.IsAIControlled && agent.Team.Side == side`; у одного
      ИИ-бойца-человека команда (Team) равна null, поэтому `agent.Team.Side` разыменовывает null,
      и весь тик боя падает. Боец-человек без команды не появляется в базовой игре — он приходит
      от мода, который спавнит/призывает юнита в бою, не назначив ему Team (обычно это призывы /
      поднятие нежити TOR). Это хрупкость движка ваниль, а НЕ проблема шейдеров или драйвера, и
      не баг TOR.
    zh: |
      任务刻 tick 期间，当一方撤退、引擎挑选哪些 AI 士兵播放胜利反应时
      （BattleEndLogic.OnMissionTick → SetTimersOfVictoryReactionsOnRetreat → Where().ToList()），
      AgentVictoryLogic.SetTimersOfVictoryReactionsOnRetreat 抛出空引用异常。过滤器读取
      `agent.IsHuman && agent.IsAIControlled && agent.Team.Side == side`；某个 AI 控制的人类士兵
      的 Team 为 null，于是 `agent.Team.Side` 对空取引用，整个任务 tick 崩溃。没有队伍的人类士兵
      绝不会由原版生成——它来自某个在战斗中生成/召唤单位却未为其分配 Team 的模组（通常是 TOR
      的召唤/亡灵）。这是原版引擎的脆弱性，不是着色器或驱动问题，也不是 TOR 的错。
    zht: |
      任務刻 tick 期間，當一方撤退、引擎挑選哪些 AI 士兵播放勝利反應時
      （BattleEndLogic.OnMissionTick → SetTimersOfVictoryReactionsOnRetreat → Where().ToList()），
      AgentVictoryLogic.SetTimersOfVictoryReactionsOnRetreat 擲出空參考例外。過濾器讀取
      `agent.IsHuman && agent.IsAIControlled && agent.Team.Side == side`；某個 AI 控制的人類士兵
      的 Team 為 null，於是 `agent.Team.Side` 對空取參考，整個任務 tick 崩潰。沒有隊伍的人類士兵
      絕不會由原版生成——它來自某個在戰鬥中生成/召喚單位卻未為其分配 Team 的模組（通常是 TOR
      的召喚/亡靈）。這是原版引擎的脆弱性，不是著色器或驅動問題，也不是 TOR 的錯。
    tr: |
      Görev tick'inde, bir taraf geri çekilirken motor hangi AI askerlerinin zafer tepkisi
      oynayacağını seçerken (BattleEndLogic.OnMissionTick → SetTimersOfVictoryReactionsOnRetreat →
      Where().ToList()) AgentVictoryLogic.SetTimersOfVictoryReactionsOnRetreat'tan
      NullReferenceException fırlatıldı. Filtre `agent.IsHuman && agent.IsAIControlled &&
      agent.Team.Side == side` okur; AI kontrollü bir insan ajanın Team'i null olduğundan
      `agent.Team.Side` null'a başvurur ve tüm görev tick'i çöker. Takımsız bir insan ajan asla
      temel oyun tarafından üretilmez — savaş ortasında bir birimi Team atamadan doğuran/çağıran
      bir moddan gelir (genelde TOR çağırma / ölü diriltme). Bu, motorun orijinal kırılganlığıdır,
      gölgelendirici veya sürücü sorunu DEĞİL ve gerçekten bir TOR hatası değil.
  fix:
    en:
      - "Crash Doctor already guards this — its safety net swallows the crash and skips one cosmetic retreat cheer, so the battle keeps running. Keep the «End-of-battle retreat-cheer crash guard» fix ON (Crash Fixes tab)."
      - "Root cause is a mod that spawns/summons a soldier without a team. If you use summon / raise-dead abilities (TOR) or a mod that adds reinforcements mid-fight, that is the source — it is cosmetic, no action needed while the guard is on."
      - "Do NOT rebuild shaders or change drivers — this is a battle-state bug, that won't help."
    ru:
      - "Crash Doctor уже это перехватывает — safety net гасит вылет и пропускает один косметический клич при отступлении, бой продолжается. Держи фикс «Защита от вылета в конце боя (клич при отступлении)» ВКЛ (вкладка «Фиксы крашей»)."
      - "Корень — мод, спавнящий/призывающий бойца без команды. Если пользуешься призывом / поднятием нежити (TOR) или модом, добавляющим подкрепления прямо в бою — это источник; эффект косметический, пока защита включена, делать ничего не нужно."
      - "НЕ пересобирай шейдеры и не меняй драйвер — это баг состояния боя, не поможет."
    zh:
      - "Crash Doctor 已经拦截了它——安全网会吞掉崩溃并跳过一次纯装饰性的撤退欢呼，战斗继续运行。在「崩溃修复」页保持「战斗结束撤退欢呼崩溃防护」为开。"
