      - "治本：在「崩潰修復」頁保持「讀檔時修復損壞的部隊」為開，讀取存檔後再次儲存。這會把殘留的損壞部隊從所有隊伍中清除，崩潰就會徹底停止。"
      - "這些損壞部隊是已移除的自訂部隊模組（如 Special Troops Plus / FireArchers）的殘留。重新安裝該模組也能停止崩潰（部隊 ID 重新可解析），但清理＋重新儲存是更乾淨的辦法。"
