# War Sails (official naval DLC, module id "NavalDLC") world-map ship-visual crash, caused by a
# BROKEN third-party "Faster Ships" mod. AccessViolationException (0xC0000005) thrown from
# NavalMobilePartyVisual.UpdateEntityPosition inside NavalMobilePartyVisualManager.OnTick →
# TWParallel.For (parallel worker thread, native memory). NavalDLC is the OFFICIAL DLC (the game
# does NOT list it under "Unofficial modules"; warsails assets everywhere) — do NOT tell the
# player to delete it. Client 2026-06-05 ROOT CAUSE found in rgl_log: right after the valid
# NavalDLC/ModuleData/ship_hulls.xml, the game opens Modules/Faster Ships/ModuleData/faster_ships.xml
# and ShipHulls.xsd rejects every entry — ~92 ship hulls each MISSING 19 required attributes,
# including map_visual_scale and mission_ship (the exact data UpdateEntityPosition reads to place
# the ship entity on the map). Faster Ships overrides the hull table with junk; ships built on those
# hulls have a null/zero map-visual entity, and once enough naval parties exist (~50h) one ticks
# through the parallel visual update with a bad native pointer → AV. Crash lands in official DLC code
# because that's the consumer of Faster Ships' broken data. This is a corrupted-state exception on a
# worker thread, NOT a managed exception we can swallow — Crash Doctor can only NAME it. Opening
# Crash Doctor over the naval map keeps the naval tick alive → fires there too (same crash).
- id: engine.warsails_ship_visual_av
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-05 report.txt — AccessViolationException at NavalDLC.View.Map.Visuals.NavalMobilePartyVisual.UpdateEntityPosition ← NavalMobilePartyVisualManager.OnTick ← TWParallel.For ← MapState.OnMapModeTick. Native rgl_log_errors: 0xC0000005, bottom frame NavalDLC.View.pdb. rgl_log: NavalDLC absent from 'Unofficial modules' (= official War Sails DLC); 'Faster Ships/ModuleData/faster_ships.xml' fails ShipHulls.xsd with 1748 'required attribute missing' errors over 92 hulls (map_visual_scale, mission_ship, max_hitpoints, sea_worthiness, …). Captured by Crash Doctor managed capture (no BEW)."
  requires_sources: [managed_exception]
  title:
    en: "War Sails ship-visual crash caused by the broken 'Faster Ships' mod — remove Faster Ships, keep the DLC"
    ru: "Краш визуала кораблей War Sails из-за сломанного мода «Faster Ships» — удали Faster Ships, DLC оставь"
    zh: "War Sails 船只视觉崩溃，由损坏的「Faster Ships」模组引起——移除 Faster Ships，保留 DLC"
    zht: "War Sails 船隻視覺崩潰，由損壞的「Faster Ships」模組引起——移除 Faster Ships，保留 DLC"
    tr: "Bozuk 'Faster Ships' modunun yol açtığı War Sails gemi-görsel çökmesi — Faster Ships'i kaldır, DLC'yi koru"
  description:
    en: |
      AccessViolationException (0xC0000005 — read/write of protected memory) thrown from
      NavalMobilePartyVisual.UpdateEntityPosition (official "War Sails" DLC, module "NavalDLC"),
      called inside NavalMobilePartyVisualManager.OnTick through TWParallel.For — a parallel
      worker thread that positions every ship on the world map. The DLC itself is fine and is
      part of your game; the real cause is the third-party "Faster Ships" mod. In the log, right
      after the game loads the valid NavalDLC ship_hulls.xml it loads Faster Ships'
      faster_ships.xml, and the ship-hull validator rejects all ~92 of its hull entries — each is
      MISSING 19 required attributes, including map_visual_scale and mission_ship, the exact data
      this crash method reads to place the ship's 3D entity on the map. Faster Ships overwrites the
      ship-hull table with junk; ships built on those hulls get a null/zero map entity, and once
      enough naval parties exist (about 50h in) one of them ticks through the parallel visual update
      with a bad pointer and the engine instantly dies. That is why a fresh start scans clean (no
      such ship yet) and the crash only appears after hours of play. NOTE: opening Crash Doctor over
      the naval map (Ctrl+Alt+D) keeps the naval tick running, so it crashes there too — same crash.
    ru: |
      AccessViolationException (0xC0000005 — чтение/запись защищённой памяти) из метода
      NavalMobilePartyVisual.UpdateEntityPosition (официальное DLC «War Sails», модуль «NavalDLC»),
      вызванного внутри NavalMobilePartyVisualManager.OnTick через TWParallel.For — параллельный
      рабочий поток, который расставляет каждый корабль на карте мира. Само DLC исправно и является
      частью игры; настоящая причина — сторонний мод «Faster Ships». В логе сразу после того, как
      игра грузит корректный NavalDLC ship_hulls.xml, открывается faster_ships.xml этого мода, и
      валидатор корпусов кораблей отвергает все ~92 его записи — у каждой ОТСУТСТВУЮТ 19 обязательных
      атрибутов, включая map_visual_scale и mission_ship — ровно те данные, которые этот падающий
      метод читает, чтобы поставить 3D-модель корабля на карту. Faster Ships перезаписывает таблицу
      корпусов мусором; у кораблей на таких корпусах модель на карте оказывается null/нулевой, и как
      только морских отрядов накапливается достаточно (примерно к 50 часам), один из них проходит
      через параллельное обновление визуала с битым указателем — и движок мгновенно падает. Поэтому
      свежий старт сканируется чисто (такого корабля ещё нет), а краш появляется только спустя часы
      игры. ВАЖНО: открытие Crash Doctor поверх морской карты (Ctrl+Alt+D) не останавливает морской
      тик, поэтому там падает тоже — это тот же краш.
    zh: |
      AccessViolationException（0xC0000005——读写受保护内存）从
      NavalMobilePartyVisual.UpdateEntityPosition（官方「War Sails」DLC，模块「NavalDLC」）抛出，
      该方法在 NavalMobilePartyVisualManager.OnTick 中通过 TWParallel.For 调用——这是一个在世界
      地图上为每艘船定位的并行工作线程。DLC 本身没问题，是你游戏的一部分；真正的原因是第三方
      「Faster Ships」模组。日志显示：游戏加载了有效的 NavalDLC ship_hulls.xml 之后，紧接着加载
      Faster Ships 的 faster_ships.xml，而船体验证器拒绝了它全部约 92 条船体条目——每条都缺少
      19 个必需属性，包括 map_visual_scale 和 mission_ship，正是这个崩溃方法用来把船的 3D 实体
      放到地图上的数据。Faster Ships 用垃圾数据覆盖了船体表；基于这些船体的船只在地图上得到一个
      空/零实体，一旦海军队伍积累到足够多（大约 50 小时后），其中一个在并行视觉更新中带着错误
      指针被处理，引擎立即崩溃。这就是为什么全新开局扫描是干净的（还没有这种船），崩溃只在游戏
      数小时后出现。注意：在海图上打开 Crash Doctor（Ctrl+Alt+D）不会停止海军 tick，所以在那里
      也会崩溃——同一个崩溃。
    zht: |
      AccessViolationException（0xC0000005——讀寫受保護記憶體）從
      NavalMobilePartyVisual.UpdateEntityPosition（官方「War Sails」DLC，模組「NavalDLC」）擲出，
      該方法在 NavalMobilePartyVisualManager.OnTick 中透過 TWParallel.For 呼叫——這是一個在世界
      地圖上為每艘船定位的並行工作執行緒。DLC 本身沒問題，是你遊戲的一部分；真正的原因是第三方
      「Faster Ships」模組。日誌顯示：遊戲載入了有效的 NavalDLC ship_hulls.xml 之後，緊接著載入
      Faster Ships 的 faster_ships.xml，而船體驗證器拒絕了它全部約 92 條船體條目——每條都缺少
      19 個必要屬性，包括 map_visual_scale 和 mission_ship，正是這個崩潰方法用來把船的 3D 實體
      放到地圖上的資料。Faster Ships 用垃圾資料覆寫了船體表；基於這些船體的船隻在地圖上得到一個
      空/零實體，一旦海軍隊伍累積到足夠多（大約 50 小時後），其中一個在並行視覺更新中帶著錯誤
      指標被處理，引擎立即崩潰。這就是為什麼全新開局掃描是乾淨的（還沒有這種船），崩潰只在遊戲
      數小時後出現。注意：在海圖上開啟 Crash Doctor（Ctrl+Alt+D）不會停止海軍 tick，所以在那裡
      也會崩潰——同一個崩潰。
    tr: |
      NavalMobilePartyVisual.UpdateEntityPosition metodundan (resmî "War Sails" DLC, modül
      "NavalDLC") AccessViolationException (0xC0000005 — korumalı belleğin okunması/yazılması)
      fırlatıldı; bu metot NavalMobilePartyVisualManager.OnTick içinde TWParallel.For aracılığıyla
      çağrılır — dünya haritasındaki her gemiyi konumlandıran paralel bir çalışan iş parçacığı.
      DLC'nin kendisi sağlamdır ve oyunun bir parçasıdır; asıl neden üçüncü taraf "Faster Ships"
      modudur. Günlükte, oyun geçerli NavalDLC ship_hulls.xml dosyasını yükledikten hemen sonra
      Faster Ships'in faster_ships.xml dosyasını yükler ve gemi-gövdesi doğrulayıcısı onun ~92
      gövde girişinin tümünü reddeder — her biri map_visual_scale ve mission_ship dahil 19 zorunlu
      özniteliği EKSİK; bunlar tam olarak bu çöken metodun geminin 3B nesnesini haritaya yerleştirmek
      için okuduğu verilerdir. Faster Ships gövde tablosunu çöple ezer; bu gövdelere dayalı gemiler
      haritada null/sıfır bir nesne alır ve yeterince deniz grubu oluştuğunda (yaklaşık 50 saat sonra)
      bunlardan biri paralel görsel güncellemeden hatalı bir işaretçiyle geçer ve motor anında çöker.
      Bu yüzden yeni bir başlangıç temiz taranır (henüz böyle bir gemi yoktur) ve çökme yalnızca
      saatlerce oynadıktan sonra ortaya çıkar. NOT: Crash Doctor'u deniz haritasının üzerinde açmak
      (Ctrl+Alt+D) deniz tick'ini durdurmaz, orada da çöker — aynı çökme.
