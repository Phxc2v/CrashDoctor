# Campaign-map TICK crash inside the AUTO-RESOLVE (simulated) battle path. NullReferenceException from
# MapEventSide.ApplySimulatedHitRewardToSelectedTroop ← MapEvent.SimulateSingleTroopHit ←
# MapEvent.SimulateBattleRound ← MapEvent.SimulateBattleSessionForMapEvent ← MapEvent.Update ←
# MapEventManager.Tick ← Campaign.Tick. Every frame the engine auto-resolves AI-vs-AI map battles;
# the simulation picks a random troop from each side and ApplySimulatedHitRewardToSelectedTroop
# dereferences the striker's FirstBattleEquipment first thing. A party roster still carrying a troop
# whose CharacterObject no longer resolves (a "dangling troop" left after a custom-troop mod was
# removed) yields a null striker → NRE → the whole map tick dies. NOT a shader/driver problem.
- id: campaign.simulated_battle_hit_nre
  category: managed
  severity: critical
  confidence: high
  evidence_source: "Client crash 2026-06-15 report(22).txt — NullReferenceException TaleWorlds.CampaignSystem.MapEvents.MapEventSide.ApplySimulatedHitRewardToSelectedTroop ← MapEvent.SimulateSingleTroopHit ← MapEvent.SimulateBattleRound ← MapEvent.SimulateBattleSessionForMapEvent ← MapEvent.Update ← MapEventManager.Tick ← Campaign.Tick ← MapState.OnMapModeTick. Player had removed custom-troop mods (Special Troops Plus / FireArchers); crashes every ~10 min of map time. Captured by Crash Doctor managed capture."
  requires_sources: [managed_exception]
  title:
    en: "World-map crash — auto-resolving an AI battle hit a broken troop — guarded by Crash Doctor"
    ru: "Вылет на карте — авто-расчёт боя ИИ наткнулся на битого бойца — перехвачено Crash Doctor"
    zh: "世界地图崩溃——自动结算 AI 战斗时遇到损坏部队——已被 Crash Doctor 拦截"
    zht: "世界地圖崩潰——自動結算 AI 戰鬥時遇到損壞部隊——已被 Crash Doctor 攔截"
    tr: "Dünya haritası çökmesi — AI savaşını otomatik çözerken bozuk bir askere rastlandı — Crash Doctor tarafından korunuyor"
  description:
    en: |
      NullReferenceException from MapEventSide.ApplySimulatedHitRewardToSelectedTroop on the
      campaign-map tick, while the engine auto-resolves (simulates) a battle that AI parties are
      fighting on the world map (MapEventManager.Tick → MapEvent.Update → SimulateBattleRound →
      SimulateSingleTroopHit → ApplySimulatedHitRewardToSelectedTroop). The simulation picks a
      random troop from each side's roster; the reward method dereferences the striker troop's
      FirstBattleEquipment as its very first statement. Here the striker is null — a party's roster
      still carries a troop whose CharacterObject no longer resolves. That is the classic "dangling
      troop": after a custom-troop mod is removed (the report's player removed Special Troops Plus /
      FireArchers), the units AI lords had recruited remain referenced in the save but the IDs no
      longer load, so the lookup returns null. Because AI battles resolve constantly on a long save,
      this fires every few minutes of active map time. It is a mod/save-data issue, NOT a shader or
      driver problem, and not a TOR bug.
    ru: |
      NullReferenceException из MapEventSide.ApplySimulatedHitRewardToSelectedTroop на тике карты,
      когда движок авто-рассчитывает (симулирует) бой, который ИИ-партии ведут на глобальной карте
      (MapEventManager.Tick → MapEvent.Update → SimulateBattleRound → SimulateSingleTroopHit →
      ApplySimulatedHitRewardToSelectedTroop). Симуляция берёт случайного бойца из ростера каждой
      стороны; метод награды первым же действием разыменовывает FirstBattleEquipment бойца-атакующего.
      Здесь атакующий равен null — в ростере отряда остался боец, чей CharacterObject больше не
      резолвится. Это классический «висячий боец»: после удаления мода с войсками (игрок в репорте
      убрал Special Troops Plus / FireArchers) юниты, которых успели нанять ИИ-лорды, остаются в
      сейве по ссылке, но их ID больше не грузятся, и поиск возвращает null. Поскольку на долгом
      сейве бои ИИ идут постоянно, вылет повторяется каждые несколько минут активного времени на
      карте. Это проблема мода/данных сейва, а НЕ шейдеров или драйвера, и не баг TOR.
    zh: |
      战役地图 tick 期间，当引擎自动结算（模拟）AI 队伍在世界地图上进行的战斗时
      （MapEventManager.Tick → MapEvent.Update → SimulateBattleRound → SimulateSingleTroopHit →
      ApplySimulatedHitRewardToSelectedTroop），MapEventSide.ApplySimulatedHitRewardToSelectedTroop
      抛出空引用异常。模拟从每一方的名册中随机挑选一名部队；奖励方法第一步就对攻击方部队的
      FirstBattleEquipment 取引用。此处攻击方为 null——某队伍名册中仍带有一名其 CharacterObject
      已无法解析的部队。这就是典型的“悬空部队”：移除自定义部队模组后（报告中的玩家移除了
      Special Troops Plus / FireArchers），AI 领主曾招募的单位仍在存档中被引用，但其 ID 已无法加载，
      于是查找返回 null。由于长存档中 AI 战斗持续发生，此崩溃每隔几分钟的活跃地图时间就会触发。
      这是模组／存档数据问题，不是着色器或驱动问题，也不是 TOR 的 bug。
    zht: |
      戰役地圖 tick 期間，當引擎自動結算（模擬）AI 隊伍在世界地圖上進行的戰鬥時
      （MapEventManager.Tick → MapEvent.Update → SimulateBattleRound → SimulateSingleTroopHit →
      ApplySimulatedHitRewardToSelectedTroop），MapEventSide.ApplySimulatedHitRewardToSelectedTroop
      擲出空參考例外。模擬從每一方的名冊中隨機挑選一名部隊；獎勵方法第一步就對攻擊方部隊的
      FirstBattleEquipment 取參考。此處攻擊方為 null——某隊伍名冊中仍帶有一名其 CharacterObject
      已無法解析的部隊。這就是典型的「懸空部隊」：移除自訂部隊模組後（報告中的玩家移除了
      Special Troops Plus / FireArchers），AI 領主曾招募的單位仍在存檔中被引用，但其 ID 已無法載入，
      於是查找回傳 null。由於長存檔中 AI 戰鬥持續發生，此崩潰每隔幾分鐘的活躍地圖時間就會觸發。
      這是模組／存檔資料問題，不是著色器或驅動問題，也不是 TOR 的 bug。
    tr: |
      Sefer haritası tick'inde, motor AI gruplarının dünya haritasında verdiği bir savaşı otomatik
      çözerken (simüle ederken) MapEventSide.ApplySimulatedHitRewardToSelectedTroop'tan
      NullReferenceException fırlatıldı (MapEventManager.Tick → MapEvent.Update → SimulateBattleRound
      → SimulateSingleTroopHit → ApplySimulatedHitRewardToSelectedTroop). Simülasyon her tarafın
      kadrosundan rastgele bir asker seçer; ödül metodu ilk iş olarak vuran askerin
      FirstBattleEquipment'ına başvurur. Burada vuran asker null — bir grubun kadrosu, CharacterObject'i
      artık çözülmeyen bir asker taşımaya devam ediyor. Bu klasik "sarkan asker"dir: özel birlik modu
      kaldırıldıktan sonra (rapordaki oyuncu Special Troops Plus / FireArchers'ı kaldırmış), AI
      lortlarının topladığı birimler kayıtta referanslı kalır ama ID'ler artık yüklenmez, dolayısıyla
      arama null döner. Uzun bir kayıtta AI savaşları sürekli çözüldüğü için bu, aktif harita
      süresinin her birkaç dakikasında tetiklenir. Bu bir mod/kayıt-verisi sorunudur, gölgelendirici
      veya sürücü sorunu DEĞİL ve bir TOR hatası değil.
  fix:
    en:
      - "Crash Doctor already guards this — its safety net swallows the crash and skips that one auto-resolve hit, so the world map keeps running. Keep the «Auto-resolve battle crash guard (broken troop)» fix ON (Crash Fixes tab)."
      - "Fix the root: keep «Fix broken troops on save load» ON (Crash Fixes tab), load the save, then RE-SAVE. That scrubs the leftover broken troops out of every party so the crash stops for good."
      - "These broken troops are leftovers from a removed custom-troop mod (e.g. Special Troops Plus / FireArchers). Re-installing that mod also stops the crash (the troop IDs resolve again), but the cleanup + re-save is the cleaner fix."
      - "Do NOT rebuild shaders or change drivers — this is a save-data bug, that won't help."
    ru:
      - "Crash Doctor уже это перехватывает — safety net гасит вылет и пропускает один удар авто-расчёта, карта продолжает работать. Держи фикс «Защита от вылета при авто-расчёте боя (битый боец)» ВКЛ (вкладка «Фиксы крашей»)."
      - "Почини корень: держи «Чинить сломанные отряды при загрузке» ВКЛ (вкладка «Фиксы крашей»), загрузи сейв и ПЕРЕСОХРАНИ. Это вычистит оставшихся битых бойцов из всех отрядов, и вылет прекратится навсегда."
      - "Эти битые бойцы — остатки удалённого мода с войсками (напр. Special Troops Plus / FireArchers). Вернуть этот мод тоже убирает вылет (ID войск снова резолвятся), но чистка + пересохранение — более чистое решение."
      - "НЕ пересобирай шейдеры и не меняй драйвер — это баг данных сейва, не поможет."
    zh:
      - "Crash Doctor 已经拦截了它——安全网会吞掉崩溃并跳过那一次自动结算攻击，世界地图继续运行。在「崩溃修复」页保持「自动结算战斗崩溃防护（损坏部队）」为开。"
      - "治本：在「崩溃修复」页保持「读档时修复损坏的部队」为开，读取存档后再次保存。这会把残留的损坏部队从所有队伍中清除，崩溃就会彻底停止。"
