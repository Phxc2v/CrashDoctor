      - "Kökü düzelt: «Kayıt yüklenirken bozuk birlikleri onar»ı AÇIK tut (Çökme Düzeltmeleri sekmesi), kaydı yükle ve YENİDEN KAYDET. Bu, kalan bozuk askerleri her gruptan temizler ve çökme kalıcı olarak durur."
