- id: mission.deployment_formation_clear_crash
  category: mission
  severity: warning
  confidence: medium
  evidence_source: "Real client log 2026-05-04 (Гевор) — log truncates immediately after 'Selected formations being cleared' during pre-battle troop transfer."
  requires_sources: [log_line]
  title:
    en: "Crash during pre-battle deployment phase (formation troop transfer)"
    ru: "Краш в фазе расстановки перед боем (перенос юнитов между формациями)"
    zh: "战前部署阶段崩溃（在编队间转移部队）"
    zht: "戰前部署階段崩潰（在編隊間轉移部隊）"
    tr: "Savaş öncesi yerleştirme aşamasında çökme (düzen arası birlik aktarımı)"
  description:
    en: |
      Real-world signature from a client crash: log ends right after a troop-transfer
      between formations + 'Selected formations being cleared' line, mid-battle in
      the deployment screen. The next line never gets written — the game dies inside
      Mission's formation/troop-roster manipulation. Strongly correlated with mods
      that patch deployment / troop-pool logic (RestoreLordTroops, RBM, custom
      faction mods that override DeploymentMissionController).

      Without a managed stack trace (BetterExceptionWindow / BLSE) we can't name
      the patcher. Install BLSE if this repeats — see m41 module.
    ru: |
      Сигнатура с реального клиентского краша: лог обрывается сразу после переноса
      войск между формациями + строки 'Selected formations being cleared', в
      середине фазы расстановки. Следующая строка не успевает записаться — игра
      умирает внутри манипуляции formation/troop-roster в Mission. Сильно коррелирует
      с модами, которые патчат deployment / troop-pool логику (RestoreLordTroops,
      RBM, кастомные мод-фракции с override DeploymentMissionController).

      Без managed-стека (BetterExceptionWindow / BLSE) патчер не назовём.
      Поставь BLSE на следующую сессию — см. модуль m41.
    zh: |
      来自真实客户崩溃的特征：日志在编队间转移部队 + 'Selected formations being
      cleared' 这行之后立即结束，正处于部署界面的战斗中途。下一行始终没有写出来——
      游戏在 Mission 的编队 / 部队名册操作内部崩溃。与修补部署 / 部队池逻辑的模组高度
      相关（RestoreLordTroops、RBM、覆盖 DeploymentMissionController 的自定义势力模组）。

      没有托管堆栈（BetterExceptionWindow / BLSE）就无法指认是哪个补丁所致。如果反复
      出现就安装 BLSE——见 m41 模块。
    zht: |
      來自真實客戶崩潰的特徵：日誌在編隊間轉移部隊 + 'Selected formations being
      cleared' 這行之後立即結束，正處於部署介面的戰鬥中途。下一行始終沒有寫出來——
      遊戲在 Mission 的編隊 / 部隊名冊操作內部崩潰。與修補部署 / 部隊池邏輯的模組高度
      相關（RestoreLordTroops、RBM、覆寫 DeploymentMissionController 的自訂勢力模組）。

      沒有託管堆疊（BetterExceptionWindow / BLSE）就無法指認是哪個修補程式所致。如果反覆
      出現就安裝 BLSE——見 m41 模組。
    tr: |
      Gerçek bir müşteri çökmesinden alınan imza: günlük, düzenler arası bir birlik
      aktarımı + 'Selected formations being cleared' satırından hemen sonra,
      yerleştirme ekranında savaş ortasında biter. Sonraki satır hiç yazılmaz —
      oyun, Mission'ın düzen/birlik-kadro işleme kodu içinde ölür. Yerleştirme /
      birlik-havuzu mantığını yamalayan modlarla güçlü şekilde ilişkilidir
      (RestoreLordTroops, RBM, DeploymentMissionController'ı geçersiz kılan özel
      hizip modları).

      Yönetilen bir yığın izi (BetterExceptionWindow / BLSE) olmadan yamayı
      adlandıramayız. Tekrarlarsa BLSE kur — bkz. m41 modülü.
  fix:
    en:
      - "Try a battle WITHOUT moving troops between formations in deployment — if it still crashes, the cause is elsewhere; if it doesn't, the trigger is confirmed."
      - "Disable mods that patch troop pool / deployment one at a time: RestoreLordTroops, RBM, custom factions. Re-enable in groups to find the culprit."
      - "Steam → Verify integrity (catches partial Bannerlord install if a deployment asset is missing)."
      - "Install BLSE + BetterExceptionWindow before next session — captures managed stack with patcher name."
      - "If campaign-wide: send the crash_report.html (after BLSE is installed) to t.me/CodeRickTg."
    ru:
      - "Попробуй бой БЕЗ перемещения войск между формациями в расстановке — если всё равно крашится, причина в другом; если нет — триггер подтверждён."
      - "Отключай по одному моды, патчащие troop pool / deployment: RestoreLordTroops, RBM, кастомные фракции. Включай по группам — ищи виновника."
      - "Steam → Проверить целостность (ловит частичный install если отсутствует deployment-ассет)."
      - "Поставь BLSE + BetterExceptionWindow к следующей сессии — поймает managed-стек с именем патчера."
      - "Если повторяется — пришли crash_report.html (после установки BLSE) в t.me/CodeRickTg."
    zh:
      - "试一场战斗，在部署时不在编队间移动部队——如果仍然崩溃，原因在别处；如果不崩，触发条件就确认了。"
      - "逐个禁用修补部队池 / 部署的模组：RestoreLordTroops、RBM、自定义势力。再按组重新启用以找出元凶。"
      - "Steam → 验证文件完整性（如果缺少某个部署资源，可发现 Bannerlord 安装不完整）。"
      - "下次游戏前安装 BLSE + BetterExceptionWindow——能捕获带补丁名称的托管堆栈。"
      - "如果整个战役都这样：（装好 BLSE 后）把 crash_report.html 发到 t.me/CodeRickTg。"
    zht:
      - "試一場戰鬥，在部署時不在編隊間移動部隊——如果仍然崩潰，原因在別處；如果不崩，觸發條件就確認了。"
      - "逐個停用修補部隊池 / 部署的模組：RestoreLordTroops、RBM、自訂勢力。再按組重新啟用以找出元兇。"
      - "Steam → 驗證檔案完整性（如果缺少某個部署資源，可發現 Bannerlord 安裝不完整）。"
      - "下次遊戲前安裝 BLSE + BetterExceptionWindow——能擷取帶修補程式名稱的託管堆疊。"
      - "如果整個戰役都這樣：（裝好 BLSE 後）把 crash_report.html 發到 t.me/CodeRickTg。"
    tr:
      - "Yerleştirmede düzenler arası birlik taşımadan bir savaş dene — yine çöküyorsa neden başka yerde; çökmüyorsa tetikleyici doğrulanmıştır."
      - "Birlik havuzunu / yerleştirmeyi yamalayan modları teker teker devre dışı bırak: RestoreLordTroops, RBM, özel hizipler. Suçluyu bulmak için gruplar hâlinde yeniden etkinleştir."
      - "Steam → Bütünlüğü doğrula (bir yerleştirme varlığı eksikse kısmi Bannerlord kurulumunu yakalar)."
      - "Bir sonraki oturumdan önce BLSE + BetterExceptionWindow kur — yama adıyla birlikte yönetilen yığını yakalar."
      - "Sefer genelindeyse: (BLSE kurulduktan sonra) crash_report.html dosyasını t.me/CodeRickTg adresine gönder."
  match:
    # Drop the redundant `contains "transfers"` filter — the regex already
    # narrows on "transfers N unit(s) to", so adding a substring check on
    # "transfers" alone widened the pre-filter without changing the result.
    all:
      - log_line:
          regex: "transfers \\d+ units? to"
      - log_line:
          contains: "Selected formations being cleared"

- id: mission.inventory_screen_crash
  category: mission
  severity: warning
  confidence: medium
  evidence_source: "TOR-bug-corpus.md TOR-014 — multiple Steam Community comments. Signature: rgl_log truncates on inventory-screen open."
  requires_sources: [log_line]
  title:
    en: "Crash on inventory screen open (equipment-mod conflict)"
    ru: "Краш при открытии инвентаря (конфликт equipment-мода)"
    zh: "打开物品栏界面时崩溃（装备模组冲突）"
    zht: "開啟物品欄介面時崩潰（裝備模組衝突）"
    tr: "Envanter ekranı açılırken çökme (ekipman-mod çakışması)"
  description:
    en: |
      Click on the inventory tab → game dies. Signature in rgl_log: last entries
      show GauntletInventoryScreen.HandleActivate / HandleResume followed by no
      further content (game crashed during inventory population). On TOR
      installs the typical cause is an equipment mod (OpenSourceArmory,
      ExpandedArmoury, Distinguished Service) that breaks TOR's equipment IDs.

      Vanilla can also hit this if a mod added an item to a hero's equipment that
      no longer exists (mod uninstalled mid-save).
    ru: |
      Клик на вкладку инвентарь → игра падает. Сигнатура в rgl_log: последние
      записи — GauntletInventoryScreen.HandleActivate / HandleResume, после
      них пустота (игра упала во время заполнения инвентаря). На TOR-установках
      типовая причина — equipment-мод (OpenSourceArmory, ExpandedArmoury,
      Distinguished Service), ломающий equipment ID'ы TOR.

      Ванилла тоже может упасть если мод добавил герою вещь, которой теперь
      нет (мод удалили посреди сейва).
    zh: |
      点击物品栏标签页 → 游戏崩溃。rgl_log 中的特征：最后几条记录是
      GauntletInventoryScreen.HandleActivate / HandleResume，之后再无内容（游戏在填充
      物品栏时崩溃）。在 TOR 安装环境中，典型原因是某个装备模组（OpenSourceArmory、
      ExpandedArmoury、Distinguished Service）破坏了 TOR 的装备 ID。

      如果某个模组给英雄的装备里加了一件如今已不存在的物品（模组在存档中途被卸载），
      原版也可能遇到这个问题。
    zht: |
      點擊物品欄標籤頁 → 遊戲崩潰。rgl_log 中的特徵：最後幾條記錄是
      GauntletInventoryScreen.HandleActivate / HandleResume，之後再無內容（遊戲在填充
      物品欄時崩潰）。在 TOR 安裝環境中，典型原因是某個裝備模組（OpenSourceArmory、
      ExpandedArmoury、Distinguished Service）破壞了 TOR 的裝備 ID。

      如果某個模組給英雄的裝備裡加了一件如今已不存在的物品（模組在存檔中途被解除安裝），
      原版也可能遇到這個問題。
    tr: |
      Envanter sekmesine tıkla → oyun ölür. rgl_log'daki imza: son girişler
      GauntletInventoryScreen.HandleActivate / HandleResume gösterir, ardından
      başka içerik gelmez (oyun envanter doldurulurken çöktü). TOR kurulumlarında
      tipik neden, TOR'un ekipman kimliklerini bozan bir ekipman modudur
      (OpenSourceArmory, ExpandedArmoury, Distinguished Service).

      Bir mod, bir kahramanın ekipmanına artık var olmayan bir eşya eklediyse
      (mod kayıt ortasında kaldırıldıysa) orijinal oyun da bununla karşılaşabilir.
  fix:
    en:
      - "Disable equipment mods (OpenSourceArmory, ExpandedArmoury, Distinguished Service) and try again."
      - "If using TOR + Distinguished Service — install the TOR DS Compat Patch on Nexus."
      - "If problem persists vanilla: load an earlier save before the equipment mod was added/removed."
      - "Steam → Verify integrity to confirm no missing equipment XMLs."
    ru:
      - "Отключи equipment-моды (OpenSourceArmory, ExpandedArmoury, Distinguished Service) и попробуй снова."
      - "Если стоит TOR + Distinguished Service — поставь TOR DS Compat Patch с Nexus."
      - "Если проблема осталась на чистой ванилле: загрузи более ранний сейв ДО добавления/удаления equipment-мода."
      - "Steam → Проверить целостность — убедиться что XML с экипировкой не пропали."
    zh:
      - "禁用装备模组（OpenSourceArmory、ExpandedArmoury、Distinguished Service）后再试。"
      - "如果在用 TOR + Distinguished Service——在 Nexus 上安装 TOR DS Compat Patch。"
      - "如果在纯原版下问题仍在：读取添加 / 移除该装备模组之前的更早存档。"
      - "Steam → 验证文件完整性，以确认没有缺失的装备 XML。"
    zht:
      - "停用裝備模組（OpenSourceArmory、ExpandedArmoury、Distinguished Service）後再試。"
      - "如果在用 TOR + Distinguished Service——在 Nexus 上安裝 TOR DS Compat Patch。"
      - "如果在純原版下問題仍在：讀取加入 / 移除該裝備模組之前的更早存檔。"
      - "Steam → 驗證檔案完整性，以確認沒有缺失的裝備 XML。"
    tr:
      - "Ekipman modlarını devre dışı bırak (OpenSourceArmory, ExpandedArmoury, Distinguished Service) ve tekrar dene."
      - "TOR + Distinguished Service kullanıyorsan — Nexus'tan TOR DS Compat Patch'i kur."
      - "Sorun orijinal oyunda da sürüyorsa: ekipman modu eklenmeden/kaldırılmadan önceki daha eski bir kaydı yükle."
      - "Steam → Bütünlüğü doğrula, eksik ekipman XML'i olmadığını teyit et."
  match:
    all:
      - log_line:
          contains: "GauntletInventoryScreen"
      - any:
          - log_line:
              contains: "EquipmentElement"
          - log_line:
              contains: "Equipment.GetEquipmentFromSlot"
          - log_line:
              contains: "TransferItem"

- id: mission.loot_screen_crash
  category: mission
  severity: warning
  confidence: low
  evidence_source: "TOR-bug-corpus.md TOR-015 — Steam Community comments. Confidence low because signature is weak (rgl_log just ends after 'battle won')."
  requires_sources: [log_line]
  title:
    en: "Crash on loot screen after battle"
    ru: "Краш на экране лута после боя"
    zh: "战斗后战利品界面崩溃"
    zht: "戰鬥後戰利品介面崩潰"
    tr: "Savaştan sonra ganimet ekranında çökme"
  description:
    en: |
      Battle ends → loot screen → crash. Often a NullReference inside
      MissionAfterMath / LootCampaignBehavior, triggered by a third-party
      loot-modifying mod (Loot Anywhere, Loot Filter) that patched logic
      after the underlying class signature changed.

      Confidence is low — the rgl_log signature is just 'battle won' followed
      by silence. Without a crash_report.html from BLSE we can't pin it.
    ru: |
      Бой кончился → экран лута → краш. Часто это NullReference в
      MissionAfterMath / LootCampaignBehavior, спровоцированный сторонним
      loot-модом (Loot Anywhere, Loot Filter), который запатчил логику —
      и логика поменялась под ним.

      Confidence низкий — сигнатура в rgl_log только 'battle won' и тишина.
      Без crash_report.html от BLSE точно не диагностируем.
    zh: |
      战斗结束 → 战利品界面 → 崩溃。常见于 MissionAfterMath / LootCampaignBehavior
      内部的空引用，由某个第三方修改战利品的模组（Loot Anywhere、Loot Filter）触发——
      它在底层类签名改变之后仍然修补了原有逻辑。

      置信度低——rgl_log 中的特征只是 'battle won' 然后一片沉默。没有 BLSE 提供的
      crash_report.html，我们无法确定原因。
    zht: |
      戰鬥結束 → 戰利品介面 → 崩潰。常見於 MissionAfterMath / LootCampaignBehavior
      內部的空引用，由某個第三方修改戰利品的模組（Loot Anywhere、Loot Filter）觸發——
      它在底層類別簽章改變之後仍然修補了原有邏輯。

      信賴度低——rgl_log 中的特徵只是 'battle won' 然後一片沉默。沒有 BLSE 提供的
      crash_report.html，我們無法確定原因。
    tr: |
      Savaş biter → ganimet ekranı → çökme. Genellikle MissionAfterMath /
      LootCampaignBehavior içinde bir boş referans; altta yatan sınıf imzası
      değiştikten sonra mantığı yamalayan üçüncü taraf bir ganimet-değiştiren mod
      (Loot Anywhere, Loot Filter) tarafından tetiklenir.

      Güven düşük — rgl_log imzası sadece 'battle won' ve ardından sessizlik.
      BLSE'den bir crash_report.html olmadan kesin olarak belirleyemeyiz.
  fix:
    en:
      - "Disable loot-modifying mods (Loot Anywhere, Loot Filter, custom drop-rate mods)."
      - "Reload the pre-battle save and try the same battle again — if reproducible, mod conflict; if not, race condition (won't repeat reliably)."
      - "Install BLSE + BetterExceptionWindow for managed stack on next occurrence."
    ru:
      - "Отключи loot-моды (Loot Anywhere, Loot Filter, кастомные drop-rate моды)."
      - "Загрузи сейв ДО боя и попробуй тот же бой ещё раз — если воспроизводится, конфликт мода; если нет — race-condition (стабильно не повторится)."
      - "Поставь BLSE + BetterExceptionWindow — на следующем краше будет managed-стек."
    zh:
      - "禁用修改战利品的模组（Loot Anywhere、Loot Filter、自定义掉率模组）。"
      - "读取战斗前的存档，再打同一场战斗——如果能复现，就是模组冲突；如果不能，就是竞态问题（不会稳定重现）。"
      - "安装 BLSE + BetterExceptionWindow，以便下次发生时获得托管堆栈。"
    zht:
      - "停用修改戰利品的模組（Loot Anywhere、Loot Filter、自訂掉率模組）。"
      - "讀取戰鬥前的存檔，再打同一場戰鬥——如果能重現，就是模組衝突；如果不能，就是競態問題（不會穩定重現）。"
      - "安裝 BLSE + BetterExceptionWindow，以便下次發生時取得託管堆疊。"
    tr:
      - "Ganimet-değiştiren modları devre dışı bırak (Loot Anywhere, Loot Filter, özel düşme oranı modları)."
      - "Savaş öncesi kaydı yükle ve aynı savaşı tekrar dene — tekrarlanabiliyorsa mod çakışması; değilse yarış durumu (güvenilir şekilde tekrarlamaz)."
      - "Bir sonraki olayda yönetilen yığın için BLSE + BetterExceptionWindow kur."
  match:
    all:
      - log_line:
          contains: "MissionAfterMath"
      - any:
          - log_line:
              contains: "NullReference"
          - log_line:
              contains: "LootCampaignBehavior"

- id: mp.steam_session_init_fail
  category: networking
  severity: warning
  confidence: medium
  evidence_source: "Common Steam multiplayer session init failures — Steam Community discussions."
  requires_sources: [log_line]
  title:
    en: "Steam session init failed — multiplayer / Workshop sync broken"
    ru: "Не удалось инициировать сессию Steam — multiplayer / Workshop sync сломаны"
    zh: "Steam 会话初始化失败——多人 / 创意工坊同步损坏"
    zht: "Steam 工作階段初始化失敗——多人 / 創意工坊同步損壞"
    tr: "Steam oturumu başlatılamadı — çok oyunculu / Workshop senkronizasyonu bozuk"
  description:
    en: |
      Bannerlord couldn't establish a Steam session. Means: SteamAPI handshake
      failed, Workshop API didn't respond, or the user's Steam client is offline.
      Multiplayer entirely unavailable; Workshop-mod auto-update doesn't run;
      cloud saves don't sync.

      Most common cause is Steam in offline mode (or its login token expired).
      Less common: Steam process not running, antivirus blocking SteamAPI64.dll,
      or transient Steam outage (check steamstat.us).
    ru: |
      Bannerlord не смог установить сессию Steam. Означает: SteamAPI handshake
      провалился, Workshop API не ответил, или клиент Steam офлайн. Multiplayer
      недоступен; авто-обновление Workshop-модов не работает; cloud-сейвы
      не синхронизируются.

      Самая частая причина — Steam в offline-режиме (или login token истёк).
      Реже: процесс Steam не запущен, антивирус блокирует SteamAPI64.dll,
      или временный отказ Steam (проверь steamstat.us).
    zh: |
      Bannerlord 无法建立 Steam 会话。意味着：SteamAPI 握手失败、创意工坊 API 没有
      响应，或者用户的 Steam 客户端处于离线状态。多人游戏完全不可用；创意工坊模组的
      自动更新不会运行；云存档不会同步。

      最常见的原因是 Steam 处于离线模式（或其登录令牌过期）。较少见的：Steam 进程
      没在运行、杀毒软件拦截了 SteamAPI64.dll，或者 Steam 临时故障（查看 steamstat.us）。
    zht: |
      Bannerlord 無法建立 Steam 工作階段。意味著：SteamAPI 交握失敗、創意工坊 API 沒有
      回應，或者使用者的 Steam 用戶端處於離線狀態。多人遊戲完全不可用；創意工坊模組的
      自動更新不會執行；雲端存檔不會同步。

      最常見的原因是 Steam 處於離線模式（或其登入權杖過期）。較少見的：Steam 行程
      沒在執行、防毒軟體攔截了 SteamAPI64.dll，或者 Steam 臨時故障（查看 steamstat.us）。
    tr: |
      Bannerlord bir Steam oturumu kuramadı. Şu anlama gelir: SteamAPI el sıkışması
      başarısız oldu, Workshop API yanıt vermedi ya da kullanıcının Steam istemcisi
      çevrimdışı. Çok oyunculu tamamen kullanılamaz; Workshop-mod otomatik
      güncellemesi çalışmaz; bulut kayıtları senkronize olmaz.

      En yaygın neden, Steam'in çevrimdışı modda olması (veya oturum açma
      belirtecinin süresinin dolması). Daha az yaygın: Steam süreci çalışmıyor,
      antivirüs SteamAPI64.dll'i engelliyor ya da geçici bir Steam kesintisi
      (steamstat.us'a bak).
  fix:
    en:
      - "Restart Steam: full quit from system tray (right-click → Exit), wait 10 seconds, relaunch."
      - "Steam → click your username → 'Go online' if it shows offline."
      - "Antivirus exclusion: add SteamAPI64.dll path (typically <Steam>\\steamapps\\common\\Mount & Blade II Bannerlord\\bin\\Win64_Shipping_Client\\)."
      - "Check Steam status at https://steamstat.us — if 'Steam API' is red, wait it out."
    ru:
      - "Перезапусти Steam: полный выход из системного трея (ПКМ → Выход), подожди 10 секунд, запусти заново."
      - "Steam → клик по имени → 'В сеть' если показывает offline."
      - "Исключение антивируса: добавь путь к SteamAPI64.dll (обычно <Steam>\\steamapps\\common\\Mount & Blade II Bannerlord\\bin\\Win64_Shipping_Client\\)."
      - "Проверь статус Steam на https://steamstat.us — если 'Steam API' красный, ждать."
    zh:
      - "重启 Steam：从系统托盘完全退出（右键 → 退出），等 10 秒，再重新启动。"
      - "Steam → 点击你的用户名 → 如果显示离线就点“切换到在线”。"
      - "杀毒软件排除：添加 SteamAPI64.dll 的路径（通常是 <Steam>\\steamapps\\common\\Mount & Blade II Bannerlord\\bin\\Win64_Shipping_Client\\）。"
      - "在 https://steamstat.us 查看 Steam 状态——如果 'Steam API' 显示红色，等它恢复。"
    zht:
      - "重新啟動 Steam：從系統匣完全退出（右鍵 → 退出），等 10 秒，再重新啟動。"
      - "Steam → 點擊你的使用者名稱 → 如果顯示離線就點「切換到線上」。"
      - "防毒軟體排除：加入 SteamAPI64.dll 的路徑（通常是 <Steam>\\steamapps\\common\\Mount & Blade II Bannerlord\\bin\\Win64_Shipping_Client\\）。"
      - "在 https://steamstat.us 查看 Steam 狀態——如果 'Steam API' 顯示紅色，等它恢復。"
    tr:
      - "Steam'i yeniden başlat: sistem tepsisinden tamamen çık (sağ tık → Çık), 10 saniye bekle, yeniden başlat."
      - "Steam → kullanıcı adına tıkla → çevrimdışı görünüyorsa 'Çevrimiçi ol'."
      - "Antivirüs istisnası: SteamAPI64.dll yolunu ekle (genellikle <Steam>\\steamapps\\common\\Mount & Blade II Bannerlord\\bin\\Win64_Shipping_Client\\)."
      - "Steam durumunu https://steamstat.us adresinde kontrol et — 'Steam API' kırmızıysa geçmesini bekle."
  match:
    any:
      - log_line:
          contains: "SteamAPI_Init failed"
      - log_line:
          contains: "Steam session could not be initialized"
      # "SteamAPI returned error" dropped — it shows up as a warning on
      # transient hiccups (network blip, Workshop temporarily offline) without
      # crashing the game, and the recommendation here is "restart Steam",
      # which is wrong advice for the transient case.
